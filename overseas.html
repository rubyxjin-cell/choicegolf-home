<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해외 골프상품 | 초이스골프</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Italianno&family=Noto+Serif+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

<style>
:root {
  --navy-900: #0a1628;
  --navy-800: #14243e;
  --navy-700: #1f3557;
  --gold: #c9a961;
  --gold-light: #e4c97e;
  --gold-deep: #a88a4b;
  --cream: #faf7f0;
  --cream-warm: #f4ecda;
  --forest: #1B4332;
  --forest-deep: #0e2e1f;
  --ink: #1a1a1a;
  --gray-900: #252525;
  --gray-700: #4a4a4a;
  --gray-500: #8a8a8a;
  --gray-400: #b8b8b8;
  --gray-300: #d4d4d4;
  --gray-200: #e5e5e5;
  --gray-100: #f5f5f5;
  --white: #ffffff;
  --line: #e8e3d6;
  --red-hot: #dc2626;
  --kakao: #fee500;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
  color: var(--ink); background: var(--cream);
  line-height: 1.6; -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

/* ============================================== */
/* ===== HERO (큰 사진 배경 + 좌측 큰 타이틀) ===== */
/* ============================================== */
.os-hero {
  position: relative;
  height: 640px;
  background-image:
    linear-gradient(90deg, rgba(0,0,0,0.50) 0%, rgba(0,0,0,0.15) 55%, rgba(0,0,0,0) 100%),
    url('https://images.unsplash.com/photo-1587174486073-ae5e5cff23aa?q=80&w=1800&auto=format&fit=crop');
  background-size: cover;
  background-position: center;
  color: white;
  overflow: hidden;
}
.os-hero-inner {
  max-width: 1400px;
  height: 100%;
  margin: 0 auto;
  padding: 0 56px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  z-index: 2;
}
.os-hero-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 72px;
  font-weight: 700;
  letter-spacing: -3px;
  line-height: 1.1;
  margin-bottom: 18px;
  text-shadow: 0 4px 32px rgba(0,0,0,0.45);
}
.os-hero-desc {
  font-size: 16px;
  font-weight: 400;
  opacity: 0.94;
  max-width: 520px;
  line-height: 1.7;
  text-shadow: 0 1px 12px rgba(0,0,0,0.45);
  letter-spacing: -0.3px;
  margin-bottom: 30px;
}
.hero-cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 28px;
  background: rgba(10,22,40,0.85);
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(4px);
  border-radius: 30px;
  color: white;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.3px;
  cursor: pointer;
  transition: all 0.25s;
  width: fit-content;
  box-shadow: 0 6px 22px rgba(0,0,0,0.3);
}
.hero-cta-btn:hover {
  background: var(--forest);
  border-color: var(--gold);
  transform: translateY(-1px);
}
.hero-cta-btn .icon { font-size: 16px; }

@media (max-width: 1024px) {
  .os-hero { height: 560px; }
  .os-hero-title { font-size: 56px; }
}
@media (max-width: 768px) {
  .os-hero { height: 480px; }
  .os-hero-inner { padding: 0 24px; }
  .os-hero-title { font-size: 38px; letter-spacing: -1.5px; margin-bottom: 12px; }
  .os-hero-desc { font-size: 13px; margin-bottom: 22px; }
  .hero-cta-btn { padding: 12px 22px; font-size: 13px; }
}

/* ================================================== */
/* ===== 곡선 탭 바 (HERO 위로 겹쳐서 올라오는) ===== */
/* ================================================== */
.tab-band-wrap {
  position: relative;
  margin-top: -68px;
  z-index: 10;
  padding: 0 24px;
}
.tab-band {
  position: relative;
  max-width: 1360px;
  margin: 0 auto;
  height: 142px;
}
/* SVG 곡선 배경 */
.tab-band-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  filter: drop-shadow(0 14px 28px rgba(10,22,40,0.20));
}

/* 탭 그리드 (절대배치 위에 배치) */
.tab-band-grid {
  position: relative;
  height: 100%;
  display: flex;
  align-items: center;
  padding: 14px 28px;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.tab-band-grid::-webkit-scrollbar { display: none; }

.tab-item {
  flex: 1 1 0;
  min-width: 88px;
  height: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border-radius: 10px;
  background: transparent;
  cursor: pointer;
  transition: all 0.22s;
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--gray-700);
  letter-spacing: -0.5px;
  position: relative;
  border: none;
}
.tab-item:hover {
  background: rgba(255,255,255,0.4);
  color: var(--forest);
  transform: translateY(-2px);
}
.tab-item.active {
  background: linear-gradient(180deg, var(--forest) 0%, var(--forest-deep) 100%);
  color: white;
  box-shadow: inset 0 0 0 1.5px var(--gold), 0 6px 18px rgba(27,67,50,0.35);
  transform: translateY(-2px);
}
.tab-item .flag-img {
  width: 40px;
  height: 28px;
  border-radius: 4px;
  object-fit: cover;
  box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  background: var(--gray-100);
}
.tab-item .flag-emoji {
  font-size: 30px;
  line-height: 1;
}
.tab-item .star-icon {
  font-size: 28px;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 2px 6px rgba(201,169,97,0.4);
}
.tab-item.active .star-icon { color: var(--gold-light); }
.tab-item .tab-name { white-space: nowrap; }

@media (max-width: 768px) {
  .tab-band-wrap { margin-top: -50px; padding: 0 12px; }
  .tab-band { height: 108px; }
  .tab-band-grid { padding: 10px 16px; gap: 2px; }
  .tab-item { min-width: 70px; height: 78px; font-size: 12.5px; gap: 5px; }
  .tab-item .flag-img { width: 30px; height: 21px; }
  .tab-item .flag-emoji { font-size: 22px; }
  .tab-item .star-icon { font-size: 22px; }
}

/* ============================================== */
/* ===== Beyond the Fairway 캘리그래피 ===== */
/* ============================================== */
.tagline-band {
  text-align: center;
  padding: 36px 20px 30px;
  background: var(--cream);
}
.tagline-script {
  font-family: 'Italianno', 'Cormorant Garamond', cursive;
  font-size: 56px;
  color: var(--gold);
  letter-spacing: 1px;
  line-height: 1;
  margin-bottom: 8px;
  font-weight: 400;
}
.tagline-kor {
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  color: var(--gray-700);
  letter-spacing: 2px;
  font-weight: 400;
}
.tagline-line {
  width: 32px;
  height: 1.5px;
  background: var(--gold);
  margin: 12px auto 0;
}
@media (max-width: 768px) {
  .tagline-band { padding: 28px 20px 22px; }
  .tagline-script { font-size: 40px; }
  .tagline-kor { font-size: 12px; letter-spacing: 1.5px; }
}

/* ===== 메인 컨테이너 (2단 레이아웃) ===== */
.os-main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 20px 40px 60px;
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 32px;
  align-items: start;
}
@media (max-width: 1024px) {
  .os-main { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .os-main { padding: 10px 20px 50px; gap: 28px; }
}

/* ===== 섹션 헤더 ===== */
.os-section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--navy-900);
}
.os-section-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--navy-900);
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.os-section-title .icon { font-size: 18px; }
.os-section-sub {
  font-size: 12.5px;
  color: var(--gray-500);
  font-weight: 500;
}
@media (max-width: 768px) {
  .os-section-title { font-size: 18px; }
  .os-section-sub { font-size: 11px; }
}

/* ===== 좌측: 국가별 인기상품 그리드 ===== */
.popular-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}
@media (max-width: 1100px) { .popular-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 1024px) { .popular-grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 880px) { .popular-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 680px) { .popular-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; } }

.popular-card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--line);
  cursor: pointer;
  transition: all 0.25s;
  display: block;
  text-decoration: none;
  color: inherit;
}
.popular-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 32px rgba(10,22,40,0.12);
  border-color: rgba(201,169,97,0.5);
}
.popular-card-image {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 3;
  background: var(--gray-100);
  overflow: hidden;
}
.popular-card-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s;
}
.popular-card:hover .popular-card-image img { transform: scale(1.06); }
.popular-card-country {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(255,255,255,0.96);
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 11.5px;
  font-weight: 700;
  color: var(--navy-900);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.popular-card-body { padding: 14px 14px 16px; }
.popular-card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--navy-900);
  line-height: 1.4;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  letter-spacing: -0.4px;
  min-height: 42px;
}
.popular-card-meta {
  display: flex;
  gap: 8px;
  font-size: 11.5px;
  color: var(--gray-500);
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.popular-card-price {
  font-size: 16px;
  font-weight: 800;
  color: var(--navy-900);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.3px;
}
.popular-card-price .won { font-size: 11.5px; font-weight: 500; color: var(--gray-700); margin-left: 1px; }
.popular-card-price.inquire { font-size: 14px; color: var(--gray-500); }

/* 더 많은 상품 보기 버튼 */
.more-btn-wrap { display: flex; justify-content: center; margin-top: 30px; }
.more-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--forest);
  color: white;
  padding: 13px 36px;
  border-radius: 30px;
  font-size: 13.5px;
  font-weight: 600;
  letter-spacing: -0.3px;
  transition: all 0.25s;
  box-shadow: 0 4px 14px rgba(27,67,50,0.25);
}
.more-btn:hover {
  background: var(--gold);
  color: var(--navy-900);
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(201,169,97,0.4);
}
.more-btn .arrow { font-size: 16px; }

/* ===== 우측: 특가상품 사이드바 ===== */
.promo-side {
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 22px 22px 24px;
  position: sticky;
  top: 100px;
}
@media (max-width: 1024px) { .promo-side { position: static; } }
.promo-side .os-section-head { padding-bottom: 12px; margin-bottom: 18px; }
.promo-side .os-section-title { font-size: 19px; }
.promo-side-desc {
  font-size: 12.5px; color: var(--gray-500);
  margin-bottom: 16px; margin-top: -8px;
}

.promo-list { display: flex; flex-direction: column; gap: 12px; }

.promo-item {
  display: grid;
  grid-template-columns: 96px 1fr;
  gap: 12px;
  padding: 10px;
  border-radius: 8px;
  background: var(--cream);
  transition: all 0.2s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
}
.promo-item:hover { background: white; box-shadow: 0 6px 16px rgba(10,22,40,0.08); }
.promo-item-image {
  position: relative; width: 96px; height: 96px;
  border-radius: 6px; overflow: hidden;
  background: var(--gray-200); flex-shrink: 0;
}
.promo-item-image img { width: 100%; height: 100%; object-fit: cover; }
.promo-item-badge {
  position: absolute; top: 4px; left: 4px;
  font-size: 10px; font-weight: 700; color: white;
  padding: 2px 7px; border-radius: 3px;
  letter-spacing: -0.3px;
}
.promo-item-badge.hot { background: var(--red-hot); }
.promo-item-badge.pick { background: var(--gold); color: var(--navy-900); }
.promo-item-badge.new { background: #2563eb; }
.promo-item-badge.coupon { background: #7c3aed; }
.promo-item-badge.best { background: #f59e0b; color: var(--navy-900); }

.promo-item-body {
  display: flex; flex-direction: column;
  justify-content: space-between; min-width: 0;
}
.promo-item-title {
  font-size: 13.5px; font-weight: 700; color: var(--navy-900);
  line-height: 1.4; letter-spacing: -0.3px;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 4px;
}
.promo-item-region {
  font-size: 11px; color: var(--gray-500);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 4px;
}
.promo-item-price {
  font-size: 14.5px; font-weight: 800;
  color: var(--gold-deep);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.3px;
}
.promo-item-price .won { font-size: 11px; font-weight: 500; color: var(--gray-700); margin-left: 1px; }
.promo-item-price.inquire { font-size: 12.5px; color: var(--gray-500); font-weight: 600; }

.promo-side-more {
  display: block; text-align: center;
  margin-top: 18px; padding: 11px;
  border: 1.5px solid var(--gold); border-radius: 6px;
  font-size: 13px; font-weight: 700; color: var(--gold-deep);
  transition: all 0.2s; letter-spacing: -0.3px;
}
.promo-side-more:hover { background: var(--gold); color: white; }

@media (max-width: 768px) {
  .promo-side { padding: 18px 16px 20px; }
  .promo-item-image { width: 84px; height: 84px; }
  .promo-item { grid-template-columns: 84px 1fr; }
}

/* ===== 빈 상태 ===== */
.empty-result {
  text-align: center; padding: 60px 20px;
  background: white; border-radius: 10px;
  border: 1px dashed var(--gray-300);
  color: var(--gray-500); grid-column: 1 / -1;
}
.empty-result-icon { font-size: 38px; margin-bottom: 12px; color: var(--gold); opacity: 0.6; }
.empty-result h3 { font-size: 16px; color: var(--navy-900); margin-bottom: 6px; font-family: 'Noto Serif KR', serif; }
.empty-result p { font-size: 13px; }

/* ===== 하단 CTA 3박스 ===== */
.cta-row { background: var(--cream); padding: 0 0 50px; }
.cta-row-inner {
  max-width: 1280px; margin: 0 auto; padding: 0 40px;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
}
.cta-box {
  background: var(--forest); color: white;
  border-radius: 12px; padding: 22px 26px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer; transition: all 0.25s;
  border: 1px solid rgba(255,255,255,0.06);
}
.cta-box:hover {
  background: var(--forest-deep);
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(27,67,50,0.3);
}
.cta-box-icon {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(201,169,97,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--gold); flex-shrink: 0;
}
.cta-box-text { flex: 1; min-width: 0; }
.cta-box-label { font-size: 14px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
.cta-box-sub { font-size: 11.5px; opacity: 0.7; font-weight: 400; letter-spacing: -0.2px; }
.cta-box-arrow { color: var(--gold); font-size: 18px; opacity: 0.7; }

@media (max-width: 880px) { .cta-row-inner { grid-template-columns: 1fr; } }
@media (max-width: 768px) {
  .cta-row-inner { padding: 0 20px; gap: 10px; }
  .cta-box { padding: 18px 20px; }
}

/* ===== 로딩 ===== */
.loading-state {
  min-height: 60vh; display: flex;
  align-items: center; justify-content: center;
  color: var(--gray-500); font-size: 14px; text-align: center;
}
.loading-state .spin {
  font-size: 42px; margin-bottom: 14px;
  display: inline-block;
  animation: spin 1.5s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>

<div id="app"></div>

<script src="layout.js"></script>

<script>
const KAKAO_CHANNEL_URL = 'https://pf.kakao.com/_choicegolf/chat';
function openKakao(e) { if (e) e.preventDefault(); window.open(KAKAO_CHANNEL_URL, '_blank'); }

/* ═════════════ 햄버거 메뉴 ═════════════ */
function closeMenu() {
  const menu = document.getElementById('mobileMenu');
  if (!menu) return;
  menu.classList.remove('open');
  menu.querySelectorAll('.has-sub.open').forEach(el => el.classList.remove('open'));
}
function toggleSubmenu(id) {
  const li = document.getElementById(id);
  if (!li) return;
  const wasOpen = li.classList.contains('open');
  document.querySelectorAll('.mobile-menu .has-sub.open').forEach(el => el.classList.remove('open'));
  if (!wasOpen) li.classList.add('open');
}
const KOREA_REGION_META_MM = {
  gangwon: { emoji: '🏔️' }, metro: { emoji: '🌆' },
  chungcheong: { emoji: '🌾' }, gyeongsang: { emoji: '⛰️' },
  jeolla: { emoji: '🌿' }, jeju: { emoji: '🌴' }
};
async function loadMobileMenus() {
  const subOverseas = document.getElementById('submenuOverseas');
  const subDomestic = document.getElementById('submenuDomestic');
  const escH = (s) => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const _URL = 'https://qmzrpyyadoajwziqachm.supabase.co';
  const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtenJweXlhZG9hand6aXFhY2htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI0NDcsImV4cCI6MjA4OTc3ODQ0N30.CI6ZFvNa2TRa0XqwnrXKL9x3ZHXfKg6GaNwJhqYvCmc';
  try {
    const resC = await fetch(`${_URL}/rest/v1/countries?select=code,name_ko,flag&is_active=eq.true&order=sort_order.asc,name_ko.asc`,
      { headers: { apikey: _KEY, Authorization: `Bearer ${_KEY}` } });
    const countries = resC.ok ? await resC.json() : [];
    const overseas = countries.filter(c => c.code !== 'korea' && c.code !== 'domestic');
    const mobileOrder = ['japan','taiwan','china','thailand','philippines','malaysia','vietnam'];
    const byCode = Object.fromEntries(overseas.map(c => [c.code, c]));
    const ordered = [];
    mobileOrder.forEach(code => { if (byCode[code]) ordered.push(byCode[code]); });
    overseas.forEach(c => { if (!mobileOrder.includes(c.code)) ordered.push(c); });
    if (subOverseas) {
      let html = ordered.map(c => `
        <li><a href="country.html?c=${encodeURIComponent(c.code)}" onclick="closeMenu()">
          <span class="m-flag">${c.flag || '🌐'}</span><span>${escH(c.name_ko)}</span>
        </a></li>`).join('');
      html += `<li><a class="all-link" href="overseas.html" onclick="closeMenu()">
        <span class="m-flag">🌏</span><span>전체 해외 골프투어 →</span></a></li>`;
      subOverseas.innerHTML = html || '<li><div style="padding:10px 14px;color:#999;font-size:12px">등록된 국가가 없습니다</div></li>';
    }
    const resR = await fetch(`${_URL}/rest/v1/regions?select=region_code,region_name&country=eq.korea&is_active=eq.true&order=sort_order.asc,region_name.asc`,
      { headers: { apikey: _KEY, Authorization: `Bearer ${_KEY}` } });
    const regions = resR.ok ? await resR.json() : [];
    if (subDomestic) {
      if (regions.length > 0) {
        let html = regions.map(r => {
          const meta = KOREA_REGION_META_MM[r.region_code] || { emoji: '⛳' };
          return `<li><a href="country.html?c=korea&r=${encodeURIComponent(r.region_code)}" onclick="closeMenu()">
            <span class="m-flag">${meta.emoji}</span><span>${escH(r.region_name)}</span></a></li>`;
        }).join('');
        html += `<li><a class="all-link" href="index.html#domestic" onclick="closeMenu()">
          <span class="m-flag">🇰🇷</span><span>전체 국내 골프투어 →</span></a></li>`;
        subDomestic.innerHTML = html;
      } else {
        subDomestic.innerHTML = '<li><div style="padding:10px 14px;color:#999;font-size:12px">등록된 지역이 없습니다</div></li>';
      }
    }
  } catch(e) { console.warn('[loadMobileMenus] 실패', e); }
}

} else { loadMobileMenus(); }

function escHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function mapProduct(r) {
  return {
    id: r.id, country: r.country, region: r.region, regionName: r.region_name,
    tag: r.tag || '', duration: r.duration || '', title: r.title || '',
    summary: r.summary || '',
    image: r.main_image || 'https://images.unsplash.com/photo-1535131749006-b7f58c99034b?q=80&w=800&auto=format&fit=crop',
    priceFrom: r.price_from || 0, sortOrder: r.sort_order || 0,
    overlayText: r.overlay_text || '', overlayColor: r.overlay_color || 'blue',
    isMain: !!r.is_main, isMonthlyPick: !!r.is_monthly_pick,
    promoSection: r.promo_section || ''
  };
}

async function fetchOverseasCountries() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/countries?select=code,name_ko,flag,sort_order&is_active=eq.true&order=sort_order.asc,name_ko.asc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error('국가 로드 실패');
    const rows = await res.json();
    return rows.filter(c => c.code !== 'korea' && c.code !== 'domestic');
  } catch (e) { console.error('[overseas] 국가 로드 실패:', e); return []; }
}

async function fetchOverseasProducts() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/home_products?select=id,country,region,region_name,tag,duration,title,summary,main_image,price_from,sort_order,overlay_text,overlay_color,is_main,is_monthly_pick,promo_section&is_published=eq.true&country=neq.korea&country=neq.domestic&order=sort_order.asc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error('fetch failed');
    const rows = await res.json();
    return rows.map(mapProduct);
  } catch (e) { console.error('[overseas] 상품 로드 실패:', e); return []; }
}

function filterPopular(products, countryCode) {
  let list = products.slice();
  if (countryCode && countryCode !== 'all') {
    list = list.filter(p => p.country === countryCode);
  }
  return list.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
}

function filterPromo(products) {
  return products
    .filter(p => p.promoSection === 'pick' || p.promoSection === 'earlybird' ||
                p.isMain || PROMO_TAGS.includes(p.tag))
    .sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
}

// 탭 렌더 - "전체" + 국가별 (국기 이미지 사용)
function renderTabs() {
  const tabs = [{ code: 'all', name: '전체', isAll: true }];
  COUNTRIES.forEach(c => {
    tabs.push({ code: c.code, name: c.name_ko, flagCode: COUNTRY_FLAG_CODE[c.code], flagEmoji: c.flag });
  });

  return tabs.map(t => {
    let iconHtml = '';
    if (t.isAll) {
      iconHtml = '<span class="star-icon">✦</span>';
    } else if (t.flagCode) {
      iconHtml = `<img class="flag-img" src="https://flagcdn.com/w80/${t.flagCode}.png" alt="${escHtml(t.name)}" loading="lazy">`;
    } else {
      iconHtml = `<span class="flag-emoji">${t.flagEmoji || '🌐'}</span>`;
    }
    return `
      <button class="tab-item ${t.code === CURRENT_TAB ? 'active' : ''}"
              onclick="selectTab('${t.code}')">
        ${iconHtml}
        <span class="tab-name">${escHtml(t.name)}</span>
      </button>
    `;
  }).join('');
}

function selectTab(code) {
  CURRENT_TAB = code;
  const bar = document.getElementById('tabsBar');
  if (bar) bar.innerHTML = renderTabs();
  renderPopular();
  // 상품 영역으로 부드럽게 스크롤
  const target = document.querySelector('.os-main');
  if (target) {
    setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }
}

function renderPopular() {
  const grid = document.getElementById('popularGrid');
  const moreWrap = document.getElementById('moreBtnWrap');
  if (!grid) return;

  const filtered = filterPopular(ALL_PRODUCTS, CURRENT_TAB);
  const visible = filtered.slice(0, POPULAR_LIMIT);

  if (visible.length === 0) {
    grid.innerHTML = `
      <div class="empty-result">
        <div class="empty-result-icon">✦</div>
        <h3>해당 국가의 상품을 준비 중입니다</h3>
        <p>다른 탭을 선택하거나 문의해 주세요.</p>
      </div>`;
    moreWrap.innerHTML = '';
    return;
  }

  grid.innerHTML = visible.map(renderPopularCard).join('');

  if (CURRENT_TAB === 'all') {
    moreWrap.innerHTML = `<a class="more-btn" href="index.html#destinations">더 많은 상품 보기 <span class="arrow">›</span></a>`;
  } else {
    moreWrap.innerHTML = `<a class="more-btn" href="country.html?c=${encodeURIComponent(CURRENT_TAB)}">더 많은 ${escHtml(COUNTRIES_MAP[CURRENT_TAB]?.name || '')} 상품 보기 <span class="arrow">›</span></a>`;
  }
}

function renderPopularCard(p) {
  const cInfo = COUNTRIES_MAP[p.country] || { name: p.country || '', flag: '🌐' };
  const countryLabel = `${cInfo.flag} ${cInfo.name}`;

  const metas = [];
  if (p.duration) metas.push(`<span class="item">📅 ${escHtml(p.duration)}</span>`);

  const priceHtml = p.priceFrom > 0
    ? `<div class="popular-card-price">${p.priceFrom.toLocaleString()}<span class="won">원~</span></div>`
    : `<div class="popular-card-price inquire">💬 문의 시 안내</div>`;

  return `
    <a class="popular-card" href="product.html?id=${encodeURIComponent(p.id)}">
      <div class="popular-card-image">
        <img src="${p.image}" alt="${escHtml(p.title)}" loading="lazy">
        <span class="popular-card-country">${countryLabel}</span>
      </div>
      <div class="popular-card-body">
        <div class="popular-card-title">${escHtml((p.title || '').replace(/^\[.+?\]\s*/, ''))}</div>
        ${metas.length ? `<div class="popular-card-meta">${metas.join('')}</div>` : ''}
        ${priceHtml}
      </div>
    </a>`;
}

function renderPromo() {
  const list = document.getElementById('promoList');
  if (!list) return;

  const promoProducts = filterPromo(ALL_PRODUCTS).slice(0, PROMO_LIMIT);

  if (promoProducts.length === 0) {
    list.innerHTML = `
      <div style="text-align:center;padding:30px 12px;color:var(--gray-500);font-size:13px;">
        현재 특가상품 준비 중입니다
      </div>`;
    return;
  }
  list.innerHTML = promoProducts.map(renderPromoItem).join('');
}

function renderPromoItem(p) {
  const cInfo = COUNTRIES_MAP[p.country] || { name: p.country || '', flag: '🌐' };

  let badge = { text: '특가', cls: 'hot' };
  if (p.promoSection === 'pick') badge = { text: '추천', cls: 'pick' };
  else if (p.promoSection === 'earlybird') badge = { text: '얼리', cls: 'new' };
  else if (p.isMain) badge = { text: 'BEST', cls: 'best' };
  else if (p.tag === '쿠폰') badge = { text: '쿠폰', cls: 'coupon' };
  else if (p.tag === 'NEW') badge = { text: 'NEW', cls: 'new' };

  const priceHtml = p.priceFrom > 0
    ? `<div class="promo-item-price">${p.priceFrom.toLocaleString()}<span class="won">원~</span></div>`
    : `<div class="promo-item-price inquire">💬 문의 시 안내</div>`;

  return `
    <a class="promo-item" href="product.html?id=${encodeURIComponent(p.id)}">
      <div class="promo-item-image">
        <img src="${p.image}" alt="${escHtml(p.title)}" loading="lazy">
        <span class="promo-item-badge ${badge.cls}">${badge.text}</span>
      </div>
      <div class="promo-item-body">
        <div>
          <div class="promo-item-region">${cInfo.flag} ${escHtml(cInfo.name)}${p.duration ? ' · ' + escHtml(p.duration) : ''}</div>
          <div class="promo-item-title">${escHtml((p.title || '').replace(/^\[.+?\]\s*/, ''))}</div>
        </div>
        ${priceHtml}
      </div>
    </a>`;
}
