<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객지원 | 초이스골프</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: 'Noto Sans KR', 'Inter', sans-serif;
  color: #1a1a1a;
  background: #fff;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'tnum' on;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* ============= 페이지 히어로 ============= */
.cs-hero {
  background: #f7f7f5;
  padding: 44px 0;
  border-bottom: 1px solid #ececec;
}
.cs-hero-inner {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 40px;
}
.cs-hero-title h1 {
  font-size: 28px;
  font-weight: 700;
  color: #1a1a1a;
  letter-spacing: -0.8px;
  margin-bottom: 6px;
  line-height: 1.2;
}
.cs-hero-title p {
  font-size: 13.5px;
  color: #707070;
  letter-spacing: -0.3px;
}

/* 카드 3개 */
.cs-quick-cards {
  display: flex;
  gap: 8px;
}
.cs-quick-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 22px;
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 4px;
  min-width: 160px;
  transition: all 0.15s;
  cursor: pointer;
}
.cs-quick-card:hover {
  border-color: #1a1a1a;
}
.cs-quick-card-icon {
  width: 22px; height: 22px;
  color: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.cs-quick-card-icon svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.cs-quick-card-text {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: #1a1a1a;
  letter-spacing: -0.3px;
}
.cs-quick-card-arrow {
  color: #b0b0b0;
  font-size: 13px;
  transition: transform 0.15s;
}
.cs-quick-card:hover .cs-quick-card-arrow { color: #1a1a1a; transform: translateX(2px); }
.cs-quick-card.active {
  background: #1B4332;
  border-color: #1B4332;
}
.cs-quick-card.active .cs-quick-card-icon { color: #fff; }
.cs-quick-card.active .cs-quick-card-text { color: #fff; }
.cs-quick-card.active .cs-quick-card-arrow { color: #c9a961; }

/* ============= 메인 레이아웃 ============= */
.cs-main { padding: 36px 0 50px; }
.cs-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 28px;
  align-items: start;
}

/* 좌측 사이드 */
.cs-side {
  position: sticky;
  top: 20px;
}
.cs-side-block {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 4px;
  padding: 18px 18px;
  margin-bottom: 12px;
}
.cs-side-title {
  font-size: 11.5px;
  font-weight: 700;
  color: #707070;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid #ececec;
}
.cs-side-row {
  display: flex;
  gap: 10px;
  padding: 8px 0;
  align-items: flex-start;
}
.cs-side-row + .cs-side-row {
  border-top: 1px solid #f0f0f0;
  margin-top: 4px;
  padding-top: 12px;
}
.cs-side-row-icon {
  width: 28px; height: 28px;
  border-radius: 2px;
  background: #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.cs-side-row-icon svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.cs-side-row-body { flex: 1; min-width: 0; }
.cs-side-row-label {
  font-size: 10.5px;
  color: #909090;
  font-weight: 500;
  letter-spacing: -0.2px;
  margin-bottom: 2px;
}
.cs-side-row-value {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a1a;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.4px;
  line-height: 1.25;
}
.cs-side-row-sub {
  font-size: 11px;
  color: #909090;
  margin-top: 2px;
  letter-spacing: -0.2px;
}
.cs-side-row-desc {
  font-size: 11.5px;
  color: #707070;
  margin-top: 2px;
  letter-spacing: -0.2px;
  line-height: 1.5;
}

/* 사이드 메뉴 */
.cs-side-menu { list-style: none; }
.cs-side-menu li + li { border-top: 1px solid #f0f0f0; }
.cs-side-menu button {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 0;
  font-size: 13px;
  font-weight: 500;
  color: #5a5a5a;
  letter-spacing: -0.3px;
  transition: color 0.15s;
}
.cs-side-menu button:hover { color: #1a1a1a; }
.cs-side-menu button.active {
  color: #1B4332;
  font-weight: 700;
}
.cs-side-menu button .cs-side-menu-arrow {
  color: #c5c5c5;
  font-size: 12px;
}
.cs-side-menu button.active .cs-side-menu-arrow { color: #1B4332; }

/* ============= 우측 컨텐츠 ============= */
.cs-content { min-width: 0; }

/* 검색바 */
.cs-search {
  display: flex;
  align-items: center;
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 4px;
  padding: 12px 16px;
  margin-bottom: 12px;
  transition: border-color 0.15s;
}
.cs-search:focus-within {
  border-color: #1a1a1a;
}
.cs-search-icon {
  color: #909090;
  display: flex;
  margin-right: 10px;
}
.cs-search-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.cs-search input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 13.5px;
  font-family: inherit;
  color: #1a1a1a;
  background: transparent;
  letter-spacing: -0.3px;
}
.cs-search input::placeholder { color: #b0b0b0; }

/* 섹션 */
.cs-section { display: none; }
.cs-section.active { display: block; }
.cs-section-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 4px 4px 12px;
}
.cs-section-title {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a1a;
  letter-spacing: -0.4px;
}
.cs-section-count {
  font-size: 12px;
  color: #909090;
  letter-spacing: -0.2px;
  font-variant-numeric: tabular-nums;
}

/* FAQ 리스트 */
.cs-faq-list {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 4px;
  overflow: hidden;
}
.cs-faq-item { border-top: 1px solid #f0f0f0; }
.cs-faq-item:first-child { border-top: 0; }
.cs-faq-q {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  text-align: left;
  background: #fff;
  transition: background 0.15s;
}
.cs-faq-q:hover { background: #fafafa; }
.cs-faq-q-mark {
  font-size: 12px;
  font-weight: 700;
  color: #1B4332;
  font-family: 'Inter', sans-serif;
  flex-shrink: 0;
  letter-spacing: 0.3px;
  min-width: 14px;
}
.cs-faq-q-text {
  flex: 1;
  font-size: 13.5px;
  font-weight: 500;
  color: #1a1a1a;
  letter-spacing: -0.3px;
}
.cs-faq-q-arrow {
  color: #b0b0b0;
  font-size: 12px;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.cs-faq-item.open .cs-faq-q-arrow { transform: rotate(180deg); color: #1a1a1a; }
.cs-faq-item.open .cs-faq-q { background: #fafafa; }
.cs-faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.25s ease;
  padding: 0 20px 0 48px;
  font-size: 13px;
  color: #5a5a5a;
  line-height: 1.7;
  letter-spacing: -0.2px;
  background: #fafafa;
  border-top: 0;
}
.cs-faq-item.open .cs-faq-a {
  max-height: 1500px;
  padding: 14px 20px 18px 48px;
  border-top: 1px solid #ececec;
}

/* 공지사항 리스트 */
.cs-notice-list {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 4px;
  overflow: hidden;
}
.cs-notice-item {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 16px;
  align-items: center;
  padding: 14px 20px;
  border-top: 1px solid #f0f0f0;
  cursor: pointer;
  transition: background 0.15s;
}
.cs-notice-item:first-child { border-top: 0; }
.cs-notice-item:hover { background: #fafafa; }
.cs-notice-badge {
  display: inline-block;
  padding: 3px 8px;
  background: #1B4332;
  color: #fff;
  border-radius: 2px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-align: center;
}
.cs-notice-badge.event { background: #c9a961; }
.cs-notice-body { min-width: 0; }
.cs-notice-title {
  font-size: 13.5px;
  font-weight: 500;
  color: #1a1a1a;
  letter-spacing: -0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cs-notice-summary {
  margin-top: 3px;
  font-size: 12px;
  color: #909090;
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cs-notice-date {
  font-size: 12px;
  color: #909090;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.2px;
}

/* 약관 */
.cs-terms-list {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 4px;
  overflow: hidden;
}
.cs-terms-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-top: 1px solid #f0f0f0;
  cursor: pointer;
  transition: background 0.15s;
}
.cs-terms-item:first-child { border-top: 0; }
.cs-terms-item:hover { background: #fafafa; }
.cs-terms-info { min-width: 0; }
.cs-terms-title {
  font-size: 13.5px;
  font-weight: 500;
  color: #1a1a1a;
  letter-spacing: -0.3px;
}
.cs-terms-summary {
  margin-top: 3px;
  font-size: 12px;
  color: #909090;
  letter-spacing: -0.2px;
}
.cs-terms-arrow { color: #b0b0b0; font-size: 14px; }

/* 빈 상태 */
.cs-empty {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 4px;
  padding: 56px 24px;
  text-align: center;
  color: #909090;
  font-size: 13px;
  letter-spacing: -0.3px;
}

/* ============= 하단 CTA ============= */
.cs-cta-wrap { padding: 0 0 50px; }
.cs-cta {
  background: #1a1a1a;
  border-radius: 4px;
  padding: 24px 32px;
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 16px;
  align-items: center;
}
.cs-cta-text-title {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.4px;
  margin-bottom: 3px;
}
.cs-cta-text-sub {
  font-size: 12.5px;
  color: #a0a0a0;
  letter-spacing: -0.2px;
}
.cs-cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 22px;
  border-radius: 3px;
  font-size: 13.5px;
  font-weight: 600;
  letter-spacing: -0.3px;
  transition: all 0.15s;
}
.cs-cta-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.cs-cta-btn.tel {
  background: #1B4332;
  color: #fff;
  border: 1px solid #1B4332;
  font-variant-numeric: tabular-nums;
}
.cs-cta-btn.tel:hover { background: #163829; }
.cs-cta-btn.kakao {
  background: #FEE500;
  color: #1a1a1a;
  border: 1px solid #FEE500;
}
.cs-cta-btn.kakao:hover { background: #f5d900; }

/* ============= 반응형 ============= */
@media (max-width: 980px) {
  .cs-hero-inner { grid-template-columns: 1fr; gap: 20px; }
  .cs-quick-cards { width: 100%; }
  .cs-quick-card { flex: 1; min-width: 0; padding: 12px 14px; }
  .cs-layout { grid-template-columns: 1fr; gap: 16px; }
  .cs-side { position: static; }
  .cs-cta { grid-template-columns: 1fr; text-align: center; }
}
@media (max-width: 600px) {
  .cs-hero { padding: 30px 0; }
  .cs-hero-title h1 { font-size: 22px; }
  .cs-quick-card-text { font-size: 12.5px; }
  .cs-faq-q { padding: 14px; gap: 10px; }
  .cs-faq-q-text { font-size: 12.5px; }
  .cs-faq-a { padding: 0 14px 0 38px; font-size: 12px; }
  .cs-faq-item.open .cs-faq-a { padding: 12px 14px 16px 38px; }
  .cs-notice-item { grid-template-columns: 1fr; gap: 6px; padding: 14px; }
  .cs-notice-date { display: none; }
  .cs-cta { padding: 18px; }
  .cs-cta-btn { padding: 11px 18px; font-size: 13px; }
}
</style>
</head>
<body>

<!-- 페이지 히어로 -->
<section class="cs-hero">
  <div class="container">
    <div class="cs-hero-inner">
      <div class="cs-hero-title">
        <h1>고객지원</h1>
        <p>자주 묻는 질문과 공지사항, 이용약관을 확인하세요.</p>
      </div>
      <div class="cs-quick-cards" id="csQuickCards">
        <button class="cs-quick-card active" data-tab="faq">
          <span class="cs-quick-card-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </span>
          <span class="cs-quick-card-text">FAQ</span>
          <span class="cs-quick-card-arrow">→</span>
        </button>
        <button class="cs-quick-card" data-tab="notice">
          <span class="cs-quick-card-icon">
            <svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </span>
          <span class="cs-quick-card-text">공지사항</span>
          <span class="cs-quick-card-arrow">→</span>
        </button>
        <button class="cs-quick-card" data-tab="terms">
          <span class="cs-quick-card-icon">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
          </span>
          <span class="cs-quick-card-text">약관</span>
          <span class="cs-quick-card-arrow">→</span>
        </button>
      </div>
    </div>
  </div>
</section>

<!-- 메인 -->
<main class="cs-main">
  <div class="container">
    <div class="cs-layout">

      <!-- 좌측 사이드 -->
      <aside class="cs-side">
        <div class="cs-side-block">
          <div class="cs-side-title">빠른 상담 안내</div>
          <div class="cs-side-row">
            <span class="cs-side-row-icon">
              <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </span>
            <div class="cs-side-row-body">
              <div class="cs-side-row-label">대표번호</div>
              <div class="cs-side-row-value">1533-3160</div>
              <div class="cs-side-row-sub">평일 09:00 - 18:00</div>
            </div>
          </div>
          <a class="cs-side-row" href="https://pf.kakao.com/_xjxjxj/chat" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;cursor:pointer;">
            <span class="cs-side-row-icon" style="background:#FEE500;">
              <svg viewBox="0 0 24 24" style="stroke:#1a1a1a;"><path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.78 1.86 5.21 4.65 6.59L5.5 21l4.27-2.32c.73.09 1.47.12 2.23.12 5.52 0 10-3.48 10-7.8S17.52 3 12 3z"/></svg>
            </span>
            <div class="cs-side-row-body">
              <div class="cs-side-row-label">카카오톡 상담</div>
              <div class="cs-side-row-value" style="font-size:13.5px;">@초이스골프</div>
            </div>
          </a>
        </div>

        <div class="cs-side-block">
          <div class="cs-side-title">고객지원 메뉴</div>
          <ul class="cs-side-menu" id="csSideMenu">
            <li><button class="active" data-tab="faq"><span>자주 묻는 질문</span><span class="cs-side-menu-arrow">›</span></button></li>
            <li><button data-tab="notice"><span>공지사항</span><span class="cs-side-menu-arrow">›</span></button></li>
            <li><button data-tab="terms"><span>이용약관</span><span class="cs-side-menu-arrow">›</span></button></li>
          </ul>
        </div>
      </aside>

      <!-- 우측 컨텐츠 -->
      <section class="cs-content">

        <!-- 검색바 -->
        <div class="cs-search">
          <span class="cs-search-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="text" id="csSearch" placeholder="궁금한 내용을 검색해 보세요.">
        </div>

        <!-- FAQ -->
        <div class="cs-section active" id="sec-faq">
          <div class="cs-section-header">
            <span class="cs-section-title">자주 묻는 질문</span>
            <span class="cs-section-count" id="cntFaq"></span>
          </div>
          <div id="listFaq"></div>
        </div>

        <!-- 공지사항 -->
        <div class="cs-section" id="sec-notice">
          <div class="cs-section-header">
            <span class="cs-section-title">공지사항</span>
            <span class="cs-section-count" id="cntNotice"></span>
          </div>
          <div id="listNotice"></div>
        </div>

        <!-- 약관 -->
        <div class="cs-section" id="sec-terms">
          <div class="cs-section-header">
            <span class="cs-section-title">이용약관</span>
            <span class="cs-section-count" id="cntTerms"></span>
          </div>
          <div id="listTerms"></div>
        </div>

      </section>
    </div>
  </div>
</main>

<!-- 하단 CTA -->
<div class="cs-cta-wrap">
  <div class="container">
    <div class="cs-cta">
      <div class="cs-cta-text">
        <div class="cs-cta-text-title">원하시는 답을 찾지 못하셨나요?</div>
        <div class="cs-cta-text-sub">전문 상담원이 친절하게 안내해 드리겠습니다.</div>

<script>
const SUPABASE_URL = 'https://qmzrpyyadoajwziqachm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtenJweXlhZG9hand6aXFhY2htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI0NDcsImV4cCI6MjA4OTc3ODQ0N30.CI6ZFvNa2TRa0XqwnrXKL9x3ZHXfKg6GaNwJhqYvCmc';

let sb = null;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) { console.warn(e); }

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  return `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
}


// ===== 탭 전환 =====
function switchTab(tab) {
  document.querySelectorAll('.cs-quick-card').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('#csSideMenu button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.cs-section').forEach(s => s.classList.toggle('active', s.id === `sec-${tab}`));
  history.replaceState(null, '', `#${tab}`);
}
document.getElementById('csQuickCards').addEventListener('click', (e) => {
  const btn = e.target.closest('.cs-quick-card');
  if (btn) switchTab(btn.dataset.tab);
});
document.getElementById('csSideMenu').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (btn) switchTab(btn.dataset.tab);
});

// ===== 검색 =====
document.getElementById('csSearch').addEventListener('input', (e) => {
  const q = (e.target.value || '').toLowerCase().trim();
  document.querySelectorAll('.cs-faq-item, .cs-notice-item, .cs-terms-item').forEach(el => {
    el.style.display = !q || el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});

// ===== 데이터 로드 =====
async function loadAll() {
  loadFaqs();
  loadNotices();
  loadTerms();
}

// FAQ
async function loadFaqs() {
  let items = [];
  if (sb) {
    try {
      const { data, error } = await sb.from('support_articles')
        .select('*').eq('category', 'faq').eq('is_active', true)
        .order('sort_order', { ascending: true }).limit(50);
      if (!error && data) items = data;
    } catch (e) {}
  }
  renderFaqs(items);
}
function renderFaqs(items) {
  document.getElementById('cntFaq').textContent = `총 ${items.length}건`;
  const el = document.getElementById('listFaq');
  if (!items.length) {
    el.innerHTML = '<div class="cs-empty">등록된 FAQ가 없습니다.</div>';
    return;
  }
  el.innerHTML = '<div class="cs-faq-list">' + items.map((it, i) => `
    <div class="cs-faq-item" data-idx="${i}">
      <button class="cs-faq-q" onclick="toggleFaq(${i})">
        <span class="cs-faq-q-mark">Q</span>
        <span class="cs-faq-q-text">${escapeHtml(it.title || '')}</span>
        <span class="cs-faq-q-arrow">▾</span>
      </button>
      <div class="cs-faq-a">${it.content || it.summary || ''}</div>
    </div>
  `).join('') + '</div>';
}
function toggleFaq(idx) {
  const item = document.querySelector(`.cs-faq-item[data-idx="${idx}"]`);
  if (item) item.classList.toggle('open');
}

// 공지사항
async function loadNotices() {
  let items = [];
  if (sb) {
    try {
      const { data, error } = await sb.from('support_articles')
        .select('*').eq('category', 'notice').eq('is_active', true)
        .order('created_at', { ascending: false }).limit(50);
      if (!error && data) items = data;
    } catch (e) {}
  }
  renderNotices(items);
}
function renderNotices(items) {
  document.getElementById('cntNotice').textContent = `총 ${items.length}건`;
  const el = document.getElementById('listNotice');
  if (!items.length) {
    el.innerHTML = '<div class="cs-empty">등록된 공지사항이 없습니다.</div>';
    return;
  }
  el.innerHTML = '<div class="cs-notice-list">' + items.map(it => {
    const desc = it.summary || it.content || '';
    return `
    <article class="cs-notice-item" onclick="openArticle('${it.id||''}')">
      <span class="cs-notice-badge ${it.type === 'event' ? 'event' : ''}">${it.type === 'event' ? '이벤트' : '공지'}</span>
      <div class="cs-notice-body">
        <div class="cs-notice-title">${escapeHtml(it.title || '')}</div>
        ${desc ? `<div class="cs-notice-summary">${escapeHtml(desc)}</div>` : ''}
      </div>
      <span class="cs-notice-date">${formatDate(it.created_at)}</span>
    </article>
  `;}).join('') + '</div>';
}

// 약관
async function loadTerms() {
  let items = [];
  if (sb) {
    try {
      const { data, error } = await sb.from('support_articles')
        .select('*').eq('category', 'terms').eq('is_active', true)
        .order('sort_order', { ascending: true }).limit(50);
      if (!error && data) items = data;
    } catch (e) {}
  }
  renderTerms(items);
}
function renderTerms(items) {
  document.getElementById('cntTerms').textContent = `총 ${items.length}건`;
  const el = document.getElementById('listTerms');
  if (!items.length) {
    el.innerHTML = '<div class="cs-empty">등록된 약관이 없습니다.</div>';
    return;
  }
  el.innerHTML = '<div class="cs-terms-list">' + items.map(it => `
    <article class="cs-terms-item" onclick="openArticle('${it.id||''}')">
      <div class="cs-terms-info">
        <div class="cs-terms-title">${escapeHtml(it.title || '')}</div>
        ${it.summary ? `<div class="cs-terms-summary">${escapeHtml(it.summary)}</div>` : ''}
      </div>
      <span class="cs-terms-arrow">›</span>
    </article>
  `).join('') + '</div>';
}

function openArticle(id) { console.log('open article:', id); }

// 해시 라우팅
function handleHash() {
  const hash = (location.hash || '').replace('#', '');
  if (['faq','notice','terms'].includes(hash)) switchTab(hash);
}

window.addEventListener('DOMContentLoaded', () => {
  loadAll();
  handleHash();
});
window.addEventListener('hashchange', handleHash);
</script>
