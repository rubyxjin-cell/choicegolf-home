<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객지원 | 초이스골프</title>
<meta name="description" content="초이스골프 고객지원 - FAQ, 공지사항, 이용약관">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />

<style>
:root {
  --navy-900: #0a1628;
  --navy-800: #14243e;
  --gold: #c9a961;
  --gold-light: #e8c574;
  --cream: #faf8f3;
  --white: #ffffff;
  --line: #e5e5e0;
  --ink1: #1a1a1a;
  --ink2: #4a4a4a;
  --ink3: #888;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--cream);
  color: var(--ink1);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }

/* 헤더 */
.sp-header {
  background: var(--navy-900);
  color: white;
  padding: 14px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.sp-header-inner {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sp-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
  font-style: italic;
  color: var(--gold);
  letter-spacing: 0.5px;
}
.sp-logo span { color: white; font-style: normal; font-weight: 700; }
.sp-back {
  font-size: 14px;
  color: #ccc;
  padding: 6px 14px;
  border: 1px solid #444;
  border-radius: 6px;
  transition: all 0.15s;
}
.sp-back:hover { background: var(--gold); color: var(--navy-900); border-color: var(--gold); }

/* HERO */
.sp-hero {
  background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-800) 100%);
  color: white;
  padding: 60px 24px 50px;
  text-align: center;
}
.sp-hero-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--gold);
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}
.sp-hero-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.sp-hero-desc {
  margin-top: 14px;
  color: #b8c5d6;
  font-size: 15px;
}

/* 탭 */
.sp-tabs {
  background: white;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 58px;
  z-index: 50;
}
.sp-tabs-inner {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  gap: 0;
}
.sp-tab {
  flex: 1;
  padding: 18px 16px;
  font-size: 15px;
  font-weight: 600;
  color: var(--ink3);
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  letter-spacing: -0.3px;
}
.sp-tab:hover { color: var(--navy-900); }
.sp-tab.active {
  color: var(--navy-900);
  border-bottom-color: var(--gold);
  font-weight: 700;
}

/* 본문 */
.sp-main {
  max-width: 980px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}
.sp-loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink3);
  font-size: 14px;
}
.sp-empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink3);
  font-size: 15px;
  background: white;
  border-radius: 12px;
  border: 1px solid var(--line);
}
.sp-empty-ico { font-size: 40px; margin-bottom: 12px; display: block; }

/* FAQ 아코디언 */
.faq-list { display: flex; flex-direction: column; gap: 10px; }
.faq-item {
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
  transition: all 0.2s;
}
.faq-item:hover { border-color: var(--gold); }
.faq-item.open { border-color: var(--gold); box-shadow: 0 4px 14px rgba(201,169,97,0.1); }
.faq-q {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 24px;
  cursor: pointer;
  user-select: none;
}
.faq-q-mark {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  background: var(--gold);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 18px;
  font-style: italic;
}
.faq-q-text {
  flex: 1;
  font-weight: 600;
  font-size: 16px;
  color: var(--navy-900);
  letter-spacing: -0.3px;
}
.faq-q-arrow {
  flex-shrink: 0;
  color: var(--ink3);
  font-size: 13px;
  transition: transform 0.2s;
}
.faq-item.open .faq-q-arrow { transform: rotate(180deg); color: var(--gold); }
.faq-a {
  display: none;
  padding: 0 24px 22px 72px;
  border-top: 1px dashed var(--line);
  padding-top: 18px;
  color: var(--ink2);
  font-size: 14px;
  line-height: 1.8;
}
.faq-item.open .faq-a { display: block; }

/* 일반 아티클 (공지/약관) */
.art-list { display: flex; flex-direction: column; gap: 20px; }
.art-item {
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 30px 32px;
}
.art-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--navy-900);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.art-title::before {
  content: '';
  width: 3px;
  height: 18px;
  background: var(--gold);
  border-radius: 2px;
}
.art-date {
  color: var(--ink3);
  font-size: 12px;
  margin-bottom: 18px;
  padding-left: 13px;
}
.art-body {
  color: var(--ink2);
  font-size: 14px;
  line-height: 1.85;
}
.art-body p { margin-bottom: 12px; }
.art-body p:last-child { margin-bottom: 0; }
.art-body ul, .art-body ol { margin: 10px 0 14px 22px; }
.art-body li { margin-bottom: 6px; }
.art-body strong { color: var(--navy-900); font-weight: 700; }
.art-body a { color: var(--gold); text-decoration: underline; }

/* 하단 CTA */
.sp-cta {
  margin-top: 50px;
  background: white;
  border: 2px solid var(--gold);
  border-radius: 14px;
  padding: 32px 28px;
  text-align: center;
}
.sp-cta-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--navy-900);
  margin-bottom: 8px;
}
.sp-cta-desc { color: var(--ink2); font-size: 14px; margin-bottom: 18px; }
.sp-cta-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.sp-cta-btn {
  padding: 12px 22px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
  border: 1.5px solid var(--navy-900);
}
.sp-cta-btn.primary { background: var(--navy-900); color: white; }
.sp-cta-btn.primary:hover { background: var(--gold); border-color: var(--gold); }
.sp-cta-btn.secondary { background: white; color: var(--navy-900); }
.sp-cta-btn.secondary:hover { background: var(--navy-900); color: white; }

/* 모바일 */
@media (max-width: 768px) {
  .sp-header-inner { padding: 0 16px; }
  .sp-logo { font-size: 20px; }
  .sp-hero { padding: 42px 20px 36px; }
  .sp-hero-title { font-size: 24px; }
  .sp-hero-sub { font-size: 15px; letter-spacing: 1px; }
  .sp-hero-desc { font-size: 13px; }
  .sp-tabs-inner { padding: 0 8px; }
  .sp-tab { padding: 14px 6px; font-size: 13px; }
  .sp-main { padding: 24px 14px 50px; }
  .faq-q { padding: 16px 16px; gap: 12px; }
  .faq-q-mark { width: 28px; height: 28px; font-size: 16px; }
  .faq-q-text { font-size: 14px; }
  .faq-a { padding: 16px 18px 18px 56px; font-size: 13px; }
  .art-item { padding: 22px 20px; }
  .art-title { font-size: 17px; }
  .art-body { font-size: 13px; }
  .sp-cta { padding: 24px 18px; }
  .sp-cta-title { font-size: 17px; }
  .sp-cta-btn { padding: 10px 16px; font-size: 13px; flex: 1; min-width: 0; justify-content: center; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="sp-header">
  <div class="sp-header-inner">
    <a href="index.html" class="sp-logo">Choice<span>Golf</span></a>
    <a href="index.html" class="sp-back">← 메인으로</a>
  </div>
</header>

<!-- HERO -->
<section class="sp-hero">
  <div class="sp-hero-sub">Customer Support</div>
  <h1 class="sp-hero-title">고객지원</h1>
  <p class="sp-hero-desc">자주 묻는 질문과 공지사항, 이용약관을 확인하세요</p>
</section>

<!-- 탭 -->
<nav class="sp-tabs">
  <div class="sp-tabs-inner">
    <button class="sp-tab active" data-cat="faq" onclick="switchTab('faq')">📖 FAQ</button>
    <button class="sp-tab" data-cat="notice" onclick="switchTab('notice')">📢 공지사항</button>
    <button class="sp-tab" data-cat="terms" onclick="switchTab('terms')">📋 약관</button>
  </div>
</nav>

<!-- 본문 -->
<main class="sp-main">
  <div id="content">
    <div class="sp-loading">불러오는 중…</div>
  </div>

  <!-- 하단 CTA -->
  <div class="sp-cta">
    <div class="sp-cta-title">원하시는 답을 찾지 못하셨나요?</div>
    <div class="sp-cta-desc">전화 또는 카카오톡으로 언제든 편하게 문의 주세요</div>
    <div class="sp-cta-btns">
      <a href="tel:1533-3160" class="sp-cta-btn primary">📞 1533-3160</a>
      <a href="http://pf.kakao.com/_xoZxoxj" target="_blank" class="sp-cta-btn secondary">💬 카카오톡 채널</a>
    </div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://qmzrpyyadoajwziqachm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtenJweXlhZG9hand6aXFhY2htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI0NDcsImV4cCI6MjA4OTc3ODQ0N30.CI6ZFvNa2TRa0XqwnrXKL9x3ZHXfKg6GaNwJhqYvCmc';

let articles = { faq: [], notice: [], terms: [] };
let currentTab = 'faq';

// URL 해시로 탭 자동 선택
if (location.hash) {
  const cat = location.hash.slice(1);
  if (['faq', 'notice', 'terms'].includes(cat)) currentTab = cat;
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

// content는 HTML이지만 보안상 허용된 태그만 남김
function sanitizeHtml(html) {
  if (!html) return '';
  // 간단한 화이트리스트: p, br, strong, b, em, i, u, ul, ol, li, a
  const allowed = ['p','br','strong','b','em','i','u','ul','ol','li','a'];
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  // 모든 태그 순회하며 허용되지 않은 것 제거
  const walk = (node) => {
    const children = [...node.childNodes];
    children.forEach(child => {
      if (child.nodeType === 1) {
        const tag = child.tagName.toLowerCase();
        if (!allowed.includes(tag)) {
          // 내용은 남기고 태그만 제거
          const parent = child.parentNode;
          while (child.firstChild) parent.insertBefore(child.firstChild, child);
          parent.removeChild(child);
        } else {
          // 속성 정리 (a는 href만)
          [...child.attributes].forEach(attr => {
            if (tag === 'a' && attr.name === 'href') {
              // javascript: 차단
              if (/^\s*javascript:/i.test(attr.value)) child.removeAttribute('href');
            } else {
              child.removeAttribute(attr.name);
            }
          });
          if (tag === 'a') {
            child.setAttribute('target', '_blank');
            child.setAttribute('rel', 'noopener');
          }
          walk(child);
        }
      }
    });
  };
  walk(tmp);
  return tmp.innerHTML;
}

async function loadArticles() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/support_articles?select=*&is_active=eq.true&order=category,sort_order.asc,created_at.desc`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error('데이터 로드 실패');
    const rows = await res.json();
    articles = { faq: [], notice: [], terms: [] };
    rows.forEach(r => {
      if (articles[r.category]) articles[r.category].push(r);
    });
    render();
  } catch (e) {
    console.error(e);
    document.getElementById('content').innerHTML = `
      <div class="sp-empty">
        <span class="sp-empty-ico">⚠️</span>
        데이터를 불러오지 못했습니다.<br>
        <span style="font-size:12px;color:#aaa">${esc(e.message)}</span>
      </div>`;
  }
}

function switchTab(cat) {
  currentTab = cat;
  history.replaceState(null, '', '#' + cat);
  document.querySelectorAll('.sp-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat);
  });
  render();
  // 화면 상단으로 부드럽게
  window.scrollTo({ top: document.querySelector('.sp-tabs').offsetTop - 60, behavior: 'smooth' });
}

function render() {
  const list = articles[currentTab] || [];
  const wrap = document.getElementById('content');
  if (list.length === 0) {
    const emptyMsg = {
      faq: '아직 등록된 FAQ가 없습니다.',
      notice: '등록된 공지사항이 없습니다.',
      terms: '등록된 약관이 없습니다.'
    };
    wrap.innerHTML = `
      <div class="sp-empty">
        <span class="sp-empty-ico">📭</span>
        ${emptyMsg[currentTab]}
      </div>`;
    return;
  }

  if (currentTab === 'faq') {
    wrap.innerHTML = `
      <div class="faq-list">
        ${list.map((a, i) => `
          <div class="faq-item" id="faq-${a.id}">
            <div class="faq-q" onclick="toggleFaq(${a.id})">
              <div class="faq-q-mark">Q</div>
              <div class="faq-q-text">${esc(a.title)}</div>
              <div class="faq-q-arrow">▼</div>
            </div>
            <div class="faq-a">${sanitizeHtml(a.content)}</div>
          </div>
        `).join('')}
      </div>
    `;
  } else {
    // 공지 / 약관
    wrap.innerHTML = `
      <div class="art-list">
        ${list.map(a => {
          const dt = a.updated_at ? new Date(a.updated_at).toLocaleDateString('ko-KR') : '';
          return `
            <article class="art-item">
              <h2 class="art-title">${esc(a.title)}</h2>
              ${dt ? `<div class="art-date">최종 수정: ${dt}</div>` : ''}
              <div class="art-body">${sanitizeHtml(a.content)}</div>
            </article>
          `;
        }).join('')}
      </div>
    `;
  }
}

function toggleFaq(id) {
  const el = document.getElementById('faq-' + id);
  if (el) el.classList.toggle('open');
}

// 탭 초기 표시
document.querySelectorAll('.sp-tab').forEach(btn => {
  btn.classList.toggle('active', btn.dataset.cat === currentTab);
});

loadArticles();
</script>

</body>
</html>
