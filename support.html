<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객지원 | 초이스골프</title>
<meta name="description" content="초이스골프 고객지원 - FAQ, 공지사항, 이용약관">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />

<style>
:root {
  --navy-900: #0a1628;
  --navy-800: #14243e;
  --gold: #c9a961;
  --gold-light: #e8c574;
  --cream: #faf8f3;
  --white: #ffffff;
  --line: #e5e5e0;
  --ink1: #1a1a1a;
  --ink2: #4a4a4a;
  --ink3: #888;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--cream);
  color: var(--ink1);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }

/* 헤더 */
.sp-header {
  background: var(--navy-900);
  color: white;
  padding: 14px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.sp-header-inner {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sp-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
  font-style: italic;
  color: var(--gold);
  letter-spacing: 0.5px;
}
.sp-logo span { color: white; font-style: normal; font-weight: 700; }
.sp-back {
  font-size: 14px;
  color: #ccc;
  padding: 6px 14px;
  border: 1px solid #444;
  border-radius: 6px;
  transition: all 0.15s;
}
.sp-back:hover { background: var(--gold); color: var(--navy-900); border-color: var(--gold); }

/* HERO */
.sp-hero {
  background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-800) 100%);
  color: white;
  padding: 60px 24px 50px;
  text-align: center;
}
.sp-hero-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--gold);
  font-size: 18px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}
.sp-hero-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.sp-hero-desc {
  margin-top: 14px;
  color: #b8c5d6;
  font-size: 15px;
}

/* 탭 */
.sp-tabs {
  background: white;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 58px;
  z-index: 50;
}
.sp-tabs-inner {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  gap: 0;
}
.sp-tab {
  flex: 1;
  padding: 18px 16px;
  font-size: 15px;
  font-weight: 600;
  color: var(--ink3);
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  letter-spacing: -0.3px;
}
.sp-tab:hover { color: var(--navy-900); }
.sp-tab.active {
  color: var(--navy-900);
  border-bottom-color: var(--gold);
  font-weight: 700;
}

/* 본문 */
.sp-main {
  max-width: 980px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}
.sp-loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink3);
  font-size: 14px;
}
.sp-empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink3);
  font-size: 15px;
  background: white;
  border-radius: 12px;
  border: 1px solid var(--line);
}
.sp-empty-ico { font-size: 40px; margin-bottom: 12px; display: block; }

/* FAQ 아코디언 */
.faq-list { display: flex; flex-direction: column; gap: 10px; }
.faq-item {
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
  transition: all 0.2s;
}
.faq-item:hover { border-color: var(--gold); }
.faq-item.open { border-color: var(--gold); box-shadow: 0 4px 14px rgba(201,169,97,0.1); }
.faq-q {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 24px;
  cursor: pointer;
  user-select: none;
}
.faq-q-mark {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  background: var(--gold);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 18px;
  font-style: italic;
}
.faq-q-text {
  flex: 1;
  font-weight: 600;
  font-size: 16px;
  color: var(--navy-900);
  letter-spacing: -0.3px;
}
.faq-q-arrow {
  flex-shrink: 0;
  color: var(--ink3);
  font-size: 13px;
  transition: transform 0.2s;
}
.faq-item.open .faq-q-arrow { transform: rotate(180deg); color: var(--gold); }
.faq-a {
  display: none;
  padding: 0 24px 22px 72px;
  border-top: 1px dashed var(--line);
  padding-top: 18px;
  color: var(--ink2);
  font-size: 14px;
  line-height: 1.8;
}
.faq-item.open .faq-a { display: block; }

/* 일반 아티클 (공지/약관) */
.art-list { display: flex; flex-direction: column; gap: 20px; }
.art-item {
  background: white;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 30px 32px;
}
.art-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--navy-900);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.art-title::before {
  content: '';
  width: 3px;
  height: 18px;
  background: var(--gold);
  border-radius: 2px;
}
.art-date {
  color: var(--ink3);
  font-size: 12px;
  margin-bottom: 18px;
  padding-left: 13px;
}
.art-meta {
  display: flex;
  align-items: center;
  gap: 14px;
  color: var(--ink3);
  font-size: 12px;
  margin-bottom: 18px;
  padding-left: 13px;
}
.art-meta span { display: inline-flex; align-items: center; }
.art-views {
  color: var(--gold);
  font-weight: 600;
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.5px;
}
.art-body {
  color: var(--ink2);
  font-size: 14px;
  line-height: 1.85;
}
.art-body p { margin-bottom: 12px; }
.art-body p:last-child { margin-bottom: 0; }
.art-body ul, .art-body ol { margin: 10px 0 14px 22px; }
.art-body li { margin-bottom: 6px; }
.art-body strong { color: var(--navy-900); font-weight: 700; }
.art-body a { color: var(--gold); text-decoration: underline; }

/* 하단 CTA */
.sp-cta {
  margin-top: 50px;
  background: white;
  border: 2px solid var(--gold);
  border-radius: 14px;
  padding: 32px 28px;
  text-align: center;
}
.sp-cta-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--navy-900);
  margin-bottom: 8px;
}
.sp-cta-desc { color: var(--ink2); font-size: 14px; margin-bottom: 18px; }
.sp-cta-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.sp-cta-btn {
  padding: 12px 22px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
  border: 1.5px solid var(--navy-900);
}
.sp-cta-btn.primary { background: var(--navy-900); color: white; }
.sp-cta-btn.primary:hover { background: var(--gold); border-color: var(--gold); }
.sp-cta-btn.secondary { background: white; color: var(--navy-900); }
.sp-cta-btn.secondary:hover { background: var(--navy-900); color: white; }

/* 모바일 */
@media (max-width: 768px) {
  .sp-header-inner { padding: 0 16px; }
  .sp-logo { font-size: 20px; }
  .sp-hero { padding: 42px 20px 36px; }
  .sp-hero-title { font-size: 24px; }
  .sp-hero-sub { font-size: 15px; letter-spacing: 1px; }
  .sp-hero-desc { font-size: 13px; }
  .sp-tabs-inner { padding: 0 8px; }
  .sp-tab { padding: 14px 6px; font-size: 13px; }
  .sp-main { padding: 24px 14px 50px; }
  .faq-q { padding: 16px 16px; gap: 12px; }
  .faq-q-mark { width: 28px; height: 28px; font-size: 16px; }
  .faq-q-text { font-size: 14px; }
  .faq-a { padding: 16px 18px 18px 56px; font-size: 13px; }
  .art-item { padding: 22px 20px; }
  .art-title { font-size: 17px; }
  .art-body { font-size: 13px; }
  .sp-cta { padding: 24px 18px; }
  .sp-cta-title { font-size: 17px; }
  .sp-cta-btn { padding: 10px 16px; font-size: 13px; flex: 1; min-width: 0; justify-content: center; }
}
/* ===== TRUST BAR (영업보증보험 + 종합여행업 + 회원권 + 관광청 로고) ===== */
.trust-bar {
  background: var(--white, #ffffff);
  border-bottom: 1px solid var(--line);
  padding: 8px 20px;
  position: relative;
  z-index: 99;
}
.trust-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: nowrap;
}
.trust-logos { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.trust-logo { height: 24px; width: auto; display: block; object-fit: contain; }
.trust-logo.tw, .trust-logo.th, .trust-logo.jp { height: 22px; }
.trust-text {
  flex: 1; font-size: 12.5px; color: var(--navy-900); font-weight: 500;
  letter-spacing: 0.3px; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.trust-divider { color: var(--gold); margin: 0 7px; font-weight: 400; }
@media (max-width: 1024px) {
  .trust-text { font-size: 11.5px; }
  .trust-logo { height: 22px; }
  .trust-logo.tw, .trust-logo.th, .trust-logo.jp { height: 20px; }
  .trust-logos { gap: 10px; }
}
@media (max-width: 768px) {
  .trust-bar { padding: 8px 12px; }
  .trust-inner { gap: 8px; flex-wrap: wrap; justify-content: center; }
  .trust-logos { gap: 8px; order: 1; width: 100%; justify-content: center; }
  .trust-text { order: 2; font-size: 10.5px; letter-spacing: 0.1px; width: 100%; text-align: center; }
  .trust-logo { height: 18px; }
  .trust-logo.tw, .trust-logo.th, .trust-logo.jp { height: 16px; }
  .trust-divider { margin: 0 4px; }
}
@media (max-width: 380px) {
  .trust-text { font-size: 9.5px; }
  .trust-logos { gap: 6px; }
  .trust-logo { height: 16px; }
  .trust-logo.tw, .trust-logo.th, .trust-logo.jp { height: 14px; }
}
</style>
</head>

const SUPABASE_URL = 'https://qmzrpyyadoajwziqachm.supabase.co';

// URL 해시로 탭 자동 선택
if (location.hash) {
  const cat = location.hash.slice(1);
  if (['faq', 'notice', 'terms'].includes(cat)) currentTab = cat;
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

// content는 HTML이지만 보안상 허용된 태그만 남김
function sanitizeHtml(html) {
  if (!html) return '';
  // 간단한 화이트리스트: p, br, strong, b, em, i, u, ul, ol, li, a
  const allowed = ['p','br','strong','b','em','i','u','ul','ol','li','a'];
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  // 모든 태그 순회하며 허용되지 않은 것 제거
  const walk = (node) => {
    const children = [...node.childNodes];
    children.forEach(child => {
      if (child.nodeType === 1) {
        const tag = child.tagName.toLowerCase();
        if (!allowed.includes(tag)) {
          // 내용은 남기고 태그만 제거
          const parent = child.parentNode;
          while (child.firstChild) parent.insertBefore(child.firstChild, child);
          parent.removeChild(child);
        } else {
          // 속성 정리 (a는 href만)
          [...child.attributes].forEach(attr => {
            if (tag === 'a' && attr.name === 'href') {
              // javascript: 차단
              if (/^\s*javascript:/i.test(attr.value)) child.removeAttribute('href');
            } else {
              child.removeAttribute(attr.name);
            }
          });
          if (tag === 'a') {
            child.setAttribute('target', '_blank');
            child.setAttribute('rel', 'noopener');
          }
          walk(child);
        }
      }
    });
  };
  walk(tmp);
  return tmp.innerHTML;
}

async function loadArticles() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/support_articles?select=*&is_active=eq.true&order=category,sort_order.asc,created_at.desc`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error('데이터 로드 실패');
    const rows = await res.json();
    articles = { faq: [], notice: [], terms: [] };
    rows.forEach(r => {
      if (articles[r.category]) articles[r.category].push(r);
    });
    render();
  } catch (e) {
    console.error(e);
    document.getElementById('content').innerHTML = `
      <div class="sp-empty">
        <span class="sp-empty-ico">⚠️</span>
        데이터를 불러오지 못했습니다.<br>
        <span style="font-size:12px;color:#aaa">${esc(e.message)}</span>
      </div>`;
  }
}

function switchTab(cat) {
  currentTab = cat;
  history.replaceState(null, '', '#' + cat);
  document.querySelectorAll('.sp-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat);
  });
  render();
  // 화면 상단으로 부드럽게
  window.scrollTo({ top: document.querySelector('.sp-tabs').offsetTop - 60, behavior: 'smooth' });
}

function render() {
  const list = articles[currentTab] || [];
  const wrap = document.getElementById('content');
  if (list.length === 0) {
    const emptyMsg = {
      faq: '아직 등록된 FAQ가 없습니다.',
      notice: '등록된 공지사항이 없습니다.',
      terms: '등록된 약관이 없습니다.'
    };
    wrap.innerHTML = `
      <div class="sp-empty">
        <span class="sp-empty-ico">📭</span>
        ${emptyMsg[currentTab]}
      </div>`;
    return;
  }

  if (currentTab === 'faq') {
    wrap.innerHTML = `
      <div class="faq-list">
        ${list.map((a, i) => `
          <div class="faq-item" id="faq-${a.id}">
            <div class="faq-q" onclick="toggleFaq(${a.id})">
              <div class="faq-q-mark">Q</div>
              <div class="faq-q-text">${esc(a.title)}</div>
              <div class="faq-q-arrow">▼</div>
            </div>
            <div class="faq-a">${sanitizeHtml(a.content)}</div>
          </div>
        `).join('')}
      </div>
    `;
  } else {
    // 공지 / 약관
    wrap.innerHTML = `
      <div class="art-list">
        ${list.map(a => {
          const dt = a.created_at ? new Date(a.created_at).toLocaleDateString('ko-KR') : '';
          // 🆕 공지사항만 조회수 표시 (방문 시 +1)
          const viewCountHtml = (currentTab === 'notice')
            ? `<span class="art-views">👁 ${(a.view_count ?? 0).toLocaleString()}</span>`
            : '';
          return `
            <article class="art-item" data-article-id="${a.id}">
              <h2 class="art-title">${esc(a.title)}</h2>
              <div class="art-meta">
                ${dt ? `<span>${dt}</span>` : ''}
                ${viewCountHtml}
              </div>
              <div class="art-body">${sanitizeHtml(a.content)}</div>
            </article>
          `;
        }).join('')}
      </div>
    `;
    // 🆕 공지사항일 때만: 각 글에 대해 조회수 +1 (한 세션 당 한 번)
    if (currentTab === 'notice') {
      bumpNoticeViews(list);
    }
  }
}

// 🆕 공지사항 조회수 증가 (세션당 1회씩)
async function bumpNoticeViews(list) {
  const SESSION_KEY = 'sp_viewed_notices';
  let viewed = [];
  try { viewed = JSON.parse(sessionStorage.getItem(SESSION_KEY) || '[]'); } catch(e) { viewed = []; }
  const toBump = list.filter(a => !viewed.includes(a.id));
  if (toBump.length === 0) return;

  for (const a of toBump) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_support_view`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`
        },
        body: JSON.stringify({ article_id: a.id })
      });
      if (res.ok) {
        const newCount = await res.json();
        viewed.push(a.id);
        // 화면의 조회수 숫자 즉시 갱신
        const card = document.querySelector(`[data-article-id="${a.id}"] .art-views`);
        if (card) card.textContent = '👁 ' + Number(newCount).toLocaleString();
      }
    } catch(e) { /* 조회수 실패해도 본문은 표시됨 */ }
  }
  try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(viewed)); } catch(e) {}
}

function toggleFaq(id) {
  const el = document.getElementById('faq-' + id);
  if (el) el.classList.toggle('open');
}

// 탭 초기 표시
document.querySelectorAll('.sp-tab').forEach(btn => {
  btn.classList.toggle('active', btn.dataset.cat === currentTab);
});

loadArticles();
</script>
