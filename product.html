}

/* ═══════════════════════════════════════════════════════
   🆕 확정서 인쇄 전용 한 페이지 양식 (#printConfirm)
   - 회사 헤더 → 타이틀 → 항공 정보 → 기본정보 → 확정 일정표 → 체크리스트
   ═══════════════════════════════════════════════════════ */
function renderPrintConfirm(p) {
  const old = document.getElementById('printConfirm');
  if (old) old.remove();

  const ci = p.confirmInfo || {};
  const customer = p.customerName || '';

  // 기간 문자열 (예: 2026년 2월 22일 ~ 2월 25일 (3박4일))
  const start = p.period && p.period.start;
  const end = p.period && p.period.end;
  let periodStr = '';
  if (start && end) {
    const a = start.split('-'), b = end.split('-');
    const range = `${a[0]}년 ${Number(a[1])}월 ${Number(a[2])}일 ~ ${Number(b[1])}월 ${Number(b[2])}일`;
    // 박/일: 어드민에 적힌 값만 사용 (자동계산 안 함) — confirm_info → 변환표 → 라벨 순, 없으면 표시 안 함
    let nl = '';
    const av = (p.variations && p.variations[p.activeVariationIdx]) || null;
    if (Number(ci.nights) > 0 && Number(ci.days) > 0) {
      nl = `${Number(ci.nights)}박${Number(ci.days)}일`;
    } else if (av && Number(av.nights) > 0 && Number(av.days) > 0) {
      nl = `${Number(av.nights)}박${Number(av.days)}일`;
    } else {
      const dm = String(p.duration || '').match(/\d+\s*박\s*\d+\s*일/);
      if (dm) nl = dm[0].replace(/\s+/g, '');
    }
    periodStr = range + (nl ? ` (${nl})` : '');
  } else if (start) {
    const a = start.split('-');
    periodStr = `${a[0]}년 ${Number(a[1])}월 ${Number(a[2])}일 출발`;
  } else {
    periodStr = p.duration || '';
  }

  // 날짜 (2/22 (일))
  const fmtDay = (dstr) => {
    if (!dstr) return '';
    const d = new Date(dstr);
    if (isNaN(d)) return '';
    const wd = ['일','월','화','수','목','금','토'][d.getDay()];
    return `${d.getMonth()+1}/${d.getDate()} (${wd})`;
  };

  // 일정 텍스트 (색상태그 + 골프 아이콘 + 항공사 로고)
  const evText = (ev) => {
    const g = stripGolfEmoji(ev.text || '');
    let t = (typeof parseColorTags === 'function') ? parseColorTags(g.text) : esc(g.text);
    const isG = ev.is_golf || g.had;
    if (isG) t = redHoles(t);
    return (isG ? '⛳ ' : '') + t;
  };
  const transHtml = (ev) => (ev.transport ? esc(ev.transport) : '');  // PDF에는 항공사 로고 미출력

  // 식사 (조: 호텔식 / 중: 불포함)
  const mealHtml = (day) => {
    const m = (day.meals && typeof day.meals === 'object') ? day.meals : {};
    const out = [];
    [['조식','조'],['중식','중'],['석식','석']].forEach(([k, s]) => {
      const t = (m[k] || '').trim();
      if (!t) return;
      const no = t.includes('불포함') || t.includes('미제공');
      out.push(`<span class="${no ? 'm-no' : 'm-ok'}">${s}: ${esc(t)}</span>`);
    });
    return out.join('');
  };

  const divider = (t) => `<div class="pcf-divider"><span>${t}</span></div>`;

  // ① 회사 헤더 + 문서 타이틀
  const headerHtml = `
    <div class="pcf-titlewrap">
      <div class="pcf-doc-title">여행 확정서</div>
      <div class="pcf-corpline"><b>초이스골프</b> · www.chctour.com · 1533-3160 · 서울특별시 서초구 강남대로101안길 18-1 (잠원빌딩 2층)</div>
    </div>`;

  // ② 기본 정보
  const infoRows = [];
  infoRows.push(`<tr><td class="k">상 품</td><td class="v" colspan="3">${esc(p.title || '')}</td></tr>`);
  infoRows.push(`<tr><td class="k">기 간</td><td class="v">${esc(periodStr)}</td><td class="k">호 텔</td><td class="v">${esc(ci.hotel || '-')}</td></tr>`);
  // 항공사 한국어명 (출발편/귀국편 코드에서 추출, 예: LJ → 진에어)
  let airlineName = '';
  const flightStr = String(ci.dep_flight || ci.ret_flight || '').toUpperCase();
  const am = flightStr.match(/(?:^|[^A-Z0-9])([A-Z]{2}|[0-9][A-Z])\s?\d{2,4}(?![0-9])/);
  if (am && typeof AIRLINE_KR !== 'undefined' && AIRLINE_KR[am[1]]) airlineName = AIRLINE_KR[am[1]];
  if (ci.picket || airlineName) infoRows.push(`<tr><td class="k">피켓미팅</td><td class="v">${esc(ci.picket || '-')}</td><td class="k">항 공</td><td class="v">${esc(airlineName || '-')}</td></tr>`);
  const inclStr = (p.includes || []).join(', ');
  const exclStr = (p.excludes || []).join(', ');
  if (inclStr) infoRows.push(`<tr><td class="k">포함사항</td><td class="v" colspan="3">${esc(inclStr)}</td></tr>`);
  if (exclStr) infoRows.push(`<tr><td class="k">불포함</td><td class="v" colspan="3">${esc(exclStr)}</td></tr>`);
  const infoHtml = `
    <table class="pcf-kv">
      <colgroup><col style="width:62px"><col><col style="width:62px"><col style="width:200px"></colgroup>
      ${infoRows.join('')}
    </table>`;

  // (항공 정보 섹션 제거됨 — 기본 정보의 '항 공' 칸으로 대체)
  const airHtml = '';

  // ④ 여행 일정
  const list = p.itinerary || [];
  let itinRows = '';
  list.forEach((day, dIdx) => {
    const events = (day.events || []).filter(e => !e.meal || e.time || e.place || e.transport);
    const hotelStay = (day.hotel_name || '').trim();
    const hasHotelBar = hotelStay && dIdx < list.length - 1;
    const daySpan = Math.max(events.length, 1) + (hasHotelBar ? 1 : 0);
    const mealSpan = Math.max(events.length, 1);
    const meal = mealHtml(day);
    const dayCell = `
      <td class="c-day" rowspan="${daySpan}">
        ${dayRangeLabel(day) ? `<span class="pcf-day-badge custom"><span class="num">${esc(dayRangeLabel(day))}</span></span>` : `<span class="pcf-day-badge"><span class="d">DAY</span><span class="num">${String(day.day).padStart(2,'0')}</span></span>`}
        ${day.date ? `<div class="pcf-day-date">${fmtDay(day.date)}</div>` : ''}
      </td>`;

    if (!events.length) {
      itinRows += `<tr${hasHotelBar ? '' : ' class="day-end"'}>${dayCell}
        <td class="c-place"></td><td class="c-trans"></td><td class="c-time"></td>
        <td class="c-event">-</td>
        <td class="c-meal" rowspan="${mealSpan}">${meal}</td>
      </tr>`;
    } else {
      events.forEach((ev, i) => {
        const trCls = [ev.highlight ? 'hl-row' : '', (i === events.length - 1 && !hasHotelBar) ? 'day-end' : ''].filter(Boolean).join(' ');
        itinRows += `<tr${trCls ? ` class="${trCls}"` : ''}>
          ${i === 0 ? dayCell : ''}
          <td class="c-place">${ev.place ? esc(ev.place) : ''}</td>
          <td class="c-trans">${transHtml(ev)}</td>
          <td class="c-time">${ev.time ? esc(ev.time) : ''}</td>
          <td class="c-event">${evText(ev)}</td>
          ${i === 0 ? `<td class="c-meal" rowspan="${mealSpan}">${meal}</td>` : ''}
        </tr>`;
      });
    }
    if (hasHotelBar) {
      itinRows += `<tr class="pcf-hotel-row day-end"><td class="c-place"></td><td class="c-trans"></td><td class="c-time"></td><td class="c-event pcf-hotel-cell" colspan="2"><span class="pcf-hotel-tag">HOTEL</span>${esc(hotelStay)}</td></tr>`;
    }
  });
  const itinHtml = itinRows ? `
    ${divider('여행 일정')}
    <table class="pcf-itin">
      <colgroup><col style="width:58px"><col style="width:62px"><col style="width:62px"><col style="width:42px"><col><col style="width:74px"></colgroup>
      <thead><tr><th>날 짜</th><th>장 소</th><th>교 통</th><th>시 간</th><th class="th-event">일 정</th><th>식 사</th></tr></thead>
      <tbody>${itinRows}</tbody>
    </table>
    <div style="font-size:10.5px;color:#333;font-weight:500;text-align:center;margin-top:5px">※ 상기 일정은 항공 및 현지 사정에 의해 다소 변경될 수 있습니다.</div>` : '';

  // ⑤ 체크리스트 (유의사항)
  const checkHtml = (p.notices && p.notices.length) ? `
    <div class="pcf-checkbox">
      <div class="head">여행 전 꼭 확인해 주세요</div>
      <div class="body pcf-check">${p.notices.map(n => `<div>${esc(n)}</div>`).join('')}</div>
    </div>` : '';

  const footHtml = `<div class="pcf-foot">CHOICE GOLF · PREMIUM GOLF JOURNEY · 1533-3160</div>`;

  const wrap = document.createElement('div');
  wrap.id = 'printConfirm';
  wrap.innerHTML = headerHtml + infoHtml + airHtml + itinHtml + checkHtml + footHtml;
  document.body.appendChild(wrap);
}

/* ═══════════════════════════════════════════════════════
   🆕 확정서 상단 카드 (예약 확정 안내)
   ═══════════════════════════════════════════════════════ */
function renderConfirmHero(p) {
  const ci = p.confirmInfo || {};
  const container = document.querySelector('.main-content');
  if (!container) return;

  const fmt = (s) => { if (!s) return ''; const a = s.split('-'); return `${a[0]}.${a[1]}.${a[2]}`; };
  const start = p.period && p.period.start;
  const end = p.period && p.period.end;
  let scheduleStr = '';
  if (start && end) {
    const endShort = end.slice(5).replace('-', '.');
    // 박/일: 어드민에 적힌 값만 사용 (자동계산 안 함) — confirm_info → 변환표 → 라벨 순
    let nl = '';
    const av = (p.variations && p.variations[p.activeVariationIdx]) || null;
    if (Number(ci.nights) > 0 && Number(ci.days) > 0) {
      nl = `${Number(ci.nights)}박${Number(ci.days)}일`;
    } else if (av && Number(av.nights) > 0 && Number(av.days) > 0) {
      nl = `${Number(av.nights)}박${Number(av.days)}일`;
    } else {
      const dm = String(p.duration || '').match(/\d+\s*박\s*\d+\s*일/);
      if (dm) nl = dm[0].replace(/\s+/g, '');
    }
    scheduleStr = `${fmt(start)} ~ ${endShort}` + (nl ? ` (${nl})` : '');
  } else if (start) {
    scheduleStr = fmt(start);
  }

  // 행 아이콘 (틸 라인 SVG)
  const CIICON = {
    cal: '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2.5" stroke="currentColor" stroke-width="2"/><path d="M3 9.5h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
    bld: '<svg viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="1.6" stroke="currentColor" stroke-width="2"/><rect x="8.4" y="6.4" width="2.3" height="2.3" fill="currentColor"/><rect x="13.3" y="6.4" width="2.3" height="2.3" fill="currentColor"/><rect x="8.4" y="11" width="2.3" height="2.3" fill="currentColor"/><rect x="13.3" y="11" width="2.3" height="2.3" fill="currentColor"/><path d="M10 21v-4h4v4" stroke="currentColor" stroke-width="2"/></svg>',
    usr: '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.6" stroke="currentColor" stroke-width="2"/><path d="M4.5 20c0-3.8 3.4-5.8 7.5-5.8s7.5 2 7.5 5.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
    pin: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 21s7-6.4 7-11.5A7 7 0 1 0 5 9.5C5 14.6 12 21 12 21Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="9.3" r="2.4" stroke="currentColor" stroke-width="2"/></svg>',
    tkt: '<svg viewBox="0 0 24 24" fill="none"><path d="M4 8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2 2 2 0 0 0 0 4 2 2 0 0 1 0 4 2 2 0 0 1-2 2H6a2 2 0 0 1-2-2 2 2 0 0 0 0-4 2 2 0 0 1 0-4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M14.5 6.5v11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="0.5 3"/></svg>',
    ret: '<svg viewBox="0 0 24 24" fill="none"><path d="M10 9H16.5a4 4 0 0 1 0 8H13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12.5 6l-3 3 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    bag: '<svg viewBox="0 0 24 24" fill="none"><rect x="5" y="7.5" width="14" height="12.5" rx="2.2" stroke="currentColor" stroke-width="2"/><path d="M9 7.5V5.5a1.5 1.5 0 0 1 1.5-1.5h3A1.5 1.5 0 0 1 15 5.5v2M9.5 11.5v5M14.5 11.5v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'
  };
  // 현지 정보 그룹
  const localRows = [];
  if (scheduleStr)   localRows.push(['일정', scheduleStr, 'cal']);
  if (ci.hotel)      localRows.push(['호텔', ci.hotel, 'bld']);
  if (ci.picket)     localRows.push(['피켓미팅', ci.picket, 'usr', true]);   // 🔶 공항 미팅 핵심 정보 → 강조
  if (ci.guide)      localRows.push(['가이드', ci.guide, 'usr']);
  // 항공 정보 그룹
  const airRows = [];
  if (ci.depart)     airRows.push(['출발지', ci.depart, 'pin']);
  if (ci.dep_flight) airRows.push(['출발편', ci.dep_flight, 'tkt']);
  if (ci.ret_flight) airRows.push(['귀국편', ci.ret_flight, 'ret']);
  if (ci.baggage)    airRows.push(['수하물', ci.baggage, 'bag']);
  // 항공사 로고 (출발편/귀국편 칸)
  const rowHtml = (arr) => arr.map(([l, v, ic, hl]) => {
    const logo = (ic === 'tkt' || ic === 'ret') ? airlineLogoHtml(v) : '';
    return `<div class="cinfo-row${hl ? ' cinfo-row--hl' : ''}"><span class="cir-ico">${CIICON[ic] || ''}</span><span class="cir-txt"><span class="cir-label">${l}</span><span class="cir-val">${logo}${esc(v)}</span></span></div>`;
  }).join('');

  // 첨부 자료 (카테고리별 드롭다운)
  const atts = Array.isArray(ci.attachments) ? ci.attachments.filter(a => a && a.url) : [];
  window.__confirmAtts = atts;
  // 🆕 여행안내문 (텍스트) — 있으면 첨부 패널에 버튼 추가, 누르면 새 탭에 표시
  const hasTravelNote = !!(ci.travel_note && String(ci.travel_note).trim());
  window.__travelNote = ci.travel_note || '';
  window.__travelNoteTitle = p.title || '';
  const groups = {};
  atts.forEach((a, idx) => {
    const cat = (a.category && a.category.trim()) || '기타';
    (groups[cat] = groups[cat] || []).push({ label: a.label, idx });
  });
  const groupKeys = Object.keys(groups);
  const QR_ICO = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:inline-block;vertical-align:middle"><path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm8-2h3v3h-3v-3zm5 0h3v3h-3v-3zm-5 5h3v3h-3v-3zm5 0h3v3h-3v-3z"/></svg>';
  const attIcon = (cat) => {
    if (/qr|큐알/i.test(cat)) return QR_ICO;
    if (/인보이스|invoice/i.test(cat)) return '📄';
    if (/항공|티켓|ticket|탑승|e-?ticket/i.test(cat)) return '✈️';
    if (/비짓|visit\s*japan|vjw/i.test(cat)) return '🛂';
    if (/신고서/i.test(cat)) return '📝';
    if (/여권|passport|입국|출국|세관/i.test(cat)) return '🛂';
    if (/영수증|receipt|결제/i.test(cat)) return '🧾';
    if (/호텔|숙박|바우처|voucher/i.test(cat)) return '🏨';
    if (/골프|부킹|라운딩|티오프|tee/i.test(cat)) return golfIconSvg(18);
    if (/일정|스케줄|여정/i.test(cat)) return '🗓️';
    if (/보험/i.test(cat)) return '🛡️';
    return '📄';
  };
  // 🆕 인보이스 — 이 확정서에 연결된 인보이스가 있으면 첨부에 버튼 추가, 누르면 새 탭에 청구서(invoice.html)
  const invToken = (params.get('inv')) || (p.linkedInvoiceToken) || '';
  const hasInvoice = !!invToken;
  const invoiceCard = hasInvoice ? `
            <div class="attach-card-wrap">
              <button type="button" class="attach-card" onclick="openInvoiceDoc()">
                <span class="attach-card-ico">🧾</span>
                <span class="attach-card-txt">
                  <span class="attach-card-title">인보이스</span>
                  <span class="attach-card-desc">눌러서 청구서 보기</span>
                </span>
                <span class="attach-card-go">›</span>
              </button>
            </div>` : '';
  const travelCard = hasTravelNote ? `
            <div class="attach-card-wrap">
              <button type="button" class="attach-card" onclick="openTravelNote()">
                <span class="attach-card-ico">📝</span>
                <span class="attach-card-txt">
                  <span class="attach-card-title">여행안내문</span>
                  <span class="attach-card-desc">눌러서 안내문 보기</span>
                </span>
                <span class="attach-card-go">›</span>
              </button>
            </div>` : '';
  const attachHtml = (groupKeys.length || hasTravelNote || hasInvoice) ? `
        <div class="attach-panel">
          <div class="attach-head">
            <div class="attach-title"><span class="at-ico">📑</span>첨부 서류</div>
            <div class="attach-count">총 ${atts.length + (hasTravelNote ? 1 : 0) + (hasInvoice ? 1 : 0)}개 · 필수 확인</div>
          </div>
          <div class="attach-cards">
            ${invoiceCard}
            ${travelCard}
            ${groupKeys.map(cat => {
              const items = groups[cat];
              const desc = `${items.length}개 파일`;
              const fileList = `
                <div class="attach-files">
                  ${items.map(it => `<button type="button" class="attach-file-btn" onclick="openConfirmImage(${it.idx})"><span class="aff-dot"></span><span>${esc(it.label || '보기')}</span><span class="aff-go">›</span></button>`).join('')}
                </div>`;
              return `
            <div class="attach-card-wrap">
              <button type="button" class="attach-card" onclick="toggleAttachGroup(this)">
                <span class="attach-card-ico">${attIcon(cat)}</span>
                <span class="attach-card-txt">
                  <span class="attach-card-title">${esc(cat)}</span>
                  <span class="attach-card-desc">${esc(desc)}</span>
                </span>
                <span class="attach-card-go">›</span>
              </button>
              ${fileList}
            </div>`;
            }).join('')}
          </div>
          <div class="attach-foot"><span class="af-lock">🔒</span> 첨부 서류는 본 확정서에서만 안전하게 열람됩니다.</div>
        </div>` : '';

  const customer = p.customerName || '';
  window.__confirmCustomer = customer;  // 🆕 PDF 파일명용
  const checkSvg = `<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5 L10 17.5 L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const noteSvg = `<svg viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2.5" stroke="currentColor" stroke-width="1.8"/><path d="M9 8h6M9 12h6M9 16h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`;

  const GLOBE = '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M3 12h18" stroke="currentColor" stroke-width="2"/><path d="M12 3c2.6 2.7 2.6 15.3 0 18M12 3c-2.6 2.7-2.6 15.3 0 18" stroke="currentColor" stroke-width="2"/></svg>';
  const PLANE = '<svg viewBox="0 0 24 24" fill="currentColor" style="transform:rotate(45deg);overflow:visible"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5v1.3l3.5-1 3.5 1v-1.3L13 18.5V13.5L21 16Z"/></svg>';
  const infoHtml = `
      ${localRows.length ? `
      <div class="cinfo-card">
        <div class="cinfo-head"><span class="cih-ico">${GLOBE}</span><span class="cih-title">현지 정보</span></div>
        <div class="cinfo-body">${rowHtml(localRows)}</div>
      </div>` : ''}
      ${airRows.length ? `
      <div class="cinfo-card">
        <div class="cinfo-head"><span class="cih-ico">${PLANE}</span><span class="cih-title">항공 정보</span></div>
        <div class="cinfo-body">${rowHtml(airRows)}</div>
      </div>` : ''}`;

  const checkCircle = `<span class="cc-check">${checkSvg}</span>`;
  const html = `
    <div class="confirm-hero">
      ${customer
        ? `<div class="confirm-customer">${checkCircle}<span class="cc-name">${esc(customer)}</span></div>`
        : `<div class="confirm-customer confirm-customer--solo">${checkCircle}</div>`}
      <div class="confirm-headline">예약 확정서</div>
      <div class="confirm-eng">TRAVEL CONFIRMATION</div>
      <div class="confirm-thanks"><span class="cg-brand">초이스골프</span>를 이용해 주셔서 감사합니다.<br>즐거운 여행 되세요!</div>

      <button type="button" class="confirm-pdf-btn" onclick="printConfirmPdf()"><svg viewBox="0 0 24 24" fill="none"><path d="M7 8V4h10v4M7 17H5a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="7" y="14" width="10" height="7" rx="1" stroke="currentColor" stroke-width="2"/></svg>PDF 저장 · 인쇄</button>

      ${attachHtml}
      ${infoHtml}
    </div>
  `;
  container.insertAdjacentHTML('afterbegin', html);

  // 🆕 섹션 탭(PC·모바일)을 확정 카드 아래로 이동
  const hero = container.querySelector('.confirm-hero');
  const mtabs = document.querySelector('.mobile-tabs');
  const pctabs = document.querySelector('.tab-menu');
  if (hero && pctabs) hero.insertAdjacentElement('afterend', pctabs);
  if (hero && mtabs) hero.insertAdjacentElement('afterend', mtabs);
}

  const fmtMD = d => { if(!d) return ''; const dt=new Date(d); if(isNaN(dt)) return d; const day=['일','월','화','수','목','금','토'][dt.getDay()]; return `${dt.getMonth()+1}/${dt.getDate()}(${day})`; };

function buildInvoice(b, pax, pays, account){
  const named = (pax||[]).filter(p => (p.pax_name||'').trim());
  const isNamedList = named.length > 0;

  let totalDue, totalPaid, items = [];

  } else {

      const val = num ? Number(s.replace(/,/g,'')).toLocaleString() : esc(s);

      return `<td style="${style}">${val}</td>`;

    feeSection = `<table class="items"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  } else if (isNamedList) {

        </div>`;
  }

  const NIC = {
    bank:'<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M4 10h16M5 6l7-3 7 3M6 10v8M10 10v8M14 10v8M18 10v8"/></svg>',

  };

  const bankAcct = (b.invoice_bank && String(b.invoice_bank).trim()) ? b.invoice_bank : account;
  const acctNum = (String(bankAcct).match(/[\d][\d-]{5,}/) || [bankAcct])[0];
  const acctHtml = bankAcct ? `

            </div>

  return `

async function fetchInvoiceForDoc(token){
  if(!token) return null;
  try{
    const apiI = async (path) => { const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` } }); return r.ok ? r.json() : null; };
    const bks = await apiI(`bookings?invoice_token=eq.${encodeURIComponent(token)}&select=*`);
    if(!bks || !bks.length) return null;
    const b = bks[0];
    const [pax, pays, settings] = await Promise.all([
      apiI(`booking_pax?booking_id=eq.${b.id}&order=sort_order.asc`),
      apiI(`booking_pax_payments?booking_id=eq.${b.id}&order=created_at.asc`),
      apiI(`site_settings?key=eq.invoice_account&select=value`)
    ]);
    return { b: b, pax: pax || [], pays: pays || [], account: (settings && settings[0] && settings[0].value) || '' };
  }catch(e){ return null; }
}

  });
}

   🆕 국내골프 자동 콘텐츠 채움
   - 포함/불포함 사항: 박수에 따라 자동 결정
   - 일정표: 1박2일 / 2박3일 / 3박4일 자동 생성
   ═══════════════════════════════════════════════════════ */
// 🆕 어드민 일정표가 비어있는 국내 상품용 — 해외 상품과 동일한 표준 itinerary 데이터 생성
//    (renderPage 시작 시 p.itinerary에 주입 → 해외골프와 같은 타임라인 렌더러로 표시됨)
function buildDomesticDefaultItinerary(p) {
  const nights = parseDomesticNights(p);
  const days = nights + 1;
  const golfNames = (p.golfCourses || []).map(g => g.name).filter(Boolean);
  const golfLabel = golfNames.length ? golfNames.join(' 또는 ') : '골프장';
  const hotelName = ((p.hotels || [])[0] || {}).name || '';
  const ev = (text, isGolf) => ({ time: '', place: '', transport: '', text, sub_text: '', is_golf: !!isGolf });
  const arr = [];
  for (let d = 1; d <= days; d++) {
    const isFirst = d === 1, isLast = d === days;
    let events;
    if (isFirst) {
      events = [
        ev('골프장 도착'),
        ev(`${golfLabel} 18홀 라운딩 (2부)`, true),
        ev('라운딩 후 호텔 체크인 및 휴식'),
      ];
    } else if (isLast) {
      events = [
        ev('호텔 조식 후 체크아웃'),
        ev(`${golfLabel} 18홀 라운딩 (1부)`, true),
        ev('라운딩 후 일정 종료 및 귀가'),
      ];
    } else {
      events = [
        ev('호텔 조식 후 골프장 이동'),
        ev(`${golfLabel} 18홀 라운딩 (1부)`, true),
        ev('자유 시간 및 휴식'),
      ];
    }
    arr.push({
      day: d, date: '', title: `${d}일차`,
      hotel_name: isLast ? '' : hotelName,
      meals: { 조식: isFirst ? '' : '호텔식', 중식: '', 석식: '' },
      events
    });
  }
  return arr;
}

// 박수 추출 헬퍼: 상품의 duration 또는 title/summary 분석
function parseDomesticNights(p) {
  // duration 컬럼 우선 (예: "2박3일")
  const durStr = (p.duration || p.period || p.title || p.summary || '').toString();
  const m = durStr.match(/(\d)박(\d)일/);
  if (m) return Number(m[1]);
  // 못 찾으면 기본 1박2일
  return 1;
}

// WMO weather code → 아이콘 + 한글 설명
function weatherCodeToInfo(code) {
  const map = {
    0: ['☀️', '맑음'],     1: ['🌤️', '대체로 맑음'],
    2: ['⛅', '부분 흐림'], 3: ['☁️', '흐림'],
    45: ['🌫️', '안개'],    48: ['🌫️', '서리 안개'],
    51: ['🌦️', '약한 이슬비'], 53: ['🌦️', '보통 이슬비'], 55: ['🌦️', '강한 이슬비'],
    61: ['🌧️', '약한 비'],     63: ['🌧️', '비'],           65: ['🌧️', '강한 비'],
    71: ['🌨️', '약한 눈'],     73: ['🌨️', '눈'],           75: ['❄️', '강한 눈'],
    77: ['🌨️', '눈발'],
    80: ['🌦️', '소나기'],      81: ['🌧️', '강한 소나기'],   82: ['⛈️', '매우 강한 소나기'],
    95: ['⛈️', '뇌우'],        96: ['⛈️', '뇌우+우박'],     99: ['⛈️', '강한 뇌우+우박'],
  };
  return map[code] || ['🌡️', ''];
}

// 골프 적합도 자동 판정
function golfVerdict(temp, wind, rainProb, code) {
  if (rainProb >= 70) return { emoji: '🌧️', text: '비 소식이 있어요. 출발 전 골프장 상황 확인을 권해드려요' };
  if (code >= 71 && code <= 77) return { emoji: '❄️', text: '눈 소식이 있어 골프장 운영 상황을 살펴보시면 좋아요' };
  if (wind >= 10) return { emoji: '💨', text: '바람이 다소 있어 샷 감각에 변화가 있을 수 있어요' };
  if (temp < 5)  return { emoji: '🧣', text: '쌀쌀한 날씨예요. 따뜻한 옷차림이 좋겠어요' };
  if (temp < 12) return { emoji: '🧥', text: '선선한 날씨예요. 가벼운 겉옷 챙기시면 좋아요' };
  if (temp >= 32) return { emoji: '☀️', text: '햇살이 따뜻해요. 수분 보충하며 라운딩 즐기세요' };
  if (temp >= 18 && temp <= 26 && wind < 5 && rainProb < 20)
    return { emoji: golfIconSvg(30), text: '라운딩하기 참 좋은 날이에요' };
  return { emoji: golfIconSvg(30), text: '골프 치기 좋은 날씨예요' };
}

// 좌표 결정: region → country 순으로 fallback
function resolveWeatherCoords(product) {
  if (product.region && WEATHER_REGION_COORDS[product.region]) {
    return WEATHER_REGION_COORDS[product.region];
  }
  if (product.country && WEATHER_COUNTRY_COORDS[product.country]) {
    return WEATHER_COUNTRY_COORDS[product.country];
  }
  return null;
}

// 메인 함수: 날씨 로드 + 렌더
async function loadWeather(product) {
  const section = document.getElementById('secWeather');
  const widget = document.getElementById('weatherWidget');
  if (!section || !widget) return;

  const coords = resolveWeatherCoords(product);
  if (!coords) return; // 좌표 정보 없으면 섹션 자체 안 보임

  // 섹션 표시
  section.style.display = '';

  const regionName = (product.regionName || product.countryName || coords.name);

  try {
    // 🆕 Open-Meteo 직접 호출이 일부 통신사에서 차단됨 → 우리 서버(/api/weather) 경유
    const url = `/api/weather?lat=${coords.lat}&lng=${coords.lng}&tz=${encodeURIComponent(coords.timezone)}`;
    
    const res = await fetch(url);
    if (!res.ok) throw new Error('API 호출 실패');
    const data = await res.json();

    const c = data.current;
    const d = data.daily;
    const [icon, desc] = weatherCodeToInfo(c.weather_code);
    const rainProb = d.precipitation_probability_max?.[0] ?? 0;
    const verdict = golfVerdict(c.temperature_2m, c.wind_speed_10m, rainProb, c.weather_code);

    // ===== 한국식 체감온도 계산 (기온 + 습도만) =====
    // 기상청 여름철 체감온도 공식 (Heat Index 한국 변형)
    // 기온 ≥ 26°일 때만 적용, 그 외엔 기온 그대로
    function calcKoreanFeelsLike(tempC, humidity) {
      if (tempC < 26) return tempC;
      const tw = tempC * Math.atan(0.151977 * Math.pow(humidity + 8.313659, 0.5))
               + Math.atan(tempC + humidity)
               - Math.atan(humidity - 1.67633)
               + 0.00391838 * Math.pow(humidity, 1.5) * Math.atan(0.023101 * humidity)
               - 4.686035;
      const feels = -0.2442 + 0.55399 * tw + 0.45535 * tempC
                  - 0.0022 * tw * tw + 0.00278 * tw * tempC + 3.0;
      return feels;
    }
    const feelsLike = calcKoreanFeelsLike(c.temperature_2m, c.relative_humidity_2m);

    // 6일 예보 렌더 (3×2 그리드)
    const DAY_NAMES = ['일', '월', '화', '수', '목', '금', '토'];
    const forecastHtml = d.time.slice(0, 6).map((dateStr, i) => {
      const [fIcon] = weatherCodeToInfo(d.weather_code[i]);
      const hi = Math.round(d.temperature_2m_max[i]);
      const lo = Math.round(d.temperature_2m_min[i]);
      const rain = d.precipitation_probability_max?.[i] ?? 0;
      const dt = new Date(dateStr);
      const mmdd = `${dt.getMonth() + 1}/${dt.getDate()}`;
      // 오늘/내일/모레는 고정, 나머지는 요일명
      const dayLabel = i === 0 ? '오늘' : (i === 1 ? '내일' : (i === 2 ? '모레' : DAY_NAMES[dt.getDay()]));
      return `<div class="forecast-day${i === 0 ? ' today' : ''}">
        <div class="f-day">${dayLabel}</div>
        <div class="f-date">${mmdd}</div>
        <div class="f-icon">${fIcon}</div>
        <div class="f-temp"><span class="f-hi">${hi}°</span> / <span class="f-lo">${lo}°</span></div>
        <div class="f-rain">${rain > 0 ? rain + '%' : '&nbsp;'}</div>
      </div>`;
    }).join('');

    // 현지 시간 (HH:mm) 표시
    const nowLocal = new Date(new Date().toLocaleString('en-US', { timeZone: coords.timezone }));
    const localTime = `${String(nowLocal.getHours()).padStart(2,'0')}:${String(nowLocal.getMinutes()).padStart(2,'0')}`;
    const localDateStr = `${nowLocal.getMonth() + 1}월 ${nowLocal.getDate()}일`;

    widget.className = 'weather-widget';
    widget.innerHTML = `
      <div class="weather-head">
        <div class="title">
          <span class="loc-name">${regionName}</span>
          <span class="loc-time">${localDateStr} · 현지 ${localTime}</span>
        </div>
        <div class="live-badge">LIVE</div>
      </div>
      <div class="weather-now">
        <div class="weather-now-left">
          <div class="big-icon">${icon}</div>
          <div class="now-temp">${Math.round(c.temperature_2m)}<span class="deg">°</span></div>
        </div>
        <div class="weather-now-right">
          <div class="desc">${desc}</div>
          <div class="feel">체감 ${Math.round(feelsLike)}°</div>
        </div>
      </div>
      <div class="weather-stats">
        <div class="weather-stat">
          <div class="stat-label">바람</div>
          <div class="stat-value">${c.wind_speed_10m.toFixed(1)}<span class="stat-unit">m/s</span></div>
        </div>
        <div class="weather-stat">
          <div class="stat-label">강수확률</div>
          <div class="stat-value">${rainProb}<span class="stat-unit">%</span></div>
        </div>
        <div class="weather-stat">
          <div class="stat-label">습도</div>
          <div class="stat-value">${c.relative_humidity_2m}<span class="stat-unit">%</span></div>
        </div>
      </div>
      <div class="weather-forecast">
        <div class="weather-forecast-title">날씨 예보</div>
        <div class="weather-forecast-grid">${forecastHtml}</div>
      </div>
      <div class="weather-verdict">
        <div class="v-emoji">${verdict.emoji}</div>
        <div class="v-text">${verdict.text}</div>
      </div>
      <div class="weather-footer">Powered by Open-Meteo</div>
    `;
  } catch (err) {
    console.error('[weather] 날씨 로드 실패:', err);
    widget.className = '';
    widget.innerHTML = `<div class="weather-error">⚠️ 현지 날씨 정보를 불러오지 못했습니다.</div>`;
  }
}

// 항공사 한글명 추출 (편명 코드를 제거하고 남은 텍스트)
const AIRLINE_CODE_NAMES = {
  'KE':'대한항공', 'OZ':'아시아나항공', 'LJ':'진에어', '7C':'제주항공',
  'TW':'티웨이항공', 'BX':'에어부산', 'RS':'에어서울', 'ZE':'이스타항공',
  'YP':'에어프레미아', 'RF':'에어로케이', 'JL':'일본항공', 'NH':'전일본공수',
  'VN':'베트남항공', 'VJ':'비엣젯항공', 'TG':'타이항공', 'PR':'필리핀항공',
  'CX':'캐세이퍼시픽', 'SQ':'싱가포르항공', 'CI':'중화항공', 'BR':'에바항공'
};
function extractAirlineName(flights) {
  if (!flights || !flights.length) return '-';
  const airline = (flights[0].airline || '').trim();
  if (!airline) return '-';
  // 편명 패턴(KE 463, OZ123 등) 잡아두기
  const codeMatch = airline.match(/([A-Z]{2,3})\s*\d{1,4}/);
  // 편명 제거한 나머지 텍스트 (주로 한글 항공사명)
  const cleaned = airline.replace(/[A-Z]{2,3}\s*\d{1,4}/g, '').replace(/\s+/g, ' ').trim();
  if (cleaned) return cleaned;
  // 한글명이 없고 편명만 있으면 코드로 한글명 추정
  if (codeMatch && AIRLINE_CODE_NAMES[codeMatch[1]]) return AIRLINE_CODE_NAMES[codeMatch[1]];
  return airline;
}

// 사진 갤러리: 새 디자인 (3장 가로 + 좌우 화살표 슬라이드, 모바일은 가로 스와이프)
// 🆕 골프장 소개 탭 전환 (골프장 2개 이상일 때)
// 🆕 모바일 골프장/호텔 아코디언: 헤더 클릭 시 펼침 (한 번에 하나만)
function toggleAccItem(btn) {
  const body = btn.nextElementSibling;
  const isOpen = btn.classList.contains('open');
  const section = btn.closest('.sec-golf, .sec-hotel');
  if (section && !isOpen) {
    section.querySelectorAll('.acc-head.open').forEach(h => {
      h.classList.remove('open');
      if (h.nextElementSibling) h.nextElementSibling.classList.remove('open');
    });
  }
  btn.classList.toggle('open');
  if (body) body.classList.toggle('open');
}

function switchGolfPane(idx) {
  document.querySelectorAll('.sec-golf .golf-pane').forEach(el => {

// 🆕 › 화살표: 다음 골프장/호텔로 한 칸씩 넘김 (선택+내용 전환, 끝이면 처음으로 순환)
function slideGolfTabs(btn, dir) {
  const wrap = btn.closest('.golf-tabs-wrap');
  const tabs = wrap && wrap.querySelector('.golf-tabs');
  if (!tabs) return;
  const tabBtns = Array.from(tabs.querySelectorAll('.golf-tab'));
  if (tabBtns.length < 2) return;
  // 현재 선택된 탭 → 다음 한 칸 (마지막이면 처음으로)
  let cur = tabBtns.findIndex(b => b.classList.contains('active'));
  if (cur < 0) cur = 0;
  const next = (cur + 1) % tabBtns.length;
  // 선택 + 소개 내용 전환
  tabBtns[next].click();
  // 선택된 탭이 가운데로 오도록 '탭 줄만' 가로 스크롤 (페이지 세로 위치는 그대로)
  const tabsRect = tabs.getBoundingClientRect();
  const nextRect = tabBtns[next].getBoundingClientRect();
  const target = tabs.scrollLeft + (nextRect.left - tabsRect.left) - (tabs.clientWidth - nextRect.width) / 2;
  tabs.scrollTo({ left: Math.max(0, target), behavior: 'smooth' });
}

function slideInfoGallery(galleryId, direction) {
  const track = document.querySelector(`[data-track="${galleryId}"]`);
  if (!track) return;
  const slides = track.querySelectorAll('.info-photo');
  if (!slides.length) return;

  // 🆕 모바일(스크롤 가능): 네이티브 스크롤로 한 장씩 이동
  if (track.scrollWidth > track.clientWidth + 2) {
    const step = slides[0].offsetWidth + 8;
    track.scrollBy({ left: direction * step, behavior: 'smooth' });
    return;
  }

  // 현재 위치 (px 단위)
  const currentX = parseFloat(track.dataset.x || '0');
  const slideWidth = slides[0].offsetWidth;
  const gap = 12;
  const step = slideWidth + gap;

  // 화면 너비에 따라 보이는 개수
  const isMobile = window.__previewFrame || window.matchMedia('(max-width: 768px) and (pointer: coarse)').matches;
  const visibleCount = isMobile ? 1 : 3;
  const maxIdx = Math.max(0, slides.length - visibleCount);

  // 현재 인덱스 계산
  let currentIdx = Math.round(-currentX / step);
  let newIdx = currentIdx + direction;
  newIdx = Math.max(0, Math.min(maxIdx, newIdx));

  const newX = -newIdx * step;
  track.dataset.x = newX;
  track.style.transform = `translateX(${newX}px)`;

  // 화살표 활성/비활성
  const gallery = track.closest('.info-gallery');
  if (gallery) {
    const prev = gallery.querySelector('.info-arrow.prev');
    const next = gallery.querySelector('.info-arrow.next');
    if (prev) prev.disabled = (newIdx === 0);
    if (next) next.disabled = (newIdx >= maxIdx);
  }
}

function initGalleryDots() {
  // 초기 화살표 상태 설정 (첫 번째는 prev 비활성)
  document.querySelectorAll('.info-gallery').forEach(gallery => {
    const prev = gallery.querySelector('.info-arrow.prev');
    if (prev) prev.disabled = true;
  });

  // 모바일 가로 스와이프 시 화살표 자동 갱신 (선택적)
  // 화면 리사이즈 시 위치 초기화
  window.addEventListener('resize', () => {
    document.querySelectorAll('.info-photos[data-track]').forEach(track => {
      track.dataset.x = '0';
      track.style.transform = 'translateX(0)';
      const gallery = track.closest('.info-gallery');
      if (gallery) {
        const prev = gallery.querySelector('.info-arrow.prev');
        const next = gallery.querySelector('.info-arrow.next');
        if (prev) prev.disabled = true;
        if (next) next.disabled = false;
      }
    });
  });
}

// 🆕 시즌별 1박 요금표 (박당 요금제 상품 — 달력 대체, 본문 상단에 표시)
function renderPerNightTable(p) {
  const maxPrice = Math.max(...p.perNight.map(it => Number(it.price || 0)), 1);
  // 가격 오름차순 순위 → 카드 톤(그린→블루→오렌지→레드) 매칭
  const priceRank = [...new Set(p.perNight.map(it => Number(it.price || 0)))].sort((a, b) => a - b);
  const cards = p.perNight.map(it => {
    const priceN = Number(it.price || 0);
    const isPeak = priceN === maxPrice;
    const tone = Math.min(Math.max(priceRank.indexOf(priceN), 0), 3);
    return `
      <div class="pn-card pn-t${tone}">
        ${isPeak ? '<span class="pn-peak">🔥</span>' : ''}
        <div class="pn-card-label">${esc(it.label || '')}</div>
        <div class="pn-card-price">${priceN.toLocaleString()}<em>원</em></div>
      </div>`;
  }).join('');
  const pnHtml = `
    <div class="pnrate">
      <div class="pnrate-top">
        <div class="pnrate-title"><span class="pnrate-ico">₩</span>시즌별 요금 안내</div>
        <div class="pnrate-unit">1박 · 1인 기준 · 2인 1실</div>
      </div>
      <div class="pnrate-grid">${cards}</div>
    </div>`;

  // PC: 본문 핵심정보(.pci-cal)의 요금표 자리에 렌더
  const pcHost = document.getElementById('pnrateArea');
  if (pcHost) pcHost.innerHTML = pnHtml;

  // 사이드바 달력 카드는 비어 있으므로 숨김
  const calArea = document.getElementById('calendarArea');
  if (calArea) {
    const calCard = calArea.closest('.cal2-card');
    if (calCard) calCard.style.display = 'none';
  }

  // 🆕 모바일: 본문 핵심정보(sec-core)가 숨겨져 요금표가 안 보이므로 본문에도 렌더 (PC에선 숨김)
  try {
    let msec = document.getElementById('secPnrateM');
    if (!msec) {
      msec = document.createElement('div');
      msec.id = 'secPnrateM';
      msec.className = 'section-box sec-pnrate';
      const mc = document.querySelector('.main-content');
      if (mc) mc.appendChild(msec);
    }
    if (msec) msec.innerHTML = pnHtml;
  } catch (e) {}
}

function renderCalendar() {
  const p = product;
  
  // 🆕 박당(시즌별 1박) 요금 상품: 달력 대신 시즌 요금표 표시
  if (p.perNight && p.perNight.length) {
    renderPerNightTable(p);
    return;
  }
  
  // 🆕 period가 없는 상품(알펜시아 등)은 달력 렌더링 스킵
  if (!p.period || !p.period.start) return;

  let startDate = new Date(p.period.start);
  let endDate = new Date(p.period.end);
  // 🆕 국내 요금달력 데이터(알펜시아 자동요금 등)가 있으면 요금이 있는 날짜 범위로 재설정
  //    → 지난 기간·요금 없는 기간은 예약 불가로 표시
  const dpp = p.domesticPricing;
  const dppDur = (dpp && Array.isArray(dpp.durations) && dpp.durations[0]) || null;
  const dppDates = (dpp && dpp.prices) ? [...new Set(Object.keys(dpp.prices).map(k => k.split('|')[2]))].sort() : [];
  if (dppDates.length) {
    startDate = new Date(dppDates[0] + 'T00:00:00');
    endDate = new Date(dppDates[dppDates.length - 1] + 'T00:00:00');
  }
  // 날짜별 최저가 (호텔 중 가장 저렴한 1인 요금)
  const dppMin = ds => {
    if (!dpp || !dppDur) return null;
    let best = null;
    (dpp.hotels || []).forEach(hh => {
      const v = dpp.prices[`${hh.id}|${dppDur.id}|${ds}`];
      if (v != null && Number(v) > 0 && (best === null || Number(v) < best)) best = Number(v);
    });
    return best;
  };
  // 지난 날짜·당일 출발은 마감 처리 (내일부터 예약 가능)
  const _t = new Date();
  const todayLocal = `${_t.getFullYear()}-${String(_t.getMonth() + 1).padStart(2, '0')}-${String(_t.getDate()).padStart(2, '0')}`;
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  
  const prevDisabled = new Date(year, month - 1, 1) < new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  const nextDisabled = new Date(year, month + 1, 1) > new Date(endDate.getFullYear(), endDate.getMonth(), 1);
  
  // 한 달 그리드 생성
  function monthGrid(y, m) {
    const firstDay = new Date(y, m, 1);
    const lastDay = new Date(y, m + 1, 0);
    const startWeekday = firstDay.getDay();
    const daysInMonth = lastDay.getDate();
    let g = `
      <div class="c2-weekdays">
        <div class="c2-wd sun">일</div><div class="c2-wd">월</div><div class="c2-wd">화</div>
        <div class="c2-wd">수</div><div class="c2-wd">목</div><div class="c2-wd">금</div>
        <div class="c2-wd sat">토</div>
      </div>
      <div class="c2-days">`;
    for (let i = 0; i < startWeekday; i++) g += '<div class="c2-day empty"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(y, m, d);
      const weekday = date.getDay();
      const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const inRange = date >= startDate && date <= endDate;
      // 요금달력 연동 상품은 요금 있는 날짜가 곧 출발 가능일 (요일 제한 무시)
      const weekdayOk = dppDates.length ? true : p.weekdays.includes(weekday);
      const notExcluded = !p.excludeDates.includes(dateStr);
      const notBlocked = !p.pricing.blocked.includes(dateStr);
      const notPast = dateStr > todayLocal;   // 🆕 지난 날짜·당일 출발 마감
      const dpPrice = dppDates.length ? dppMin(dateStr) : null;
      const available = inRange && weekdayOk && notExcluded && notBlocked && notPast && (!dppDates.length || dpPrice != null);
      const isSelected = selectedDate === dateStr;
      const hasExactPrice = p.pricing.exact && p.pricing.exact[dateStr] != null;
      const isHoliday = KR_HOLIDAYS.has(dateStr);

      let cls = 'c2-day';
      cls += available ? ' available' : ' disabled';
      if (dppDates.length) cls += ' has-price';
      if (weekday === 0) cls += ' sun';
      if (weekday === 6) cls += ' sat';
      if (isHoliday) cls += ' hol';
      if (isSelected) cls += ' selected';
      // 자동 요금달력 상품은 전 날짜가 exact라 빨간 강조 제외 (주말·공휴일만 빨강 유지)
      if (hasExactPrice && available && !dppDates.length) cls += ' exact';

      const onclick = available ? `onclick="selectDate('${dateStr}')"` : '';
      const priceTag = (available && dpPrice != null) ? `<span class="c2-price">${dpFmtMan(dpPrice)}</span>` : '';
      g += `<button class="${cls}" ${onclick} ${!available ? 'disabled' : ''}><span>${d}</span>${priceTag}</button>`;
    }
    g += '</div>';
    return g;
  }
  
  const mt = (y, m) => `${y}.${String(m + 1).padStart(2, '0')}`;
  
  // 🆕 옵션 바: 일정(박수) 선택 + 항공편 선택
  const hasVars = p.hasRealVariations && p.variations && p.variations.length >= 2;
  const airlines = [...new Set((p.flights || []).map(f => (f.airline || '').trim()).filter(Boolean))];
  if (!selectedAirline && airlines.length) selectedAirline = airlines[0];
  let optBar = '';
  if (hasVars || airlines.length) {
    optBar = `
      <div class="cal2-opts">
        ${hasVars ? `
        <label class="c2o">
          <span class="c2o-label">📋 일정 선택</span>
          <select class="c2o-select" onchange="switchVariation(Number(this.value))">
            ${p.variations.map((v, i) => `<option value="${i}"${i === p.activeVariationIdx ? ' selected' : ''}>${esc(v.label || ('옵션 ' + (i+1)))}</option>`).join('')}
          </select>
        </label>` : ''}
        ${airlines.length >= 2 ? `
        <label class="c2o">
          <span class="c2o-label">✈️ 항공편</span>
          <select class="c2o-select" onchange="selectedAirline=this.value">
            ${airlines.map(a => `<option value="${esc(a)}"${a === selectedAirline ? ' selected' : ''}>${esc(a)}</option>`).join('')}
          </select>
        </label>` : (airlines.length === 1 ? `
        <span class="c2o c2o-static">
          <span class="c2o-label">✈️ 항공편</span><b>${esc(airlines[0])}</b>
        </span>` : '')}
      </div>`;
  }
  
  const html = `
    <div class="cal2">
      ${optBar}
      <div class="cal2-months one-month">
        <div class="cal2-month">
          <div class="cal2-mhead">
            <button type="button" class="cal2-nav" onclick="changeMonth(-1)" ${prevDisabled ? 'disabled' : ''}><span class="arr">←</span> 이전달</button>
            <div class="cal2-mtitle">${mt(year, month)}</div>
            <button type="button" class="cal2-nav" onclick="changeMonth(1)" ${nextDisabled ? 'disabled' : ''}>다음달 <span class="arr">→</span></button>
          </div>
          ${monthGrid(year, month)}
        </div>
      </div>
    </div>
  `;
  
  document.getElementById('calendarArea').innerHTML = html;
}

function changeMonth(delta) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + delta, 1);
  renderCalendar();
}

// 🆕 일정 옵션 전환 (pill 클릭)
function switchVariation(idx) {
  const p = product;
  if (!p.variations || idx < 0 || idx >= p.variations.length || idx === p.activeVariationIdx) return;
  const v = p.variations[idx];

  // 전역 product 객체의 active 값 교체 → 기존 렌더 함수가 자동으로 새 값 사용
  p.activeVariationIdx = idx;
  p.duration = v.label || p.duration;
  p.itinerary = v.itinerary || [];
  p.pricing = v.pricing;

  // priceFrom(카드용 최저가)도 갱신 — 단, 견적서는 수동 입력 금액이므로 그대로 유지
  if (!p.isQuote) {
    const exactVals = Object.values((v.pricing && v.pricing.exact) || {}).filter(x => x > 0);
    if (exactVals.length > 0) p.priceFrom = Math.min(...exactVals);
    else if (v.pricing && v.pricing.default && v.pricing.default.weekday > 0) p.priceFrom = v.pricing.default.weekday;
    else if (v.pricing && v.pricing.default && v.pricing.default.weekend > 0) p.priceFrom = v.pricing.default.weekend;
    else p.priceFrom = 0;
  }

  // 선택된 날짜 초기화 (박수 바뀌면 기간도 달라지므로)
  selectedDate = null;
  // 예약 카드 선택 요약 숨기기
  const bkSum = document.getElementById('bkSelSummary');
  if (bkSum) { bkSum.classList.remove('show'); bkSum.innerHTML = ''; }
  const bkGuide = document.getElementById('bkCtaGuide');
  if (bkGuide) bkGuide.style.display = '';

  // 스크롤 위치 유지
  const scrollY = window.scrollY;
  renderPage();
  window.scrollTo(0, scrollY);
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  renderCalendar();
  renderPciFlights();  // 🆕 요약 항공일정에 날짜 병기

  const p = product;
  const startDate = new Date(dateStr);
  const weekday = startDate.getDay();
  const isWeekend = weekday === 0 || weekday === 5 || weekday === 6;

  // 🆕 가격 우선순위: 일별 정확 요금(exact) > 월별 예외 > 기본
  let price = 0;
  let priceMode = ''; // 'exact' | 'monthly' | 'default' | 'inquiry'
  if (p.pricing.exact && p.pricing.exact[dateStr] != null) {
    price = p.pricing.exact[dateStr];
    priceMode = 'exact';
  } else {
    const monthKey = dateStr.substring(0, 7);
    const priceData = p.pricing[monthKey] || p.pricing.default;
    price = isWeekend ? priceData.weekend : priceData.weekday;
    priceMode = (p.pricing[monthKey]) ? 'monthly' : 'default';
  }
  if (!price || price <= 0) priceMode = 'inquiry';

  // 기간(박 수) 추출 → 종료일 계산
  const durStr = p.duration || '';
  const nightsMatch = durStr.match(/(\d+)박/);
  const daysMatch = durStr.match(/(\d+)일/);
  const nights = nightsMatch ? parseInt(nightsMatch[1]) : 0;
  const days = daysMatch ? parseInt(daysMatch[1]) : (nights ? nights + 1 : 1);
  const endDate = new Date(startDate);
  endDate.setDate(startDate.getDate() + nights);

  const wdNames = ['일','월','화','수','목','금','토'];
  const fmt = d => `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} (${wdNames[d.getDay()]})`;
  const durLabel = durStr || (nights ? `${nights}박 ${days}일` : '당일');

  // 🆕 priceDisplay 갱신 (선택일정 카드 제거됨 — 요소 있을 때만 갱신)
  const priceEl = document.getElementById('priceDisplay');
  if (priceEl) {
    if (priceMode === 'inquiry') {
      priceEl.innerHTML = `<span style="font-size:22px;color:#555;font-family:'Pretendard Variable',Pretendard,sans-serif">💬 문의 시 안내</span>`;
    } else {
      const badge = priceMode === 'exact'
        ? `<span style="display:block;font-size:10px;font-weight:700;color:#10b981;letter-spacing:1px;margin-top:4px">✓ 확정 요금</span>`
        : '';
      priceEl.innerHTML = `${price.toLocaleString()}<span class="won">원</span>${badge}`;
    }
  }
  const selTextEl = document.getElementById('selectedDateText');
  if (selTextEl) selTextEl.innerHTML = `
    <div class="sel-range">${fmt(startDate)} ~ ${fmt(endDate)}</div>
    <div class="sel-duration">${durLabel}</div>
  `;
  const selBoxEl = document.getElementById('selectedBox');
  if (selBoxEl) selBoxEl.classList.add('show');
  const resultCard = document.getElementById('bookingPriceCard');
  if (resultCard) resultCard.style.display = '';

  // 🆕 오른쪽 예약 카드에 선택 요약 표시 (날짜·일정·골프·호텔·1인 요금)
  const sumEl = document.getElementById('bkSelSummary');
  if (sumEl) {
    const golfRounds = (p.itinerary || []).reduce((n, dd) => n + ((dd.events || []).filter(e => e && (e.is_golf || /⛳|🏌/.test(String(e.text || '')))).length), 0);
    const golfNames = (p.golfCourses || []).map(g => g.name).filter(Boolean).join(' · ');
    const hotelNames = (p.hotels || []).map(h => h.name).filter(Boolean).join(' · ');
    const priceHtml = (priceMode === 'inquiry')
      ? '<b style="font-size:15px">문의 시 안내</b>'
      : `<b>${price.toLocaleString()}원</b>`;
    sumEl.innerHTML = `
      <div class="bk-sel-head">선택한 출발일</div>
      <div class="bk-sel-date">${fmt(startDate)}<small>~ ${fmt(endDate)}</small></div>
      <div class="bk-sel-rows">
        <div><span>일정</span><b>${esc(durLabel)}${golfRounds ? ` · 골프 ${golfRounds}회` : ''}</b></div>
        ${golfNames ? `<div><span>골프</span><b>${esc(golfNames)}</b></div>` : ''}
        ${hotelNames ? `<div><span>호텔</span><b>${esc(hotelNames)}</b></div>` : ''}
      </div>
      <div class="bk-sel-price"><span>1인 요금</span>${priceHtml}</div>`;
    sumEl.classList.add('show');
    const guideEl = document.getElementById('bkCtaGuide');
    if (guideEl) guideEl.style.display = 'none';
  }
}

// ============================================================

// 🆕 Supabase에서 시뮬레이터 가격 데이터 가져오기 (어드민 → 🎿 시뮬레이터 요금 관리)
let _simPricingLoaded = false;
async function fetchSimulatorPricing(productKey = 'alpensia') {
  if (_simPricingLoaded) return SIM_ALPENSIA;
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/simulator_pricing?id=eq.${encodeURIComponent(productKey)}&select=data`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) {
      console.warn('[시뮬레이터 가격] 로드 실패, 기본값 사용. status:', res.status);
      return SIM_ALPENSIA;
    }
    const rows = await res.json();
    if (rows && rows.length > 0 && rows[0].data) {
      // 기존 SIM_ALPENSIA 객체에 DB 데이터 병합 (libraryMap 등 누락 시 fallback 보존)
      SIM_ALPENSIA = { ...SIM_ALPENSIA, ...rows[0].data };
      _simPricingLoaded = true;
      console.log('[시뮬레이터 가격] DB 로드 완료');
    }
  } catch(e) {
    console.warn('[시뮬레이터 가격] 로드 중 오류, 기본값 사용:', e);
  }
  return SIM_ALPENSIA;
}

const SIM_DOW = ['일','월','화','수','목','금','토'];
// ═══ 2026년 고정 월/일 선택 (연도 입력 불필요, 8월까지) ═══
const SIM_LAST_MONTH = 9; // 요금 등록된 마지막 달 (요금 추가 시 변경)
function simDaysInMonth(m) { return new Date(2026, m, 0).getDate(); }
function simMDSelHtml(idPrefix, cur) {
  const today = new Date();
  const minM = Math.min(today.getMonth() + 1, SIM_LAST_MONTH);
  let curM = 0, curD = 0;
  if (cur) { curM = +cur.slice(5, 7); curD = +cur.slice(8, 10); }
  let mOpts = '<option value="">월</option>';
  for (let m = minM; m <= SIM_LAST_MONTH; m++) mOpts += `<option value="${m}"${m === curM ? ' selected' : ''}>${m}월</option>`;
  let dOpts = '<option value="">일</option>';
  if (curM) {
    const minD = (curM === today.getMonth() + 1) ? today.getDate() : 1;
    for (let d = minD; d <= simDaysInMonth(curM); d++) dOpts += `<option value="${d}"${d === curD ? ' selected' : ''}>${d}일</option>`;
  }
  return `<div class="sim-md-row"><span class="sim-md-year">2026년</span>
    <select id="${idPrefix}M" onchange="simMDChange('${idPrefix}')">${mOpts}</select>
    <select id="${idPrefix}D" onchange="simMDChange('${idPrefix}')">${dOpts}</select></div>`;
}
function simMDChange(idPrefix) {
  const mSel = document.getElementById(idPrefix + 'M');
  const dSel = document.getElementById(idPrefix + 'D');
  if (!mSel || !dSel) return;
  const m = +mSel.value;
  const today = new Date();
  const keep = +dSel.value;
  let dOpts = '<option value="">일</option>';
  if (m) {
    const minD = (m === today.getMonth() + 1) ? today.getDate() : 1;
    for (let d = minD; d <= simDaysInMonth(m); d++) dOpts += `<option value="${d}"${d === keep ? ' selected' : ''}>${d}일</option>`;
  }
  dSel.innerHTML = dOpts;
  const d = +dSel.value;
  if (m && d) {
    const ds = `2026-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const hidden = document.getElementById('simDate');
    if (hidden) hidden.value = ds;
    simRecalc();
  }
}

/* ═══════════════════════════════════════════════════════
   🆕 알펜시아 출발일별 요금 달력 데이터 생성 (회원제 판매가만)
   요금표(SIM_ALPENSIA)에서 날짜별 1인 판매가를 계산해
   국내 상품 공용 '예약 요금 달력'(renderDomesticCalendar) UI로 표시
   판매가 = 그린피 + 객실(1인 분담) + 조식 + 마진(1만/라운드 + 5천/박)
   ═══════════════════════════════════════════════════════ */
function alpBuildDomesticPricing() {
  const rooms = [
    { id: 'HIS33', name: '홀리데이인 스위트 콘도 33평 (4인 1실)' },
    { id: 'IC',    name: '인터컨티넨탈 호텔 (2인 1실)' },
    { id: 'HIR',   name: '홀리데이인 리조트 (2인 1실)' },
  ];
  const durations = [ { id: 'n1', nights: 1, days: 2 } ];   // 1박2일 기준만 표기
  const todayStr = new Date().toISOString().slice(0, 10);
  const startDs = todayStr > '2026-01-01' ? todayStr : '2026-01-01';
  const limit = SIM_ALPENSIA.RATE_LIMIT || '2026-10-01';
  const prices = {};
  durations.forEach(du => {
    const rounds = du.nights + 1;
    for (let ds = startDs; simAddDays(ds, rounds - 1) <= limit; ds = simAddDays(ds, 1)) {
      rooms.forEach(r => {
        const pp = alpCalcPP('prv', ds, du.nights, r.id);   // 회원제(알펜시아CC)만
        if (pp) prices[`${r.id}|${du.id}|${ds}`] = pp;
      });
    }
  });
  return { hotels: rooms, durations, prices };
}

// 코스별 1인 판매가 계산 (0 반환 = 요금 데이터 없음 → 문의)
function alpCalcPP(courseKey, date, nights, roomKey) {
  const rounds = nights + 1;
  let gf = 0;
  for (let i = 0; i < rounds; i++) {
    const fee = simGetGreenfee(courseKey, simAddDays(date, i), i === 0 ? 1 : 0);   // 1일차 2부, 이후 1부
    if (!fee) return 0;
    gf += fee;
  }
  const room = SIM_ALPENSIA.rooms[roomKey];
  if (!room) return 0;
  const occ = room.occ || 2;
  let roomPerRoom = 0, bf = 0;
  for (let i = 0; i < nights; i++) {
    const rate = simGetRoomRate(roomKey, simAddDays(date, i));
    if (!rate) return 0;
    roomPerRoom += rate;
    bf += SIM_ALPENSIA.breakfast[simSeason(simAddDays(date, i + 1))] || 15000;
  }
  const margin = 10000 * rounds + 5000 * nights;
  return gf + Math.ceil(roomPerRoom / occ) + bf + margin;
}

function simSeason(ds) {
  const c = SIM_ALPENSIA;
  if (!ds || ds < c.seasonCut) return 's1';
  for (let i = 2; i <= 12; i++) {
    const cut = c['seasonCut' + i];
    if (!cut || ds < cut) return 's' + i;
  }
  return 's13';
}
function simDow(ds) { return new Date(ds + 'T00:00:00').getDay(); }
function simDayType(ds) {
  if ((SIM_ALPENSIA.SUNDAY_RATE_DATES || []).includes(ds)) return 'sunday';
  if ((SIM_ALPENSIA.SATURDAY_RATE_DATES || []).includes(ds)) return 'saturday';
  const d = simDow(ds);
  return d >= 1 && d <= 4 ? 'weekday' : d === 5 ? 'friday' : d === 6 ? 'saturday' : 'sunday';
}
function simAddDays(ds, n) {
  const d = new Date(ds + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function simFmtD(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T00:00:00');
  return (d.getMonth()+1) + '/' + d.getDate() + '(' + SIM_DOW[d.getDay()] + ')';
}
// 🆕 날짜를 분리 형태로 반환 ({md: "5/14", dow: "수"})
function simFmtDParts(ds) {
  if (!ds) return { md: '', dow: '' };
  const d = new Date(ds + 'T00:00:00');
  return {
    md: (d.getMonth()+1) + '/' + d.getDate(),
    dow: SIM_DOW[d.getDay()]
  };
}

// 객실 1박 가격 (연휴/연휴전일 처리)
function simGetRoomRate(roomKey, ds) {
  const r = SIM_ALPENSIA.rooms[roomKey];
  if (!r) return 0;
  const d = simDow(ds);
  const idx = d === 6 ? 2 : d === 5 ? 1 : 0; // 토=2, 금=1, 주중=0
  if (SIM_ALPENSIA.HOLIDAY_DATES.includes(ds) || SIM_ALPENSIA.HOLIDAY_EVE.includes(ds)) {
    // 연휴: 요일별 연휴요금 / 연휴전일: 성수기 토요일 요금 = holiday[2]
    const hIdx = SIM_ALPENSIA.HOLIDAY_EVE.includes(ds) ? 2 : idx;
    return (r.holiday && r.holiday[hIdx]) || (r[simSeason(ds)] && r[simSeason(ds)][idx]) || 0;
  }
  return r[simSeason(ds)] ? r[simSeason(ds)][idx] : 0;
}

// 그린피 (코스 키 + 날짜 + 1부(0)/2부(1))
function simGetGreenfee(courseKey, ds, teeIdx) {
  const c = SIM_ALPENSIA.courses[courseKey];
  if (!c) return 0;
  const dt = simDayType(ds);
  const ss = simSeason(ds);
  return (c[ss] && c[ss][dt] && c[ss][dt][teeIdx]) || 0;
}

      const roomEl = document.getElementById('simRoom');
      if (roomEl) roomEl.value = presetHotel;
    }
    if (presetCourse && ['prv','pub','prv_pub'].includes(presetCourse)) {
      const courseEl = document.getElementById('simCourse');
      if (courseEl) courseEl.value = presetCourse;
    }
    // 🆕 카드 UI 선택 상태를 숨김 select 값과 동기화
    [['simRoomCards','simRoom'], ['simCourseCards','simCourse']].forEach(([cardsId, selId]) => {
      const sel = document.getElementById(selId);
      const group = document.getElementById(cardsId);
      if (!sel || !group) return;
      group.querySelectorAll('.sim-card').forEach(b => b.classList.toggle('active', b.dataset.val === sel.value));

// ═══ 시뮬레이터 예약 신청 → 어드민 문의함(inquiries) 전달 ═══
async function simSubmitBooking() {
  const v = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const name = v('simBookName');
  const phone = v('simBookPhone');
  const err = document.getElementById('simBookErr');
  const show = msg => { if (err) { err.textContent = msg; err.style.display = 'block'; } };
  if (err) err.style.display = 'none';
  if (!name) { show('성함을 입력해 주세요.'); return; }
  if (!phone || phone.replace(/[^0-9]/g, '').length < 9) { show('연락처를 정확히 입력해 주세요.'); return; }

  const btn = document.getElementById('simBookBtn');
  if (btn) { btn.disabled = true; btn.textContent = '신청 중...'; }

  const ctx = window.__simBookCtx || {};
  const msg = '[알펜시아 예약신청]\n' + (ctx.summaryText || '') +
    '\n견적 링크: ' + location.href;
  const payload = {
    name, phone,
    people: '4인 1팀 기준',
    depart_date: ctx.date || null,
    region: '알펜시아',
    duration: ctx.nights ? `${ctx.nights}박${ctx.nights + 1}일` : null,
    message: msg,
    status: 'new'
  };
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/inquiries`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('접수 실패 ' + res.status);
    const form = document.getElementById('simBookForm');
    const done = document.getElementById('simBookDone');
    if (form) form.style.display = 'none';
    if (done) { done.style.display = 'block'; done.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  } catch (e) {
    show('접수 중 오류가 발생했습니다. 전화(1533-3160)로 연락 부탁드립니다.');
    if (btn) { btn.disabled = false; btn.textContent = '📩 예약 신청하기'; }
  }
}

// 실시간 재계산
/* ═══════════════════════════════════════════════════════
   🆕 알펜시아 시뮬레이터: 날짜별 요금 달력
   기존 계산 엔진(simGetGreenfee 등)을 날짜마다 돌려 1인 요금 표시
   ═══════════════════════════════════════════════════════ */
let _simCal = { year: new Date().getFullYear(), month: new Date().getMonth() };
const SIM_CAL_MAX = '2026-08-31';

function simPricePerPersonFor(dateStr, nights, roomKey, courseSel) {
  try {
    const rounds = nights + 1;
    let coursePerRound;
    if (courseSel === 'prv') coursePerRound = Array(rounds).fill('prv');
    else if (courseSel === 'pub') coursePerRound = Array(rounds).fill('pub');
    else coursePerRound = ['pub', ...Array(rounds - 1).fill('prv')];
    const teePerRound = [1, ...Array(rounds - 1).fill(0)]; // 표준 (첫날 2부, 이후 1부)

    let greenfee = 0;
    for (let i = 0; i < rounds; i++) {
      greenfee += simGetGreenfee(coursePerRound[i], simAddDays(dateStr, i), teePerRound[i]);
    }
    let roomTotal = 0, breakfastTotal = 0;
    const occ = simAutoOcc(roomKey);
    if (roomKey !== 'NONE') {
      for (let i = 0; i < nights; i++) roomTotal += simGetRoomRate(roomKey, simAddDays(dateStr, i));
      for (let i = 0; i < nights; i++) breakfastTotal += SIM_ALPENSIA.breakfast[simSeason(simAddDays(dateStr, i + 1))] || 20000;
    }
    const roomPP = roomKey === 'NONE' ? 0 : Math.round(roomTotal / occ);
    const margin = (10000 * rounds) + (roomKey === 'NONE' ? 0 : (5000 * nights));
    return greenfee + roomPP + breakfastTotal + margin;
  } catch (e) { return null; }
}

function simCalMove(delta) {
  let m = _simCal.month + delta, y = _simCal.year;
  if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; }
  // 이동 한계: 이번 달 ~ 최대일이 속한 달
  const now = new Date();
  const minYM = now.getFullYear() * 12 + now.getMonth();
  const maxD = new Date(SIM_CAL_MAX + 'T00:00:00');
  const maxYM = maxD.getFullYear() * 12 + maxD.getMonth();
  const ym = y * 12 + m;
  if (ym < minYM || ym > maxYM) return;
  _simCal.year = y; _simCal.month = m;
  simCalRender();
}

function simCalPick(ds) {
  const dateEl = document.getElementById('simDate');
  if (!dateEl) return;
  dateEl.value = ds;
  simRecalc();
  // 선택 후 결과 영역으로 부드럽게 스크롤
  const r = document.getElementById('simResultArea');
  if (r) setTimeout(() => r.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

function simCalRender() {
  const area = document.getElementById('simCalArea');
  if (!area) return;
  const dateEl = document.getElementById('simDate');
  const roomEl = document.getElementById('simRoom');
  const courseEl = document.getElementById('simCourse');
  if (!roomEl || !courseEl) return;
  const nights = parseInt(simChipVal('simNightsChips') || '1', 10);
  const roomKey = roomEl.value;
  const courseSel = courseEl.value;
  const selected = dateEl ? dateEl.value : '';
  const { year, month } = _simCal;

  const startDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = new Date().toISOString().slice(0, 10);

  let cells = '';
  for (let i = 0; i < startDow; i++) cells += '<div class="dp-cell dp-empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const dow = new Date(year, month, d).getDay();
    const ok = ds >= todayStr && ds <= SIM_CAL_MAX;
    const price = ok ? simPricePerPersonFor(ds, nights, roomKey, courseSel) : null;
    const has = ok && price != null && price > 0;
    cells += `<div class="dp-cell${has ? ' dp-has' : ' dp-off'}${selected === ds ? ' dp-sel' : ''}${dow === 0 ? ' dp-sun' : ''}${dow === 6 ? ' dp-sat' : ''}"
      ${has ? `onclick="simCalPick('${ds}')"` : ''}>
      <span class="dp-day">${d}</span>
      ${has ? `<span class="dp-price">${price.toLocaleString()}</span>` : ''}
    </div>`;
  }

  area.innerHTML = `
    <div class="dp-cal-head">
      <button type="button" class="dp-nav" onclick="simCalMove(-1)">‹</button>
      <span class="dp-cal-title">${year}년 ${month + 1}월</span>
      <button type="button" class="dp-nav" onclick="simCalMove(1)">›</button>
    </div>
    <div class="dp-grid dp-dow">
      <div class="dp-sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="dp-sat">토</div>
    </div>
    <div class="dp-grid">${cells}</div>
    <div class="dp-note">· 1인 기준 요금 (그린피+숙박+조식 포함) · 날짜를 누르면 아래에 상세 견적이 나옵니다 · ${SIM_CAL_MAX.slice(5).replace('-','/')} 이후는 별도 문의</div>`;
}

function simRecalc() {
  const dateEl = document.getElementById('simDate');
  const sec = document.getElementById('secSimulator');
  // 시뮬레이터가 비활성이거나 input 없으면 종료
  if (!dateEl || !sec || sec.style.display === 'none') return;
  // 필수 요소 체크
  const roomEl = document.getElementById('simRoom');
  const courseEl = document.getElementById('simCourse');
  if (!roomEl || !courseEl) return;
  
  const date = dateEl.value;
  const nights = parseInt(simChipVal('simNightsChips') || '1', 10);
  const roomKey = roomEl.value;
  // 🆕 옵션이 바뀔 때마다 요금 달력도 다시 계산
  if (typeof simCalRender === 'function') simCalRender();
  // 🆕 1실당 인원: 호텔 따라 자동 (콘도=4, 일반호텔=2, 없음=1)
  const occ = simAutoOcc(roomKey);
  const courseSel = courseEl.value;
  // 🆕 고정값: 티타임=표준 / 인원=1팀 기준 / 조식=항상 포함
  const teeSel = 'standard';
  const teams = 1;
  const pax = teams * 4;
  const breakfast = true;
  
  const result = document.getElementById('simResultArea');
  const dynamicArea = document.getElementById('simDynamicArea');
  const datePromptArea = document.getElementById('simDatePromptArea');
  
  if (!date) {
    // 🆕 날짜 미선택: 안내만 표시 (STEP 1 셀렉트는 상단에 항상 노출됨)
    if (result) result.innerHTML = `
      <div class="sim-prompt-date">
        <div class="sim-prompt-date-icon">📅</div>
        <div class="sim-prompt-date-title">출발 일자를 선택해 주세요</div>
        <div class="sim-prompt-date-desc">출발일 선택 시 1인 요금이 자동으로 계산됩니다.</div>
      </div>`;
    if (dynamicArea) dynamicArea.innerHTML = '';
    return;
  }
  // 🆕 날짜 보유 시 상단 월/일 셀렉트 동기화 (지정 견적 링크로 진입한 경우)
  {
    const mSel = document.getElementById('simMDTopM');
    const dSel = document.getElementById('simMDTopD');
    if (mSel && dSel) {
      const m = +date.slice(5, 7), d = +date.slice(8, 10);
      if (+mSel.value !== m) { mSel.value = String(m); simMDChange('simMDTop'); }
      if (+dSel.value !== d) dSel.value = String(d);
    }
  }
  if (date > '2026-08-31') {
    result.innerHTML = `<div class="sim-disabled-msg">📅 8/31 이후 일정은 별도 문의 부탁드립니다.</div>`;
    if (dynamicArea) dynamicArea.innerHTML = '';
    return;
  }
  
  // 라운드 수 = 박수 + 1 (1박=2라운드, 2박=3라운드, 3박=4라운드)
  // App.jsx 표준: 1박2일=2R, 2박3일=3R, 3박4일=4R
  const rounds = nights + 1;
  
  // 라운드별 코스 (회원=prv / 대중=pub / 혼합)
  let coursePerRound;
  if (courseSel === 'prv') coursePerRound = Array(rounds).fill('prv');
  else if (courseSel === 'pub') coursePerRound = Array(rounds).fill('pub');
  else { // 🆕 혼합: 첫날 대중제(2부) → 이후 모두 회원제(1부) (대중제 2부가 더 비싸므로 첫날에 배치)
    coursePerRound = ['pub', ...Array(rounds-1).fill('prv')];
  }
  
  // 라운드별 티오프 (1부=0, 2부=1)
  let teePerRound;
  if (teeSel === 'all1') teePerRound = Array(rounds).fill(0);
  else if (teeSel === 'all2') teePerRound = Array(rounds).fill(1);
  else { // 표준: 1라운드 2부, 이후 1부
    teePerRound = [1, ...Array(rounds-1).fill(0)];
  }
  
  // 라운드별 날짜
  // 1라운드: 도착당일 (=체크인)
  // 마지막 라운드: 체크아웃일
  // 그 사이: 체크인 다음~체크아웃 전날 (각 1라운드)
  const roundDates = [];
  for (let i = 0; i < rounds; i++) {
    roundDates.push(simAddDays(date, i));
  }
  
  // 그린피 합계
  let greenfeeTotal = 0;
  const greenfeeDetails = [];
  for (let i = 0; i < rounds; i++) {
    const fee = simGetGreenfee(coursePerRound[i], roundDates[i], teePerRound[i]);
    greenfeeTotal += fee;
    greenfeeDetails.push({
      day: i+1,
      date: roundDates[i],
      course: coursePerRound[i] === 'prv' ? '회원제' : '대중제',
      tee: teePerRound[i] === 0 ? '1부' : '2부',
      fee
    });
  }
  
  // 객실비 (실당, nights박)
  let roomTotalPerRoom = 0;
  const roomDetails = [];
  if (roomKey !== 'NONE') {
    for (let i = 0; i < nights; i++) {
      const ds = simAddDays(date, i);
      const rate = simGetRoomRate(roomKey, ds);
      // 객실 인원당 인덱스 (single/double/triple) = occ-1
      // 위 simGetRoomRate는 요일 기준 idx만 반환 → occ별로 재계산 필요
      // 실제로 simGetRoomRate는 [single,double,triple]에서 요일 idx로 뽑음 → 요일과 occ 모두 반영하려면 별도 처리
      roomTotalPerRoom += rate;
      roomDetails.push({ date: ds, rate });
    }
    // 위에서 요일만 반영 → occ별 정확한 가격은 [occ-1]을 참고해야 하지만, 현재 simGetRoomRate는 weekday 기준 [0]만
    // 알펜시아 가격표 패턴: index = 요일 (월~목=0, 금=1, 토=2)
    // 근데 [single, double, triple]은 사실 인원별이 아니라 "요일별 1실 가격"에 가까움 → App.jsx에서도 이렇게 사용
    // 즉 1실 가격은 인원과 무관 (객실당 단가) → 그대로 사용 OK
  }
  
  // 조식
  let breakfastTotal = 0;
  if (breakfast && roomKey !== 'NONE') {
    // 조식은 1인 기준, nights일 동안
    for (let i = 0; i < nights; i++) {
      const ds = simAddDays(date, i+1); // 다음날 조식
      breakfastTotal += SIM_ALPENSIA.breakfast[simSeason(ds)] || 20000;
    }
  }
  
  // 1인당 가격 계산
  // 그린피: 1인 기준 (라운드별 1인 그린피)
  // 객실: 객실당 → 인원으로 나눔 (1인당 = 1실가격 / occ)
  const roomPerPerson = (roomKey === 'NONE') ? 0 : Math.round(roomTotalPerRoom / occ);
  const breakfastPerPerson = breakfastTotal; // 이미 1인 기준
  const greenfeePerPerson = greenfeeTotal;   // 1인 기준
  
  // 🆕 공식 판매가 마진 (App.jsx의 offPP 공식과 동일)
  // = 원가 + (10,000원 × 라운드 수) + (5,000원 × 박 수, 호텔 있을 때만)
  const margin = (10000 * rounds) + ((roomKey === 'NONE') ? 0 : (5000 * nights));
  
  const rawPerPerson = greenfeePerPerson + roomPerPerson + breakfastPerPerson;
  const perPerson = rawPerPerson + margin;
  const totalAll = perPerson * pax;
  
  // 결과 렌더링
  const checkout = simAddDays(date, nights);
  const courseLabel = courseSel === 'prv' ? '회원제 전체' : courseSel === 'pub' ? '대중제 전체' : '회원제+대중제 혼합';
  const teeLabel = teeSel === 'all1' ? '모두 1부' : teeSel === 'all2' ? '모두 2부' : '표준 (2부+1부)';
  const roomLabel = roomKey === 'NONE' ? '호텔 없음' : SIM_ALPENSIA.rooms[roomKey].name;
  
  // 🆕 코스별 카트비 (회원제 ₩120,000 / 대중제 ₩100,000, 캐디피는 동일 ₩150,000)
  const hasPrv = coursePerRound.includes('prv');
  const hasPub = coursePerRound.includes('pub');
  const prvCount = coursePerRound.filter(c => c === 'prv').length;
  const pubCount = coursePerRound.filter(c => c === 'pub').length;
  
  // 🆕 카트비 - 혼합이면 2줄로 분리
  const cartFeeLines = [];
  if (hasPrv) cartFeeLines.push('카트비 1팀당 ₩120,000 (회원제)');
  if (hasPub) cartFeeLines.push('카트비 1팀당 ₩100,000 (대중제)');
  const caddyFeeText = '캐디피 1팀당 ₩150,000';
  
  // 🆕 그린피 표기 (코스별 라운딩 횟수)
  let greenfeeLabel;
  if (hasPrv && hasPub) {
    greenfeeLabel = `그린피 (회원제 ${prvCount}, 대중제 ${pubCount})`;
  } else if (hasPrv) {
    greenfeeLabel = `그린피 (회원제 ${prvCount}회 라운딩)`;
  } else {
    greenfeeLabel = `그린피 (대중제 ${pubCount}회 라운딩)`;
  }
  
  // 🆕 조식 횟수 (박수와 동일: 1박=1번, 2박=2번, 3박=3번)
  const breakfastCount = nights;
  
  // 포함 사항
  const inclusions = [
    `${greenfeeLabel}`,
    roomKey !== 'NONE' ? `${roomLabel} 숙박` : null,
    breakfastCount > 0 ? `클럽 조식 ${breakfastCount}회` : null,
  ].filter(Boolean);
  
  // 불포함 사항
  const exclusions = [
    `${caddyFeeText}`,
    ...cartFeeLines.map(t => `${t}`),
    `개인 경비 (식음료, 석식 등)`,
  ];
  
  // 🆕 간단 일정 요약 - 줄단위로 나눠서 자세한 안내
  const days = nights + 1;
  const itinShort = [];
  const hasHotel = roomKey !== 'NONE'; // 🆕 호텔 없음 체크
  
  for (let d = 0; d < days; d++) {
    const ds = simAddDays(date, d);
    const dateParts = simFmtDParts(ds); // 🆕 {md, dow}
    const isFirst = d === 0;
    const isLast = d === days - 1;
    const roundIdx = d;
    const hasRound = roundIdx < rounds;
    
    // 코스 풀네임 (해당 라운드용)
    let courseFullName = '';
    if (hasRound) {
      const courseKey = coursePerRound[roundIdx];
      courseFullName = courseKey === 'prv' ? '알펜시아CC (회원제)' : '700CC (대중제)';
    }
    
    let lines = []; // {icon, text}
    
    if (isFirst) {
      // 첫날
      lines.push({ icon: '🚐', text: '골프장 개별 도착' });
      if (hasRound) {
        const tee = teePerRound[roundIdx];
        const teeLabel = tee === 0 ? '1부' : '2부';
        lines.push({ icon: '⛳', text: `${courseFullName} 18홀 라운딩 (${teeLabel} 티오프)` });
      }
      // 🆕 호텔 있을 때만 체크인 안내
      if (!isLast && hasHotel) lines.push({ icon: '🏨', text: '호텔 체크인 후 휴식' });
    } else if (isLast) {
      // 마지막날
      if (hasHotel) lines.push({ icon: '🍳', text: '클럽 조식' });
      if (hasRound) {
        const tee = teePerRound[roundIdx];
        const teeLabel = tee === 0 ? '1부' : '2부';
        lines.push({ icon: '⛳', text: `${courseFullName} 18홀 라운딩 (${teeLabel} 티오프)` });
      }
      lines.push({ icon: '🚐', text: '라운딩 후 개별 출발' });
    } else {
      // 중간날
      if (hasHotel) lines.push({ icon: '🍳', text: '클럽 조식' });
      if (hasRound) {
        const tee = teePerRound[roundIdx];
        const teeLabel = tee === 0 ? '1부' : '2부';
        lines.push({ icon: '⛳', text: `${courseFullName} 18홀 라운딩 (${teeLabel} 티오프)` });
      }
      if (hasHotel) lines.push({ icon: '🏨', text: '호텔 휴식' });
    }
    
    itinShort.push({ dateParts, lines });
  }
  
  result.innerHTML = `
    <div class="sim-result">
      <div class="sim-result-label">1인 요금 <small>(조식 포함)</small></div>
      <div class="sim-result-price">${perPerson.toLocaleString()}<span class="won">원</span></div>
      
      <div class="sim-breakdown">
        <div class="sim-breakdown-row"><span class="label">${greenfeeLabel}</span><span class="val">${greenfeePerPerson.toLocaleString()}원</span></div>
        ${roomKey !== 'NONE' ? `<div class="sim-breakdown-row"><span class="label">${roomLabel}</span><span class="val">${roomPerPerson.toLocaleString()}원</span></div>` : ''}
        ${breakfastTotal > 0 ? `<div class="sim-breakdown-row"><span class="label">클럽 조식 ${breakfastCount}회</span><span class="val">${breakfastPerPerson.toLocaleString()}원</span></div>` : ''}
      </div>
      
      <!-- 🆕 포함/불포함 사항 (결과 카드 안에 통합) -->
      <div class="sim-result-incexc">
        <div class="sim-result-incexc-col">
          <div class="sim-result-incexc-head incl">포함</div>
          <ul class="sim-result-incexc-list">
            ${inclusions.map(s => `<li>${s}</li>`).join('')}
          </ul>
        </div>
        <div class="sim-result-incexc-col">
          <div class="sim-result-incexc-head excl">불포함</div>
          <ul class="sim-result-incexc-list">
            ${exclusions.map(s => `<li>${s}</li>`).join('')}
          </ul>
        </div>
      </div>
      
      <!-- 🆕 간단 일정 요약 -->
      <div class="sim-result-itin">
        <div class="sim-result-itin-head"><span>일 정 표</span></div>
        <div class="sim-result-itin-list">
          ${itinShort.map(d => `
            <div class="sim-result-itin-row">
              <div class="date">
                <div class="date-md">${d.dateParts.md}</div>
                <div class="date-dow">(${d.dateParts.dow})</div>
              </div>
              <div class="text">
                ${d.lines.map(l => `
                  ${(() => {
                    const raw = String(l.text);
                    const isGolf = raw.includes('라운딩');
                    const m = raw.match(/^(.*?)\s*\((\d부 티오프)\)\s*$/);
                    const main = (m ? m[1] : raw).replace('18홀', '<span class="itin-18">18홀</span>');
                    const tee = m ? m[2] : '';
                    return `<div class="sim-itin-line${isGolf ? ' is-golf' : ''}">
                      <span class="sim-itin-dot"></span>
                      <span class="sim-itin-line-text">${main}${tee ? `<span class="itin-tee">${tee}</span>` : ''}</span>
                    </div>`;
                  })()}
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
    
  `;

  // 🆕 예약 신청 박스는 맨 아래(소개 섹션 뒤)에 1회만 렌더 (입력값 유지)
  const bookArea = document.getElementById('simBookArea');
  if (bookArea && !bookArea.querySelector('.sim-book')) {
    bookArea.innerHTML = `
    <div class="sim-book" id="simBookBox">
      <div class="sim-book-head">예약 신청</div>
      <div class="sim-book-body">
        <div class="sim-book-desc">성함과 연락처를 남겨주시면 티오프 시간을 안내해 드립니다.</div>
        <div class="sim-book-form" id="simBookForm">
          <input type="text" id="simBookName" placeholder="성함" maxlength="40">
          <input type="tel" id="simBookPhone" placeholder="연락처" maxlength="20">
          <div class="sim-book-err" id="simBookErr"></div>
          <button type="button" class="sim-book-btn" id="simBookBtn" onclick="simSubmitBooking()">예약 신청하기</button>
        </div>
        <div class="sim-book-done" id="simBookDone" style="display:none">
          ✅ 예약 신청이 접수되었습니다.<br>티오프 시간을 확인하여 안내해 드리겠습니다.
        </div>
      </div>
    </div>`;
  }
  
  // 카카오톡/복사 버튼
  const summaryText = simBuildSummaryText({
    date, checkout, nights, rounds, roomLabel, roomKey, occ, pax, teams,
    courseLabel, teeLabel, breakfast,
    greenfeePerPerson, roomPerPerson, breakfastPerPerson,
    perPerson, totalAll
  });
  // 🆕 예약 신청용 현재 견적 보관
  window.__simBookCtx = { summaryText, date, nights };
  
  // 🆕 동적 영역 갱신 (일정표 + 골프장 + 호텔 소개)
  simRenderDynamicArea({ date, nights, rounds, roomKey, courseSel, coursePerRound, teePerRound, roundDates });
  
}

// 카톡/공유용 텍스트
// 🆕 동적 영역 (일정표 + 골프장 + 호텔) 렌더링
function simRenderDynamicArea(o) {
  const area = document.getElementById('simDynamicArea');
  if (!area) return;
  
  // 골프장 소개 HTML (선택한 코스만)
  const courseHtml = simBuildCoursesHtml(o.courseSel);
  
  // 호텔 소개 HTML (선택한 호텔만, NONE이면 숨김)
  const hotelHtml = o.roomKey === 'NONE' ? '' : simBuildHotelHtml(o.roomKey);
  
  area.innerHTML = `
    <div class="section-box sec-info sim-sec-golf" style="margin-top:24px">
      <h2 class="sec-title">골프장 소개</h2>
      <div class="info-list">${courseHtml}</div>
    </div>
    ${hotelHtml ? `
    <div class="section-box sec-info sim-sec-hotel" style="margin-top:24px">
      <h2 class="sec-title">호텔 소개</h2>
      <div class="info-list">${hotelHtml}</div>
    </div>` : ''}
  `;
  
  // 🆕 사진 갤러리 도트/스크롤 동기화 (해외와 동일하게)
  if (typeof initGalleryDots === 'function') {
    initGalleryDots();
  }
}

// 🆕 일정표 HTML 생성 (박수에 따라 동적)
function simBuildItineraryHtml(o) {
  const { date, nights, rounds, coursePerRound, teePerRound, roundDates } = o;
  const days = nights + 1; // 1박2일=2일, 2박3일=3일, 3박4일=4일
  
  let html = '<div class="sim-itin-list">';
  
  for (let d = 0; d < days; d++) {
    const dayNum = d + 1;
    const ds = simAddDays(date, d);
    const dateLabel = simFmtD(ds);
    const isFirst = d === 0;
    const isLast = d === days - 1;
    
    // 해당 일자에 라운드가 있는지 (라운드 수 = 박수+1, day별로 1라운드)
    // 1박2일: Day1 = round0(2부), Day2 = round1(1부)
    // 2박3일: Day1 = round0, Day2 = round1, Day3 = round2
    // 3박4일: Day1~Day4 각 1라운드씩
    const roundIdx = d; // 매일 1라운드씩
    const hasRound = roundIdx < rounds;
    
    let events = [];
    
    if (isFirst) {
      events.push({ time: '오전', icon: '🚐', text: '서울 출발 → 알펜시아 도착' });
      events.push({ time: '점심', icon: '🍽️', text: '점심 식사 / 호텔 체크인' });
    }
    
    if (hasRound) {
      const tee = teePerRound[roundIdx];
      const courseKey = coursePerRound[roundIdx];
      const courseName = courseKey === 'prv' ? '알펜시아CC (회원제)' : '700 G.C (대중제)';
      const teeLabel = tee === 0 ? '1부 (오전)' : '2부 (오후)';
      const teeIcon = tee === 0 ? '🌅' : '🌇';
      events.push({ time: `${teeLabel}`, icon: golfIconSvg(15), text: `${courseName} 라운드`, hl: true });
    }
    
    if (!isFirst && !isLast) {
      // 중간 날: 라운드 후 호텔 휴식
      events.push({ time: '저녁', icon: '🏨', text: '호텔 휴식 / 자유 일정' });
    }
    
    if (isLast && !isFirst) {
      events.push({ time: '점심', icon: '🍽️', text: '점심 식사' });
      events.push({ time: '오후', icon: '🚐', text: '알펜시아 출발 → 서울 도착' });
    }
    
    if (isFirst && isLast) {
      // 1박2일이 아닌 1일짜리는 없으니 무시
    }
    
    // 둘째날부터는 조식
    if (!isFirst) {
      events.unshift({ time: '조식', icon: '🍳', text: '호텔 조식' });
    }
    
    html += `
      <div class="sim-itin-day">
        <div class="sim-itin-day-head">
          <span class="sim-itin-daynum">DAY ${dayNum}</span>
          <span class="sim-itin-date">${dateLabel}</span>
        </div>
        <div class="sim-itin-events">
          ${events.map(e => `
            <div class="sim-itin-event${e.hl ? ' hl' : ''}">
              <span class="sim-itin-time">${e.time}</span>
              <span class="sim-itin-icon">${e.icon}</span>
              <span class="sim-itin-text">${e.text}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  
  html += '</div>';
  return html;
}

// 🆕 library 데이터 캐시 (페이지 로드 시 1회만 fetch)
const SIM_LIBRARY_CACHE = {};
let simLibraryFetched = false;

// 🆕 library에서 알펜시아 5개 항목 미리 가져오기
async function simLibraryFetch() {
  if (simLibraryFetched) return;
  simLibraryFetched = true;
  
  const ids = [
    ...Object.values(SIM_ALPENSIA.libraryMap.course),
    ...Object.values(SIM_ALPENSIA.libraryMap.hotel)
  ];
  // PostgREST in 필터 형식: id=in.("id1","id2",...)
  const inFilter = 'id=in.(' + ids.map(id => `"${id}"`).join(',') + ')';
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/library?${inFilter}&select=id,name,name_kr,category,photos,description,tags`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) {
      console.warn('library fetch 실패:', res.status);
      return;
    }
    const rows = await res.json();
    rows.forEach(r => { SIM_LIBRARY_CACHE[r.id] = r; });
    // fetch 완료 후 현재 보여지는 카드 재렌더 (데이터 채우기)
