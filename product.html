// 🆕 library 항목 → 카드 HTML (해외 info-item과 동일한 디자인)
function simRenderLibraryCard(item, tag, fallbackIcon, extraHtml) {
  // 데이터 아직 안 왔으면 로딩 카드
  if (!item) {
    return `
      <div class="info-item" style="text-align:center;padding:30px 20px;color:var(--gray-500)">
        ${fallbackIcon} 불러오는 중...
      </div>
    `;
  }
  
  const photos = Array.isArray(item.photos) ? item.photos : [];
  const tags = Array.isArray(item.tags) ? item.tags : [];
  const title = item.name_kr || item.name || '';
  const subtitle = item.name && item.name_kr && item.name !== item.name_kr ? item.name : '';
  const desc = item.description || '';
  // 🆕 태그 → 스펙 칩 (쉼표로 갈라진 숫자 태그 병합: "9" + "905Yard" → "9,905Yard")
  const merged = [];
  for (let i = 0; i < tags.length; i++) {
    const t = String(tags[i]).trim();
    const nx = i + 1 < tags.length ? String(tags[i + 1]).trim() : '';
    if (/^\d{1,3}$/.test(t) && /^\d{3}\s*(yard|야드|m)/i.test(nx)) {
      merged.push(t + ',' + nx); i++;
    } else if (t) merged.push(t);
  }
  const specChips = merged.map(t => `<span class="sim-lib-chip">${t}</span>`).join('');
  
  return `
    <div class="info-item">
      ${photos.length > 0 ? `
        <div class="info-gallery">
          <div class="info-photos">
            ${photos.map(url => `
              <div class="info-photo">
                <img src="${url}" alt="${title}" loading="lazy">
              </div>
            `).join('')}
          </div>
          ${photos.length > 1 ? `
            <div class="info-dots">
              ${photos.map((_, i) => `<button class="info-dot${i===0?' active':''}" data-idx="${i}" aria-label="사진 ${i+1}"></button>`).join('')}
            </div>
          ` : ''}
        </div>
      ` : ''}
      <div class="sim-lib-head">
        <div class="sim-lib-name">${title}</div>
        ${subtitle ? `<div class="sim-lib-eng">${subtitle}</div>` : ''}
        ${specChips ? `<div class="sim-lib-specs">${specChips}</div>` : ''}
      </div>
      ${desc ? `<div class="sim-lib-desc">${desc}</div>` : ''}
      ${extraHtml || ''}
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════
   📷 상품 페이지 → 사진(JPG) 변환
   어드민 상품 목록의 '사진변환' 버튼이 product.html?id=X&photo=1 로 열면
   렌더 완료 후 자동 실행되어 JPG 2장을 다운로드한다.
   · 1장: 상품 기본정보(기간·항공·호텔·골프·가격) + 포함/불포함 + 참고사항 + 일정표
   · 2장: 골프장 소개 + 호텔 소개
   ═══════════════════════════════════════════════════════ */
const isPhotoExport = new URLSearchParams(location.search).get('photo') === '1';

/* 캡처 엔진: modern-screenshot (SVG foreignObject — 브라우저 엔진 그대로 렌더링, 표·타임라인 정렬 정확)
   로드 실패 시 html2canvas로 폴백 */
let _pxShot = null, _pxH2C = null;
function pxLoadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('스크립트 로드 실패: ' + src));
    document.head.appendChild(s);
  });
}
function pxLoadShot() {
  if (window.modernScreenshot) return Promise.resolve(window.modernScreenshot);
  if (_pxShot) return _pxShot;
  _pxShot = pxLoadScript('https://cdn.jsdelivr.net/npm/modern-screenshot@4.6.5/dist/index.js')
    .catch(() => pxLoadScript('https://unpkg.com/modern-screenshot@4.6.5/dist/index.js'))
    .then(() => window.modernScreenshot);
  return _pxShot;
}
function pxLoadHtml2Canvas() {
  if (window.html2canvas) return Promise.resolve(window.html2canvas);
  if (_pxH2C) return _pxH2C;
  _pxH2C = pxLoadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js')
    .then(() => window.html2canvas);
  return _pxH2C;
}

/* 캡처 전: 대상 안의 이미지(lazy 포함) 로딩 완료 대기 */
async function pxWaitImages(el) {
  const imgs = el.querySelectorAll('img');
  await Promise.all(Array.from(imgs).map(async (img) => {
    try {
      if (img.loading === 'lazy') img.loading = 'eager';
      if (!(img.complete && img.naturalHeight !== 0)) {
        await new Promise(res => { img.onload = res; img.onerror = res; setTimeout(res, 3500); });
      }
      if (img.decode) await img.decode().catch(() => {});
    } catch (e) {}
  }));
}

/* 캡처 중에만 적용: 예약접수·여권업로드·탭메뉴·슬라이더 버튼 등 사진에 어울리지 않는 요소 숨김 + select → 선택값 텍스트로 교체 */
function pxPrepareDom(isQuoteDoc) {
  const style = document.createElement('style');
  style.id = 'pxCaptureCss';
  style.textContent = `
    body.px-capturing .section-box button,
    body.px-capturing .psec-nav,
    body.px-capturing .psec-dots { display: none !important; }
    /* 슬라이더의 비활성 슬라이드(opacity:0 겹침)가 캡처에서 서로 비쳐 보이는 문제 방지 */
    body.px-capturing .psec-img:not(.on) { display: none !important; }
  `;
  document.head.appendChild(style);
  document.body.classList.add('px-capturing');
  // select는 foreignObject에서 밋밋하게 나오므로 선택된 텍스트로 잠시 교체
  const swapped = [];
  document.querySelectorAll('.main-content select').forEach(sel => {
    const span = document.createElement('span');
    span.textContent = (sel.options && sel.options[sel.selectedIndex]) ? sel.options[sel.selectedIndex].text : '';
    span.style.fontWeight = '700';
    sel.style.display = 'none';
    sel.parentNode.insertBefore(span, sel);
    swapped.push([sel, span]);
  });
  // 🆕 캡처 속도 개선: 수파베이스 사진을 캡처 동안만 축소본(640px)으로 교체
  //    (JPG로 압축돼 나가므로 원본 화질 차이가 거의 없고, 사진 수십 장 다운로드·래스터화 시간이 크게 줄어듦)
  const swappedImgs = [];
  document.querySelectorAll('.sec-golf img, .sec-hotel img').forEach(img => {
    const src = img.currentSrc || img.src || '';
    let small = '';
    if (src.includes('/storage/v1/render/image/public/')) {
      small = src.replace(/width=\d+/, 'width=640').replace(/quality=\d+/, 'quality=78');
    } else if (src.includes('/storage/v1/object/public/')) {
      small = src.replace('/storage/v1/object/public/', '/storage/v1/render/image/public/') + (src.includes('?') ? '&' : '?') + 'width=640&quality=78';
    }
    if (small && small !== src) { swappedImgs.push([img, img.src]); img.src = small; }
  });
  return () => {
    style.remove();
    document.body.classList.remove('px-capturing');
    swapped.forEach(([sel, span]) => { span.remove(); sel.style.display = ''; });
    swappedImgs.forEach(([img, orig]) => { img.src = orig; });
  };
}

/* 섹션 1개 캡처: modern-screenshot 우선, 실패 시 html2canvas 폴백 */
async function pxCaptureEl(el, scale) {
  try {
    const shot = await pxLoadShot();
    return await shot.domToCanvas(el, {
      scale: scale,
      backgroundColor: '#ffffff',
      timeout: 30000,
      fetch: { requestInit: { cache: 'force-cache' } }
    });
  } catch (err) {
    console.warn('modern-screenshot 실패 → html2canvas 폴백', err);
    const h2c = await pxLoadHtml2Canvas();
    const opts = {
      backgroundColor: '#ffffff',
      scale: scale,
      useCORS: true,
      allowTaint: true,
      logging: false,
      imageTimeout: 15000
    };
    try {
      return await h2c(el, opts);
    } catch (e) {
      if (!String(e && e.message).includes('createPattern')) throw e;
      // 높이 0의 그라데이션 장식(::before/::after)이 있으면 캡처가 통째로 실패 → 잠시 배경 제거 후 재시도
      const kill = document.createElement('style');
      kill.textContent = '*::before,*::after{background:none !important;background-image:none !important;}';
      document.head.appendChild(kill);
      void el.offsetHeight;
      try { return await h2c(el, opts); } finally { kill.remove(); }
    }
  }
}

/* 📄 압축 시트: 예전 견적서 양식처럼 상품·기간·호텔·항공·요금·포함/불포함·REMARK·계좌·일정표를
   한 장에 표로 그려서 캡처한다 (웹페이지 캡처가 아니라 전용 문서라 레이아웃이 절대 안 틀어짐) */
function pxBuildSheet(p) {
  const GREEN = '#123524', GREEN_BG = '#eef4ee', LINE = '#b9c4b9';

  const fmtD = s => { if (!s) return ''; const d = new Date(s + 'T00:00:00'); if (isNaN(d)) return ''; const wd = ['일','월','화','수','목','금','토'][d.getDay()]; return `${d.getFullYear()}년 ${String(d.getMonth()+1).padStart(2,'0')}월 ${String(d.getDate()).padStart(2,'0')}일(${wd})`; };
  const th = label => `<td style="background:${GREEN_BG};color:${GREEN};font-weight:800;font-size:14px;text-align:center;padding:11px 10px;border:1px solid ${LINE};width:96px;white-space:nowrap;letter-spacing:2px">${label}</td>`;
  const td = (html, extra) => `<td style="padding:11px 14px;border:1px solid ${LINE};font-size:14px;line-height:1.65;${extra || ''}">${html}</td>`;
  const bullets = arr => (arr || []).filter(Boolean).map(s => `<div style="margin:2px 0">▶ ${parseColorTags(String(s))}</div>`).join('');

  // 데이터 정리
  const title = parseColorTags((p.title || '').replace(/^\[.+?\]\s*/, ''));
  const period = (p.periodRaw && p.periodRaw.start)
    ? `${fmtD(p.periodRaw.start)} ~ ${fmtD(p.periodRaw.end || p.periodRaw.start)}${p.duration ? ` <b style="color:${GREEN}">(${esc(p.duration)})</b>` : ''}`
    : (p.duration ? esc(p.duration) : '문의');
  const pax = p.customerPax ? `${p.customerPax}인` : '문의';
  const hotelNames = (p.hotels && p.hotels.length ? p.hotels.map(h => h.name) : [...new Set((p.itinerary || []).map(d => d.hotel_name))]).filter(Boolean);
  const hotels = hotelNames.length ? hotelNames.map(esc).join(' · ') : '문의';
  const airlines = [...new Set((p.flights || []).map(f => (f.airline || '').trim()).filter(Boolean))];
  const air = airlines.length ? `<span style="color:#1a4577;font-weight:700">${airlines.map(esc).join(' · ')}</span>` : '문의';
  // 요금: 단일가 + 항목별 요금
  const pbRows = (p.priceBreakdown || []).filter(r => r && !r.__meta && (r.label || Number(r.air) || Number(r.land)));
  let priceHtml = '';
  if (p.priceFrom > 0) priceHtml += `<div style="text-align:center;font-size:21px;font-weight:900;color:#C0392B;padding:2px 0">₩ ${Number(p.priceFrom).toLocaleString()}원<span style="font-size:14px;color:#555;font-weight:700"> / 인</span></div>`;
  if (pbRows.length) {
    priceHtml += `<table style="width:100%;border-collapse:collapse;margin-top:${p.priceFrom > 0 ? 8 : 0}px;font-size:13px">${pbRows.map(r => {
      const tot = (Number(r.air) || 0) + (Number(r.land) || 0);
      return `<tr><td style="border:1px solid #dde5dd;padding:7px 10px;background:#fafcf9">${esc(String(r.label || '').replace(/\n/g, ' '))}</td><td style="border:1px solid #dde5dd;padding:7px 10px;text-align:right;font-weight:800;color:#C0392B;white-space:nowrap;width:130px">${tot > 0 ? tot.toLocaleString() + '원' : '-'}</td></tr>`;
    }).join('')}</table>`;
  }
  if (!priceHtml) priceHtml = '<div style="text-align:center;color:#777">문의 시 안내</div>';
  // 입금계좌 (견적서만)
  const isQuoteDoc = !!p.isQuote && !String(p.id || '').startsWith('confirm-');
  const dep = Number(p.quoteDeposit) || 0;
  const depTxt = dep > 0 ? (dep % 10000 === 0 ? (dep / 10000).toLocaleString() + '만원' : dep.toLocaleString() + '원') : '';
  const payHtml = isQuoteDoc ? `
    <div style="text-align:center;font-weight:800;font-size:15px;color:${GREEN}">하나은행 103-910072-08204 <span style="font-weight:700">(주)초이스골프</span></div>
    <div style="text-align:center;font-size:12.5px;color:#555;margin-top:4px">예약 시 여권사본을 담당자에게 보내주시고${depTxt ? `, <b style="color:#C0392B">예약금 1인 ${depTxt}</b>을 상기 계좌로 입금 바랍니다` : ' 안내에 따라 예약금을 입금해 주세요'}.</div>` : '';

  wrap.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;background:${GREEN};padding:18px 26px">
      <div>
        <div style="color:#cfe3cf;font-size:13px;font-weight:700;letter-spacing:3px">해외골프전문</div>

      </div>
      <div style="text-align:right">
        <div style="color:#fff;font-size:23px;font-weight:900">☎ 1533-3160</div>
        <div style="color:#cfe3cf;font-size:12px;font-weight:600;margin-top:2px">일본 · 중국 · 동남아 현지 직영 골프</div>
      </div>
    </div>
    <table style="width:100%;border-collapse:collapse;table-layout:fixed">
      <colgroup><col style="width:96px"><col><col style="width:96px"><col style="width:230px"></colgroup>
      <tr>${th('상 품')}${td(`<b style="font-size:16px">${title}</b>${p.subtitle ? `<div style="font-size:12.5px;color:#666;margin-top:2px">${parseColorTags(p.subtitle)}</div>` : ''}`, 'padding:12px 14px')}${isQuoteDoc && p.customerName ? `${th('고 객')}${td(`<b>${esc(p.customerName)}</b>`)}` : `${th('담 당')}${td('초이스골프')}`}</tr>
      <tr>${th('기 간')}${td(period)}${th('인 원')}${td(pax)}</tr>

      <tr>${th('요 금')}<td colspan="3" style="padding:12px 14px;border:1px solid ${LINE}">${priceHtml}</td></tr>
      ${(p.includes && p.includes.length) ? `<tr>${th('포함사항')}<td colspan="3" style="padding:11px 14px;border:1px solid ${LINE};font-size:13.5px;line-height:1.7">${bullets(p.includes)}</td></tr>` : ''}
      ${(p.excludes && p.excludes.length) ? `<tr>${th('불 포 함')}<td colspan="3" style="padding:11px 14px;border:1px solid ${LINE};font-size:13.5px;line-height:1.7">${bullets(p.excludes)}</td></tr>` : ''}
      ${(p.notices && p.notices.length) ? `<tr>${th('REMARK')}<td colspan="3" style="padding:11px 14px;border:1px solid ${LINE};font-size:13px;line-height:1.7;color:#444">${bullets(p.notices)}</td></tr>` : ''}
      ${payHtml ? `<tr>${th('입금계좌')}<td colspan="3" style="padding:12px 14px;border:1px solid ${LINE};background:#fdf6f4">${payHtml}</td></tr>` : ''}
    </table>
    <div style="padding:16px 0 0">${renderItineraryTable(p)}</div>
    <div style="margin-top:14px;background:${GREEN};color:#fff;text-align:center;font-size:13px;font-weight:700;padding:13px 10px">
      상기 일정 및 요금은 항공·현지 사정에 따라 변경될 수 있습니다 · ㈜초이스골프 1533-3160
    </div>`;
  document.body.appendChild(wrap);
  return wrap;
}

/* 캔버스 → JPG blob 파일 */
function pxCanvasToFile(canvas, filename) {
  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => {
      if (!blob) { reject(new Error('이미지 생성 실패 (용량 초과)')); return; }
      resolve({ filename, url: URL.createObjectURL(blob), size: blob.size });
    }, 'image/jpeg', 0.92);
  });
}

/* 캔버스 여러 개를 세로로 이어붙이기 (골프장+호텔 소개용) */
function pxStackCanvases(canvases, scale) {
  if (canvases.length === 1) return canvases[0];
  const GAP = Math.round(16 * scale);
  const W = Math.max(...canvases.map(c => c.width));
  const H = canvases.reduce((a, c) => a + c.height, 0) + GAP * (canvases.length - 1);
  const out = document.createElement('canvas');
  out.width = W; out.height = H;
  const ctx = out.getContext('2d');
  ctx.fillStyle = '#f4f1ea';
  ctx.fillRect(0, 0, W, H);
  let y = 0;
  canvases.forEach(c => { ctx.drawImage(c, Math.round((W - c.width) / 2), y); y += c.height + GAP; });
  return out;
}

function pxTriggerDownload(file) {
  const a = document.createElement('a');
  a.href = file.url; a.download = file.filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

let _pxFiles = [];   // 생성된 파일 (다시 받기용)

async function runPhotoExport() {
  const p = product;
  if (!p) { alert('상품 데이터가 아직 로드되지 않았습니다.'); return; }
  const safeName = (p.title || 'product').replace(/^\[.+?\]\s*/, '').replace(/\[\/?[^\]]+\]/g, '').replace(/[<>:"/\\|?*]/g, '_').trim().substring(0, 50);
  let header = null, restoreDom = null;
  _pxFiles.forEach(f => { try { URL.revokeObjectURL(f.url); } catch (e) {} });
  _pxFiles = [];
  try {
    const isQuoteDoc = !!p.isQuote && !String(p.id || '').startsWith('confirm-');

    /* ── 1장: 압축 시트 (예전 견적서 양식 — 상품·기간·호텔·항공·요금·포함/불포함·REMARK·계좌·일정표 한 장) ── */
    pxOverlay('견적 시트 만드는 중...', { sub: '기간 · 호텔 · 항공 · 요금 · 포함/불포함 · 일정표를 한 장으로 압축' });
    window.scrollTo(0, 0);
    header = pxBuildSheet(p);
    await pxWaitImages(header);
    void header.offsetHeight;
    const sheetCanvas = await pxCaptureEl(header, 2);   // 전용 문서라 2배율로 선명하게
    _pxFiles.push(await pxCanvasToFile(sheetCanvas, `${safeName}_${isQuoteDoc ? '견적서' : '상품안내'}.jpg`));
    header.remove(); header = null;

    /* ── 2장: 골프장 + 호텔 소개 (있을 때만) ── */
    const secs2 = ['.sec-golf', '.sec-hotel'].map(s => document.querySelector(s)).filter(el => el && el.offsetHeight > 30);
    if (secs2.length) {
      pxOverlay('골프장 · 호텔 사진 준비 중...', { sub: '사진을 축소본으로 바꿔 빠르게 캡처합니다' });
      restoreDom = pxPrepareDom(isQuoteDoc);
      for (const el of secs2) await pxWaitImages(el);
      const h2 = secs2.reduce((a, el) => a + el.offsetHeight, 0);
      const scale2 = Math.min(2, Math.max(1, Math.floor((13000 / Math.max(h2, 1)) * 100) / 100));
      const canv2 = [];
      for (let si = 0; si < secs2.length; si++) {
        pxOverlay(`골프장 · 호텔 소개 캡처 중... (${si + 1}/${secs2.length})`, { sub: '사진이 많으면 조금 걸릴 수 있어요' });
        canv2.push(await pxCaptureEl(secs2[si], scale2));
      }
      restoreDom(); restoreDom = null;
      _pxFiles.push(await pxCanvasToFile(pxStackCanvases(canv2, scale2), `${safeName}_골프장호텔.jpg`));
    }

    // 자동 다운로드 (크롬이 연속 다운로드를 차단할 수 있어 간격을 두고, 아래에 수동 버튼도 제공)
    for (let i = 0; i < _pxFiles.length; i++) {
      pxTriggerDownload(_pxFiles[i]);
      if (i < _pxFiles.length - 1) await new Promise(r => setTimeout(r, 900));
    }

    const fileBtns = _pxFiles.map((f, i) =>
      `<a href="${f.url}" download="${esc(f.filename)}" style="display:block;margin-top:8px;border:1px solid #BFDBFE;background:#EEF6FF;color:#1d4ed8;font-size:13px;font-weight:700;padding:10px 14px;border-radius:9px;text-decoration:none">📥 ${i + 1}장 받기 — ${esc(f.filename)} <span style="color:#7c8592;font-weight:600">(${(f.size / 1024 / 1024).toFixed(1)}MB)</span></a>`
    ).join('');
    pxOverlay(`✅ 사진 ${_pxFiles.length}장 생성 완료!`, {
      icon: '🎉', done: true,
      sub: `자동 저장이 안 됐다면(주소창의 다운로드 차단 확인) 아래 버튼으로 받으세요.${fileBtns}`
    });
  } catch (e) {
    console.error(e);
    pxOverlay('사진 저장에 실패했습니다', { icon: '❌', done: true, sub: esc(e.message || String(e)) });
  } finally {
    if (header) header.remove();
    if (restoreDom) restoreDom();
  }
}

function simBuildSummaryText(o) {
  const lines = [
    '🏌️ 알펜시아 골프패키지 견적 문의',
    '',
    `📅 일정: ${simFmtD(o.date)} ~ ${simFmtD(o.checkout)} (${o.nights}박${o.nights+1}일, ${o.rounds}라운드)`,
    `🏨 호텔: ${o.roomLabel}${o.roomKey !== 'NONE' ? ' (' + o.occ + '인 1실)' : ''}`,
    `⛳ 골프장: ${o.courseLabel}`,
    '',
    '💰 예상 견적 (1인 기준, 조식 포함)',
    `· 그린피: ${o.greenfeePerPerson.toLocaleString()}원`,
  ];
  if (o.roomKey !== 'NONE') lines.push(`· 객실: ${o.roomPerPerson.toLocaleString()}원`);
  if (o.breakfastPerPerson > 0) lines.push(`· 조식: ${o.breakfastPerPerson.toLocaleString()}원`);
  lines.push(`✅ 1인당 ${o.perPerson.toLocaleString()}원`);
  lines.push('');
  lines.push('※ 카트비/캐디피 별도, 정확한 견적은 확인 후 안내드립니다.');
  lines.push('※ 인원수 및 추가 옵션은 문의 시 안내 부탁드립니다.');
  return lines.join('\n');
}
