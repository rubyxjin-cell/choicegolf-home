        <a href="index.html">← 메인으로 돌아가기</a>
      </div>`;
  });
}

/* ═══════════════════════════════════════════════════════
   고객 인보이스(입금현황) — 견적서 하단에 표시
   URL ?inv=토큰 이 있을 때만 동작
   ═══════════════════════════════════════════════════════ */
async function loadInvoiceSection() {
  const invToken = params.get('inv');
  if (!invToken) return;  // 토큰 없으면 표시 안 함

  const wonFmt = n => '₩' + (Number(n)||0).toLocaleString();
  const KIND = {deposit:'예약금', balance:'잔금', full:'전액', etc:'입금'};
  const METHOD = {transfer:'계좌', card:'카드', cash:'현금', etc:'기타'};
  const fmtD = d => {
    if(!d) return '';
    const dt = new Date(d);
    if(isNaN(dt)) return d;
    const day=['일','월','화','수','목','금','토'][dt.getDay()];
    return `${dt.getMonth()+1}/${dt.getDate()}(${day})`;
  };
  const escI = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const apiI = async (path) => {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
    });
    if(!r.ok) throw new Error('로드 실패');
    return r.json();
  };

  try {
    const bks = await apiI(`bookings?invoice_token=eq.${encodeURIComponent(invToken)}&select=*`);
    if(!bks.length) return;
    const b = bks[0];
    const [pax, pays, settings] = await Promise.all([
      apiI(`booking_pax?booking_id=eq.${b.id}&order=sort_order.asc`),
      apiI(`booking_pax_payments?booking_id=eq.${b.id}&order=created_at.asc`),
      apiI(`site_settings?key=eq.invoice_account&select=value`)
    ]);
    const account = settings[0]?.value || '';

    const named = pax.filter(p => (p.pax_name||'').trim());
    const paxNames = named.map(p => (p.pax_name||'').trim());
    let totalDue = named.reduce((s,p)=>s+(Number(p.unit_price)||0),0);
    if(!totalDue) totalDue = Number(b.total_amount)||0;
    const totalPaid = pays.reduce((s,p)=>s+(Number(p.amount)||0),0);
    const balance = totalDue - totalPaid;
    const fullyPaid = totalDue>0 && balance<=0;

    const received = {};
    paxNames.forEach(n=>received[n]=0);
    pays.forEach(p=>{
      const amt = Number(p.amount)||0;
      const names = (p.covers||'').split(',').map(s=>s.trim()).filter(Boolean);
      const targets = names.length ? names : paxNames;
      if(!targets.length) return;
      const per = amt/targets.length;
      targets.forEach(n=>{ received[n]=(received[n]||0)+per; });
    });

    const paxHtml = named.length ? named.map(p=>{
      const name=(p.pax_name||'').trim();
      const due=Number(p.unit_price)||0;
      const got=Math.round(received[name]||0);
      const bal=due-got;
      const done = due>0 && bal<=0;
      return `<div class="inv-pax-row">
        <span class="inv-nm">${escI(name)}</span>
        <span class="inv-badge ${done?'done':'wait'}">${done?'완납':'잔금 '+wonFmt(bal)}</span>
        <span class="inv-amt">${wonFmt(due)}<span class="inv-small">입금 ${wonFmt(got)}</span></span>
      </div>`;
    }).join('') : '';

    const payHtml = pays.length ? pays.map(p=>{
      const cov=(p.covers||'').trim();
      return `<div class="inv-pay-row">
        <span class="inv-who">${escI(p.payer_name||'입금')}</span>
        <span class="inv-tag">${KIND[p.kind]||'입금'} · ${METHOD[p.method]||''}</span>
        ${cov?`<span class="inv-tag">${escI(cov)} 몫</span>`:''}
        <span class="inv-pdate">${escI(fmtD(p.paid_date))}</span>
        <span class="inv-pamt">${wonFmt(p.amount)}</span>
      </div>`;
    }).join('') : `<div class="inv-pay-row"><span style="color:#888;font-size:13px">아직 입금 내역이 없습니다.</span></div>`;

    const html = `
    <section class="inv-section">
      <div class="inv-card">
        <div class="inv-head">
          <div class="inv-label">PAYMENT · 결제 안내</div>
          <div class="inv-title">입금 현황 안내</div>
        </div>
        <div class="inv-body">
          <div class="inv-summary">
            <div><div class="inv-lab">총 청구액</div><div class="inv-val due">${wonFmt(totalDue)}</div></div>
            <div><div class="inv-lab">입금 완료</div><div class="inv-val paid">${wonFmt(totalPaid)}</div></div>
            <div><div class="inv-lab">${fullyPaid?'납부 상태':'남은 잔금'}</div><div class="inv-val ${fullyPaid?'done':'bal'}">${fullyPaid?'완납 ✅':wonFmt(balance)}</div></div>
          </div>
          ${paxHtml?`<div class="inv-stitle">참가자별 현황</div><div class="inv-box">${paxHtml}</div>`:''}
          <div class="inv-stitle">입금 내역</div>
          <div class="inv-box">${payHtml}</div>
          ${account?`<div class="inv-stitle">입금 계좌</div>
          <div class="inv-account"><div class="inv-acc-lab">입금하실 계좌</div><div class="inv-acc-num">${escI(account)}</div></div>
          <div class="inv-note">입금자명은 가급적 예약자 성함으로 부탁드립니다. 입금 확인 후 자동 반영됩니다.</div>`:''}
        </div>
      </div>
    </section>`;

    // #app 바로 뒤에 삽입
    const app = document.getElementById('app');
    app.insertAdjacentHTML('afterend', html);
  } catch(e) {
    console.error('invoice load error', e);
  }
}

function renderItineraryTable(p) {
  const list = p.itinerary || [];
  if (!list.length) return '<div style="color:var(--gray-500);padding:20px;text-align:center">일정 정보가 아직 없습니다</div>';

  // 호텔 이름 목록 (일정 본문에서 하이라이트용)
  const hotelNames = (p.hotels || []).map(h => h.name).filter(Boolean);
  // 골프장 이름 목록
  const golfNames = (p.golfCourses || []).map(g => g.name).filter(Boolean);

  function highlight(text) {
    let out = text || '';
    // 🆕 색상 태그 파싱 ([초록]...[/초록] 등) - 이미 HTML이 있으면 건너뜀
    if (typeof parseColorTags === 'function' && !out.includes('<span') && !out.includes('<')) {
      out = parseColorTags(out);
    }
    // 🆕 색상 태그로 이미 span이 입혀졌으면 골프장명 덧칠 스킵 (색 중첩·깨짐 방지)
    if (!out.includes('<span')) {
      golfNames.forEach(n => {
        if (n && out.includes(n)) {
          out = out.split(n).join(`<span class="course-hl">${n}</span>`);
        }
      });
    }
    return out;
  }

  function fmtDate(dstr) {
    if (!dstr) return '';
    const d = new Date(dstr);
    if (isNaN(d)) return '';
    const wd = ['일','월','화','수','목','금','토'][d.getDay()];
    return `${d.getMonth()+1}/${d.getDate()} ${wd}`;
  }

  // 일자별 식사 상태 계산 (조/중/석)
  // 우선순위: day.meals(신규) > events[].meal(기존 호환)
  function mealStatus(day) {
    const status = { 조식: null, 중식: null, 석식: null };
    // 1) 신규 포맷: day.meals
    if (day.meals && typeof day.meals === 'object') {
      ['조식','중식','석식'].forEach(k => {
        const t = (day.meals[k] || '').trim();
        if (!t) return;
        if (t.includes('불포함') || t.includes('미제공')) status[k] = { type: 'no', text: t };
        else status[k] = { type: 'ok', text: t };
      });
    }
    // 2) 기존 포맷: events[].meal + events[].text (신규 포맷에 없는 것만 보완)
    (day.events || []).forEach(e => {
      if (e.meal && status.hasOwnProperty(e.meal) && !status[e.meal]) {
        const t = (e.text || '').trim();
        if (!t) { status[e.meal] = { type: 'empty', text: '-' }; return; }
        if (t.includes('불포함')) status[e.meal] = { type: 'no', text: '불포함' };
        else status[e.meal] = { type: 'ok', text: t };
      }
    });
    return status;
  }

  function mealSpan(label, m) {
    if (!m) return '';
    const cls = m.type === 'ok' ? 'm-ok' : (m.type === 'no' ? 'm-no' : '');
    return `<span class="${cls}">${label}: ${m.text}</span>`;
  }

  let rows = '';
  list.forEach((day, dIdx) => {
    // 기존 포맷의 식사 전용 이벤트(ev.meal만 있고 다른 정보 없음)는 일정 표시에서 제외
    const events = (day.events || []).filter(e => !e.meal || e.time || e.place || e.transport);
    const ms = mealStatus(day);
    const mealHtml = `
      ${mealSpan('조', ms.조식)}
      ${mealSpan('중', ms.중식)}
      ${mealSpan('석', ms.석식)}
    `;

    // 이 일자에 호텔 스테이가 있는지(보통 마지막 행에 HOTEL 표시)
    const hotelStay = (day.hotel_name || '').trim() || hotelNames[0] || '';

    // 해당 일자에 세부 일정이 없으면 1행, 있으면 events.length 행
    const rowCount = Math.max(events.length, 1);

    if (events.length === 0) {
      rows += `
        <tr>
          <td class="col-day">
            <span class="itin-day-badge"><span class="d">DAY</span><span class="num">${String(day.day).padStart(2,'0')}</span></span>
            ${day.date ? `<div class="itin-day-date">${fmtDate(day.date)}</div>` : ''}
          </td>
          <td class="col-place"></td>
          <td class="col-trans"></td>
          <td class="col-time"></td>
          <td class="col-event">${(day.title && !/^\s*\d+\s*일차\s*$/.test(day.title.trim())) ? esc(day.title) : '-'}</td>
          <td class="col-meal">${mealHtml}</td>
        </tr>`;
      return;
    }

    events.forEach((ev, eIdx) => {
      const isFirstRow = eIdx === 0;
      const isArr = ev._auto_flight && /도착/.test(ev.text || '');
      const transLogo = isArr ? '' : airlineLogoHtml(ev.transport || '');
      const textLogo = (isArr || transLogo) ? '' : airlineLogoHtml(ev.text || '');
      rows += `
        <tr${ev.highlight ? ' class="hl-row"' : ''}>
          ${isFirstRow ? `
            <td class="col-day" rowspan="${events.length}">
              <span class="itin-day-badge"><span class="d">DAY</span><span class="num">${String(day.day).padStart(2,'0')}</span></span>
              ${day.date ? `<div class="itin-day-date">${fmtDate(day.date)}</div>` : ''}
            </td>` : ''}
          <td class="col-place">${ev.place ? esc(ev.place) : ''}</td>
          <td class="col-trans">${transLogo}${ev.transport ? esc(ev.transport) : ''}</td>
          <td class="col-time">${ev.time ? esc(ev.time) : ''}</td>
          <td class="col-event">${textLogo}${ev.is_golf ? '⛳ ' : ''}${highlight(ev.text || '')}</td>
          ${isFirstRow ? `<td class="col-meal" rowspan="${events.length}">${mealHtml}</td>` : ''}
        </tr>`;
    });

    // 호텔 스테이 행 (마지막 일자가 아니면)
    if (hotelStay && dIdx < list.length - 1) {
      rows += `
        <tr style="background:#FAF6EE">
          <td></td>
          <td class="col-place" colspan="4" style="padding:10px 8px;text-align:left">
            <span class="hotel-tag">HOTEL</span><strong>${esc(hotelStay)}</strong>
          </td>
          <td></td>
        </tr>`;
    }
  });

  return `
    <table class="itin-table">
      <thead>
        <tr>
          <th>날짜</th>
          <th>장소</th>
          <th>교통</th>
          <th>시간</th>
          <th class="col-event">일정</th>
          <th>식사</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* 🆕 항공사 로고: 편명(LJ0357 등)에서 IATA 코드 추출 → 로고 CDN.
   오탐 방지를 위해 아래 맵에 등록된 코드일 때만 표시 */
const AIRLINE_KR = {
  // 국내
  LJ:'진에어', KE:'대한항공', OZ:'아시아나항공', '7C':'제주항공', TW:'티웨이항공',
  BX:'에어부산', RS:'에어서울', ZE:'이스타항공', YP:'에어프레미아', RF:'에어로케이',
  // 일본
  JL:'일본항공', NH:'전일본공수', MM:'피치항공', GK:'제트스타재팬', '7G':'스타플라이어',
  // 태국
  TG:'타이항공', WE:'타이스마일', FD:'타이에어아시아', SL:'타이라이언에어', VZ:'타이비엣젯',
  // 베트남
  VN:'베트남항공', VJ:'비엣젯항공', QH:'뱀부항공',
  // 필리핀
  PR:'필리핀항공', '5J':'세부퍼시픽', Z2:'필리핀에어아시아',
  // 대만
  CI:'중화항공', BR:'에바항공', IT:'타이거에어대만', JX:'스타룩스항공',
  // 중국
  CA:'중국국제항공', MU:'중국동방항공', CZ:'중국남방항공', HU:'하이난항공',
  // 말레이시아 / 기타
  MH:'말레이시아항공', AK:'에어아시아', D7:'에어아시아X', OD:'말린도에어',
  CX:'캐세이퍼시픽', SQ:'싱가포르항공'
};
function airlineLogoHtml(text) {
  const m = String(text || '').toUpperCase().match(/(?:^|[^A-Z0-9])([A-Z]{2}|[0-9][A-Z])\s?\d{2,4}(?![0-9])/);
  if (!m) return '';
  const code = m[1];
  if (!AIRLINE_KR[code]) return '';
  const name = AIRLINE_KR[code];
  const s1 = `https://images.daisycon.io/airline/?width=200&height=80&iata=${code}`;
  const s2 = `https://images.kiwi.com/airlines/64/${code}.png`;
  const s3 = `https://pics.avs.io/120/60/${code}.png`;
  const onerr = `var s=['${s2}','${s3}'];var i=this.dataset.i?+this.dataset.i:0;if(i<s.length){this.dataset.i=i+1;this.src=s[i];}else{this.style.display='none';}`;
  return `<img class="airline-logo" src="${s1}" alt="" title="${name}" loading="lazy" onerror="${onerr}">`;
}

/* 🆕 일정 본문 HTML sanitize: <span style="color:..."> 만 허용 (XSS 방어)
   - 기존 plain text 이벤트도 자연스럽게 처리됨
   - <, > 같은 문자는 파서가 자동 escape */
const SAFE_COLORS = ['#DC2626','#2563EB','#16A34A','#C9A961','#dc2626','#2563eb','#16a34a','#c9a961'];
function sanitizeEventText(html) {
  if (html == null) return '';
  const s = String(html);
  // HTML 태그 흔적이 없으면 그냥 plain escape
  if (s.indexOf('<') === -1 && s.indexOf('&') === -1) {
    return esc(s);
  }
  const tmp = document.createElement('div');
  tmp.innerHTML = s;
  const walk = (node) => {
    const children = [...node.childNodes];
    children.forEach(child => {
      if (child.nodeType === 3) return; // text
      if (child.nodeType !== 1) { child.remove(); return; }
      const tag = child.tagName;
      if (tag === 'SPAN' || tag === 'FONT') {
        // color 추출
        let color = '';
        if (tag === 'FONT') color = child.getAttribute('color') || '';
        else color = child.style.color || '';
        // 모든 속성 제거
        while (child.attributes.length > 0) {
          child.removeAttribute(child.attributes[0].name);
        }
        // 화이트리스트 색상만 적용 (rgb 형식도 hex로 매칭)
        const rgbToHex = (c) => {
          const m = c.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
          if (!m) return c;
          const to2 = (n) => Number(n).toString(16).padStart(2,'0');
          return '#' + to2(m[1]) + to2(m[2]) + to2(m[3]);
        };
        const hex = rgbToHex(color).toLowerCase();
        if (SAFE_COLORS.map(c => c.toLowerCase()).includes(hex)) {
          // span으로 통일
          if (tag === 'FONT') {
            const span = document.createElement('span');
            span.style.color = hex;
            span.innerHTML = child.innerHTML;
            child.parentNode.replaceChild(span, child);
            walk(span);
            return;
          }
          child.style.color = hex;
        }
        walk(child);
      } else if (tag === 'BR') {
        // 줄바꿈 허용
      } else {
        // 기타 태그는 텍스트로 치환
        const textNode = document.createTextNode(child.textContent || '');
        child.parentNode.replaceChild(textNode, child);
      }
    });
  };
  walk(tmp);
  return tmp.innerHTML;
}

/* 🆕 상품 정보 카드 렌더링 (항공/숙소/식사/라운딩/특이사항)
   product 객체의 flights, hotels, golfCourses, itinerary, notices 등을 종합해 한눈에 표시 */
// 🆕 상품 기본정보 표 렌더링 (PC/모바일 공통)
function renderProductInfoTable(p) {
  const rows = [];

  // 1) 여행기간
  if (p.duration) {
    rows.push({ label: '여행기간', value: esc(p.duration) });
  }

  // 2) 출발/도착 (라우트가 있을 때 첫 번째 항공편에서 추출)
  if (p.flights && p.flights.length) {
    const f = p.flights[0];
    const route = (f.route || '').trim();
    if (route) {
      rows.push({ label: '여행지', value: esc(route) });
    }
    // 항공편: 출발편/돌아오는편 분리 표시
    const flightLines = p.flights.map(ff => {
      const type = ff.type || '';
      const airline = ff.airline || '';
      const time = ff.time || '';
      const parts = [];
      if (type) parts.push(`<b>${esc(type)}</b>`);
      if (airline) parts.push(esc(airline));
      if (time) parts.push(esc(time));
      return parts.join(' · ');
    }).filter(s => s).join('<br>');
    if (flightLines) {
      rows.push({ label: '항공편', value: flightLines });
    }
  }

  // 3) 골프장
  if (p.golfCourses && p.golfCourses.length) {
    const golfNames = p.golfCourses.map(g => esc(g.name || '')).filter(s => s).join(', ');
    if (golfNames) {
      rows.push({ label: '골프장', value: golfNames });
    }
  }

  // 4) 라운드 수 (일정표에서 ⛳ 자동 카운트)
  let roundCount = 0;
  if (p.itinerary && Array.isArray(p.itinerary)) {
    p.itinerary.forEach(day => {
      if (day.events && Array.isArray(day.events)) {
        day.events.forEach(ev => { if (ev.is_golf) roundCount++; });
      }
    });
  }
  if (roundCount > 0) {
    rows.push({ label: '라운드', value: `${roundCount}라운드` });
  }

  // 5) 숙박 (호텔)
  if (p.hotels && p.hotels.length) {
    const hotelLines = p.hotels.map(h => {
      const name = esc(h.name || '');
      const stars = h.stars ? ` <span class="stars">${'★'.repeat(h.stars)}</span>` : '';
      return name ? `<span class="pinfo-line">${name}${stars}</span>` : '';
    }).filter(s => s).join('');
    if (hotelLines) {
      rows.push({ label: '숙박', value: hotelLines });
    }
  }

  // 6) 식사 (일정표에서 자동 카운트)
  let meals = { 조: 0, 중: 0, 석: 0 };
  if (p.itinerary && Array.isArray(p.itinerary)) {
    p.itinerary.forEach(day => {
      ['breakfast','lunch','dinner'].forEach((key, i) => {
        const v = (day[key] || '').toString().trim();
        if (v && !/불포함|미제공|x|X|^-$/.test(v)) {
          meals[['조','중','석'][i]]++;
        }
      });
    });
  }
  const mealText = [];
  if (meals.조 > 0) mealText.push(`조식 ${meals.조}회`);
  if (meals.중 > 0) mealText.push(`중식 ${meals.중}회`);
  if (meals.석 > 0) mealText.push(`석식 ${meals.석}회`);
  if (mealText.length) {
    rows.push({ label: '식사', value: mealText.join(' / ') });
  }

  // 7) 시작 가격 (견적서는 상단에 별도 표시되므로 표에서는 제외)
  if (p.priceFrom && p.priceFrom > 0 && !p.isQuote) {
    rows.push({
      label: '상품가',
      value: `<span class="em">${p.priceFrom.toLocaleString()}원</span>~ (1인 기준)`
    });
  }

  // 행이 하나도 없으면 안내문
  if (!rows.length) {
    return '<div class="pinfo-row"><div class="pinfo-value" style="justify-content:center;color:#888">상세 정보는 1:1 상담을 통해 안내드립니다.</div></div>';
  }

  return rows.map(r => `
    <div class="pinfo-row">
      <div class="pinfo-label">${r.label}</div>
      <div class="pinfo-value">${r.value}</div>
    </div>
  `).join('');
}

function renderProductInfoCards(p) {
  const items = [];

  // 1) 항공
  if (p.flights && p.flights.length) {
    const flightLines = p.flights.map(f => {
      const type = f.type || '';
      const route = f.route || '';
      const airline = f.airline || '';
      const time = f.time || '';
      const parts = [];
      if (type) parts.push(`<b>${esc(type)}</b>`);
      if (route) parts.push(esc(route));
      if (airline) parts.push(`<span class="pi-tag">${esc(airline)}</span>`);
      if (time) parts.push(`<span class="pi-time">${esc(time)}</span>`);
      return `<li>${parts.join(' · ')}</li>`;
    }).join('');
    items.push({
      icon: '✈️',
      label: '항공',
      sub: `${p.flights.length}편`,
      body: `<ul class="pi-list">${flightLines}</ul>`
    });
  } else {
    items.push({
      icon: '✈️',
      label: '항공',
      sub: '미포함',
      body: '<div class="pi-empty">항공편 별도 안내</div>'
    });
  }

  // 2) 숙박
  if (p.hotels && p.hotels.length) {
    const hotelLines = p.hotels.map(h => {
      const stars = h.stars ? ` <span class="pi-stars">${'★'.repeat(h.stars)}</span>` : '';
      return `<li><b>${esc(h.name||'')}</b>${stars}${h.nameEn ? ` <span class="pi-en">${esc(h.nameEn)}</span>` : ''}</li>`;
    }).join('');
    const nights = p.itinerary ? Math.max(0, (p.itinerary.length - 1)) : 0;
    items.push({
      icon: '🏨',
      label: '숙박',
      sub: nights > 0 ? `${nights}박` : `${p.hotels.length}곳`,
      body: `<ul class="pi-list">${hotelLines}</ul>`
    });
  }

  // 3) 골프장 (라운딩)
  if (p.golfCourses && p.golfCourses.length) {
    const golfLines = p.golfCourses.map(g => {
      const holes = g.holes ? ` <span class="pi-tag">${g.holes}홀</span>` : '';
      return `<li><b>${esc(g.name||'')}</b>${holes}${g.nameEn ? ` <span class="pi-en">${esc(g.nameEn)}</span>` : ''}</li>`;
    }).join('');
    // 라운딩 횟수: itinerary에서 is_golf 카운트
    let rounds = 0;
    (p.itinerary || []).forEach(d => {
      (d.events || []).forEach(e => { if (e.is_golf) rounds++; });
    });
    items.push({
      icon: '⛳',
      label: '라운딩',
      sub: rounds > 0 ? `${rounds}R` : `${p.golfCourses.length}곳`,
      body: `<ul class="pi-list">${golfLines}</ul>`
    });
  }

  // (식사 카드 제거 - 일정표 일차별 식사 바에 이미 표시됨)

  // 5) 특이사항 / 유의사항 (notices 첫 2-3개 미리보기)
  if (p.notices && p.notices.length) {
    const previewItems = p.notices.slice(0, 3).map(n => `<li>${esc(n)}</li>`).join('');
    const moreText = p.notices.length > 3 ? `<div class="pi-more">+ ${p.notices.length - 3}건 더 (아래 상세)</div>` : '';
    items.push({
      icon: '📌',
      label: '특이사항',
      sub: `${p.notices.length}건`,
      body: `<ul class="pi-list">${previewItems}</ul>${moreText}`
    });
  }

  if (items.length === 0) {
    return '<div class="pi-empty" style="padding:30px;text-align:center">상품 정보 준비 중입니다.</div>';
  }

  return `<div class="pi-grid">${items.map(it => `
    <div class="pi-card">
      <div class="pi-card-head">
        <span class="pi-card-ico">${it.icon}</span>
        <span class="pi-card-label">${it.label}</span>
        <span class="pi-card-sub">${it.sub}</span>
      </div>
      <div class="pi-card-body">${it.body}</div>
    </div>
  `).join('')}</div>`;
}

function switchMobileTab(tab) {
  // active 표시만 갱신
  document.querySelectorAll('.m-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  // 탭 → 섹션 매핑
  const targetMap = {
    remark:   '.sec-remark',
    schedule: '.sec-itin',
    info:     '.sec-golf',     // 골프장·호텔 탭 → 골프장 섹션으로 (그 아래에 호텔 자동)
    cancel:   '.sec-cancel'
  };
  const sel = targetMap[tab];
  if (!sel) return;
  let target = document.querySelector(sel);
  // 골프장 없으면 호텔로, 호텔도 없으면 sec-info로 fallback
  if (!target && tab === 'info') {
    target = document.querySelector('.sec-hotel') || document.querySelector('.sec-info');
  }
  if (!target) return;
  // sticky 탭 높이 만큼 offset
  const tabsEl = document.querySelector('.mobile-tabs');
  const offset = (tabsEl ? tabsEl.offsetHeight : 0) + 12;
  const top = target.getBoundingClientRect().top + window.scrollY - offset;
  window.scrollTo({ top, behavior: 'smooth' });
}

// 🆕 스크롤 위치에 따라 active 탭 자동 갱신
function updateActiveTabOnScroll() {
  const tabs = ['remark', 'schedule', 'info', 'cancel'];
  const sels = {
    remark:   '.sec-remark',
    schedule: '.sec-itin',
    info:     '.sec-golf',
    cancel:   '.sec-cancel'
  };
  const tabsEl = document.querySelector('.mobile-tabs');
  const threshold = (tabsEl ? tabsEl.offsetHeight : 0) + 60;
  let activeKey = 'remark';
  for (const k of tabs) {
    let el = document.querySelector(sels[k]);
    if (!el && k === 'info') el = document.querySelector('.sec-hotel') || document.querySelector('.sec-info');
    if (!el) continue;
    const top = el.getBoundingClientRect().top;
    if (top <= threshold) activeKey = k;
  }
  document.querySelectorAll('.m-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === activeKey);
  });
}
window.addEventListener('scroll', () => {
  if (window.matchMedia('(max-width: 980px)').matches) {
    requestAnimationFrame(updateActiveTabOnScroll);
  }
}, { passive: true });

function renderItineraryMobile(p) {
  const list = p.itinerary || [];
  if (!list.length) return '<div class="itin-mobile"></div>';

  const hotelList = p.hotels || [];
  const golfList = p.golfCourses || [];

  function findCard(text) {
    if (!text) return null;
    for (const h of hotelList) {
      if (h.name && text.includes(h.name)) return { cat: '숙박', name: h.name, photo: (h.photos||[])[0] || '🏨' };
    }
    for (const g of golfList) {
      if (g.name && text.includes(g.name)) return { cat: '골프장', name: g.name, photo: (g.photos||[])[0] || '⛳' };
    }
    return null;
  }

  function fmtDate(dstr) {
    if (!dstr) return '';
    const d = new Date(dstr);
    if (isNaN(d)) return '';
    const wd = ['일','월','화','수','목','금','토'][d.getDay()];
    const mo = d.getMonth() + 1;
    const da = d.getDate();
    return `${String(mo).padStart(2,'0')}/${String(da).padStart(2,'0')} (${wd})`;
  }

  // 이벤트 아이콘 판정 → 골프 체크된 것만 ⛳
  // (항공편은 그룹 헤더 ✈️로 통합되어 개별 아이콘 생략)
  function getItemIcon(ev) {
    if (ev && ev.is_golf) return '⛳';
    return '';
  }

  // 🆕 그날의 출발 도시 → 도착 도시 경로 (헤더 표시용)
  function dayRoute(day) {
    const cities = [];
    (day.events || []).forEach(e => {
      const c = cleanCityName(e.place || '');
      if (c && cities[cities.length - 1] !== c) cities.push(c);
    });
    if (cities.length === 0) return '';
    if (cities.length === 1) return esc(cities[0]);
    return esc(cities[0]) + ' → ' + esc(cities[cities.length - 1]);
  }

  // 항공편은 사각 박스로 합치지 않고, 텍스트 2줄 그대로 표시
  // (admin에서 '일정표에 반영' 버튼으로 입력된 출발/도착 이벤트가 각 줄로 보임)
  function consolidateFlights(events) {
    return events.map(ev => ({ type: 'event', ev }));
  }

  function cleanCityName(s) {
    if (!s) return '';
    // "인천 국제공항 출발" → "인천", "호치민 국제공항 도착" → "호치민"
    return s.replace(/국제공항|공항|출발|도착|에서|행|방면/g, '').trim();
  }

  // 🆕 블록의 장소(도시) 추출 - 그룹핑용
  function blockLocation(b) {
    if (b.type === 'flight') {
      // 항공편은 출발지를 장소로 간주 (롯데 스타일: "인천" 아래에 항공편이 들어감)
      return cleanCityName(b.dep.place || b.dep.text) || '';
    }
    return (b.ev.place || '').trim();
  }

  // 🆕 blocks를 연속된 동일 location으로 그룹화
  function groupByLocation(blocks) {
    const groups = [];
    let cur = null;
    blocks.forEach(b => {
      const loc = blockLocation(b);
      if (!cur || cur.location !== loc) {
        cur = { location: loc, blocks: [] };
        groups.push(cur);
      }
      cur.blocks.push(b);
    });
    return groups;
  }

  // 🆕 단일 블록(항공편/이벤트) HTML 생성 (그룹 location 전달받아 title 중복 생략)
  function renderBlock(block, groupLocation) {
    if (block.type === 'flight') {
      const depCity = cleanCityName(block.dep.place || block.dep.text);
      const arrCity = cleanCityName(block.arr.place || block.arr.text);
      const depTime = block.dep.time || '';
      const arrTime = block.arr.time || '';
      const code = block.flightCode || '';
      const airline = block.airline || '';
      return `<div class="tl-flight-box">
        <span class="tl-flight-ico">✈️</span>
        ${code || airline ? `<span class="tl-flight-code">${esc(code)}${airline ? `<span class="airline">${esc(airline)}</span>` : ''}</span>` : ''}
        <span class="tl-flight-route">
          <span class="leg">
            ${depTime ? `<span class="time">${esc(depTime)}</span>` : ''}
            <span class="city">${esc(depCity)}</span>
          </span>
          <span class="arrow">→</span>
          <span class="leg">
            ${arrTime ? `<span class="time">${esc(arrTime)}</span>` : ''}
            <span class="city">${esc(arrCity)}</span>
          </span>
        </span>
      </div>`;
    }
    // event 블록
    const ev = block.ev;
    const icon = getItemIcon(ev);
    // 🆕 도시명(place)은 일차 헤더 경로에만 표시하고 본문 줄에는 생략
    const title = '';
    // 🆕 desc는 HTML 허용 (색상 span) - 색상 태그([빨강] 등) 먼저 변환 후 sanitize (PC와 동일하게)
    const descHtml = ev.text ? sanitizeEventText((typeof parseColorTags === 'function') ? parseColorTags(ev.text) : ev.text) : '';
    // 🆕 자동 생성 항공편의 '도착' 줄은 편명 배지 숨김 (출발 줄에만 표시하여 중복 방지)
    const isAutoArrival = ev._auto_flight && /도착/.test(String(ev.text || ''));
    // 🆕 항공사 로고: 편명 코드 위치(교통편 칸 우선, 없으면 일정 텍스트) 바로 앞에 표시
    const logoFromTransport = isAutoArrival ? '' : airlineLogoHtml(ev.transport || '');
    const logoFromText = (isAutoArrival || logoFromTransport) ? '' : airlineLogoHtml(ev.text || '');
    const transport = (ev.transport && !isAutoArrival) ? `<span class="transport">${logoFromTransport}${esc(ev.transport)}</span>` : '';
    const time = ev.time || '';
    const golfClass = ev.is_golf ? ' is-golf' : '';
    const hlClass = ev.highlight ? ' is-highlight' : '';
    const noTimeClass = !time ? ' no-time-item' : '';
    // 🆕 부가 안내문구: _auto_sub (자동 생성 항공편) 또는 sub_text (수동 입력)
    const subRaw = ev._auto_sub || ev.sub_text || '';
    const subText = subRaw ? `<div class="tl-item-sub">${esc(subRaw)}</div>` : '';

    // 호텔/골프장 카드 (item-body 내부에 배치 → 자동 정렬)
    let cardHtml = '';
    const searchText = ev.text ? String(ev.text).replace(/<[^>]*>/g, '') : '';
    const card = findCard(searchText) || findCard(ev.place);
    if (card) {
      const photoHtml = (typeof card.photo === 'string' && card.photo.startsWith('http'))
        ? `<div class="tl-ref-thumb" style="background-image:url('${esc(card.photo)}')"></div>`
        : `<div class="tl-ref-thumb">${card.photo}</div>`;
      cardHtml = `<div class="tl-ref-card">${photoHtml}
        <div class="tl-ref-info">
          <div class="tl-ref-cat">${esc(card.cat)}</div>
          <div class="tl-ref-name">${esc(card.name)}</div>
        </div>
      </div>`;
    }

    const bodyHtml = `<div class="tl-item-body">
        ${title ? `<div class="tl-item-title">${esc(title)}</div>` : ''}
        ${descHtml ? `<div class="tl-item-desc">${logoFromText}${descHtml}${transport}</div>` : (transport ? `<div class="tl-item-desc">${transport}</div>` : '')}
        ${subText}
        ${cardHtml}
      </div>`;
    const icoHtml = `<div class="tl-item-ico">${icon}</div>`;
    // 골프 줄은 아이콘+본문을 카드로 감싸 시간칸/점을 침범하지 않게 함
    const contentHtml = ev.is_golf ? `<div class="tl-golf-card">${icoHtml}${bodyHtml}</div>` : `${icoHtml}${bodyHtml}`;
    return `<div class="tl-item${golfClass}${noTimeClass}${hlClass}">
      ${time
        ? (ev.is_golf
            ? `<div class="tl-item-time golf-toff"><span class="toff-label">T-OFF</span><span class="toff-time">${esc(time)}</span></div>`
            : `<div class="tl-item-time${/^\d{1,2}:\d{2}$/.test(time) ? '' : ' long-label'}">${/^\d{1,2}:\d{2}$/.test(time) ? `<span class="tl-time-badge">${esc(time)}</span>` : esc(time)}</div>`)
        : '<div class="tl-item-time"></div>'}
      <div class="tl-item-dot"></div>
      ${contentHtml}
    </div>`;
  }

  function mealInfo(day) {
    const mls = { 조식: null, 중식: null, 석식: null };
    if (day.meals && typeof day.meals === 'object') {
      ['조식','중식','석식'].forEach(k => {
        const t = (day.meals[k] || '').trim();
        if (t) mls[k] = t;
      });
    }
    (day.events || []).forEach(e => {
      if (e.meal && mls.hasOwnProperty(e.meal) && !mls[e.meal]) {
        const t = (e.text || '').trim();
        if (t) mls[e.meal] = t;
      }
    });
    const parts = [];
    ['조식','중식','석식'].forEach(k => {
      if (mls[k]) {
        const isNo = /불포함|없음|X|x|\-/.test(mls[k]);
        parts.push(`<span class="meal-item ${isNo?'meal-no':''}"><strong>${k} :</strong> ${esc(mls[k])}</span>`);
      }
    });
    if (!parts.length) return '';
    return `<div class="tl-item tl-summary no-time-item">
      <div class="tl-item-time"><span class="tl-sum-badge">식 사</span></div>
      <div class="tl-item-dot"></div>
      <div class="tl-item-ico"></div>
      <div class="tl-item-body"><div class="tl-item-desc tl-meal-line">${parts.join('<span class="meal-sep">·</span>')}</div></div>
    </div>`;
  }

  let html = '<div class="itin-mobile">';
  list.forEach(day => {
    const events = (day.events || []).filter(e => !e.meal || e.time || e.place || e.transport);
    const blocks = consolidateFlights(events);
    const groups = groupByLocation(blocks);

    html += `<div class="tl-day">
      <div class="tl-day-head">
        <span class="day-badge">${day.day}일차</span>
        ${(() => { const r = dayRoute(day); const pin = `<svg class="route-pin" viewBox="0 0 24 30" width="12" height="15"><path d="M12 0C5.37 0 0 5.37 0 12c0 8.25 12 18 12 18s12-9.75 12-18C24 5.37 18.63 0 12 0z" fill="#e8392f"/><circle cx="12" cy="12" r="4.3" fill="#fff"/></svg>`; return r ? `<span class="day-route">${pin} ${r}</span>` : `<span class="day-route">${(day.title && !/^\s*\d+\s*일차\s*$/.test(day.title.trim())) ? esc(day.title) : ''}</span>`; })()}
        ${day.date ? `<span class="day-date-sm">${fmtDate(day.date)}</span>` : ''}
      </div>
      <div class="tl-day-body">`;

    if (!blocks.length) {
      html += `<div style="padding:8px 0;color:var(--gray-500);font-size:12px;text-align:center;font-style:italic">일정 미확정</div>`;
    }

    // 🆕 핀 그룹 헤더 없이 일렬로 렌더 (도시명은 일차 헤더 경로에만 표시)
    html += `<div class="tl-no-location">`;
    blocks.forEach(block => {
      html += renderBlock(block, null);
    });

    // 🆕 숙박/식사를 타임라인 행으로 (왼쪽 칸=라벨, 오른쪽=내용 / 시간 항목과 정렬 동일)
    const hotelName = (day.hotel_name || '').trim();
    if (hotelName) {
      const isNone = /미숙박|없음|없슴|출국|귀국/.test(hotelName);
      html += `<div class="tl-item tl-summary no-time-item">
        <div class="tl-item-time"><span class="tl-sum-badge">호 텔</span></div>
        <div class="tl-item-dot"></div>
        <div class="tl-item-ico"></div>
        <div class="tl-item-body"><div class="tl-item-desc ${isNone ? 'tl-day-stay-none' : 'tl-day-stay-name'}">${isNone ? '' : '<span class="stay-emoji">🏨</span>'}${esc(hotelName)}</div></div>
      </div>`;
    }

    // 식사 정보 (호텔 아래)
    html += mealInfo(day);

    html += `</div>`;

    html += `</div>`;
  });
  html += '</div>';
  return html;
}

// 🆕 취소·환불 규정 렌더링 (상품별 개별 작성 / 비어있으면 빈 문자열 → 섹션 숨김)
function renderCancellationPolicy(p) {
  // 약관 입력 없으면 빈 문자열 (섹션 자체가 숨겨짐)
  if (!p.cancellationPolicy || !p.cancellationPolicy.trim()) {
    return '';
  }
  // 약관 있으면 → 줄바꿈 유지하며 표시
  return `
    <div style="color:var(--gray-700);line-height:1.9;font-size:14px;white-space:pre-wrap">${esc(p.cancellationPolicy)}</div>
    <p style="margin-top:20px;font-size:12px;color:var(--gray-500)">

// 🆕 취소약관이 있는지 확인 (탭/섹션 표시 여부)
function hasCancellationPolicy(p) {
  return !!(p.cancellationPolicy && p.cancellationPolicy.trim());
}

// 🆕 견적서 인보이스 (총액/예약금/잔금) — 견적서(quote-)에서만, 예약금 입력 시 표시
function isQuoteInvoice(p) {
  return !!(p.isQuote && !String(p.id || '').startsWith('confirm-') && (Number(p.quoteDeposit) > 0));
}
function renderQuoteInvoice(p) {
  if (!isQuoteInvoice(p)) return '';
  const total = Number(p.priceFrom) || 0;
  const dep = Number(p.quoteDeposit) || 0;
  const bal = total - dep;
  const won = n => (Number(n) || 0).toLocaleString() + '원';
  const row = (label, val, strong) => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 4px;border-bottom:1px solid #eee">
      <span style="font-size:14px;color:#555;${strong?'font-weight:700':''}">${label}</span>
      <span style="font-size:${strong?'19px':'16px'};font-weight:${strong?'800':'600'};font-variant-numeric:tabular-nums;color:${strong?'#1B4332':'#222'}">${won(val)}</span>
    </div>`;
  return `
    <div style="border:1px solid #d8e3d8;border-radius:12px;overflow:hidden;background:#fff">
      <div style="background:#1B4332;color:#fff;padding:12px 18px;font-size:15px;font-weight:700;letter-spacing:.5px">결제 안내</div>
      <div style="padding:6px 18px 14px">
        ${row('총 금액', total, true)}
        ${row('예약금', dep)}
        <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 4px">
          <span style="font-size:14px;color:#555">잔금</span>
          <span style="font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;color:#c0392b">${won(bal)}</span>
        </div>
      </div>
      <div style="padding:0 18px 14px;font-size:12px;color:#888">※ 예약금 입금 시 예약이 확정됩니다. 잔금은 출발 전 안내드립니다.</div>
    </div>`;
}

                  <button type="button" class="acc-head${hi===0?' open':''}" onclick="toggleAccItem(this)"><span class="acc-num">${hi+1}</span><span class="acc-name">${esc(h.name||('호텔 '+(hi+1)))}</span><span class="acc-chevron" aria-hidden="true">⌄</span></button>
                  <div class="acc-body${hi===0?' open':''}">
                  <div class="info-name-header is-hotel-header">
                    ${h.nameEn ? `<span class="info-name-en">${esc(h.nameEn)}</span>` : ''}
                    <span class="info-name-kr">${esc(h.name||'호텔 정보')}</span>
                  </div>
                  ${heroPhoto ? `
                    <div class="info-hotel-hero">
                      ${badgeHtml}
                      ${typeof heroPhoto === 'string' && heroPhoto.startsWith('http')
                        ? `<img src="${esc(heroPhoto)}" alt="${esc(h.name||'')}">`

                    </div>
                  ` : (badgeHtml ? `<div class="info-hotel-hero" style="aspect-ratio:auto;height:80px">${badgeHtml}</div>` : '')}
                  ${restPhotos.length > 0 ? `
                    <div class="info-gallery" data-gallery="${galleryId}">
                      <div class="info-photos" data-track="${galleryId}">
                        ${restPhotos.map(ph => `
                          <div class="info-photo">
                            ${typeof ph === 'string' && ph.startsWith('http') ? `<img src="${esc(ph)}" alt="${esc(h.name||'')}">` : `<span>${esc(ph)}</span>`}
                          </div>
                        `).join('')}
                      </div>
                    </div>
                  ` : ''}
                  ${h.desc ? `
                    <div class="hotel-about">
                      <div class="hotel-about-body">${esc(h.desc)}</div>
                    </div>
                  ` : ''}
                  </div>
                </div>
              `;}).join('')}
            </div>
          </div>` : ''}

        <!-- 🆕 알펜시아 가격 시뮬레이터 (조건부 노출) -->
        <div class="section-box sec-simulator" id="secSimulator" style="display:none">
          <h2 class="sec-title">패키지 견적 <span class="sub">Quote Calculator</span></h2>
          <p class="sim-intro">옵션을 선택하시면 1인당 가격이 즉시 산정됩니다.</p>
          <div id="simulatorBody"></div>
        </div>

        <!-- 포함·불포함은 기본정보 바로 밑으로 이동됨 -->

        <!-- 🆕 유의사항 (REMARK) - 별도 섹션 -->
        ${(p.notices && p.notices.length) ? `
          <div class="section-box sec-remark">
            <h2 class="sec-title">유의사항 <span class="sub">Remark</span></h2>
            <div class="incl-card incl-notice" style="margin-top:0">
              <div class="incl-card-head">
                <span class="incl-icon">!</span>
                <span class="incl-label">반드시 확인해주세요</span>
                <span class="incl-sub">Important</span>
              </div>
              <ul>${p.notices.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
            </div>
          </div>` : ''}

        <!-- 견적서 결제 안내 (인보이스) - 견적서 + 예약금 입력 시만 -->
        ${isQuoteInvoice(p) ? `
        <div class="section-box sec-invoice" id="secInvoice">
          <h2 class="sec-title">결제 안내 <span class="sub">Payment</span></h2>
          ${renderQuoteInvoice(p)}
        </div>` : ''}

        <!-- 6. 취소/약관 (모바일 탭용 + PC 탭용) - 약관 입력 있을 때만 표시 -->
        ${hasCancellationPolicy(p) ? `
        <div class="section-box sec-cancel" id="secCancellation">
          <h2 class="sec-title">취소 및 약관 <span class="sub">Cancellation</span></h2>
          ${renderCancellationPolicy(p)}
        </div>` : ''}

        <!-- 7. 실시간 현지 날씨 (골프 특화) -->
        <div class="section-box sec-weather" id="secWeather" style="display:none">
          <h2 class="sec-title">현지 날씨 <span class="sub">Live Weather</span></h2>
          <div id="weatherWidget" class="weather-loading">
            <div style="text-align:center;padding:40px;color:var(--gray-500);font-size:14px">
              ⏳ 날씨 정보를 불러오는 중...
            </div>
          </div>
        </div>

      </div>

      <!-- 사이드바: 달력 + 예약 카드 -->
      <aside class="booking-side">
        <!-- 달력 (견적서에서는 숨김) -->
        <div class="booking-card" style="padding:20px;margin-bottom:14px${p.isQuote ? ';display:none' : ''}">
          <div style="font-size:11px;color:var(--gold);letter-spacing:2px;font-weight:700;margin-bottom:10px;text-align:center">SELECT DATE</div>
          <div id="calendarArea"></div>
        </div>

        <!-- 예약 카드 -->
        <div class="booking-card">
          ${p.priceFrom > 0
            ? (p.isQuote
              ? `<div class="booking-price-label">견적 금액</div>
                 <div class="booking-price" id="priceDisplay" style="color:#c0392b">${p.priceFrom.toLocaleString()}<span class="won" style="color:#c0392b">원</span></div>
                 <div class="booking-price-note">고객님 맞춤 견적가</div>`
              : `<div class="booking-price-label">성인 1인 기준</div>
                 <div class="booking-price" id="priceDisplay">${p.priceFrom.toLocaleString()}<span class="won">원~</span></div>
                 <div class="booking-price-note">2인 1실 기준 · 2인 이상 출발</div>
                 ${p.singleExtra > 0 ? `<div class="booking-single-extra">
                   <span class="se-label">싱글룸 사용 시</span>
                   <span class="se-value">+${p.singleExtra.toLocaleString()}<span class="won">원</span></span>
                 </div>` : ''}`)
            : `<div class="booking-price-label">PRICE</div>
               <div class="booking-price" id="priceDisplay" style="font-size:22px;color:#555;font-family:'Pretendard Variable',Pretendard,sans-serif">💬 문의 시 안내</div>
               <div class="booking-price-note">상담 후 일정·요금 안내</div>`}

          <div class="booking-selected" id="selectedBox">
            <div class="booking-selected-label">SELECTED DATE</div>
            <div class="booking-selected-date" id="selectedDateText"></div>
          </div>
        </div>
      </aside>
    </div>
    
    <!-- Footer는 layout.js에서 처리됨 -->

    <!-- 하단 고정바 (모바일) -->
    <div class="bottom-bar">
      <div class="bottom-bar-inner">
        <a href="tel:1533-3160" class="bb-btn tel">📞</a>
        <a href="#" class="bb-btn kakao" onclick="openKakao(event)">
          <span class="bb-icon">💬</span>카톡 문의
        </a>
        <a href="index.html#inquiry" class="bb-btn book">
          <span class="bb-icon">✓</span>견적 요청
        </a>
      </div>
    </div>
  `;

  renderCalendar();
  // 모바일 탭 초기값
  document.body.setAttribute('data-mtab', 'schedule');
  // 사진 갤러리 도트 동기화
  initGalleryDots();
  // 실시간 현지 날씨 로드 (비동기, 실패해도 페이지는 정상 작동)
  loadWeather(p);
  // 🆕 가격 시뮬레이터 (알펜시아 등 특정 상품에서만 노출)
  initPriceSimulator(p);
  
  // 🆕 국내골프 상품 자동 처리:
  //  1) 포함/불포함 사항 자동 채우기 (어드민 입력 안 해도 됨)
  //  2) 일정표 자동 생성 (박수에 맞춰)
  //  3) 항공편 섹션 숨김
  if (isKorea) {
    autoFillDomesticContent(p);
    // 항공편 섹션은 국내골프엔 의미 없으므로 숨김
    document.querySelectorAll('.sec-flight').forEach(el => { el.style.display = 'none'; });
  }

  // 🆕 확정서(confirm-): 가격 위젯(달력·견적금액·날짜선택) 전체 숨김 + 본문 한 칸 (가격 이미 확정 단계)
  if (String(productId).startsWith('confirm-')) {
    const mw = document.querySelector('.main-wrap');
    if (mw) mw.classList.add('confirm-mode');
    document.body.classList.add('confirm-doc');
    // 🆕 확정서: 골프장·호텔 소개 전부 접힌 상태로 시작
    document.querySelectorAll('.acc-head.open, .acc-body.open').forEach(el => el.classList.remove('open'));
    const sim = document.getElementById('secSimulator');
    if (sim) sim.style.display = 'none';
    renderConfirmHero(p);   // 🆕 확정서 상단 카드 그리기
  }
}

/* ═══════════════════════════════════════════════════════
   🆕 확정서 상단 카드 (예약 확정 안내)
   ═══════════════════════════════════════════════════════ */
function renderConfirmHero(p) {
  const ci = p.confirmInfo || {};
  const container = document.querySelector('.main-content');
  if (!container) return;

  const fmt = (s) => { if (!s) return ''; const a = s.split('-'); return `${a[0]}.${a[1]}.${a[2]}`; };
  const start = p.period && p.period.start;
  const end = p.period && p.period.end;
  let scheduleStr = '';
  if (start && end) {
    const d1 = new Date(start), d2 = new Date(end);
    const nights = Math.max(0, Math.round((d2 - d1) / 86400000));
    const endShort = end.slice(5).replace('-', '.');
    scheduleStr = `${fmt(start)} ~ ${endShort}` + (nights > 0 ? ` (${nights}박${nights + 1}일)` : '');
  } else if (start) {
    scheduleStr = fmt(start);
  }

  // 행 아이콘 (틸 라인 SVG)
  const CIICON = {
    cal: '<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2.5" stroke="currentColor" stroke-width="2"/><path d="M3 9.5h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
    bld: '<svg viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="1.6" stroke="currentColor" stroke-width="2"/><rect x="8.4" y="6.4" width="2.3" height="2.3" fill="currentColor"/><rect x="13.3" y="6.4" width="2.3" height="2.3" fill="currentColor"/><rect x="8.4" y="11" width="2.3" height="2.3" fill="currentColor"/><rect x="13.3" y="11" width="2.3" height="2.3" fill="currentColor"/><path d="M10 21v-4h4v4" stroke="currentColor" stroke-width="2"/></svg>',
    usr: '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.6" stroke="currentColor" stroke-width="2"/><path d="M4.5 20c0-3.8 3.4-5.8 7.5-5.8s7.5 2 7.5 5.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
    pin: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 21s7-6.4 7-11.5A7 7 0 1 0 5 9.5C5 14.6 12 21 12 21Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="9.3" r="2.4" stroke="currentColor" stroke-width="2"/></svg>',
    tkt: '<svg viewBox="0 0 24 24" fill="none"><path d="M4 8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2 2 2 0 0 0 0 4 2 2 0 0 1 0 4 2 2 0 0 1-2 2H6a2 2 0 0 1-2-2 2 2 0 0 0 0-4 2 2 0 0 1 0-4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M14.5 6.5v11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="0.5 3"/></svg>',
    ret: '<svg viewBox="0 0 24 24" fill="none"><path d="M10 9H16.5a4 4 0 0 1 0 8H13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12.5 6l-3 3 3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    bag: '<svg viewBox="0 0 24 24" fill="none"><rect x="5" y="7.5" width="14" height="12.5" rx="2.2" stroke="currentColor" stroke-width="2"/><path d="M9 7.5V5.5a1.5 1.5 0 0 1 1.5-1.5h3A1.5 1.5 0 0 1 15 5.5v2M9.5 11.5v5M14.5 11.5v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'
  };
  // 현지 정보 그룹
  const localRows = [];
  if (scheduleStr)   localRows.push(['일정', scheduleStr, 'cal']);
  if (ci.hotel)      localRows.push(['호텔', ci.hotel, 'bld']);
  if (ci.picket)     localRows.push(['피켓명', ci.picket, 'usr']);
  if (ci.guide)      localRows.push(['가이드', ci.guide, 'usr']);
  // 항공 정보 그룹
  const airRows = [];
  if (ci.depart)     airRows.push(['출발지', ci.depart, 'pin']);
  if (ci.dep_flight) airRows.push(['출발편', ci.dep_flight, 'tkt']);
  if (ci.ret_flight) airRows.push(['귀국편', ci.ret_flight, 'ret']);
  if (ci.baggage)    airRows.push(['수하물', ci.baggage, 'bag']);
  // 항공사 로고 (출발편/귀국편 칸)
  const rowHtml = (arr) => arr.map(([l, v, ic]) => {
    const logo = (ic === 'tkt' || ic === 'ret') ? airlineLogoHtml(v) : '';
    return `<div class="cinfo-row"><span class="cir-ico">${CIICON[ic] || ''}</span><span class="cir-txt"><span class="cir-label">${l}</span><span class="cir-val">${logo}${esc(v)}</span></span></div>`;
  }).join('');

  // 첨부 자료 (카테고리별 드롭다운)
  const atts = Array.isArray(ci.attachments) ? ci.attachments.filter(a => a && a.url) : [];
  window.__confirmAtts = atts;
  const groups = {};
  atts.forEach((a, idx) => {
    const cat = (a.category && a.category.trim()) || '기타';
    (groups[cat] = groups[cat] || []).push({ label: a.label, idx });
  });
  const groupKeys = Object.keys(groups);
  const attIcon = (cat) => {
    if (/항공|티켓|ticket|탑승|e-?ticket/i.test(cat)) return '✈️';
    if (/호텔|숙박|바우처|voucher/i.test(cat)) return '🏨';
    if (/골프|부킹|라운딩|티오프|tee/i.test(cat)) return '⛳';
    if (/일정|스케줄|여정/i.test(cat)) return '🗓️';
    if (/보험/i.test(cat)) return '🛡️';
    return '📄';
  };
  const attachHtml = groupKeys.length ? `
        <div class="attach-panel">
          <div class="attach-head">
            <div class="attach-head-txt">
              <div class="attach-title">첨부 자료</div>
              <div class="attach-sub">필요한 서류를 확인하고<br>다운로드하세요.</div>
            </div>
            <div class="attach-illus">📂</div>
          </div>
          <div class="attach-cards">
            ${groupKeys.map(cat => {
              const items = groups[cat];
              const desc = `${items.length}개 파일`;
              const fileList = `
                <div class="attach-files">
                  ${items.map(it => `<button type="button" class="attach-file-btn" onclick="openConfirmImage(${it.idx})"><span class="aff-dot"></span><span>${esc(it.label || '보기')}</span><span class="aff-go">›</span></button>`).join('')}
                </div>`;
              return `
            <div class="attach-card-wrap">
              <button type="button" class="attach-card" onclick="toggleAttachGroup(this)">
                <span class="attach-card-ico">${attIcon(cat)}</span>
                <span class="attach-card-txt">
                  <span class="attach-card-title">${esc(cat)}</span>
                  <span class="attach-card-desc">${esc(desc)}</span>
                </span>
                <span class="attach-card-go">›</span>
              </button>
              ${fileList}
            </div>`;
            }).join('')}
          </div>
          <div class="attach-foot"><span class="af-lock">🔒</span> 첨부 파일은 안전하게 관리됩니다.</div>
        </div>` : '';

  const customer = p.customerName || '';
  const checkSvg = `<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5 L10 17.5 L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const noteSvg = `<svg viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2.5" stroke="currentColor" stroke-width="1.8"/><path d="M9 8h6M9 12h6M9 16h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`;

  const GLOBE = '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M3 12h18" stroke="currentColor" stroke-width="2"/><path d="M12 3c2.6 2.7 2.6 15.3 0 18M12 3c-2.6 2.7-2.6 15.3 0 18" stroke="currentColor" stroke-width="2"/></svg>';
  const PLANE = '<svg viewBox="0 0 24 24" fill="currentColor" style="transform:rotate(45deg);overflow:visible"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5v1.3l3.5-1 3.5 1v-1.3L13 18.5V13.5L21 16Z"/></svg>';
  const infoHtml = `
      ${localRows.length ? `
      <div class="cinfo-card">
        <div class="cinfo-head"><span class="cih-ico">${GLOBE}</span><span class="cih-title">현지 정보</span></div>
        <div class="cinfo-body">${rowHtml(localRows)}</div>
      </div>` : ''}
      ${airRows.length ? `
      <div class="cinfo-card">
        <div class="cinfo-head"><span class="cih-ico">${PLANE}</span><span class="cih-title">항공 정보</span></div>
        <div class="cinfo-body">${rowHtml(airRows)}</div>
      </div>` : ''}`;

  const checkCircle = `<span class="cc-check">${checkSvg}</span>`;
  const html = `
    <div class="confirm-hero">
      ${customer
        ? `<div class="confirm-customer">${checkCircle}<span class="cc-name">${esc(customer)}</span></div>`
        : `<div class="confirm-customer confirm-customer--solo">${checkCircle}</div>`}
      <div class="confirm-headline">예약 확정서</div>
      <div class="confirm-thanks"><span class="cg-brand">초이스골프</span>를 이용해 주셔서 감사합니다.<br>즐거운 여행 되세요!</div>

      ${infoHtml}
      ${attachHtml}
    </div>
  `;
  container.insertAdjacentHTML('afterbegin', html);

  // 🆕 섹션 탭(PC·모바일)을 확정 카드 아래로 이동
  const hero = container.querySelector('.confirm-hero');
  const mtabs = document.querySelector('.mobile-tabs');
  const pctabs = document.querySelector('.tab-menu');
  if (hero && pctabs) hero.insertAdjacentElement('afterend', pctabs);
  if (hero && mtabs) hero.insertAdjacentElement('afterend', mtabs);
}

// 🆕 첨부 이미지 크게 보기 (다운로드 없이 바로)
function openConfirmImage(i) {
  const a = (window.__confirmAtts || [])[i];
  if (!a || !a.url) return;
  let ov = document.getElementById('confirmImgOverlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'confirmImgOverlay';
    ov.onclick = function () { ov.style.display = 'none'; ov.innerHTML = ''; };
    document.body.appendChild(ov);
  }
  ov.innerHTML = `<button class="cio-close" aria-label="닫기">×</button><img src="${a.url}" alt="첨부 이미지"><div class="cio-hint">이미지를 길게 누르면 저장됩니다</div>`;
  ov.style.display = 'flex';
}
// 🆕 첨부 카테고리 드롭다운 펼치기/접기
function toggleAttachGroup(btn) {
  const g = btn.closest('.attach-card-wrap') || btn.closest('.cattach-group');
  if (g) g.classList.toggle('open');
}

/* ═══════════════════════════════════════════════════════
   🆕 국내골프 자동 콘텐츠 채움
   - 포함/불포함 사항: 박수에 따라 자동 결정
   - 일정표: 1박2일 / 2박3일 / 3박4일 자동 생성
   ═══════════════════════════════════════════════════════ */
function autoFillDomesticContent(p) {
  // 박수 추출 (1, 2, 3박)
  const nights = parseDomesticNights(p);
  const days = nights + 1;
  const rounds = nights + 1; // 박수+1만큼 라운딩 (관행: 1박2일 = 2회 라운딩)
  const breakfastCount = nights; // 조식은 박수만큼
  
  // ─── 1) 포함사항 자동 채움 (어드민 입력은 무시하고 자동 생성) ───
  const includesArr = [
    `골프 그린피 ${rounds}회 라운딩`,
    `호텔 숙박 ${nights}박`,
    `호텔 조식 ${breakfastCount}회`,
    `미팅·샌딩 비용`
  ];
  
  // ─── 2) 불포함사항 자동 채움 ───
  const excludesArr = [
    '캐디피 (1팀당 약 150,000원, 현장 결제)',
    '카트비 (회원제 약 120,000원 / 대중제 약 100,000원, 현장 결제)',
    '중·석식 등 별도 식사',
    '개인 경비 (미니바, 룸서비스 등)'
  ];
  
  // 포함/불포함 박스 새로 그리기
  renderDomesticIncludes(includesArr, excludesArr);
  
  // ─── 3) 일정표 자동 생성 ───
  renderDomesticItinerary(p, nights, days);
}

// 박수 추출 헬퍼: 상품의 duration 또는 title/summary 분석
function parseDomesticNights(p) {
  // duration 컬럼 우선 (예: "2박3일")
  const durStr = (p.duration || p.period || p.title || p.summary || '').toString();
  const m = durStr.match(/(\d)박(\d)일/);
  if (m) return Number(m[1]);
  // 못 찾으면 기본 1박2일
  return 1;
}

// 일정표 자동 생성
function renderDomesticItinerary(p, nights, days) {
  const dayBlocks = [];
  for (let d = 1; d <= days; d++) {
    const isFirst = d === 1;
    const isLast = d === days;
    const isMiddle = !isFirst && !isLast;
    
    let title = '';
    let activities = [];
    
    if (isFirst) {
      title = `${d}일차 · 도착 & 첫 라운딩`;
      activities = [
        '🚌 출발 및 골프장 이동',
        '⛳ 그린피 1회 라운딩 (2부)',
        '🏨 호텔 체크인 & 휴식'
      ];
    } else if (isLast) {
      title = `${d}일차 · 라운딩 & 출발`;
      activities = [
        '🍳 호텔 조식',
        '⛳ 그린피 1회 라운딩 (1부)',
        '🚌 일정 종료 및 귀가'
      ];
    } else {
      // 중간일: 1부 + 2부 또는 종일
      title = `${d}일차 · 종일 라운딩`;
      activities = [
        '🍳 호텔 조식',
        '⛳ 오전 라운딩 (1부)',
        '🍴 클럽하우스 점심 (자유)',
        '⛳ 오후 라운딩 (2부)',
        '🏨 호텔 휴식'
      ];
    }
    
    dayBlocks.push(`
      <div style="border:1px solid var(--gray-200);border-radius:10px;padding:14px 16px;margin-bottom:10px;background:white">
        <div style="font-weight:700;color:var(--navy-900);font-size:14px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--gray-100)">
          ${esc(title)}
        </div>
        <ul style="list-style:none;padding:0;margin:0;color:var(--gray-700);font-size:13px;line-height:2">
          ${activities.map(a => `<li>${esc(a)}</li>`).join('')}
        </ul>
      </div>
    `);
  }
  
  const itineraryHtml = `
    <h2 class="sec-title">상세 일정 <span class="sub">Itinerary · ${nights}박 ${days}일</span></h2>
    <div style="margin-top:14px">
      ${dayBlocks.join('')}
    </div>
    <div style="margin-top:10px;padding:10px 14px;background:#FFF8E1;border:1px solid #F0D78F;border-radius:8px;font-size:12px;color:#6b5b00;line-height:1.7">
      💡 일정은 <strong>참고용</strong>이며, 골프장 사정 및 날씨에 따라 1부·2부 시간이 조정될 수 있습니다.<br>
      자세한 티타임은 <strong>출발 7일 전</strong> 안내드립니다.
    </div>
  `;
  
  // 일정표 영역 (sec-itin) 채우기
  const itinSections = document.querySelectorAll('.sec-itin');
  if (itinSections.length > 0) {
    itinSections.forEach(box => {
      box.innerHTML = itineraryHtml;
      box.style.display = '';
    });
  }
  
  // 모바일 일정 영역도 동일하게 (있으면)
  const mobileItin = document.getElementById('mobileItinerary');
  if (mobileItin) {
    mobileItin.innerHTML = itineraryHtml;
  }
}

// WMO weather code → 아이콘 + 한글 설명
function weatherCodeToInfo(code) {
  const map = {
    0: ['☀️', '맑음'],     1: ['🌤️', '대체로 맑음'],
    2: ['⛅', '부분 흐림'], 3: ['☁️', '흐림'],
    45: ['🌫️', '안개'],    48: ['🌫️', '서리 안개'],
    51: ['🌦️', '약한 이슬비'], 53: ['🌦️', '보통 이슬비'], 55: ['🌦️', '강한 이슬비'],
    61: ['🌧️', '약한 비'],     63: ['🌧️', '비'],           65: ['🌧️', '강한 비'],
    71: ['🌨️', '약한 눈'],     73: ['🌨️', '눈'],           75: ['❄️', '강한 눈'],
    77: ['🌨️', '눈발'],
    80: ['🌦️', '소나기'],      81: ['🌧️', '강한 소나기'],   82: ['⛈️', '매우 강한 소나기'],
    95: ['⛈️', '뇌우'],        96: ['⛈️', '뇌우+우박'],     99: ['⛈️', '강한 뇌우+우박'],
  };
  return map[code] || ['🌡️', ''];
}

// 골프 적합도 자동 판정
function golfVerdict(temp, wind, rainProb, code) {
  if (rainProb >= 70) return { emoji: '🌧️', text: '비 소식이 있어요. 출발 전 골프장 상황 확인을 권해드려요' };
  if (code >= 71 && code <= 77) return { emoji: '❄️', text: '눈 소식이 있어 골프장 운영 상황을 살펴보시면 좋아요' };
  if (wind >= 10) return { emoji: '💨', text: '바람이 다소 있어 샷 감각에 변화가 있을 수 있어요' };
  if (temp < 5)  return { emoji: '🧣', text: '쌀쌀한 날씨예요. 따뜻한 옷차림이 좋겠어요' };
  if (temp < 12) return { emoji: '🧥', text: '선선한 날씨예요. 가벼운 겉옷 챙기시면 좋아요' };
  if (temp >= 32) return { emoji: '☀️', text: '햇살이 따뜻해요. 수분 보충하며 라운딩 즐기세요' };
  if (temp >= 18 && temp <= 26 && wind < 5 && rainProb < 20)
    return { emoji: '⛳', text: '라운딩하기 참 좋은 날이에요' };
  return { emoji: '🏌️', text: '골프 치기 좋은 날씨예요' };
}

// 좌표 결정: region → country 순으로 fallback
function resolveWeatherCoords(product) {
  if (product.region && WEATHER_REGION_COORDS[product.region]) {
    return WEATHER_REGION_COORDS[product.region];
  }
  if (product.country && WEATHER_COUNTRY_COORDS[product.country]) {
    return WEATHER_COUNTRY_COORDS[product.country];
  }
  return null;
}

// 메인 함수: 날씨 로드 + 렌더
async function loadWeather(product) {
  const section = document.getElementById('secWeather');
  const widget = document.getElementById('weatherWidget');
  if (!section || !widget) return;

  const coords = resolveWeatherCoords(product);
  if (!coords) return; // 좌표 정보 없으면 섹션 자체 안 보임

  // 섹션 표시
  section.style.display = '';

  const regionName = (product.regionName || product.countryName || coords.name);

  try {
    const url = `https://api.open-meteo.com/v1/forecast?` +
      `latitude=${coords.lat}&longitude=${coords.lng}` +
      `&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,apparent_temperature` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max` +
      `&timezone=${coords.timezone}&forecast_days=6`;
    
    const res = await fetch(url);
    if (!res.ok) throw new Error('API 호출 실패');
    const data = await res.json();

    const c = data.current;
    const d = data.daily;
    const [icon, desc] = weatherCodeToInfo(c.weather_code);
    const rainProb = d.precipitation_probability_max?.[0] ?? 0;
    const verdict = golfVerdict(c.temperature_2m, c.wind_speed_10m, rainProb, c.weather_code);

    // ===== 한국식 체감온도 계산 (기온 + 습도만) =====
    // 기상청 여름철 체감온도 공식 (Heat Index 한국 변형)
    // 기온 ≥ 26°일 때만 적용, 그 외엔 기온 그대로
    function calcKoreanFeelsLike(tempC, humidity) {
      if (tempC < 26) return tempC;
      const tw = tempC * Math.atan(0.151977 * Math.pow(humidity + 8.313659, 0.5))
               + Math.atan(tempC + humidity)
               - Math.atan(humidity - 1.67633)
               + 0.00391838 * Math.pow(humidity, 1.5) * Math.atan(0.023101 * humidity)
               - 4.686035;
      const feels = -0.2442 + 0.55399 * tw + 0.45535 * tempC
                  - 0.0022 * tw * tw + 0.00278 * tw * tempC + 3.0;
      return feels;
    }
    const feelsLike = calcKoreanFeelsLike(c.temperature_2m, c.relative_humidity_2m);

    // 6일 예보 렌더 (3×2 그리드)
    const DAY_NAMES = ['일', '월', '화', '수', '목', '금', '토'];
    const forecastHtml = d.time.slice(0, 6).map((dateStr, i) => {
      const [fIcon] = weatherCodeToInfo(d.weather_code[i]);
      const hi = Math.round(d.temperature_2m_max[i]);
      const lo = Math.round(d.temperature_2m_min[i]);
      const rain = d.precipitation_probability_max?.[i] ?? 0;
      const dt = new Date(dateStr);
      const mmdd = `${dt.getMonth() + 1}/${dt.getDate()}`;
      // 오늘/내일/모레는 고정, 나머지는 요일명
      const dayLabel = i === 0 ? '오늘' : (i === 1 ? '내일' : (i === 2 ? '모레' : DAY_NAMES[dt.getDay()]));
      return `<div class="forecast-day${i === 0 ? ' today' : ''}">
        <div class="f-day">${dayLabel}</div>
        <div class="f-date">${mmdd}</div>
        <div class="f-icon">${fIcon}</div>
        <div class="f-temp"><span class="f-hi">${hi}°</span> / <span class="f-lo">${lo}°</span></div>
        <div class="f-rain">${rain > 0 ? rain + '%' : '&nbsp;'}</div>
      </div>`;
    }).join('');

    // 현지 시간 (HH:mm) 표시
    const nowLocal = new Date(new Date().toLocaleString('en-US', { timeZone: coords.timezone }));
    const localTime = `${String(nowLocal.getHours()).padStart(2,'0')}:${String(nowLocal.getMinutes()).padStart(2,'0')}`;
    const localDateStr = `${nowLocal.getMonth() + 1}월 ${nowLocal.getDate()}일`;

    widget.className = 'weather-widget';
    widget.innerHTML = `
      <div class="weather-head">
        <div class="title">
          <span class="loc-name">${regionName}</span>
          <span class="loc-time">${localDateStr} · 현지 ${localTime}</span>
        </div>
        <div class="live-badge">LIVE</div>
      </div>
      <div class="weather-now">
        <div class="weather-now-left">
          <div class="big-icon">${icon}</div>
          <div class="now-temp">${Math.round(c.temperature_2m)}<span class="deg">°</span></div>
        </div>
        <div class="weather-now-right">
          <div class="desc">${desc}</div>
          <div class="feel">체감 ${Math.round(feelsLike)}°</div>
        </div>
      </div>
      <div class="weather-stats">
        <div class="weather-stat">
          <div class="stat-label">바람</div>
          <div class="stat-value">${c.wind_speed_10m.toFixed(1)}<span class="stat-unit">m/s</span></div>
        </div>
        <div class="weather-stat">
          <div class="stat-label">강수확률</div>
          <div class="stat-value">${rainProb}<span class="stat-unit">%</span></div>
        </div>
        <div class="weather-stat">
          <div class="stat-label">습도</div>
          <div class="stat-value">${c.relative_humidity_2m}<span class="stat-unit">%</span></div>
        </div>
      </div>
      <div class="weather-forecast">
        <div class="weather-forecast-title">날씨 예보</div>
        <div class="weather-forecast-grid">${forecastHtml}</div>
      </div>
      <div class="weather-verdict">
        <div class="v-emoji">${verdict.emoji}</div>
        <div class="v-text">${verdict.text}</div>
      </div>
      <div class="weather-footer">Powered by Open-Meteo</div>
    `;
  } catch (err) {
    console.error('[weather] 날씨 로드 실패:', err);
    widget.className = '';
    widget.innerHTML = `<div class="weather-error">⚠️ 현지 날씨 정보를 불러오지 못했습니다.</div>`;
  }
}

// 항공사 한글명 추출 (편명 코드를 제거하고 남은 텍스트)
const AIRLINE_CODE_NAMES = {
  'KE':'대한항공', 'OZ':'아시아나항공', 'LJ':'진에어', '7C':'제주항공',
  'TW':'티웨이항공', 'BX':'에어부산', 'RS':'에어서울', 'ZE':'이스타항공',
  'YP':'에어프레미아', 'RF':'에어로케이', 'JL':'일본항공', 'NH':'전일본공수',
  'VN':'베트남항공', 'VJ':'비엣젯항공', 'TG':'타이항공', 'PR':'필리핀항공',
  'CX':'캐세이퍼시픽', 'SQ':'싱가포르항공', 'CI':'중화항공', 'BR':'에바항공'
};
function extractAirlineName(flights) {
  if (!flights || !flights.length) return '-';
  const airline = (flights[0].airline || '').trim();
  if (!airline) return '-';
  // 편명 패턴(KE 463, OZ123 등) 잡아두기
  const codeMatch = airline.match(/([A-Z]{2,3})\s*\d{1,4}/);
  // 편명 제거한 나머지 텍스트 (주로 한글 항공사명)
  const cleaned = airline.replace(/[A-Z]{2,3}\s*\d{1,4}/g, '').replace(/\s+/g, ' ').trim();
  if (cleaned) return cleaned;
  // 한글명이 없고 편명만 있으면 코드로 한글명 추정
  if (codeMatch && AIRLINE_CODE_NAMES[codeMatch[1]]) return AIRLINE_CODE_NAMES[codeMatch[1]];
  return airline;
}

// 🆕 › 화살표: 다음 골프장/호텔로 한 칸씩 넘김 (선택+내용 전환, 끝이면 처음으로 순환)
function slideGolfTabs(btn, dir) {
  const wrap = btn.closest('.golf-tabs-wrap');
  const tabs = wrap && wrap.querySelector('.golf-tabs');
  if (!tabs) return;
  const tabBtns = Array.from(tabs.querySelectorAll('.golf-tab'));
  if (tabBtns.length < 2) return;
  // 현재 선택된 탭 → 다음 한 칸 (마지막이면 처음으로)
  let cur = tabBtns.findIndex(b => b.classList.contains('active'));
  if (cur < 0) cur = 0;
  const next = (cur + 1) % tabBtns.length;
  // 선택 + 소개 내용 전환
  tabBtns[next].click();
  // 선택된 탭이 가운데로 오도록 '탭 줄만' 가로 스크롤 (페이지 세로 위치는 그대로)
  const tabsRect = tabs.getBoundingClientRect();
  const nextRect = tabBtns[next].getBoundingClientRect();
  const target = tabs.scrollLeft + (nextRect.left - tabsRect.left) - (tabs.clientWidth - nextRect.width) / 2;
  tabs.scrollTo({ left: Math.max(0, target), behavior: 'smooth' });
}

function slideInfoGallery(galleryId, direction) {
  const track = document.querySelector(`[data-track="${galleryId}"]`);
  if (!track) return;
  const slides = track.querySelectorAll('.info-photo');
  if (!slides.length) return;

  // 현재 위치 (px 단위)
  const currentX = parseFloat(track.dataset.x || '0');
  const slideWidth = slides[0].offsetWidth;
  const gap = 12;
  const step = slideWidth + gap;

  // 화면 너비에 따라 보이는 개수
  const isMobile = window.innerWidth <= 768;
  const visibleCount = isMobile ? 1 : 3;
  const maxIdx = Math.max(0, slides.length - visibleCount);

  // 현재 인덱스 계산
  let currentIdx = Math.round(-currentX / step);
  let newIdx = currentIdx + direction;
  newIdx = Math.max(0, Math.min(maxIdx, newIdx));

  const newX = -newIdx * step;
  track.dataset.x = newX;
  track.style.transform = `translateX(${newX}px)`;

  // 화살표 활성/비활성
  const gallery = track.closest('.info-gallery');
  if (gallery) {
    const prev = gallery.querySelector('.info-arrow.prev');
    const next = gallery.querySelector('.info-arrow.next');
    if (prev) prev.disabled = (newIdx === 0);
    if (next) next.disabled = (newIdx >= maxIdx);
  }
}

function initGalleryDots() {
  // 초기 화살표 상태 설정 (첫 번째는 prev 비활성)
  document.querySelectorAll('.info-gallery').forEach(gallery => {
    const prev = gallery.querySelector('.info-arrow.prev');
    if (prev) prev.disabled = true;

  // 모바일 가로 스와이프 시 화살표 자동 갱신 (선택적)

  window.addEventListener('resize', () => {
    document.querySelectorAll('.info-photos[data-track]').forEach(track => {
      track.dataset.x = '0';
      track.style.transform = 'translateX(0)';
      const gallery = track.closest('.info-gallery');
      if (gallery) {
        const prev = gallery.querySelector('.info-arrow.prev');
        const next = gallery.querySelector('.info-arrow.next');
        if (prev) prev.disabled = true;
        if (next) next.disabled = false;
      }
    });
  });
}

function renderCalendar() {
  const p = product;
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  
  // 🆕 period가 없는 상품(알펜시아 등)은 달력 렌더링 스킵
  if (!p.period || !p.period.start) return;
  
  const startDate = new Date(p.period.start);
  const endDate = new Date(p.period.end);
  
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startWeekday = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  
  const prevM = new Date(year, month - 1, 1);
  const nextM = new Date(year, month + 1, 1);
  const prevDisabled = prevM < new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  const nextDisabled = nextM > new Date(endDate.getFullYear(), endDate.getMonth(), 1);
  
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  
  let html = `
    <div class="calendar-wrap">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)" ${prevDisabled ? 'disabled' : ''}>‹</button>
        <div class="cal-month">${year}년 ${monthNames[month]}</div>
        <button class="cal-nav" onclick="changeMonth(1)" ${nextDisabled ? 'disabled' : ''}>›</button>
      </div>
      <div class="cal-weekdays">
        <div class="cal-weekday sun">일</div>
        <div class="cal-weekday">월</div>
        <div class="cal-weekday">화</div>
        <div class="cal-weekday">수</div>
        <div class="cal-weekday">목</div>
        <div class="cal-weekday">금</div>
        <div class="cal-weekday sat">토</div>
      </div>
      <div class="cal-days">
  `;
  
  for (let i = 0; i < startWeekday; i++) html += '<div class="cal-day empty"></div>';
  
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    const weekday = date.getDay();
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const inRange = date >= startDate && date <= endDate;
    const weekdayOk = p.weekdays.includes(weekday);
    const notExcluded = !p.excludeDates.includes(dateStr);
    // 🆕 출발 막힘(blocked) 체크
    const notBlocked = !p.pricing.blocked.includes(dateStr);
    const available = inRange && weekdayOk && notExcluded && notBlocked;
    const isSelected = selectedDate === dateStr;
    // 🆕 일별 정확 요금이 있으면 시각적 표시
    const hasExactPrice = p.pricing.exact && p.pricing.exact[dateStr] != null;
    
    let cls = 'cal-day';
    cls += available ? ' available' : ' disabled';
    if (weekday === 0) cls += ' sun';
    if (weekday === 6) cls += ' sat';
    if (isSelected) cls += ' selected';
    if (hasExactPrice && available) cls += ' has-exact-price';
    
    const onclick = available ? `onclick="selectDate('${dateStr}')"` : '';
    html += `<button class="${cls}" ${onclick} ${!available ? 'disabled' : ''}>${d}</button>`;
  }
  
  html += `
      </div>
      <div class="cal-legend">
        <div><span class="cal-legend-dot"></span>예약 가능일</div>
        <div><span class="cal-legend-dot" style="background:#10b981"></span>확정 요금</div>
      </div>
    </div>
  `;
  
  document.getElementById('calendarArea').innerHTML = html;
}

function changeMonth(delta) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + delta, 1);
  renderCalendar();
}

// 🆕 일정 옵션 전환 (pill 클릭)
function switchVariation(idx) {
  const p = product;
  if (!p.variations || idx < 0 || idx >= p.variations.length || idx === p.activeVariationIdx) return;
  const v = p.variations[idx];

  // 전역 product 객체의 active 값 교체 → 기존 렌더 함수가 자동으로 새 값 사용
  p.activeVariationIdx = idx;
  p.duration = v.label || p.duration;
  p.itinerary = v.itinerary || [];
  p.pricing = v.pricing;

  // priceFrom(카드용 최저가)도 갱신 — 단, 견적서는 수동 입력 금액이므로 그대로 유지
  if (!p.isQuote) {
    const exactVals = Object.values((v.pricing && v.pricing.exact) || {}).filter(x => x > 0);
    if (exactVals.length > 0) p.priceFrom = Math.min(...exactVals);
    else if (v.pricing && v.pricing.default && v.pricing.default.weekday > 0) p.priceFrom = v.pricing.default.weekday;
    else if (v.pricing && v.pricing.default && v.pricing.default.weekend > 0) p.priceFrom = v.pricing.default.weekend;
    else p.priceFrom = 0;
  }

  // 선택된 날짜 초기화 (박수 바뀌면 기간도 달라지므로)
  selectedDate = null;
  // 출발일정 박스 숨기기
  const sdateSec = document.getElementById('selectedDateSection');
  if (sdateSec) sdateSec.classList.remove('show');

  // 스크롤 위치 유지
  const scrollY = window.scrollY;
  renderPage();
  window.scrollTo(0, scrollY);
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  renderCalendar();

  const p = product;
  const startDate = new Date(dateStr);
  const weekday = startDate.getDay();
  const isWeekend = weekday === 0 || weekday === 5 || weekday === 6;

  // 🆕 가격 우선순위: 일별 정확 요금(exact) > 월별 예외 > 기본
  let price = 0;
  let priceMode = ''; // 'exact' | 'monthly' | 'default' | 'inquiry'
  if (p.pricing.exact && p.pricing.exact[dateStr] != null) {
    price = p.pricing.exact[dateStr];
    priceMode = 'exact';
  } else {
    const monthKey = dateStr.substring(0, 7);
    const priceData = p.pricing[monthKey] || p.pricing.default;
    price = isWeekend ? priceData.weekend : priceData.weekday;
    priceMode = (p.pricing[monthKey]) ? 'monthly' : 'default';
  }
  if (!price || price <= 0) priceMode = 'inquiry';

  // 기간(박 수) 추출 → 종료일 계산
  const durStr = p.duration || '';
  const nightsMatch = durStr.match(/(\d+)박/);
  const daysMatch = durStr.match(/(\d+)일/);
  const nights = nightsMatch ? parseInt(nightsMatch[1]) : 0;
  const days = daysMatch ? parseInt(daysMatch[1]) : (nights ? nights + 1 : 1);
  const endDate = new Date(startDate);
  endDate.setDate(startDate.getDate() + nights);

  const wdNames = ['일','월','화','수','목','금','토'];
  const fmt = d => `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} (${wdNames[d.getDay()]})`;
  const durLabel = durStr || (nights ? `${nights}박 ${days}일` : '당일');

  // 🆕 priceDisplay 갱신: inquiry 모드면 "문의 시 안내", 아니면 가격 + 모드 뱃지
  const priceEl = document.getElementById('priceDisplay');
  if (priceMode === 'inquiry') {
    priceEl.innerHTML = `<span style="font-size:22px;color:#555;font-family:'Pretendard Variable',Pretendard,sans-serif">💬 문의 시 안내</span>`;
  } else {
    const badge = priceMode === 'exact'
      ? `<span style="display:block;font-size:10px;font-weight:700;color:#10b981;letter-spacing:1px;margin-top:4px">✓ 확정 요금</span>`
      : '';
    priceEl.innerHTML = `${price.toLocaleString()}<span class="won">원</span>${badge}`;
  }
  document.getElementById('selectedDateText').innerHTML = `
    <div class="sel-range">${fmt(startDate)} ~ ${fmt(endDate)}</div>
    <div class="sel-duration">${durLabel}</div>
  `;
  document.getElementById('selectedBox').classList.add('show');

  // 출발일정 박스 (main-content 상단) 업데이트 + 표시
  const sdateSec = document.getElementById('selectedDateSection');
  const sdateDateEl = document.getElementById('sdateDateValue');
  const sdateDurEl = document.getElementById('sdateDurationValue');
  if (sdateSec && sdateDateEl && sdateDurEl) {
    sdateDateEl.innerHTML = `${fmt(startDate)}<span class="sdate-end">~ ${fmt(endDate)}</span>`;
    sdateDurEl.textContent = durLabel;
    sdateSec.classList.add('show');
  }
}

// 🆕 Supabase에서 시뮬레이터 가격 데이터 가져오기 (어드민 → 🎿 시뮬레이터 요금 관리)
let _simPricingLoaded = false;
async function fetchSimulatorPricing(productKey = 'alpensia') {
  if (_simPricingLoaded) return SIM_ALPENSIA;
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/simulator_pricing?id=eq.${encodeURIComponent(productKey)}&select=data`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) {
      console.warn('[시뮬레이터 가격] 로드 실패, 기본값 사용. status:', res.status);
      return SIM_ALPENSIA;
    }
    const rows = await res.json();
    if (rows && rows.length > 0 && rows[0].data) {
      // 기존 SIM_ALPENSIA 객체에 DB 데이터 병합 (libraryMap 등 누락 시 fallback 보존)
      SIM_ALPENSIA = { ...SIM_ALPENSIA, ...rows[0].data };
      _simPricingLoaded = true;
      console.log('[시뮬레이터 가격] DB 로드 완료');
    }
  } catch(e) {
    console.warn('[시뮬레이터 가격] 로드 중 오류, 기본값 사용:', e);
  }
  return SIM_ALPENSIA;
}

const SIM_DOW = ['일','월','화','수','목','금','토'];
function simSeason(ds) {
  const c = SIM_ALPENSIA;
  if (!ds || ds < c.seasonCut) return 's1';
  if (ds < c.seasonCut2) return 's2';
  if (ds < c.seasonCut3) return 's3';
  return 's4';
}
function simDow(ds) { return new Date(ds + 'T00:00:00').getDay(); }
function simDayType(ds) {
  if (SIM_ALPENSIA.SUNDAY_RATE_DATES.includes(ds)) return 'sunday';
  const d = simDow(ds);
  return d >= 1 && d <= 4 ? 'weekday' : d === 5 ? 'friday' : d === 6 ? 'saturday' : 'sunday';
}
function simAddDays(ds, n) {
  const d = new Date(ds + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function simFmtD(ds) {
  if (!ds) return '';
  const d = new Date(ds + 'T00:00:00');
  return (d.getMonth()+1) + '/' + d.getDate() + '(' + SIM_DOW[d.getDay()] + ')';
}
// 🆕 날짜를 분리 형태로 반환 ({md: "5/14", dow: "수"})
function simFmtDParts(ds) {
  if (!ds) return { md: '', dow: '' };
  const d = new Date(ds + 'T00:00:00');
  return {
    md: (d.getMonth()+1) + '/' + d.getDate(),
    dow: SIM_DOW[d.getDay()]
  };
}

// 객실 1박 가격 (연휴/연휴전일 처리)
function simGetRoomRate(roomKey, ds) {
  const r = SIM_ALPENSIA.rooms[roomKey];
  if (!r) return 0;
  const d = simDow(ds);
  const idx = d === 6 ? 2 : d === 5 ? 1 : 0; // 토=2(triple), 금=1(double), 그외=0(single)
  if (SIM_ALPENSIA.HOLIDAY_DATES.includes(ds) || SIM_ALPENSIA.HOLIDAY_EVE.includes(ds)) {
    const hIdx = SIM_ALPENSIA.HOLIDAY_EVE.includes(ds) ? 1 : idx;
    return (r.holiday && r.holiday[hIdx]) || (r[simSeason(ds)] && r[simSeason(ds)][idx]) || 0;
  }
  return r[simSeason(ds)] ? r[simSeason(ds)][idx] : 0;
}

// 그린피 (코스 키 + 날짜 + 1부(0)/2부(1))
function simGetGreenfee(courseKey, ds, teeIdx) {
  const c = SIM_ALPENSIA.courses[courseKey];
  if (!c) return 0;
  const dt = simDayType(ds);
  const ss = simSeason(ds);
  return (c[ss] && c[ss][dt] && c[ss][dt][teeIdx]) || 0;
}

}
