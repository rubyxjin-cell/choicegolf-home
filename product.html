function renderItineraryTable(p) {
  const list = p.itinerary || [];
  if (!list.length) return '<div style="color:var(--gray-500);padding:20px;text-align:center">일정 정보가 아직 없습니다</div>';

  // 호텔 이름 목록 (일정 본문에서 하이라이트용)
  const hotelNames = (p.hotels || []).map(h => h.name).filter(Boolean);
  // 골프장 이름 목록
  const golfNames = (p.golfCourses || []).map(g => g.name).filter(Boolean);

  function highlight(text) {
    let out = text || '';
    golfNames.forEach(n => {
      if (n && out.includes(n)) {
        out = out.split(n).join(`<span class="course-hl">${n}</span>`);
      }
    });
    return out;
  }

  function fmtDate(dstr) {
    if (!dstr) return '';
    const d = new Date(dstr);
    if (isNaN(d)) return '';
    const wd = ['일','월','화','수','목','금','토'][d.getDay()];
    return `${d.getMonth()+1}/${d.getDate()} ${wd}`;
  }

  // 일자별 식사 상태 계산 (조/중/석)
  // 우선순위: day.meals(신규) > events[].meal(기존 호환)
  function mealStatus(day) {
    const status = { 조식: null, 중식: null, 석식: null };
    // 1) 신규 포맷: day.meals
    if (day.meals && typeof day.meals === 'object') {
      ['조식','중식','석식'].forEach(k => {
        const t = (day.meals[k] || '').trim();
        if (!t) return;
        if (t.includes('불포함') || t.includes('미제공')) status[k] = { type: 'no', text: t };
        else status[k] = { type: 'ok', text: t };
      });
    }
    // 2) 기존 포맷: events[].meal + events[].text (신규 포맷에 없는 것만 보완)
    (day.events || []).forEach(e => {
      if (e.meal && status.hasOwnProperty(e.meal) && !status[e.meal]) {
        const t = (e.text || '').trim();
        if (!t) { status[e.meal] = { type: 'empty', text: '-' }; return; }
        if (t.includes('불포함')) status[e.meal] = { type: 'no', text: '불포함' };
        else status[e.meal] = { type: 'ok', text: t };
      }
    });
    return status;
  }

  function mealSpan(label, m) {
    if (!m) return `<span>${label}: -</span>`;
    const cls = m.type === 'ok' ? 'm-ok' : (m.type === 'no' ? 'm-no' : '');
    return `<span class="${cls}">${label}: ${m.text}</span>`;
  }

  let rows = '';
  list.forEach((day, dIdx) => {
    // 기존 포맷의 식사 전용 이벤트(ev.meal만 있고 다른 정보 없음)는 일정 표시에서 제외
    const events = (day.events || []).filter(e => !e.meal || e.time || e.place || e.transport);
    const ms = mealStatus(day);
    const mealHtml = `
      ${mealSpan('조', ms.조식)}
      ${mealSpan('중', ms.중식)}
      ${mealSpan('석', ms.석식)}
    `;

    // 이 일자에 호텔 스테이가 있는지(보통 마지막 행에 HOTEL 표시)
    const hotelStay = hotelNames[0] || '';

    // 해당 일자에 세부 일정이 없으면 1행, 있으면 events.length 행
    const rowCount = Math.max(events.length, 1);

    if (events.length === 0) {
      rows += `
        <tr>
          <td class="col-day">
            <span class="itin-day-badge">${day.day}일차<span class="d">DAY</span></span>
            ${day.date ? `<div class="itin-day-date">${fmtDate(day.date)}</div>` : ''}
          </td>
          <td class="col-place"></td>
          <td class="col-trans"></td>
          <td class="col-time"></td>
          <td class="col-event">${day.title || '-'}</td>
          <td class="col-meal">${mealHtml}</td>
        </tr>`;
      return;
    }

    events.forEach((ev, eIdx) => {
      const isFirstRow = eIdx === 0;
      rows += `
        <tr>
          ${isFirstRow ? `
            <td class="col-day" rowspan="${events.length}">
              <span class="itin-day-badge">${day.day}일차<span class="d">DAY</span></span>
              ${day.date ? `<div class="itin-day-date">${fmtDate(day.date)}</div>` : ''}
            </td>` : ''}
          <td class="col-place">${ev.place ? esc(ev.place) : ''}</td>
          <td class="col-trans">${ev.transport ? esc(ev.transport) : ''}</td>
          <td class="col-time">${ev.time ? esc(ev.time) : ''}</td>
          <td class="col-event">${highlight(ev.text || '')}</td>
          ${isFirstRow ? `<td class="col-meal" rowspan="${events.length}">${mealHtml}</td>` : ''}
        </tr>`;
    });

    // 호텔 스테이 행 (마지막 일자가 아니면)
    if (hotelStay && dIdx < list.length - 1) {
      rows += `
        <tr style="background:#FAF6EE">
          <td></td>
          <td class="col-place" colspan="4" style="padding:10px 8px">
            <span class="hotel-tag">HOTEL</span><strong>${esc(hotelStay)}</strong>
          </td>
          <td></td>
        </tr>`;
    }
  });

  return `
    <table class="itin-table">
      <thead>
        <tr>
          <th>날짜</th>
          <th>장소</th>
          <th>교통</th>
          <th>시간</th>
          <th>일정</th>
          <th>식사</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* 🆕 일정 본문 HTML sanitize: <span style="color:..."> 만 허용 (XSS 방어)
   - 기존 plain text 이벤트도 자연스럽게 처리됨
   - <, > 같은 문자는 파서가 자동 escape */
const SAFE_COLORS = ['#DC2626','#2563EB','#16A34A','#C9A961','#dc2626','#2563eb','#16a34a','#c9a961'];
function sanitizeEventText(html) {
  if (html == null) return '';
  const s = String(html);
  // HTML 태그 흔적이 없으면 그냥 plain escape
  if (s.indexOf('<') === -1 && s.indexOf('&') === -1) {
    return esc(s);
  }
  const tmp = document.createElement('div');
  tmp.innerHTML = s;
  const walk = (node) => {
    const children = [...node.childNodes];
    children.forEach(child => {
      if (child.nodeType === 3) return; // text
      if (child.nodeType !== 1) { child.remove(); return; }
      const tag = child.tagName;
      if (tag === 'SPAN' || tag === 'FONT') {
        // color 추출
        let color = '';
        if (tag === 'FONT') color = child.getAttribute('color') || '';
        else color = child.style.color || '';
        // 모든 속성 제거
        while (child.attributes.length > 0) {
          child.removeAttribute(child.attributes[0].name);
        }
        // 화이트리스트 색상만 적용 (rgb 형식도 hex로 매칭)
        const rgbToHex = (c) => {
          const m = c.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
          if (!m) return c;
          const to2 = (n) => Number(n).toString(16).padStart(2,'0');
          return '#' + to2(m[1]) + to2(m[2]) + to2(m[3]);
        };
        const hex = rgbToHex(color).toLowerCase();
        if (SAFE_COLORS.map(c => c.toLowerCase()).includes(hex)) {
          // span으로 통일
          if (tag === 'FONT') {
            const span = document.createElement('span');
            span.style.color = hex;
            span.innerHTML = child.innerHTML;
            child.parentNode.replaceChild(span, child);
            walk(span);
            return;
          }
          child.style.color = hex;
        }
        walk(child);
      } else if (tag === 'BR') {
        // 줄바꿈 허용
      } else {
        // 기타 태그는 텍스트로 치환
        const textNode = document.createTextNode(child.textContent || '');
        child.parentNode.replaceChild(textNode, child);
      }
    });
  };
  walk(tmp);
  return tmp.innerHTML;
}

/* 🆕 상품 정보 카드 렌더링 (항공/숙소/식사/라운딩/특이사항)
   product 객체의 flights, hotels, golfCourses, itinerary, notices 등을 종합해 한눈에 표시 */
function renderProductInfoCards(p) {
  const items = [];

  // 1) 항공
  if (p.flights && p.flights.length) {
    const flightLines = p.flights.map(f => {
      const type = f.type || '';
      const route = f.route || '';
      const airline = f.airline || '';
      const time = f.time || '';
      const parts = [];
      if (type) parts.push(`<b>${esc(type)}</b>`);
      if (route) parts.push(esc(route));
      if (airline) parts.push(`<span class="pi-tag">${esc(airline)}</span>`);
      if (time) parts.push(`<span class="pi-time">${esc(time)}</span>`);
      return `<li>${parts.join(' · ')}</li>`;
    }).join('');
    items.push({
      icon: '✈️',
      label: '항공',
      sub: `${p.flights.length}편`,
      body: `<ul class="pi-list">${flightLines}</ul>`
    });
  } else {
    items.push({
      icon: '✈️',
      label: '항공',
      sub: '미포함',
      body: '<div class="pi-empty">항공편 별도 안내</div>'
    });
  }

  // 2) 숙박
  if (p.hotels && p.hotels.length) {
    const hotelLines = p.hotels.map(h => {
      const stars = h.stars ? ` <span class="pi-stars">${'★'.repeat(h.stars)}</span>` : '';
      return `<li><b>${esc(h.name||'')}</b>${stars}${h.nameEn ? ` <span class="pi-en">${esc(h.nameEn)}</span>` : ''}</li>`;
    }).join('');
    const nights = p.itinerary ? Math.max(0, (p.itinerary.length - 1)) : 0;
    items.push({
      icon: '🏨',
      label: '숙박',
      sub: nights > 0 ? `${nights}박` : `${p.hotels.length}곳`,
      body: `<ul class="pi-list">${hotelLines}</ul>`
    });
  }

  // 3) 골프장 (라운딩)
  if (p.golfCourses && p.golfCourses.length) {
    const golfLines = p.golfCourses.map(g => {
      const holes = g.holes ? ` <span class="pi-tag">${g.holes}홀</span>` : '';
      return `<li><b>${esc(g.name||'')}</b>${holes}${g.nameEn ? ` <span class="pi-en">${esc(g.nameEn)}</span>` : ''}</li>`;
    }).join('');
    // 라운딩 횟수: itinerary에서 is_golf 카운트
    let rounds = 0;
    (p.itinerary || []).forEach(d => {
      (d.events || []).forEach(e => { if (e.is_golf) rounds++; });
    });
    items.push({
      icon: '⛳',
      label: '라운딩',
      sub: rounds > 0 ? `${rounds}R` : `${p.golfCourses.length}곳`,
      body: `<ul class="pi-list">${golfLines}</ul>`
    });
  }

  // (식사 카드 제거 - 일정표 일차별 식사 바에 이미 표시됨)

  // 5) 특이사항 / 유의사항 (notices 첫 2-3개 미리보기)
  if (p.notices && p.notices.length) {
    const previewItems = p.notices.slice(0, 3).map(n => `<li>${esc(n)}</li>`).join('');
    const moreText = p.notices.length > 3 ? `<div class="pi-more">+ ${p.notices.length - 3}건 더 (아래 상세)</div>` : '';
    items.push({
      icon: '📌',
      label: '특이사항',
      sub: `${p.notices.length}건`,
      body: `<ul class="pi-list">${previewItems}</ul>${moreText}`
    });
  }

  if (items.length === 0) {
    return '<div class="pi-empty" style="padding:30px;text-align:center">상품 정보 준비 중입니다.</div>';
  }

  return `<div class="pi-grid">${items.map(it => `
    <div class="pi-card">
      <div class="pi-card-head">
        <span class="pi-card-ico">${it.icon}</span>
        <span class="pi-card-label">${it.label}</span>
        <span class="pi-card-sub">${it.sub}</span>
      </div>
      <div class="pi-card-body">${it.body}</div>
    </div>
  `).join('')}</div>`;
}

function switchMobileTab(tab) {
  // active 표시만 갱신
  document.querySelectorAll('.m-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  // 탭 → 섹션 매핑
  const targetMap = {
    remark:   '.sec-remark',
    schedule: '.sec-itin',
    info:     '.sec-golf',     // 골프장·호텔 탭 → 골프장 섹션으로 (그 아래에 호텔 자동)
    cancel:   '.sec-cancel'
  };
  const sel = targetMap[tab];
  if (!sel) return;
  let target = document.querySelector(sel);
  // 골프장 없으면 호텔로, 호텔도 없으면 sec-info로 fallback
  if (!target && tab === 'info') {
    target = document.querySelector('.sec-hotel') || document.querySelector('.sec-info');
  }
  if (!target) return;
  // sticky 탭 높이 만큼 offset
  const tabsEl = document.querySelector('.mobile-tabs');
  const offset = (tabsEl ? tabsEl.offsetHeight : 0) + 12;
  const top = target.getBoundingClientRect().top + window.scrollY - offset;
  window.scrollTo({ top, behavior: 'smooth' });
}

// 🆕 스크롤 위치에 따라 active 탭 자동 갱신
function updateActiveTabOnScroll() {
  const tabs = ['remark', 'schedule', 'info', 'cancel'];
  const sels = {
    remark:   '.sec-remark',
    schedule: '.sec-itin',
    info:     '.sec-golf',
    cancel:   '.sec-cancel'
  };
  const tabsEl = document.querySelector('.mobile-tabs');
  const threshold = (tabsEl ? tabsEl.offsetHeight : 0) + 60;
  let activeKey = 'remark';
  for (const k of tabs) {
    let el = document.querySelector(sels[k]);
    if (!el && k === 'info') el = document.querySelector('.sec-hotel') || document.querySelector('.sec-info');
    if (!el) continue;
    const top = el.getBoundingClientRect().top;
    if (top <= threshold) activeKey = k;
  }
  document.querySelectorAll('.m-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === activeKey);
  });
}
window.addEventListener('scroll', () => {
  if (window.matchMedia('(max-width: 980px)').matches) {
    requestAnimationFrame(updateActiveTabOnScroll);
  }
}, { passive: true });

function renderItineraryMobile(p) {
  const list = p.itinerary || [];
  if (!list.length) return '<div class="itin-mobile"></div>';

  const hotelList = p.hotels || [];
  const golfList = p.golfCourses || [];

  function findCard(text) {
    if (!text) return null;
    for (const h of hotelList) {
      if (h.name && text.includes(h.name)) return { cat: '숙박', name: h.name, photo: (h.photos||[])[0] || '🏨' };
    }
    for (const g of golfList) {
      if (g.name && text.includes(g.name)) return { cat: '골프장', name: g.name, photo: (g.photos||[])[0] || '⛳' };
    }
    return null;
  }

  function fmtDate(dstr) {
    if (!dstr) return '';
    const d = new Date(dstr);
    if (isNaN(d)) return '';
    const wd = ['일','월','화','수','목','금','토'][d.getDay()];
    const mo = d.getMonth() + 1;
    const da = d.getDate();
    return `${String(mo).padStart(2,'0')}/${String(da).padStart(2,'0')} (${wd})`;
  }

  // 이벤트 아이콘 판정 → 골프 체크된 것만 ⛳
  // (항공편은 그룹 헤더 ✈️로 통합되어 개별 아이콘 생략)
  function getItemIcon(ev) {
    if (ev && ev.is_golf) return '⛳';
    return '';
  }

  // 항공편은 사각 박스로 합치지 않고, 텍스트 2줄 그대로 표시
  // (admin에서 '일정표에 반영' 버튼으로 입력된 출발/도착 이벤트가 각 줄로 보임)
  function consolidateFlights(events) {
    return events.map(ev => ({ type: 'event', ev }));
  }

  function cleanCityName(s) {
    if (!s) return '';
    // "인천 국제공항 출발" → "인천", "호치민 국제공항 도착" → "호치민"
    return s.replace(/국제공항|공항|출발|도착|에서|행|방면/g, '').trim();
  }

  // 🆕 블록의 장소(도시) 추출 - 그룹핑용
  function blockLocation(b) {
    if (b.type === 'flight') {
      // 항공편은 출발지를 장소로 간주 (롯데 스타일: "인천" 아래에 항공편이 들어감)
      return cleanCityName(b.dep.place || b.dep.text) || '';
    }
    return (b.ev.place || '').trim();
  }

  // 🆕 blocks를 연속된 동일 location으로 그룹화
  function groupByLocation(blocks) {
    const groups = [];
    let cur = null;
    blocks.forEach(b => {
      const loc = blockLocation(b);
      if (!cur || cur.location !== loc) {
        cur = { location: loc, blocks: [] };
        groups.push(cur);
      }
      cur.blocks.push(b);
    });
    return groups;
  }

  // 🆕 단일 블록(항공편/이벤트) HTML 생성 (그룹 location 전달받아 title 중복 생략)
  function renderBlock(block, groupLocation) {
    if (block.type === 'flight') {
      const depCity = cleanCityName(block.dep.place || block.dep.text);
      const arrCity = cleanCityName(block.arr.place || block.arr.text);
      const depTime = block.dep.time || '';
      const arrTime = block.arr.time || '';
      const code = block.flightCode || '';
      const airline = block.airline || '';
      return `<div class="tl-flight-box">
        <span class="tl-flight-ico">✈️</span>
        ${code || airline ? `<span class="tl-flight-code">${esc(code)}${airline ? `<span class="airline">${esc(airline)}</span>` : ''}</span>` : ''}
        <span class="tl-flight-route">
          <span class="leg">
            ${depTime ? `<span class="time">${esc(depTime)}</span>` : ''}
            <span class="city">${esc(depCity)}</span>
          </span>
          <span class="arrow">→</span>
          <span class="leg">
            ${arrTime ? `<span class="time">${esc(arrTime)}</span>` : ''}
            <span class="city">${esc(arrCity)}</span>
          </span>
        </span>
      </div>`;
    }
    // event 블록
    const ev = block.ev;
    const icon = getItemIcon(ev);
    // 🆕 place가 그룹 장소와 같으면 title 생략 (중복 방지)
    const title = (ev.place && ev.place.trim() !== (groupLocation || '').trim()) ? ev.place : '';
    // 🆕 desc는 HTML 허용 (색상 span) - 안전한 태그만 통과
    const descHtml = ev.text ? sanitizeEventText(ev.text) : '';
    // 🆕 자동 생성 항공편의 '도착' 줄은 편명 배지 숨김 (출발 줄에만 표시하여 중복 방지)
    const isAutoArrival = ev._auto_flight && /도착/.test(String(ev.text || ''));
    const transport = (ev.transport && !isAutoArrival) ? `<span class="transport">${esc(ev.transport)}</span>` : '';
    const time = ev.time || '';
    const golfClass = ev.is_golf ? ' is-golf' : '';
    const noTimeClass = !time ? ' no-time-item' : '';
    // 🆕 부가 안내문구: _auto_sub (자동 생성 항공편) 또는 sub_text (수동 입력)
    const subRaw = ev._auto_sub || ev.sub_text || '';
    const subText = subRaw ? `<div class="tl-item-sub">${esc(subRaw)}</div>` : '';

    // 호텔/골프장 카드 (item-body 내부에 배치 → 자동 정렬)
    let cardHtml = '';
    const searchText = ev.text ? String(ev.text).replace(/<[^>]*>/g, '') : '';
    const card = findCard(searchText) || findCard(ev.place);
    if (card) {
      const photoHtml = (typeof card.photo === 'string' && card.photo.startsWith('http'))
        ? `<div class="tl-ref-thumb" style="background-image:url('${esc(card.photo)}')"></div>`
        : `<div class="tl-ref-thumb">${card.photo}</div>`;
      cardHtml = `<div class="tl-ref-card">${photoHtml}
        <div class="tl-ref-info">
          <div class="tl-ref-cat">${esc(card.cat)}</div>
          <div class="tl-ref-name">${esc(card.name)}</div>
        </div>
      </div>`;
    }

    return `<div class="tl-item${golfClass}${noTimeClass}">
      ${time ? `<div class="tl-item-time">${esc(time)}</div>` : '<div class="tl-item-time"></div>'}
      <div class="tl-item-ico">${icon}</div>
      <div class="tl-item-body">
        ${title ? `<div class="tl-item-title">${esc(title)}</div>` : ''}
        ${descHtml ? `<div class="tl-item-desc">${descHtml}${transport}</div>` : (transport ? `<div class="tl-item-desc">${transport}</div>` : '')}
        ${subText}
        ${cardHtml}
      </div>
    </div>`;
  }

  function mealInfo(day) {
    const mls = { 조식: null, 중식: null, 석식: null };
    if (day.meals && typeof day.meals === 'object') {
      ['조식','중식','석식'].forEach(k => {
        const t = (day.meals[k] || '').trim();
        if (t) mls[k] = t;
      });
    }
    (day.events || []).forEach(e => {
      if (e.meal && mls.hasOwnProperty(e.meal) && !mls[e.meal]) {
        const t = (e.text || '').trim();
        if (t) mls[e.meal] = t;
      }
    });
    const parts = [];
    ['조식','중식','석식'].forEach(k => {
      if (mls[k]) {
        const isNo = /불포함|없음|X|x|\-/.test(mls[k]);
        parts.push(`<span class="meal-item ${isNo?'meal-no':''}"><strong>${k}</strong> ${esc(mls[k])}</span>`);
      }
    });
    if (!parts.length) return '';
    return `<div class="tl-day-meals">
      <span class="tl-day-meals-label">🍽 식사</span>
      <span class="tl-day-meals-list">${parts.join('<span class="meal-sep">·</span>')}</span>
    </div>`;
  }

  let html = '<div class="itin-mobile">';
  list.forEach(day => {
    const events = (day.events || []).filter(e => !e.meal || e.time || e.place || e.transport);
    const blocks = consolidateFlights(events);
    const groups = groupByLocation(blocks);

    html += `<div class="tl-day">
      <div class="tl-day-head">
        <span class="day-badge">${day.day}일차</span>
        <span class="day-date">${fmtDate(day.date)}${day.title ? ' · ' + esc(day.title) : ''}</span>
      </div>
      <div class="tl-day-body">`;

    if (!blocks.length) {
      html += `<div style="padding:8px 0;color:var(--gray-500);font-size:12px;text-align:center;font-style:italic">일정 미확정</div>`;
    }

    // 🆕 그룹 단위로 렌더링 (location 헤더 + 아이템)
    groups.forEach(g => {
      const hasLoc = !!g.location;
      // 이 그룹에 항공편 이벤트가 있는지 확인
      const hasFlight = g.blocks.some(b => b.ev && b.ev._auto_flight);
      const extraClass = hasFlight ? ' has-flight' : '';
      const pinIcon = hasFlight ? '✈️' : '📍';
      if (hasLoc) {
        html += `<div class="tl-location${extraClass}">
          <span class="loc-pin">${pinIcon}</span>
          <span class="loc-name">${esc(g.location)}</span>
          <span class="loc-deco"></span>
        </div>`;
        html += `<div class="tl-location-items${extraClass}">`;
      } else {
        html += `<div class="tl-no-location${extraClass}">`;
      }

      g.blocks.forEach(block => {
        html += renderBlock(block, g.location);
      });

      html += `</div>`;
    });

    html += `</div>`;

    // 일차 하단 숙박 정보
    const hotelName = (day.hotel_name || '').trim();
    if (hotelName) {
      const isNone = /미숙박|없음|없슴|출국|귀국/.test(hotelName);
      html += `<div class="tl-day-stay">
        <span class="tl-day-stay-label">🏨 숙박</span>
        <span class="${isNone ? 'tl-day-stay-none' : 'tl-day-stay-name'}">${esc(hotelName)}</span>
      </div>`;
    }

    // 식사 정보 (호텔 숙박 아래)
    html += mealInfo(day);

    html += `</div>`;
  });
  html += '</div>';
  return html;
}

// WMO weather code → 아이콘 + 한글 설명
function weatherCodeToInfo(code) {
  const map = {
    0: ['☀️', '맑음'],     1: ['🌤️', '대체로 맑음'],
    2: ['⛅', '부분 흐림'], 3: ['☁️', '흐림'],
    45: ['🌫️', '안개'],    48: ['🌫️', '서리 안개'],
    51: ['🌦️', '약한 이슬비'], 53: ['🌦️', '보통 이슬비'], 55: ['🌦️', '강한 이슬비'],
    61: ['🌧️', '약한 비'],     63: ['🌧️', '비'],           65: ['🌧️', '강한 비'],
    71: ['🌨️', '약한 눈'],     73: ['🌨️', '눈'],           75: ['❄️', '강한 눈'],
    77: ['🌨️', '눈발'],
    80: ['🌦️', '소나기'],      81: ['🌧️', '강한 소나기'],   82: ['⛈️', '매우 강한 소나기'],
    95: ['⛈️', '뇌우'],        96: ['⛈️', '뇌우+우박'],     99: ['⛈️', '강한 뇌우+우박'],
  };
  return map[code] || ['🌡️', ''];
}

// 골프 적합도 자동 판정
function golfVerdict(temp, wind, rainProb, code) {
  if (rainProb >= 70) return { emoji: '🌧️', text: '비 소식이 있어요. 출발 전 골프장 상황 확인을 권해드려요' };
  if (code >= 71 && code <= 77) return { emoji: '❄️', text: '눈 소식이 있어 골프장 운영 상황을 살펴보시면 좋아요' };
  if (wind >= 10) return { emoji: '💨', text: '바람이 다소 있어 샷 감각에 변화가 있을 수 있어요' };
  if (temp < 5)  return { emoji: '🧣', text: '쌀쌀한 날씨예요. 따뜻한 옷차림이 좋겠어요' };
  if (temp < 12) return { emoji: '🧥', text: '선선한 날씨예요. 가벼운 겉옷 챙기시면 좋아요' };
  if (temp >= 32) return { emoji: '☀️', text: '햇살이 따뜻해요. 수분 보충하며 라운딩 즐기세요' };
  if (temp >= 18 && temp <= 26 && wind < 5 && rainProb < 20)
    return { emoji: '⛳', text: '라운딩하기 참 좋은 날이에요' };
  return { emoji: '🏌️', text: '골프 치기 좋은 날씨예요' };
}

// 좌표 결정: region → country 순으로 fallback
function resolveWeatherCoords(product) {
  if (product.region && WEATHER_REGION_COORDS[product.region]) {
    return WEATHER_REGION_COORDS[product.region];
  }
  if (product.country && WEATHER_COUNTRY_COORDS[product.country]) {
    return WEATHER_COUNTRY_COORDS[product.country];
  }
  return null;
}

// 메인 함수: 날씨 로드 + 렌더
async function loadWeather(product) {
  const section = document.getElementById('secWeather');
  const widget = document.getElementById('weatherWidget');
  if (!section || !widget) return;

  const coords = resolveWeatherCoords(product);
  if (!coords) return; // 좌표 정보 없으면 섹션 자체 안 보임

  // 섹션 표시
  section.style.display = '';

  const regionName = (product.regionName || product.countryName || coords.name);

  try {
    const url = `https://api.open-meteo.com/v1/forecast?` +
      `latitude=${coords.lat}&longitude=${coords.lng}` +
      `&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,apparent_temperature` +
      `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max` +
      `&timezone=${coords.timezone}&forecast_days=6`;
    
    const res = await fetch(url);
    if (!res.ok) throw new Error('API 호출 실패');
    const data = await res.json();

    const c = data.current;
    const d = data.daily;
    const [icon, desc] = weatherCodeToInfo(c.weather_code);
    const rainProb = d.precipitation_probability_max?.[0] ?? 0;
    const verdict = golfVerdict(c.temperature_2m, c.wind_speed_10m, rainProb, c.weather_code);

    // 6일 예보 렌더 (3×2 그리드)
    const DAY_NAMES = ['일', '월', '화', '수', '목', '금', '토'];
    const forecastHtml = d.time.slice(0, 6).map((dateStr, i) => {
      const [fIcon] = weatherCodeToInfo(d.weather_code[i]);
      const hi = Math.round(d.temperature_2m_max[i]);
      const lo = Math.round(d.temperature_2m_min[i]);
      const rain = d.precipitation_probability_max?.[i] ?? 0;
      const dt = new Date(dateStr);
      const mmdd = `${dt.getMonth() + 1}/${dt.getDate()}`;
      // 오늘/내일/모레는 고정, 나머지는 요일명
      const dayLabel = i === 0 ? '오늘' : (i === 1 ? '내일' : (i === 2 ? '모레' : DAY_NAMES[dt.getDay()]));
      return `<div class="forecast-day${i === 0 ? ' today' : ''}">
        <div class="f-day">${dayLabel}</div>
        <div class="f-date">${mmdd}</div>
        <div class="f-icon">${fIcon}</div>
        <div class="f-temp"><span class="f-hi">${hi}°</span> / <span class="f-lo">${lo}°</span></div>
        <div class="f-rain">💧 ${rain}%</div>
      </div>`;
    }).join('');

    widget.className = 'weather-widget';
    widget.innerHTML = `
      <div class="weather-head">
        <div class="title">⛳ ${regionName} 현지 날씨</div>
        <div class="live-badge">LIVE</div>
      </div>
      <div class="weather-now">
        <div class="big-icon">${icon}</div>
        <div class="now-info">
          <div class="now-label">현지 시간 기준 · 실시간 업데이트</div>
          <div class="now-temp">${Math.round(c.temperature_2m)}°</div>
          <div class="now-desc">${desc} · 체감 ${Math.round(c.apparent_temperature)}°</div>
        </div>
      </div>
      <div class="weather-stats">
        <div class="weather-stat">
          <div class="stat-label">바람</div>
          <div class="stat-value">${c.wind_speed_10m.toFixed(1)}<span class="stat-unit">m/s</span></div>
        </div>
        <div class="weather-stat">
          <div class="stat-label">강수확률</div>
          <div class="stat-value">${rainProb}<span class="stat-unit">%</span></div>
        </div>
        <div class="weather-stat">
          <div class="stat-label">습도</div>
          <div class="stat-value">${c.relative_humidity_2m}<span class="stat-unit">%</span></div>
        </div>
      </div>
      <div class="weather-forecast">
        <div class="weather-forecast-title">📅 6일 예보</div>
        <div class="weather-forecast-grid">${forecastHtml}</div>
      </div>
      <div class="weather-verdict">
        <div class="v-emoji">${verdict.emoji}</div>
        <div class="v-text">${verdict.text}</div>
      </div>
      <div class="weather-footer">Powered by Open-Meteo</div>
    `;
  } catch (err) {
    console.error('[weather] 날씨 로드 실패:', err);
    widget.className = '';
    widget.innerHTML = `<div class="weather-error">⚠️ 현지 날씨 정보를 불러오지 못했습니다.</div>`;
  }
}

// 항공사 한글명 추출 (편명 코드를 제거하고 남은 텍스트)
const AIRLINE_CODE_NAMES = {
  'KE':'대한항공', 'OZ':'아시아나항공', 'LJ':'진에어', '7C':'제주항공',
  'TW':'티웨이항공', 'BX':'에어부산', 'RS':'에어서울', 'ZE':'이스타항공',
  'YP':'에어프레미아', 'RF':'에어로케이', 'JL':'일본항공', 'NH':'전일본공수',
  'VN':'베트남항공', 'VJ':'비엣젯항공', 'TG':'타이항공', 'PR':'필리핀항공',
  'CX':'캐세이퍼시픽', 'SQ':'싱가포르항공', 'CI':'중화항공', 'BR':'에바항공'
};
function extractAirlineName(flights) {
  if (!flights || !flights.length) return '-';
  const airline = (flights[0].airline || '').trim();
  if (!airline) return '-';
  // 편명 패턴(KE 463, OZ123 등) 잡아두기
  const codeMatch = airline.match(/([A-Z]{2,3})\s*\d{1,4}/);
  // 편명 제거한 나머지 텍스트 (주로 한글 항공사명)
  const cleaned = airline.replace(/[A-Z]{2,3}\s*\d{1,4}/g, '').replace(/\s+/g, ' ').trim();
  if (cleaned) return cleaned;
  // 한글명이 없고 편명만 있으면 코드로 한글명 추정
  if (codeMatch && AIRLINE_CODE_NAMES[codeMatch[1]]) return AIRLINE_CODE_NAMES[codeMatch[1]];
  return airline;
}

// 사진 갤러리: 스크롤 위치에 따라 도트 업데이트 + 도트 클릭 시 이동
function initGalleryDots() {
  document.querySelectorAll('.info-gallery').forEach(gallery => {
    const photos = gallery.querySelector('.info-photos');
    const dots = gallery.querySelectorAll('.info-dot');
    if (!photos || !dots.length) return;

    photos.addEventListener('scroll', () => {
      const idx = Math.round(photos.scrollLeft / photos.clientWidth);
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    }, { passive: true });

    dots.forEach((dot, i) => {
      dot.addEventListener('click', () => {
        photos.scrollTo({ left: i * photos.clientWidth, behavior: 'smooth' });
      });
    });
  });
}

function renderCalendar() {
  const p = product;
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  
  const startDate = new Date(p.period.start);
  const endDate = new Date(p.period.end);
  
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startWeekday = firstDay.getDay();
  const daysInMonth = lastDay.getDate();
  
  const prevM = new Date(year, month - 1, 1);
  const nextM = new Date(year, month + 1, 1);
  const prevDisabled = prevM < new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  const nextDisabled = nextM > new Date(endDate.getFullYear(), endDate.getMonth(), 1);
  
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  
  let html = `
    <div class="calendar-wrap">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)" ${prevDisabled ? 'disabled' : ''}>‹</button>
        <div class="cal-month">${year}년 ${monthNames[month]}</div>
        <button class="cal-nav" onclick="changeMonth(1)" ${nextDisabled ? 'disabled' : ''}>›</button>
      </div>
      <div class="cal-weekdays">
        <div class="cal-weekday sun">일</div>
        <div class="cal-weekday">월</div>
        <div class="cal-weekday">화</div>
        <div class="cal-weekday">수</div>
        <div class="cal-weekday">목</div>
        <div class="cal-weekday">금</div>
        <div class="cal-weekday sat">토</div>
      </div>
      <div class="cal-days">
  `;
  
  for (let i = 0; i < startWeekday; i++) html += '<div class="cal-day empty"></div>';
  
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    const weekday = date.getDay();
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const inRange = date >= startDate && date <= endDate;
    const weekdayOk = p.weekdays.includes(weekday);
    const notExcluded = !p.excludeDates.includes(dateStr);
    // 🆕 출발 막힘(blocked) 체크
    const notBlocked = !p.pricing.blocked.includes(dateStr);
    const available = inRange && weekdayOk && notExcluded && notBlocked;
    const isSelected = selectedDate === dateStr;
    // 🆕 일별 정확 요금이 있으면 시각적 표시
    const hasExactPrice = p.pricing.exact && p.pricing.exact[dateStr] != null;
    
    let cls = 'cal-day';
    cls += available ? ' available' : ' disabled';
    if (weekday === 0) cls += ' sun';
    if (weekday === 6) cls += ' sat';
    if (isSelected) cls += ' selected';
    if (hasExactPrice && available) cls += ' has-exact-price';
    
    const onclick = available ? `onclick="selectDate('${dateStr}')"` : '';
    html += `<button class="${cls}" ${onclick} ${!available ? 'disabled' : ''}>${d}</button>`;
  }
  
  html += `
      </div>
      <div class="cal-legend">
        <div><span class="cal-legend-dot"></span>예약 가능일</div>
        <div><span class="cal-legend-dot" style="background:#10b981"></span>확정 요금</div>
      </div>
    </div>
  `;
  
  document.getElementById('calendarArea').innerHTML = html;
}

function changeMonth(delta) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + delta, 1);
  renderCalendar();
}

// 🆕 일정 옵션 전환 (pill 클릭)
function switchVariation(idx) {
  const p = product;
  if (!p.variations || idx < 0 || idx >= p.variations.length || idx === p.activeVariationIdx) return;
  const v = p.variations[idx];

  // 전역 product 객체의 active 값 교체 → 기존 렌더 함수가 자동으로 새 값 사용
  p.activeVariationIdx = idx;
  p.duration = v.label || p.duration;
  p.itinerary = v.itinerary || [];
  p.pricing = v.pricing;

  // priceFrom(카드용 최저가)도 갱신
  const exactVals = Object.values((v.pricing && v.pricing.exact) || {}).filter(x => x > 0);
  if (exactVals.length > 0) p.priceFrom = Math.min(...exactVals);
  else if (v.pricing && v.pricing.default && v.pricing.default.weekday > 0) p.priceFrom = v.pricing.default.weekday;
  else if (v.pricing && v.pricing.default && v.pricing.default.weekend > 0) p.priceFrom = v.pricing.default.weekend;
  else p.priceFrom = 0;

  // 선택된 날짜 초기화 (박수 바뀌면 기간도 달라지므로)
  selectedDate = null;
  // 출발일정 박스 숨기기
  const sdateSec = document.getElementById('selectedDateSection');
  if (sdateSec) sdateSec.classList.remove('show');

  // 스크롤 위치 유지
  const scrollY = window.scrollY;
  renderPage();
  window.scrollTo(0, scrollY);
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  renderCalendar();

  const p = product;
  const startDate = new Date(dateStr);
  const weekday = startDate.getDay();
  const isWeekend = weekday === 0 || weekday === 5 || weekday === 6;

  // 🆕 가격 우선순위: 일별 정확 요금(exact) > 월별 예외 > 기본
  let price = 0;
  let priceMode = ''; // 'exact' | 'monthly' | 'default' | 'inquiry'
  if (p.pricing.exact && p.pricing.exact[dateStr] != null) {
    price = p.pricing.exact[dateStr];
    priceMode = 'exact';
  } else {
    const monthKey = dateStr.substring(0, 7);
    const priceData = p.pricing[monthKey] || p.pricing.default;
    price = isWeekend ? priceData.weekend : priceData.weekday;
    priceMode = (p.pricing[monthKey]) ? 'monthly' : 'default';
  }
  if (!price || price <= 0) priceMode = 'inquiry';

  // 기간(박 수) 추출 → 종료일 계산
  const durStr = p.duration || '';
  const nightsMatch = durStr.match(/(\d+)박/);
  const daysMatch = durStr.match(/(\d+)일/);
  const nights = nightsMatch ? parseInt(nightsMatch[1]) : 0;
  const days = daysMatch ? parseInt(daysMatch[1]) : (nights ? nights + 1 : 1);
  const endDate = new Date(startDate);
  endDate.setDate(startDate.getDate() + nights);

  const wdNames = ['일','월','화','수','목','금','토'];
  const fmt = d => `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()} (${wdNames[d.getDay()]})`;
  const durLabel = durStr || (nights ? `${nights}박 ${days}일` : '당일');

  // 🆕 priceDisplay 갱신: inquiry 모드면 "문의 시 안내", 아니면 가격 + 모드 뱃지
  const priceEl = document.getElementById('priceDisplay');
  if (priceMode === 'inquiry') {
    priceEl.innerHTML = `<span style="font-size:22px;color:#555;font-family:'Pretendard Variable',Pretendard,sans-serif">💬 문의 시 안내</span>`;
  } else {
    const badge = priceMode === 'exact'
      ? `<span style="display:block;font-size:10px;font-weight:700;color:#10b981;letter-spacing:1px;margin-top:4px">✓ 확정 요금</span>`
      : '';
    priceEl.innerHTML = `${price.toLocaleString()}<span class="won">원</span>${badge}`;
  }
  document.getElementById('selectedDateText').innerHTML = `
    <div class="sel-range">${fmt(startDate)} ~ ${fmt(endDate)}</div>
    <div class="sel-duration">${durLabel}</div>
  `;
  document.getElementById('selectedBox').classList.add('show');

  // 출발일정 박스 (main-content 상단) 업데이트 + 표시
  const sdateSec = document.getElementById('selectedDateSection');
  const sdateDateEl = document.getElementById('sdateDateValue');
  const sdateDurEl = document.getElementById('sdateDurationValue');
  if (sdateSec && sdateDateEl && sdateDurEl) {
    sdateDateEl.innerHTML = `${fmt(startDate)}<span class="sdate-end">~ ${fmt(endDate)}</span>`;
    sdateDurEl.textContent = durLabel;
    sdateSec.classList.add('show');
  }
}
