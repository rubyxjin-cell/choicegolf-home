let heroCarTimer = null;
function startHeroCarousel() {
  if (heroCarTimer) clearInterval(heroCarTimer);
  const car = document.getElementById('heroCar');
  const track = document.getElementById('heroCarTrack');
  if (!car || !track || car.classList.contains('single')) return;
  let n = track.children.length;
  if (n < 2) return;
  const total = n;   // 🆕 원본 슬라이드 장수 (카운터 표시용, 복제 전 기준)
  let idx = 0;       // 🆕 현재 슬라이드 번호 (0-base)
  if (n < 4) {  // 매끄러운 무한 루프를 위해 슬라이드 복제
    [...track.children].forEach(c => track.appendChild(c.cloneNode(true)));
    n = track.children.length;
  }
  // 마지막 장을 맨 앞으로 → 메인사진이 가운데(children[1])에서 시작
  track.insertBefore(track.lastElementChild, track.firstElementChild);
  const GAP = 8;  /* 슬라이드 간격 (CSS gap과 동일) */
  const base = () => {
    const sw = track.children[0].getBoundingClientRect().width;
    return { sw, tx: -(sw + GAP) + (car.clientWidth - sw) / 2 };  /* 🆕 현재 슬라이드(children[1])를 화면 가운데로 — 양옆 사진이 살짝 보임 */
  };
  const cntEl = document.getElementById('heroCounterCur');
  const snap = () => {
    track.style.transition = 'none';
    track.style.transform = `translateX(${base().tx}px)`;
    [...track.children].forEach((el, i) => el.classList.toggle('active', i === 1));
    if (cntEl) cntEl.textContent = (idx % total) + 1;
  };
  snap();
  let busy = false;
  const advance = () => {
    if (busy) return;
    busy = true;
    const b = base();
    track.style.transition = 'transform 0.65s ease';
    track.style.transform = `translateX(${b.tx - b.sw - GAP}px)`;
    idx = (idx + 1) % total;
    setTimeout(() => {
      try { track.appendChild(track.firstElementChild); snap(); } catch (e) {}
      busy = false;
    }, 700);
  };
  const back = () => {
    if (busy) return;
    idx = (idx - 1 + total) % total;
    track.insertBefore(track.lastElementChild, track.firstElementChild);
    snap();
  };
  // 🆕 블러 패널의 ‹ › 버튼용 수동 넘김
  window.heroStep = d => { if (d > 0) advance(); else back(); };
  heroCarTimer = setInterval(() => {
    try {
      advance();   /* 마우스 올려도 계속 자동 슬라이드 */
    } catch (e) { busy = false; }
  }, 2800);
  window.addEventListener('resize', snap);
}

// library(호텔/골프장) → product.html 구조로 매핑
function mapLibraryItem(r, category) {
  const photos = (r.photos && r.photos.length) ? r.photos : ['🏨'];
  const tags = r.tags || [];
  // 🆕 신규 컬럼 우선 사용, 없으면 tags에서 fallback 추출 (하위호환)
  let stars = r.stars || null;
  let holes = r.holes || null;
  if (!stars || !holes) {
    tags.forEach(t => {
      if (!stars) {
        const sm = t.match(/(\d)\s*성급?/);
        if (sm) stars = parseInt(sm[1]);
      }
      if (!holes) {
        const hm = t.match(/(\d+)\s*홀/);
        if (hm) holes = parseInt(hm[1]);
      }
    });
  }
  return {
    name: r.name_kr || r.name,
    nameEn: r.name_kr ? r.name : '',
    stars: category === 'hotel' ? stars : null,
    tagline: category === 'hotel' ? (r.tagline || '') : '',
    holes: category === 'golf' ? holes : null,
    par: category === 'golf' ? (r.par || null) : null,
    yard: category === 'golf' ? (r.yards || null) : null,
    desc: r.description || '',
    rooms: category === 'hotel' && Array.isArray(r.rooms) ? r.rooms.filter(x => x && (x.name || x.img || (Array.isArray(x.imgs) && x.imgs.length))) : [],   // 🆕 객실 타입
    photos
  };
}

// DB home_products 레코드 → product.html이 쓰는 구조로 매핑
function mapProductRow(r, libraryItems) {
  // 연결된 호텔/골프장 가져오기
  const hotelIds = r.hotel_ids || [];
  const golfIds = r.golf_ids || [];
  const hotels = hotelIds.map(id => {
    const it = libraryItems.find(x => x.id === id);
    return it ? mapLibraryItem(it, 'hotel') : null;
  }).filter(Boolean);
  const golfCourses = golfIds.map(id => {
    const it = libraryItems.find(x => x.id === id);
    return it ? mapLibraryItem(it, 'golf') : null;
  }).filter(Boolean);

  // pricing 기본값 처리 + 🆕 exact(일별 정확 요금) / blocked(출발 막힘) 정규화
  let pricing = r.pricing || {};
  if (!pricing.default) {
    pricing.default = { weekday: r.price_from || 0, weekend: r.price_from || 0 };
  }
  if (!pricing.exact) pricing.exact = {};
  if (!Array.isArray(pricing.blocked)) pricing.blocked = [];

  // 🆕 variations 정규화 (하위호환 포함)
  // pricing 정규화 헬퍼
  const normalizePricing = (vp, fallbackPriceFrom) => {
    vp = vp || {};
    if (!vp.default) vp.default = { weekday: fallbackPriceFrom || 0, weekend: fallbackPriceFrom || 0 };
    if (!vp.exact) vp.exact = {};
    if (!Array.isArray(vp.blocked)) vp.blocked = [];
    return vp;
  };

  // 🆕 Supabase JSONB가 문자열로 올 수도 있음 → 방어 파싱
  let rawVariations = r.variations;
  if (typeof rawVariations === 'string') {
    try { rawVariations = JSON.parse(rawVariations); }
    catch (e) { rawVariations = null; }
  }
  const hasRealVariations = Array.isArray(rawVariations) && rawVariations.length > 0;

  let variations = hasRealVariations ? rawVariations : [];
  if (variations.length === 0) {
    // 하위호환: 단일 일정 상품 → 1개짜리 variation으로
    variations = [{
      id: 'v_default',
      label: r.duration || '',
      nights: null,
      days: null,
      itinerary: r.itinerary || [],
      pricing: pricing
    }];
  } else {
    variations = variations.map(v => ({
      id: v.id || ('v_' + Math.random().toString(36).slice(2,8)),
      label: v.label || '',
      nights: v.nights ?? null,
      days: v.days ?? null,
      itinerary: v.itinerary || [],
      pricing: normalizePricing(v.pricing, r.price_from)
    }));
  }
  // 대표 옵션(저장된 기간 duration과 label이 일치)을 기본 활성값으로, 없으면 첫 번째
  let activeIdx = variations.findIndex(v => v.label && v.label === r.duration);
  if (activeIdx < 0) activeIdx = 0;
  const active = variations[activeIdx];

  return {
    id: r.id,
    isQuote: !!r.is_customer_quote,            // 🆕 견적서 여부 (금액 표시 분기용)
    infoRows: Array.isArray(r.info_rows) ? r.info_rows : [],  // 🆕 기본정보 직접 입력 (라벨|값)
    country: r.country,
    countryName: COUNTRY_NAMES[r.country] || r.country,
    countryFlag: COUNTRY_FLAGS[r.country] || '',
    region: r.region,
    regionName: r.region_name,
    tag: r.tag || '',
    duration: active.label || r.duration || '',
    title: r.title || '',
    summary: r.summary || '',
    subtitle: r.subtitle || '',                // 🆕 제목 밑 한 줄 부제목
    checkpoints: r.checkpoints || '',          // 🆕 체크포인트 (한 줄에 하나씩)
    mainImage: r.main_image || 'https://images.unsplash.com/photo-1535131749006-b7f58c99034b?q=80&w=2400&auto=format&fit=crop',
    heroImages: Array.isArray(r.hero_images) ? r.hero_images.filter(u => typeof u === 'string' && u.startsWith('http')) : [],  // 🆕 상세 대표사진 (히어로 슬라이드 전용)
    period: {
      start: r.period_start || new Date().toISOString().slice(0, 10),
      end: r.period_end || new Date(Date.now() + 180 * 86400000).toISOString().slice(0, 10)
    },
    periodRaw: { start: r.period_start || '', end: r.period_end || '' },   // 📷 사진변환 시트용 (기본값 미주입 원본)
    excludeDates: r.exclude_dates || [],
    weekdays: (r.weekdays && r.weekdays.length) ? r.weekdays : [0,1,2,3,4,5,6],
    priceFrom: r.price_from || 0,
    perNight: (r.pricing && Array.isArray(r.pricing.per_night)) ? r.pricing.per_night : null,  // 🆕 박당(시즌별 1박) 요금표
    priceBreakdown: Array.isArray(r.price_breakdown) ? r.price_breakdown : [],   // 🆕 가격 상세(성인/소인·항공료/지상비)
    quoteDeposit: r.quote_deposit || 0,        // 🆕 견적서 인보이스 예약금
    singleExtra: r.single_room_extra || 0,
    pricing: active.pricing,
    flights: r.flights || [],
    itinerary: active.itinerary || [],
    // 🆕 박수 바리에이션
    variations,
    activeVariationIdx: activeIdx,
    hasRealVariations,  // 🆕 DB 원본에 실제 variations 있었는지
    hotels,
    golfCourses,
    includes: r.includes || [],
    excludes: r.excludes || [],
    notices: r.notices || [],
    cancellationPolicy: r.cancellation_policy || '', // 🆕 상품별 취소·환불 규정 (빈값이면 기본 약관 fallback)
    // 🆕 확정서 카드용 데이터
    customerName: r.customer_name || '',
    domesticPricing: r.domestic_pricing || null,  // 🆕 국내 요금 달력 데이터
    feeDetail: r.fee_detail || '',                // 🆕 상세요금 안내 (팝업)
    customerPax: r.customer_pax || null,
    confirmInfo: r.confirm_info || {},
    linkedInvoiceToken: r.linked_invoice_token || null,
    options: Array.isArray(r.options) ? r.options : []  // 🆕 선택 옵션 카드
  };
}

async function fetchProductFromDB(id) {
  // 👁️ 미리보기 모드: 어드민에서 임시 저장한 입력값(localStorage)으로 렌더 (저장 전 내용 확인용)
  if (new URLSearchParams(location.search).get('preview') === '1') {
    const raw = localStorage.getItem('cg_preview_product');
    if (!raw) return null;
    let row;
    try { row = JSON.parse(raw); } catch (e) { return null; }
    const neededIds = [...(row.hotel_ids || []), ...(row.golf_ids || [])];
    let libraryItems = [];
    if (neededIds.length) {
      const idList = neededIds.map(x => `"${x}"`).join(',');
      const libRes = await fetch(
        `${SUPABASE_URL}/rest/v1/library?id=in.(${idList})&select=*`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
      if (libRes.ok) libraryItems = await libRes.json();
    }
    return mapProductRow(row, libraryItems);
  }

  // 1) 상품 가져오기 (is_published 필터 제거 - 견적서는 비공개여도 링크로 접근 가능)
  const prodRes = await fetch(
    `${SUPABASE_URL}/rest/v1/home_products?id=eq.${encodeURIComponent(id)}&select=*`,
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
  );
  if (!prodRes.ok) throw new Error('상품 로드 실패');
  const rows = await prodRes.json();
  if (!rows.length) return null;
  const row = rows[0];

  // 보안: 견적서가 아닌데 비공개면 노출 차단
  if (!row.is_customer_quote && !row.is_published) return null;

  // 2) 연결된 호텔/골프장(library) 가져오기
  const neededIds = [...(row.hotel_ids || []), ...(row.golf_ids || [])];
  let libraryItems = [];
  if (neededIds.length) {
    const idList = neededIds.map(x => `"${x}"`).join(',');
    const libRes = await fetch(
      `${SUPABASE_URL}/rest/v1/library?id=in.(${idList})&select=*`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (libRes.ok) libraryItems = await libRes.json();
  }

  return mapProductRow(row, libraryItems);
}

async function loadInvoiceSection() {
  // 🆕 인보이스는 확정서 첨부의 "인보이스" 버튼 → invoice.html 새 탭으로 표시.
  //     여기서는 데이터를 미리 받아 저장(prefetch)해 두어, 버튼을 누르면 로딩 없이 바로 뜨게 한다.
  const invToken = params.get('inv') || (product && product.linkedInvoiceToken) || '';
  if (!invToken) return;
  try {
    const apiI = async (path) => {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` } });
      return r.ok ? r.json() : null;
    };
    const bks = await apiI(`bookings?invoice_token=eq.${encodeURIComponent(invToken)}&select=*`);
    if (!bks || !bks.length) return;
    const b = bks[0];
    const [pax, pays, settings] = await Promise.all([
      apiI(`booking_pax?booking_id=eq.${b.id}&order=sort_order.asc`),
      apiI(`booking_pax_payments?booking_id=eq.${b.id}&order=created_at.asc`),
      apiI(`site_settings?key=eq.invoice_account&select=value`)
    ]);
    const cache = { b: b, pax: pax || [], pays: pays || [], account: (settings && settings[0] && settings[0].value) || '', ts: Date.now() };
    window.__invoiceData = cache;
    try { localStorage.setItem('cg_inv_' + invToken, JSON.stringify(cache)); } catch(e) {}
  } catch(e) {}
}

function renderItineraryTable(p) {
  const list = p.itinerary || [];
  if (!list.length) return '<div style="color:var(--gray-500);padding:20px;text-align:center">일정 정보가 아직 없습니다</div>';

  // 호텔 이름 목록 (일정 본문에서 하이라이트용)
  const hotelNames = (p.hotels || []).map(h => h.name).filter(Boolean);
  // 골프장 이름 목록
  const golfNames = (p.golfCourses || []).map(g => g.name).filter(Boolean);

  function highlight(text) {
    let out = text || '';
    // 🆕 색상 태그 파싱 ([초록]...[/초록] 등) - 이미 HTML이 있으면 건너뜀
    if (typeof parseColorTags === 'function' && !out.includes('<span') && !out.includes('<')) {
      out = parseColorTags(out);
    }
    // 🆕 색상 태그로 이미 span이 입혀졌으면 골프장명 덧칠 스킵 (색 중첩·깨짐 방지)
    if (!out.includes('<span')) {
      golfNames.forEach(n => {
        if (n && out.includes(n)) {
          out = out.split(n).join(`<span class="course-hl">${n}</span>`);
        }
      });
    }
    return out;
  }

  function fmtDate(dstr) {
    if (!dstr) return '';
    const d = new Date(dstr);
    if (isNaN(d)) return '';
    const wd = ['일','월','화','수','목','금','토'][d.getDay()];
    return `${d.getMonth()+1}/${d.getDate()} ${wd}`;
  }

  // 일자별 식사 상태 계산 (조/중/석)
  // 우선순위: day.meals(신규) > events[].meal(기존 호환)
  function mealStatus(day) {
    const status = { 조식: null, 중식: null, 석식: null };
    // 1) 신규 포맷: day.meals
    if (day.meals && typeof day.meals === 'object') {
      ['조식','중식','석식'].forEach(k => {
        const t = (day.meals[k] || '').trim();
        if (!t) return;
        if (t.includes('불포함') || t.includes('미제공')) status[k] = { type: 'no', text: t };
        else status[k] = { type: 'ok', text: t };
      });
    }
    // 2) 기존 포맷: events[].meal + events[].text (신규 포맷에 없는 것만 보완)
    (day.events || []).forEach(e => {
      if (e.meal && status.hasOwnProperty(e.meal) && !status[e.meal]) {
        const t = (e.text || '').trim();
        if (!t) { status[e.meal] = { type: 'empty', text: '-' }; return; }
        if (t.includes('불포함')) status[e.meal] = { type: 'no', text: '불포함' };
        else status[e.meal] = { type: 'ok', text: t };
      }
    });
    return status;
  }

  function mealSpan(label, m) {
    if (!m) return '';
    const cls = m.type === 'ok' ? 'm-ok' : (m.type === 'no' ? 'm-no' : '');
    return `<span class="${cls}">${label}: ${m.text}</span>`;
  }

  let rows = '';
  list.forEach((day, dIdx) => {
    // 기존 포맷의 식사 전용 이벤트(ev.meal만 있고 다른 정보 없음)는 일정 표시에서 제외
    const events = (day.events || []).filter(e => !e.meal || e.time || e.place || e.transport);
    const ms = mealStatus(day);
    const mealHtml = `
      ${mealSpan('조', ms.조식)}
      ${mealSpan('중', ms.중식)}
      ${mealSpan('석', ms.석식)}
    `;

    // 이 일자에 호텔 스테이가 있는지(보통 마지막 행에 HOTEL 표시)
    const hotelStay = (day.hotel_name || '').trim();  // 빈칸이면 호텔 행 자체를 표시하지 않음 (자동 채움 제거)
    const hasHotelBar = !!hotelStay && dIdx < list.length - 1;  // 호텔 행 출력 여부

    // 해당 일자에 세부 일정이 없으면 1행, 있으면 events.length 행
    const rowCount = Math.max(events.length, 1);

    if (events.length === 0) {
      rows += `
        <tr class="day-end">
          <td class="col-day">
            ${dayRangeLabel(day) ? `<span class="itin-day-badge custom"><span class="num">${esc(dayRangeLabel(day))}</span></span>` : `<span class="itin-day-badge"><span class="d">DAY</span><span class="num">${String(day.day).padStart(2,'0')}</span></span>`}
            ${day.date ? `<div class="itin-day-date">${fmtDate(day.date)}</div>` : ''}
          </td>
          <td class="col-place"></td>
          <td class="col-trans"></td>
          <td class="col-time"></td>
          <td class="col-event">-</td>
          <td class="col-meal">${mealHtml}</td>
        </tr>`;
      return;
    }

    events.forEach((ev, eIdx) => {
      const isFirstRow = eIdx === 0;
      const isLastRow = eIdx === events.length - 1;
      const trCls = [ev.highlight ? 'hl-row' : '', (isLastRow && !hasHotelBar) ? 'day-end' : ''].filter(Boolean).join(' ');
      const isArr = ev._auto_flight && /도착/.test(ev.text || '');
      const transLogo = isArr ? '' : airlineLogoHtml(ev.transport || '');
      const textLogo = (isArr || transLogo) ? '' : airlineLogoHtml(ev.text || '');
      rows += `
        <tr${trCls ? ` class="${trCls}"` : ''}>
          ${isFirstRow ? `
            <td class="col-day" rowspan="${events.length + (hasHotelBar ? 1 : 0)}">
              ${dayRangeLabel(day) ? `<span class="itin-day-badge custom"><span class="num">${esc(dayRangeLabel(day))}</span></span>` : `<span class="itin-day-badge"><span class="d">DAY</span><span class="num">${String(day.day).padStart(2,'0')}</span></span>`}
              ${day.date ? `<div class="itin-day-date">${fmtDate(day.date)}</div>` : ''}
            </td>` : ''}
          <td class="col-place">${ev.place ? esc(ev.place) : ''}</td>
          <td class="col-trans">${ev.transport ? esc(ev.transport) : ''}</td>
          <td class="col-time">${ev.time ? esc(ev.time) : ''}</td>
          <td class="col-event">${(() => { const g = stripGolfEmoji(ev.text || ''); const isG = ev.is_golf || g.had; const body = isG ? redHoles(highlight(g.text)) : highlight(g.text); return `${isG ? golfIconSvg(16) + ' ' : ''}${body}${transLogo || textLogo}`; })()}</td>
          ${isFirstRow ? `<td class="col-meal" rowspan="${events.length}">${mealHtml}</td>` : ''}
        </tr>`;
    });

    // 호텔 스테이 행 (마지막 일자가 아니면) — 일정~식사 칸까지 배경
    if (hasHotelBar) {
      rows += `
        <tr class="day-end">
          <td class="col-place"></td>
          <td class="col-trans"></td>
          <td class="col-time"></td>
          <td class="col-event" colspan="2" style="background:#FAF6EE;padding:10px 12px">
            <span class="hotel-tag">HOTEL</span><strong>${esc(hotelStay)}</strong>
          </td>
        </tr>`;
    }
  });

  return `
    <table class="itin-table">
      <thead>
        <tr>
          <th>날짜</th>
          <th>장소</th>
          <th>교통</th>
          <th>시간</th>
          <th class="col-event">일정</th>
          <th>식사</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// 🆕 써니투어식 일정표 (일반 상품 PC 전용): 일차별 헤더 바 + 조·중·석 칩 + 표
function renderItinerarySuny(p) {
  const list = p.itinerary || [];
  if (!list.length) return '<div style="color:var(--gray-500);padding:20px;text-align:center">일정 정보가 아직 없습니다</div>';

  const golfNames = (p.golfCourses || []).map(g => g.name).filter(Boolean);

  function highlight(text) {
    let out = text || '';
    if (typeof parseColorTags === 'function' && !out.includes('<span') && !out.includes('<')) {
      out = parseColorTags(out);
    }
    if (!out.includes('<span')) {
      golfNames.forEach(n => {
        if (n && out.includes(n)) {
          out = out.split(n).join(`<span class="course-hl">${n}</span>`);
        }
      });
    }
    return out;
  }

  function fmtDate(dstr) {
    if (!dstr) return '';
    const d = new Date(dstr);
    if (isNaN(d)) return '';
    const wd = ['일','월','화','수','목','금','토'][d.getDay()];
    return `${d.getMonth()+1}/${d.getDate()} (${wd})`;
  }

  function mealStatus(day) {
    const status = { 조식: null, 중식: null, 석식: null };
    if (day.meals && typeof day.meals === 'object') {
      ['조식','중식','석식'].forEach(k => {
        const t = (day.meals[k] || '').trim();
        if (!t) return;
        if (t.includes('불포함') || t.includes('미제공')) status[k] = { type: 'no', text: t };
        else status[k] = { type: 'ok', text: t };
      });
    }
    (day.events || []).forEach(e => {
      if (e.meal && status.hasOwnProperty(e.meal) && !status[e.meal]) {
        const t = (e.text || '').trim();
        if (!t) { status[e.meal] = { type: 'empty', text: '-' }; return; }
        if (t.includes('불포함')) status[e.meal] = { type: 'no', text: '불포함' };
        else status[e.meal] = { type: 'ok', text: t };
      }
    });
    return status;
  }

  // 🆕 일정표 안 호텔 소개 카드: 그 일자 숙박 호텔이 라이브러리(p.hotels)에 있으면 소개+사진 3장 임베드
  //    같은 호텔은 첫 등장 일차에만 표시 (연박 반복 방지)
  const _hNorm = s => String(s || '').toLowerCase().replace(/\(.*?\)/g, '').replace(/\s+/g, '');
  const _shownHotelCards = new Set();
  function findLibHotel(name) {
    const n = _hNorm(name);
    if (!n) return null;
    return (p.hotels || []).find(h => {
      const hn = _hNorm(h.name), he = _hNorm(h.nameEn);
      return (hn && (hn.includes(n) || n.includes(hn))) || (he && (he.includes(n) || n.includes(he)));
    }) || null;
  }
  function hotelCardHtml(hotelStay) {
    const h = findLibHotel(hotelStay);
    const name = (h && h.name) || hotelStay;
    const key = _hNorm(name);
    const photos = h ? (h.photos || []).filter(u => typeof u === 'string' && u.startsWith('http')).slice(0, 3) : [];
    const full = h && !_shownHotelCards.has(key) && (photos.length || h.desc);
    const hotelIco = `<i class="shc-ico"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V5l8-3 8 3v16"/><path d="M2 21h20"/><path d="M9 9h1.5M13.5 9H15M9 13h1.5M13.5 13H15M10.5 21v-4h3v4"/></svg></i>`;
    const head = `
        <div class="shc-head">
          <span class="shc-title">${hotelIco}${esc(name)}${(h && h.nameEn) ? `<em>${esc(h.nameEn)}</em>` : ''}</span>
          ${h ? `<button type="button" class="shc-more" onclick="scrollToTab('hotel', event)">자세히 보기 +</button>` : ''}
        </div>`;
    if (!full) {
      // 연박 2일차 이후·라이브러리 미연결 호텔: 제목만 있는 칸
      return `<div class="sitin-hcard title-only">${head}</div>`;
    }
    _shownHotelCards.add(key);
    return `
      <div class="sitin-hcard">
        ${head}
        ${h.desc ? `<p class="shc-desc">${esc(h.desc)}</p>` : ''}
        ${photos.length ? `<div class="shc-photos">${photos.map(u => `<img src="${cdnImg(u, 480)}" alt="${esc(name)}" loading="lazy">`).join('')}</div>` : ''}
      </div>`;
  }

  let html = '<div class="sitin-wrap">';
  list.forEach((day, dIdx) => {
    const events = (day.events || []).filter(e => !e.meal || e.time || e.place || e.transport);
    const ms = mealStatus(day);
    const chips = ['조식','중식','석식'].map(k => {
      const m = ms[k];
      if (!m) return '';
      const cls = m.type === 'ok' ? 'ok' : (m.type === 'no' ? 'no' : '');
      return `<span class="sitin-meal ${cls}"><b>${k}</b>${esc(m.text)}</span>`;
    }).join('');

    const label = dayRangeLabel(day) ? esc(dayRangeLabel(day)) : `${day.day}일차`;
    const hotelStay = (day.hotel_name || '').trim();
    const showHotel = !!hotelStay && dIdx < list.length - 1;

    let rowsHtml = '';
    if (!events.length) {
      rowsHtml = `<tr><td class="tl-place"></td><td class="tl-time"></td><td class="tl-text">-</td></tr>`;
    } else {
      events.forEach(ev => {
        const isArr = ev._auto_flight && /도착/.test(ev.text || '');
        const transLogo = isArr ? '' : airlineLogoHtml(ev.transport || '');
        const textLogo = (isArr || transLogo) ? '' : airlineLogoHtml(ev.text || '');
        const trans = ev.transport ? `<span class="tl-trans">${esc(ev.transport)}${transLogo}</span>` : '';
        const gEv = stripGolfEmoji(ev.text || '');
        const isGolfEv = ev.is_golf || gEv.had;
        const trCls = [ev.highlight ? 'hl' : '', ev.place ? 'hp' : '', isGolfEv ? 'golf' : ''].filter(Boolean).join(' ');
        const inner = `${isGolfEv ? redHoles(highlight(gEv.text)) : highlight(gEv.text)}${trans}${textLogo}`;
        rowsHtml += `
          <tr${trCls ? ` class="${trCls}"` : ''}>
            <td class="tl-place">${ev.place ? `<span class="tl-pin"></span><span class="tl-place-name">${esc(ev.place)}</span>` : ''}</td>
            <td class="tl-time">${ev.time ? esc(ev.time) : ''}</td>
            <td class="tl-text">${isGolfEv ? `<span class="tl-golf-box"><span class="tg-ico">${golfIconSvg(17)}</span><span class="tg-txt">${inner}</span></span>` : inner}</td>
          </tr>`;
      });
    }

    html += `
      <div class="sitin-day">
        <div class="sitin-head">
          <span class="sitin-dayno">${label}</span>
          ${day.date ? `<span class="sitin-date">${fmtDate(day.date)}</span>` : ''}
        </div>
        <table class="sitin-tl">
          <colgroup><col style="width:122px"><col style="width:70px"><col></colgroup>
          <tbody>${rowsHtml}</tbody>
        </table>
        ${showHotel ? hotelCardHtml(hotelStay) : ''}
        ${chips ? `<div class="sitin-hotel"><span class="sitin-foot-meals">${chips}</span></div>` : ''}
      </div>`;
  });
  html += '</div>';
  return html;
}

// 🆕 Supabase 이미지 CDN 축소본 URL (원본 보존 · 화질 85 · 화면 대비 넉넉한 폭)
function cdnImg(url, width) {
  try {
    if (!url || typeof url !== 'string') return url;
    if (!url.includes('/storage/v1/object/public/')) return url;   // 수파베이스 저장 사진만 변환
    const base = url.replace('/storage/v1/object/public/', '/storage/v1/render/image/public/');
    return base + (base.includes('?') ? '&' : '?') + 'width=' + (width || 1600) + '&quality=85';
  } catch (e) { return url; }
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══ 견적서 예약 접수 → 어드민 문의함(inquiries)으로 자동 전달 ═══

async function submitBookingRequest() {

    if (btn) { btn.disabled = false; btn.textContent = '견적 요청 보내기'; }
  }
}

function airlineLogoHtml(text) {
  const m = String(text || '').toUpperCase().match(/(?:^|[^A-Z0-9])([A-Z]{2}|[0-9][A-Z])\s?\d{2,4}(?![0-9])/);
  if (!m) return '';
  const code = m[1];
  if (!AIRLINE_KR[code]) return '';
  const name = AIRLINE_KR[code];
  // avs.io를 1순위로: daisycon은 로고가 없는 항공사(TW·YP·RF·JX 등)에
  // 404 대신 회색 플레이스홀더를 200으로 반환해 onerror 폴백이 안 걸림
  const s1 = `https://pics.avs.io/120/60/${code}.png`;
  const s2 = `https://images.kiwi.com/airlines/64/${code}.png`;
  const s3 = `https://images.daisycon.io/airline/?width=200&height=80&iata=${code}`;
  const onerr = `var s=['${s2}','${s3}'];var i=this.dataset.i?+this.dataset.i:0;if(i<s.length){this.dataset.i=i+1;this.src=s[i];}else{this.style.display='none';}`;
  return `<img class="airline-logo" src="${s1}" alt="" title="${name}" loading="lazy" onerror="${onerr}">`;
}

/* ═══ 🆕 요약 섹션 항공편: 어드민 항공편관리(flights DB) 연동 + 출발/도착 두 줄 표시 ═══ */
let pciFlightGroups = [];   // [{airline, legs:[...]}]
let pciAirline = '';        // 요약 섹션에서 선택한 항공사

// 상품에 저장된 flights({type,route,airline,time}) → 표준 leg
function parseProductFlightLeg(f) {
  const clean = s => String(s || '').replace(/\s*\([^)]*\)\s*/g, ' ').replace(/\s+/g, ' ').trim();
  const rp = String(f.route || '').split(/\s*(?:→|->)\s*/);
  const tp = String(f.time || '').split(/\s*(?:→|->)\s*/);
  const am = String(f.airline || '').match(/([A-Z0-9]{2}\s?\d{2,4})\s*$/i);
  const flightNo = am ? am[1].replace(/\s+/g, '').toUpperCase() : '';
  const airlineName = String(f.airline || '').replace(/([A-Z0-9]{2}\s?\d{2,4})\s*$/i, '').trim() || flightNo || '항공편';
  const isIn = f.type === '귀국';
  return {
    dir: isIn ? 'in' : 'out',
    airlineName, flightNo,
    depCity: clean(rp[0]), arrCity: clean(rp[1] || ''),
    depTime: (tp[0] || '').trim(), arrTime: (tp[1] || '').trim()
  };
}

// flights DB 행 → 표준 leg
function dbFlightLeg(f) {
  return {
    dir: f.direction === 'inbound' ? 'in' : 'out',
    airlineName: f.airline_name || (AIRLINE_KR[f.airline_code] || f.airline_code || '항공편'),
    flightNo: (f.flight_no || '').replace(/\s+/g, '').toUpperCase(),
    depCity: f.dep_airport_name || f.dep_airport || '',
    arrCity: f.arr_airport_name || f.arr_airport || '',
    depTime: f.dep_time || '', arrTime: f.arr_time || ''
  };
}

function groupFlightLegs(legs) {
  const map = {};
  legs.forEach(l => {
    const key = l.airlineName || '기타';
    if (!map[key]) map[key] = { airline: key, legs: [] };
    map[key].legs.push(l);
  });
  return Object.values(map);
}

let pciDbLoaded = false;   // flights DB 조회 완료 여부 (renderPage 재실행 시 재조회·덮어쓰기 방지)

async function initPciFlights(p) {
  if (!document.getElementById('pciFlightBox')) return;
  // 1) 최초에는 상품에 저장된 항공편으로 즉시 표시 (DB 로드 후엔 로드분 유지)
  if (!pciDbLoaded) {
    pciFlightGroups = groupFlightLegs((p.flights || []).filter(f => f.route || f.airline || f.time).map(parseProductFlightLeg));
  }
  renderPciFlights();
  if (pciDbLoaded) return;
  // 2) 항공편관리 DB에서 이 상품의 국가+지역에 등록된 활성 항공편만 로드 → 항공사 선택 가능
  if (!p.country || !p.region || p.country === 'korea' || p.country === 'domestic' || p.isQuote || String(p.id || '').startsWith('confirm-')) return;
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/flights?country=eq.${encodeURIComponent(p.country)}&region_code=eq.${encodeURIComponent(p.region)}&is_active=eq.true&order=sort_order.asc&select=*`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) return;
    const rows = await res.json();
    pciDbLoaded = true;
    const groups = groupFlightLegs(rows.map(dbFlightLeg));
    if (!groups.length) return;   // 해당 지역 등록 항공편 없음 → 상품 저장분 유지
    // 상품에 저장된 항공사를 기본 선택으로
    const prodAirline = pciFlightGroups.length ? pciFlightGroups[0].airline : '';
    pciFlightGroups = groups;
    if (!pciAirline || !groups.some(g => g.airline === pciAirline)) {
      pciAirline = groups.some(g => g.airline === prodAirline) ? prodAirline : groups[0].airline;
    }
    renderPciFlights();
  } catch (e) { /* 실패 시 상품 저장분 표시 유지 */ }
}

function pciSelectAirline(name) {
  pciAirline = name;
  pciApplyAirlineToItinerary();
  // 일정표 항공 행까지 반영되도록 전체 리렌더 (스크롤 위치 유지)
  const scrollY = window.scrollY;
  renderPage();
  window.scrollTo(0, scrollY);
}

/* 선택한 항공사의 항공편을 일정표(_auto_flight 행)에 반영
   — 어드민에서 "항공편 → 일정표 자동 반영"으로 넣은 행만 교체, 수동 입력 행은 건드리지 않음 */
function pciApplyAirlineToItinerary() {
  const p = product;
  const g = pciFlightGroups.find(x => x.airline === pciAirline);
  if (!g || !Array.isArray(p.itinerary) || !p.itinerary.length) return;
  // 기존 자동 항공 행이 있는 상품에만 적용 (없는 상품에 새로 넣으면 수동 행과 중복될 수 있음)
  const hasAuto = p.itinerary.some(day => (day.events || []).some(e => e._auto_flight));
  if (!hasAuto) return;
  const legEvents = l => {
    const airlineFull = [l.airlineName, l.flightNo].filter(Boolean).join(' ');
    return [
      { time: l.depTime, place: l.depCity, transport: airlineFull, text: `${l.depCity} 국제공항 출발`, sub_text: '', is_golf: false, _auto_flight: true },
      { time: l.arrTime, place: l.arrCity, transport: airlineFull, text: `${l.arrCity} 국제공항 도착`, sub_text: '', is_golf: false, _auto_flight: true }
    ];
  };
  p.itinerary.forEach(day => { day.events = (day.events || []).filter(e => !e._auto_flight); });
  const outs = g.legs.filter(l => l.dir === 'out').flatMap(legEvents);
  const ins = g.legs.filter(l => l.dir === 'in').flatMap(legEvents);
  if (outs.length) p.itinerary[0].events = [...outs, ...(p.itinerary[0].events || [])];
  if (ins.length) {
    const last = p.itinerary[p.itinerary.length - 1];
    last.events = [...(last.events || []), ...ins];
  }
}

function fmtPciDate(d) {
  const wd = '일월화수목금토'[d.getDay()];
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} (${wd})`;
}

function renderPciFlights() {
  const box = document.getElementById('pciFlightBox');
  if (!box) return;
  const cell = document.getElementById('pciAirlineCell');
  const groups = pciFlightGroups;
  if (!groups.length) { box.style.display = 'none'; return; }
  if (!pciAirline || !groups.some(g => g.airline === pciAirline)) pciAirline = groups[0].airline;
  const g = groups.find(x => x.airline === pciAirline);

  // 항공 칸: 항공사 2개 이상이면 선택 드롭다운
  if (cell) {
    cell.innerHTML = groups.length >= 2
      ? `<select class="pci-air-select" onchange="pciSelectAirline(this.value)" aria-label="항공사 선택">${groups.map(x => `<option value="${esc(x.airline)}"${x.airline === pciAirline ? ' selected' : ''}>${esc(x.airline)}</option>`).join('')}</select>`
      : `<span class="pci-airline">${esc(g.airline)}</span>`;
  }

  // 달력에서 출발일 선택 시 날짜 병기 (귀국편: 출발일 + 박수, 심야편 익일 도착 보정)
  const nightsM = String(product.duration || '').match(/(\d+)박/);
  const nights = nightsM ? Number(nightsM[1]) : null;
  const toMin = t => { const m = String(t).match(/(\d{1,2}):(\d{2})/); return m ? (+m[1]) * 60 + (+m[2]) : null; };
  const outLeg = g.legs.find(x => x.dir === 'out');
  const outOvernight = outLeg && toMin(outLeg.arrTime) != null && toMin(outLeg.depTime) != null && toMin(outLeg.arrTime) < toMin(outLeg.depTime) ? 1 : 0;

  const legHtml = l => {
    let depDateStr = '', arrDateStr = '';
    if (selectedDate && (l.dir === 'out' || nights != null)) {
      const dep = new Date(selectedDate + 'T00:00:00');
      if (l.dir === 'in') dep.setDate(dep.getDate() + nights + outOvernight);
      const arr = new Date(dep);
      if (toMin(l.arrTime) != null && toMin(l.depTime) != null && toMin(l.arrTime) < toMin(l.depTime)) arr.setDate(arr.getDate() + 1);
      depDateStr = fmtPciDate(dep) + ' ';
      arrDateStr = fmtPciDate(arr) + ' ';
    }
    const logo = airlineLogoHtml(l.flightNo || '');
    return `
      <div class="pcf-leg">
        <span class="pcf-dir">${l.dir === 'in' ? '도착편' : '출발편'}</span>
        <div class="pcf-body">
          <div class="pcf-l1">${logo}<b class="pcf-air">${esc(l.airlineName)}</b>${l.flightNo ? `<span class="pcf-no">${esc(l.flightNo)}</span>` : ''}</div>
          <div class="pcf-route">
            <div class="pcf-pt dep">
              <span class="pcf-city">${esc(l.depCity)}</span>
              <span class="pcf-t">${esc(l.depTime)}</span>
              ${depDateStr ? `<span class="pcf-d">${depDateStr.trim()}</span>` : ''}
            </div>
            <span class="pcf-line"><span class="pcf-track"></span><span class="pcf-plane">▶</span><span class="pcf-track"></span></span>
            <div class="pcf-pt arr">
              <span class="pcf-city">${esc(l.arrCity)}</span>
              <span class="pcf-t">${esc(l.arrTime)}</span>
              ${arrDateStr ? `<span class="pcf-d">${arrDateStr.trim()}</span>` : ''}
            </div>
          </div>
        </div>
      </div>`;
  };
  const outs = g.legs.filter(l => l.dir === 'out');
  const ins = g.legs.filter(l => l.dir === 'in');
  box.innerHTML = [...outs, ...ins].map(legHtml).join('');
  box.style.display = '';
}

/* 🆕 일정 본문 HTML sanitize: <span style="color:..."> 만 허용 (XSS 방어)
   - 기존 plain text 이벤트도 자연스럽게 처리됨
   - <, > 같은 문자는 파서가 자동 escape */
const SAFE_COLORS = ['#DC2626','#2563EB','#16A34A','#C9A961','#dc2626','#2563eb','#16a34a','#c9a961'];
function sanitizeEventText(html) {
  if (html == null) return '';
  const s = String(html);
  // HTML 태그 흔적이 없으면 그냥 plain escape
  if (s.indexOf('<') === -1 && s.indexOf('&') === -1) {
    return esc(s);
  }
  const tmp = document.createElement('div');
  tmp.innerHTML = s;
  const walk = (node) => {
    const children = [...node.childNodes];
    children.forEach(child => {
      if (child.nodeType === 3) return; // text
      if (child.nodeType !== 1) { child.remove(); return; }
      const tag = child.tagName;
      if (tag === 'SPAN' || tag === 'FONT') {
        // color 추출
        let color = '';
        if (tag === 'FONT') color = child.getAttribute('color') || '';
        else color = child.style.color || '';
        // 모든 속성 제거
        while (child.attributes.length > 0) {
          child.removeAttribute(child.attributes[0].name);
        }
        // 화이트리스트 색상만 적용 (rgb 형식도 hex로 매칭)
        const rgbToHex = (c) => {
          const m = c.match(/rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
          if (!m) return c;
          const to2 = (n) => Number(n).toString(16).padStart(2,'0');
          return '#' + to2(m[1]) + to2(m[2]) + to2(m[3]);
        };
        const hex = rgbToHex(color).toLowerCase();
        if (SAFE_COLORS.map(c => c.toLowerCase()).includes(hex)) {
          // span으로 통일
          if (tag === 'FONT') {
            const span = document.createElement('span');
            span.style.color = hex;
            span.innerHTML = child.innerHTML;
            child.parentNode.replaceChild(span, child);
            walk(span);
            return;
          }
          child.style.color = hex;
        }
        walk(child);
      } else if (tag === 'BR') {
        // 줄바꿈 허용
      } else {
        // 기타 태그는 텍스트로 치환
        const textNode = document.createTextNode(child.textContent || '');
        child.parentNode.replaceChild(textNode, child);
      }
    });
  };
  walk(tmp);
  return tmp.innerHTML;
}

/* 🆕 상품 정보 카드 렌더링 (항공/숙소/식사/라운딩/특이사항)
   product 객체의 flights, hotels, golfCourses, itinerary, notices 등을 종합해 한눈에 표시 */
// 🆕 상품 기본정보 표 렌더링 (PC/모바일 공통)
// 🆕 일정 텍스트에 직접 입력된 골프 이모지(⛳/🏌️) 제거 + 골프 줄 감지
// (어드민에서 텍스트 앞에 이모지를 붙인 경우에도 SVG 아이콘으로 통일되도록)
const GOLF_EMOJI_RE = /(?:⛳|🏌)️?(?:‍(?:♂|♀)️?)?\s*/g;
function stripGolfEmoji(s) {
  const t = String(s || '');
  GOLF_EMOJI_RE.lastIndex = 0;
  const had = GOLF_EMOJI_RE.test(t);
  GOLF_EMOJI_RE.lastIndex = 0;
  return { text: had ? t.replace(GOLF_EMOJI_RE, '') : t, had };
}

// 🆕 골프 일정 텍스트의 홀수 표기 자동 강조 — 9홀/18홀/27홀/36홀/9+27홀/무제한 글씨만 빨간색
function redHoles(html) {
  return String(html || '').replace(/(\d{1,2}\s*\+\s*\d{1,2}홀|\d{1,3}홀|무제한)/g, '<span style="color:#DC2626;font-weight:700">$1</span>');
}

// 🆕 골프 표기 공용 아이콘 — 깃발 이모지(⛳)로 통일 (사장님 지정 · 🏌️‍♂️는 조합 이모지라 일부 기기에서 깨짐)
function golfIconSvg(size) {
  const s = size || 15;
  return `<span style="font-size:${Math.round(s * 0.95)}px;line-height:1;font-style:normal;vertical-align:-1px;display:inline-block">⛳</span>`;
}

// 🆕 정보 라벨 → 아이콘 매칭
function pinfoIcon(label) {
  const s = (label || '').replace(/\s/g, '');
  if (/기간|일정|날짜|출발/.test(s)) return '📅';
  if (/골프장|골프|CC|컨트리/.test(s)) return golfIconSvg(15);
  if (/라운드|라운딩|홀/.test(s)) return golfIconSvg(15);
  if (/숙박|호텔|리조트|숙소/.test(s)) return '🏨';
  if (/항공|비행/.test(s)) return '✈️';
  if (/여행지|지역|장소|목적지/.test(s)) return '📍';
  if (/식사|조식|중식|석식/.test(s)) return '🍽️';
  if (/인원|명/.test(s)) return '👥';
  if (/가격|요금|금액|상품가/.test(s)) return '💰';
  if (/가이드|인솔/.test(s)) return '🧑‍✈️';
  if (/차량|버스|이동/.test(s)) return '🚐';
  return '▪️';
}

// 🆕 견적서: 상품정보 행 → {label, main, sub} (값은 '|' 또는 줄바꿈으로 큰글씨|작은글씨 구분)
function quoteInfoCells(p) {
  return (p.infoRows || [])
    .filter(r => (r && ((r.label || '').trim() || (r.value || '').trim())))
    .map(r => {
      const parts = String(r.value || '').split(/\s*[|\n]\s*/);
      return { label: (r.label || '').trim(), main: (parts[0] || '').trim(), sub: parts.slice(1).join(' ').trim() };
    });
}

// 🆕 견적서: 요금표 아래 아이콘 요약 줄 — '상품 정보' 입력 항목 전체 사용
function renderQuoteMiniStrip(p) {
  const cells = quoteInfoCells(p);
  if (!cells.length) return '';
  return `<div class="qmini-strip">${cells.map(c => `
    <div class="qms-cell">
      <div class="qms-ico">${pinfoIcon(c.label)}</div>
      <div class="qms-label">${esc(c.label)}</div>
      <div class="qms-val">${esc(c.main || '-')}${c.sub ? `<span class="qms-sub">${esc(c.sub)}</span>` : ''}</div>
    </div>`).join('')}</div>`;
}

function renderProductInfoTable(p) {
  // 🆕 견적서: 자동 생성 안 함 — 상품 정보는 사진 위 4칸 + 요금표 아래 아이콘 줄로만 표시
  if (p.isQuote) return '';
  // 🆕 admin '상품 정보'에 입력한 항목만 그대로 표시 — 비어 있으면 표 자체를 숨김 (자동 생성 없음)
  if (!(p.infoRows && p.infoRows.length)) return '';
  return p.infoRows.map(r => `
    <div class="pinfo-row">
      <div class="pinfo-label"><span class="pinfo-ico">${pinfoIcon(r.label)}</span><span>${esc(r.label || '')}</span></div>
      <div class="pinfo-value">${esc(r.value || '')}</div>
    </div>
  `).join('');
}

function renderProductInfoCards(p) {
  const items = [];

  // 1) 항공
  if (p.flights && p.flights.length) {
    const flightLines = p.flights.map(f => {
      const type = f.type || '';
      const route = f.route || '';
      const airline = f.airline || '';
      const time = f.time || '';
      const parts = [];
      if (type) parts.push(`<b>${esc(type)}</b>`);
      if (route) parts.push(esc(route));
      if (airline) parts.push(`<span class="pi-tag">${esc(airline)}</span>`);
      if (time) parts.push(`<span class="pi-time">${esc(time)}</span>`);
      return `<li>${parts.join(' · ')}</li>`;
    }).join('');
    items.push({
      icon: '✈️',
      label: '항공',
      sub: `${p.flights.length}편`,
      body: `<ul class="pi-list">${flightLines}</ul>`
    });
  } else {
    items.push({
      icon: '✈️',
      label: '항공',
      sub: '미포함',
      body: '<div class="pi-empty">항공편 별도 안내</div>'
    });
  }

  // 2) 숙박
  if (p.hotels && p.hotels.length) {
    const hotelLines = p.hotels.map(h => {
      const stars = h.stars ? ` <span class="pi-stars">${'★'.repeat(h.stars)}</span>` : '';
      return `<li><b>${esc(h.name||'')}</b>${stars}${h.nameEn ? ` <span class="pi-en">${esc(h.nameEn)}</span>` : ''}</li>`;
    }).join('');
    const nights = p.itinerary ? Math.max(0, (p.itinerary.length - 1)) : 0;
    items.push({
      icon: '🏨',
      label: '숙박',
      sub: nights > 0 ? `${nights}박` : `${p.hotels.length}곳`,
      body: `<ul class="pi-list">${hotelLines}</ul>`
    });
  }

  // 3) 골프장 (라운딩)
  if (p.golfCourses && p.golfCourses.length) {
    const golfLines = p.golfCourses.map(g => {
      const holes = g.holes ? ` <span class="pi-tag">${g.holes}홀</span>` : '';
      return `<li><b>${esc(g.name||'')}</b>${holes}${g.nameEn ? ` <span class="pi-en">${esc(g.nameEn)}</span>` : ''}</li>`;
    }).join('');
    // 라운딩 횟수: itinerary에서 is_golf 카운트
    let rounds = 0;
    (p.itinerary || []).forEach(d => {
      (d.events || []).forEach(e => { if (e.is_golf) rounds++; });
    });
    items.push({
      icon: golfIconSvg(16),
      label: '라운딩',
      sub: rounds > 0 ? `${rounds}R` : `${p.golfCourses.length}곳`,
      body: `<ul class="pi-list">${golfLines}</ul>`
    });
  }

  // (식사 카드 제거 - 일정표 일차별 식사 바에 이미 표시됨)

  // 5) 특이사항 / 유의사항 (notices 첫 2-3개 미리보기)
  if (p.notices && p.notices.length) {
    const previewItems = p.notices.slice(0, 3).map(n => `<li>${esc(n)}</li>`).join('');
    const moreText = p.notices.length > 3 ? `<div class="pi-more">+ ${p.notices.length - 3}건 더 (아래 상세)</div>` : '';
    items.push({
      icon: '📌',
      label: '특이사항',
      sub: `${p.notices.length}건`,
      body: `<ul class="pi-list">${previewItems}</ul>${moreText}`
    });
  }

  if (items.length === 0) {
    return '<div class="pi-empty" style="padding:30px;text-align:center">상품 정보 준비 중입니다.</div>';
  }

  return `<div class="pi-grid">${items.map(it => `
    <div class="pi-card">
      <div class="pi-card-head">
        <span class="pi-card-ico">${it.icon}</span>
        <span class="pi-card-label">${it.label}</span>
        <span class="pi-card-sub">${it.sub}</span>
      </div>
      <div class="pi-card-body">${it.body}</div>
    </div>
  `).join('')}</div>`;
}

function switchMobileTab(tab) {
  // active 표시만 갱신
  document.querySelectorAll('.m-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  // 탭 → 섹션 매핑
  const targetMap = {
    pinfo:    '.sec-product-info',   // 🆕 기본정보 (포함·불포함 통합됨)
    remark:   '.sec-remark',
    schedule: '.sec-itin',
    info:     '.sec-golf',     // 골프장·호텔 탭 → 골프장 섹션으로 (그 아래에 호텔 자동)
    cancel:   '.sec-cancel'
  };
  const sel = targetMap[tab];
  if (!sel) return;
  let target = document.querySelector(sel);
  // 골프장 없으면 호텔로, 호텔도 없으면 sec-info로 fallback
  if (!target && tab === 'info') {
    target = document.querySelector('.sec-hotel') || document.querySelector('.sec-info');
  }
  if (!target) return;
  // sticky 탭 높이 만큼 offset
  const tabsEl = document.querySelector('.mobile-tabs');
  const offset = (tabsEl ? tabsEl.offsetHeight : 0) + 12;
  const top = target.getBoundingClientRect().top + window.scrollY - offset;
  window.scrollTo({ top, behavior: 'smooth' });
}

// 🆕 📱 일정표 호텔 카드 탭 → 호텔 소개 섹션으로 스크롤 (골프장 아닌 호텔로 직행)
function scrollToHotelSection() {
  const target = document.querySelector('.sec-hotel');
  if (!target) { switchMobileTab('info'); return; }
  const tabsEl = document.querySelector('.mobile-tabs');
  const offset = (tabsEl ? tabsEl.offsetHeight : 0) + 12;
  window.scrollTo({ top: target.getBoundingClientRect().top + window.scrollY - offset, behavior: 'smooth' });
}

// 🆕 스크롤 위치에 따라 active 탭 자동 갱신
function updateActiveTabOnScroll() {
  const tabs = ['remark', 'schedule', 'info', 'cancel'];
  const sels = {
    remark:   '.sec-remark',
    schedule: '.sec-itin',
    info:     '.sec-golf',
    cancel:   '.sec-cancel'
  };
  const tabsEl = document.querySelector('.mobile-tabs');
  const threshold = (tabsEl ? tabsEl.offsetHeight : 0) + 60;
  let activeKey = 'remark';
  for (const k of tabs) {
    let el = document.querySelector(sels[k]);
    if (!el && k === 'info') el = document.querySelector('.sec-hotel') || document.querySelector('.sec-info');
    if (!el) continue;
    const top = el.getBoundingClientRect().top;
    if (top <= threshold) activeKey = k;
  }
  document.querySelectorAll('.m-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === activeKey);
  });
}
window.addEventListener('scroll', () => {
  if (window.__previewFrame || window.matchMedia('(max-width: 980px) and (pointer: coarse)').matches) {
    requestAnimationFrame(updateActiveTabOnScroll);
  }
}, { passive: true });

function renderItineraryMobile(p) {
  const list = p.itinerary || [];
  if (!list.length) return '<div class="itin-mobile"></div>';

  const hotelList = p.hotels || [];
  const golfList = p.golfCourses || [];

  function findCard(text) {
    if (!text) return null;
    // 🆕 실제 사진(http)이 등록된 경우에만 미리보기 카드 표시 (이모지 placeholder 제거)
    for (const h of hotelList) {
      const ph = (h.photos||[])[0];
      if (h.name && text.includes(h.name) && typeof ph === 'string' && ph.startsWith('http')) return { cat: '숙박', name: h.name, photo: ph };
    }
    for (const g of golfList) {
      const ph = (g.photos||[])[0];
      if (g.name && text.includes(g.name) && typeof ph === 'string' && ph.startsWith('http')) return { cat: '골프장', name: g.name, photo: ph };
    }
    return null;
  }

  function fmtDate(dstr) {
    if (!dstr) return '';
    const d = new Date(dstr);
    if (isNaN(d)) return '';
    const wd = ['일','월','화','수','목','금','토'][d.getDay()];
    const mo = d.getMonth() + 1;
    const da = d.getDate();
    return `${String(mo).padStart(2,'0')}/${String(da).padStart(2,'0')} (${wd})`;
  }

  // 이벤트 아이콘 판정 → 골프 체크된 것만 (표준 ⛳ 이모지 — golfIconSvg 공용)
  // (항공편은 그룹 헤더 ✈️로 통합되어 개별 아이콘 생략)
  function getItemIcon(ev) {
    if (ev && ev.is_golf) return golfIconSvg(17);
    return '';
  }

  // 🆕 그날의 출발 도시 → 도착 도시 경로 (헤더 표시용)
  function dayRoute(day) {
    const cities = [];
    (day.events || []).forEach(e => {
      const c = cleanCityName(e.place || '');
      if (c && cities[cities.length - 1] !== c) cities.push(c);
    });
    if (cities.length === 0) return '';
    if (cities.length === 1) return esc(cities[0]);
    return esc(cities[0]) + ' → ' + esc(cities[cities.length - 1]);
  }

  // 항공편은 사각 박스로 합치지 않고, 텍스트 2줄 그대로 표시
  // (admin에서 '일정표에 반영' 버튼으로 입력된 출발/도착 이벤트가 각 줄로 보임)
  function consolidateFlights(events) {
    return events.map(ev => ({ type: 'event', ev }));
  }

  function cleanCityName(s) {
    if (!s) return '';
    // "인천 국제공항 출발" → "인천", "호치민 국제공항 도착" → "호치민"
    return s.replace(/국제공항|공항|출발|도착|에서|행|방면/g, '').trim();
  }

  // 🆕 블록의 장소(도시) 추출 - 그룹핑용
  function blockLocation(b) {
    if (b.type === 'flight') {
      // 항공편은 출발지를 장소로 간주 (롯데 스타일: "인천" 아래에 항공편이 들어감)
      return cleanCityName(b.dep.place || b.dep.text) || '';
    }
    return (b.ev.place || '').trim();
  }

  // 🆕 blocks를 연속된 동일 location으로 그룹화
  function groupByLocation(blocks) {
    const groups = [];
    let cur = null;
    blocks.forEach(b => {
      const loc = blockLocation(b);
      if (!cur || cur.location !== loc) {
        cur = { location: loc, blocks: [] };
        groups.push(cur);
      }
      cur.blocks.push(b);
    });
    return groups;
  }

  // 🆕 단일 블록(항공편/이벤트) HTML 생성 (그룹 location 전달받아 title 중복 생략)
  function renderBlock(block, groupLocation) {
    if (block.type === 'flight') {
      const depCity = cleanCityName(block.dep.place || block.dep.text);
      const arrCity = cleanCityName(block.arr.place || block.arr.text);
      const depTime = block.dep.time || '';
      const arrTime = block.arr.time || '';
      const code = block.flightCode || '';
      const airline = block.airline || '';
      return `<div class="tl-flight-box">
        <span class="tl-flight-ico">✈️</span>
        ${code || airline ? `<span class="tl-flight-code">${esc(code)}${airline ? `<span class="airline">${esc(airline)}</span>` : ''}</span>` : ''}
        <span class="tl-flight-route">
          <span class="leg">
            ${depTime ? `<span class="time">${esc(depTime)}</span>` : ''}
            <span class="city">${esc(depCity)}</span>
          </span>
          <span class="arrow">→</span>
          <span class="leg">
            ${arrTime ? `<span class="time">${esc(arrTime)}</span>` : ''}
            <span class="city">${esc(arrCity)}</span>
          </span>
        </span>
      </div>`;
    }
    // event 블록
    const ev = block.ev;
    const icon = getItemIcon(ev);
    // 🆕 도시명(place)은 일차 헤더 경로에만 표시하고 본문 줄에는 생략
    const title = '';
    // 🆕 텍스트에 직접 입력된 골프 이모지 제거 + 골프 줄 강제 인식
    const _gs = stripGolfEmoji(ev.text || '');
    const evGolf = ev.is_golf || _gs.had;
    // 🆕 desc는 HTML 허용 (색상 span) - 색상 태그([빨강] 등) 먼저 변환 후 sanitize (PC와 동일하게)
    const _descRaw = _gs.text ? sanitizeEventText((typeof parseColorTags === 'function') ? parseColorTags(_gs.text) : _gs.text) : '';
    const descHtml = evGolf ? redHoles(_descRaw) : _descRaw;
    // 🆕 자동 생성 항공편의 '도착' 줄은 편명 배지 숨김 (출발 줄에만 표시하여 중복 방지)
    const isAutoArrival = ev._auto_flight && /도착/.test(String(ev.text || ''));
    // 🆕 항공사 로고: 편명 코드 위치(교통편 칸 우선, 없으면 일정 텍스트) 바로 앞에 표시
    const logoFromTransport = isAutoArrival ? '' : airlineLogoHtml(ev.transport || '');
    const logoFromText = (isAutoArrival || logoFromTransport) ? '' : airlineLogoHtml(ev.text || '');
    const transport = (ev.transport && !isAutoArrival) ? `<span class="transport">${logoFromTransport}${esc(ev.transport)}</span>` : '';
    const time = ev.time || '';
    const golfClass = evGolf ? ' is-golf' : '';
    const hlClass = ev.highlight ? ' is-highlight' : '';
    const noTimeClass = !time ? ' no-time-item' : '';
    // 🆕 부가 안내문구: _auto_sub (자동 생성 항공편) 또는 sub_text (수동 입력)
    const subRaw = ev._auto_sub || ev.sub_text || '';
    const subText = subRaw ? `<div class="tl-item-sub">${esc(subRaw)}</div>` : '';

    // (호텔/골프장 미리보기 카드 제거됨 — 일정표에는 텍스트만 표시)
    const cardHtml = '';

    const bodyHtml = `<div class="tl-item-body">
        ${title ? `<div class="tl-item-title">${esc(title)}</div>` : ''}
        ${descHtml ? `<div class="tl-item-desc">${logoFromText}${descHtml}${transport}</div>` : (transport ? `<div class="tl-item-desc">${transport}</div>` : '')}
        ${subText}
        ${cardHtml}
      </div>`;
    const icoHtml = `<div class="tl-item-ico">${evGolf ? getItemIcon({ is_golf: true }) : icon}</div>`;
    // 골프 줄은 아이콘+본문을 카드로 감싸 시간칸/점을 침범하지 않게 함
    const contentHtml = evGolf ? `<div class="tl-golf-card">${icoHtml}${bodyHtml}</div>` : `${icoHtml}${bodyHtml}`;
    return `<div class="tl-item${golfClass}${noTimeClass}${hlClass}">
      ${time
        ? (evGolf
            ? `<div class="tl-item-time golf-toff"><span class="toff-label">T-OFF</span><span class="toff-time">${esc(time)}</span></div>`
            : (() => { const tt = String(time).trim(); const isBadge = /^\d{1,2}:\d{2}\s*~?$/.test(tt); return `<div class="tl-item-time${isBadge ? '' : ' long-label'}">${isBadge ? `<span class="tl-time-badge">${esc(tt)}</span>` : esc(time)}</div>`; })())
        : '<div class="tl-item-time"></div>'}
      <div class="tl-item-dot"></div>
      ${contentHtml}
    </div>`;
  }

  function mealInfo(day) {
    const mls = { 조식: null, 중식: null, 석식: null };
    if (day.meals && typeof day.meals === 'object') {
      ['조식','중식','석식'].forEach(k => {
        const t = (day.meals[k] || '').trim();
        if (t) mls[k] = t;
      });
    }
    (day.events || []).forEach(e => {
      if (e.meal && mls.hasOwnProperty(e.meal) && !mls[e.meal]) {
        const t = (e.text || '').trim();
        if (t) mls[e.meal] = t;
      }
    });
    const parts = [];
    ['조식','중식','석식'].forEach(k => {
      if (mls[k]) {
        const isNo = /불포함|없음|X|x|\-/.test(mls[k]);
        parts.push(`<span class="meal-item ${isNo?'meal-no':''}"><strong>${k}:</strong>${esc(mls[k])}</span>`);
      }
    });
    // 🆕 통합 박스(m-stay-box)용 식사 줄 내용만 반환
    if (!parts.length) return '';
    return parts.join('<span class="meal-sep">·</span>');
  }

  // 🆕 📱 일정표 하단 숙박·식사 통합 박스: 이중 칸 없이 하나의 테두리가 전부 감쌈
  //    호텔 줄(탭하면 호텔 섹션) + 사진 2장(첫 등장 일차만) + 식사 줄
  const _hNormM = s => String(s || '').toLowerCase().replace(/\(.*?\)/g, '').replace(/\s+/g, '');
  const _shownHotelM = new Set();
  function mHotelInner(hotelName) {
    const n = _hNormM(hotelName);
    const h = hotelList.find(x => {
      const hn = _hNormM(x.name), he = _hNormM(x.nameEn);
      return (hn && (hn.includes(n) || n.includes(hn))) || (he && (he.includes(n) || n.includes(he)));
    }) || null;
    const name = (h && h.name) || hotelName;
    const key = _hNormM(name);
    const photos = h ? (h.photos || []).filter(u => typeof u === 'string' && u.startsWith('http')).slice(0, 2) : [];
    const full = h && !_shownHotelM.has(key) && photos.length;
    const ico = `<i class="shc-ico"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V5l8-3 8 3v16"/><path d="M2 21h20"/><path d="M9 9h1.5M13.5 9H15M9 13h1.5M13.5 13H15M10.5 21v-4h3v4"/></svg></i>`;
    let out = `
      <div class="msb-hotel"${h ? ` onclick="scrollToHotelSection()"` : ''}>
        ${ico}<b>${esc(name)}</b>
        ${h ? `<span class="msb-arrow" aria-hidden="true">›</span>` : ''}
      </div>`;
    if (full) {
      _shownHotelM.add(key);
      out += `<div class="msb-photos">${photos.map(u => `<img src="${cdnImg(u, 480)}" alt="${esc(name)}" loading="lazy">`).join('')}</div>`;
    }
    return out;
  }

  let html = '<div class="itin-mobile">';
  list.forEach(day => {
    const events = (day.events || []).filter(e => !e.meal || e.time || e.place || e.transport);
    const blocks = consolidateFlights(events);
    const groups = groupByLocation(blocks);

    html += `<div class="tl-day">
      <div class="tl-day-head">
        <span class="day-badge">${dayRangeLabel(day) ? esc(dayRangeLabel(day)) : `${day.day}일차`}</span>
        ${(() => { const r = dayRoute(day); const pin = `<svg class="route-pin" viewBox="0 0 24 30" width="12" height="15"><path d="M12 0C5.37 0 0 5.37 0 12c0 8.25 12 18 12 18s12-9.75 12-18C24 5.37 18.63 0 12 0z" fill="#e8392f"/><circle cx="12" cy="12" r="4.3" fill="#fff"/></svg>`; return r ? `<span class="day-route">${pin} ${r}</span>` : '<span class="day-route"></span>'; })()}
        ${day.date ? `<span class="day-date-sm">${fmtDate(day.date)}</span>` : ''}
      </div>
      <div class="tl-day-body">`;

    if (!blocks.length) {
      html += `<div style="padding:8px 0;color:var(--gray-500);font-size:12px;text-align:center;font-style:italic">일정 미확정</div>`;
    }

    // 🆕 핀 그룹 헤더 없이 일렬로 렌더 (도시명은 일차 헤더 경로에만 표시)
    html += `<div class="tl-no-location">`;
    blocks.forEach(block => {
      html += renderBlock(block, null);
    });

    // 🆕 숙박·식사: 기존처럼 왼쪽 배지 칸 + 오른쪽 박스 — 빈 아이콘 칸을 빼서 박스가 본문 풀폭
    const hotelName = (day.hotel_name || '').trim();
    const isNoneStay = hotelName && /미숙박|없음|없슴|출국|귀국/.test(hotelName);
    const mealLine = mealInfo(day);
    if (hotelName) {
      html += `<div class="tl-item tl-summary no-time-item">
        <div class="tl-item-time"><span class="tl-sum-badge">숙 박</span></div>
        <div class="tl-item-dot"></div>
        <div class="tl-item-body${isNoneStay ? '' : ' msb-body'}">${isNoneStay
          ? `<div class="tl-item-desc tl-day-stay-none">${esc(hotelName)}</div>`
          : mHotelInner(hotelName)}</div>
      </div>`;
    }
    if (mealLine) {
      html += `<div class="tl-item tl-summary no-time-item">
        <div class="tl-item-time"><span class="tl-sum-badge">식 사</span></div>
        <div class="tl-item-dot"></div>
        <div class="tl-item-body"><div class="tl-item-desc tl-meal-line">${mealLine}</div></div>
      </div>`;
    }

    html += `</div>`;   // tl-no-location 닫기

    html += `</div>`;   // tl-day-body 닫기

    html += `</div>`;   // 🆕 tl-day 닫기 (누락되어 골프·호텔 소개가 itin-mobile 안으로 빨려들어가 PC에서 안 보이던 버그 수정)
  });
  html += '</div>';
  return html;
}

// 🆕 취소·환불 규정 렌더링 (상품별 개별 작성 / 비어있으면 빈 문자열 → 섹션 숨김)
function renderCancellationPolicy(p) {
  // 약관 입력 없으면 빈 문자열 (섹션 자체가 숨겨짐)
  if (!p.cancellationPolicy || !p.cancellationPolicy.trim()) {
    return '';
  }
  // 약관 있으면 → 줄바꿈 유지하며 표시
  return `
    <div style="color:var(--gray-700);line-height:1.9;font-size:14px;white-space:pre-wrap">${esc(p.cancellationPolicy)}</div>
    <p style="margin-top:20px;font-size:12px;color:var(--gray-500)">
      ※ 자세한 약관은 전화 문의 (1533-3160) 부탁드립니다.
    </p>
  `;
}

// 🆕 취소약관이 있는지 확인 (탭/섹션 표시 여부)
function hasCancellationPolicy(p) {
  return !!(p.cancellationPolicy && p.cancellationPolicy.trim());
}

// 🆕 가격 상세 표 (성인/소인 · 항공료/지상비) — 견적서에서 price_breakdown 있을 때만
// 🆕 요금 행 사진·별점: 직접 입력한 URL 우선, 없으면 연결된 호텔·골프장 이름 매칭으로 자동
function pbRowMatch(p, r) {
  const direct = (r.img || '').trim();
  const toks = (r.label || '').split(/[^가-힣A-Za-z0-9]+/).filter(t => t.length >= 2);
  let hit = null;
  if (toks.length) {
    // 이름 포함(아라만다) 또는 시설명 단어가 토큰 안에 포함(힐튼호텔↔힐튼)되면 매칭
    hit = [...(p.hotels || []), ...(p.golfCourses || [])].find(f => {
      const name = f.name || '';
      const words = name.split(/[^가-힣A-Za-z0-9]+/).filter(w => w.length >= 2);
      return toks.some(t => name.includes(t) || words.some(w => t.includes(w)));
    }) || null;
  }
  return {
    img: direct.startsWith('http') ? direct : ((hit && (hit.photos || [])[0]) || ''),
    stars: (hit && Number(hit.stars)) || 0
  };
}

function renderPriceBreakdown(p) {
  // 🆕 표 제목·부가설명·구분칸 제목은 어드민에서 수정 가능 (price_breakdown 안 __meta 항목)
  const meta = (p.priceBreakdown || []).find(r => r && r.__meta) || {};
  const rows = (p.priceBreakdown || []).filter(r => r && !r.__meta && (r.label || Number(r.air) || Number(r.land)));
  if (!rows.length) return '';
  const fmt = n => (Number(n) || 0).toLocaleString();
  const showAir = rows.some(r => Number(r.air) > 0);
  const showLand = rows.some(r => Number(r.land) > 0);
  const split = showAir && showLand;
  const hasLabel = rows.some(r => (r.label || '').trim());
  // 구분도 없고 항공·지상 분리도 없으면 = 단일 금액 → 위 헤드라인으로 충분, 표 생략
  if (!split && !hasLabel) return '';
  // 🆕 호텔별·객실타입별·성인/소인별 모두 아우르는 "항목별 요금" (헤더가 1인 요금이므로 /인 중복 표기 안 함)
  const perPrice = tot => `<span class="krw">₩</span>${fmt(tot)}`;
  const colLabel = esc((meta.col || '').trim() || '구분');
  const cap = `<div class="pb-cap"><span class="pb-cap-t">${esc((meta.title || '').trim() || '항목별 요금 안내')}</span>${(meta.cap || '').trim() ? `<span class="pb-cap-sub">${esc(meta.cap.trim())}</span>` : ''}</div>`;
  // 🆕 상품명 앞 사진·별점·영문명 (라벨을 '|'로 나누면 뒷부분이 영문명 줄) — 하나라도 사진 있으면 왼쪽정렬
  const matches = rows.map(r => pbRowMatch(p, r));
  const hasImg = matches.some(m => m.img);
  const labCell = (r, i) => {
    const m = matches[i];
    const parts = String(r.label || '').split(/\s*\|\s*|\s*\r?\n\s*/);   // '|' 또는 줄바꿈(엔터)으로 두 줄 분리
    const nm = (parts[0] || '').trim() || '-';
    const eng = parts.slice(1).join(' ').trim();
    return `<td class="pb-c-label"><span class="pb-cell-in">${m.img ? `<img class="pb-thumb" src="${cdnImg(esc(m.img), 200)}" alt="" loading="lazy">` : ''}<span class="pb-lab-wrap">${m.stars ? `<span class="pb-stars">${'★'.repeat(Math.min(m.stars, 5))}</span>` : ''}<span class="pb-lab-t">${esc(nm)}</span>${eng ? `<span class="pb-lab-eng">${esc(eng)}</span>` : ''}</span></span></td>`;
  };
  if (split) {
    const head = `<thead><tr>${hasLabel ? `<th>${colLabel}</th>` : ''}<th>항공료</th><th>지상비</th><th>1인 요금</th></tr></thead>`;
    const body = rows.map((r, i) => {
      const air = Number(r.air) || 0, land = Number(r.land) || 0, tot = air + land;
      return `<tr>
        ${hasLabel ? labCell(r, i) : ''}
        <td class="pb-c-num">${air ? fmt(air) : '-'}</td>
        <td class="pb-c-num">${land ? fmt(land) : '-'}</td>
        <td class="pb-c-total">${perPrice(tot)}</td>
      </tr>`;
    }).join('');
    return `<div class="pb-box">${cap}
      <table class="pb-table${hasImg ? ' pb-has-img' : ''}">${head}<tbody>${body}</tbody></table>
    </div>`;
  }
  // 분리는 없지만 구분(호텔·객실타입·성인/소인 등)은 있는 경우 → 구분 | 1인 요금
  const body = rows.map((r, i) => `<tr>${labCell(r, i)}<td class="pb-c-total">${perPrice((Number(r.air) || 0) + (Number(r.land) || 0))}</td></tr>`).join('');
  return `<div class="pb-box">${cap}
    <table class="pb-table pb-simple${hasImg ? ' pb-has-img' : ''}">
      <thead><tr><th>${colLabel}</th><th>1인 요금</th></tr></thead>
      <tbody>${body}</tbody>
    </table>
  </div>`;
}

/* 🆕 상세요금 안내 팝업 */
function openFeeDetail() {
  const raw = window.__feeDetail || '';
  if (!raw) return;
  const escF = s => String(s).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
  const FD_COLORS = { '': '', blue: '#dff1f5', pink: '#fbe4e4', green: '#e3f2df', yellow: '#fdf3d1' };
  let html = '';

  // 최신 형식: HTML 그대로 (어드민 워드형 편집기)
  if (raw.trimStart().startsWith('<')) {
    const safe = raw
      .replace(/<\s*(script|style|iframe|object|embed)[^>]*>[\s\S]*?<\s*\/\s*\1\s*>/gi, '')
      .replace(/<\s*(script|iframe|object|embed)[^>]*\/?>/gi, '')
      .replace(/\son\w+\s*=\s*"[^"]*"/gi, '')
      .replace(/\son\w+\s*=\s*'[^']*'/gi, '')
      .replace(/javascript:/gi, '');
    html = `<div class="fd-html">${safe}</div>`;
    showFeePopup(html);
    return;
  }

  // 형식 판별
  let data4 = null, data3 = null, data = null;
  try {
    const j = JSON.parse(raw);
    if (j && j.v === 4 && j.cells) data4 = j;
    else if (j && j.v === 3 && Array.isArray(j.blocks)) data3 = j;
    else if (j && j.v === 2 && Array.isArray(j.rows)) data = j;
  } catch (e) {}

  if (data4) {
    // 엑셀형(v4): 병합·색·굵기 그대로 표로 렌더
    const m = data4;
    const map = Array.from({ length: m.rows }, () => Array(m.cols).fill(null));
    Object.keys(m.cells).forEach(k => {
      const [r, cc] = k.split(',').map(Number);
      const cell = m.cells[k];
      for (let i = 0; i < (cell.rs || 1); i++) for (let j2 = 0; j2 < (cell.cs || 1); j2++) {
        if (r + i < m.rows && cc + j2 < m.cols) map[r + i][cc + j2] = k;
      }
    });
    let t = '<table class="fd-table"><tbody>';
    for (let r = 0; r < m.rows; r++) {
      t += '<tr>';
      for (let cc = 0; cc < m.cols; cc++) {
        const k = map[r][cc];
        if (k !== r + ',' + cc) continue;
        const cell = m.cells[k];
        const bg = FD_COLORS[cell.bg || ''] || '';
        t += `<td colspan="${cell.cs || 1}" rowspan="${cell.rs || 1}" style="${bg ? `background:${bg};` : ''}${cell.b ? 'font-weight:800;' : ''}">${escF(cell.t || '')}</td>`;
      }
      t += '</tr>';
    }
    t += '</tbody></table>';
    html = t;
    showFeePopup(html);
    return;
  }

  if (data3) {
    data3.blocks.forEach(b => {
      if (b.type === 'text') {
        const t = (b.text || '').trim();
        if (t) html += `<div class="fd-text">${escF(t)}</div>`;
        return;
      }
      // 표 블록
      const title = (b.title || '').trim();
      if (title) html += `<div class="fd-head">${escF(title)}</div>`;
      const rows = (b.rows || []).filter(r => (r.cells || []).some(x => (x || '').trim()));
      if (!rows.length) return;
      html += '<table class="fd-table"><tbody>' + rows.map(r => {
        const bg = FD_COLORS[r.bg || ''] || '';
        const cells = (r.cells || []).slice(0, b.cols || 3);
        while (cells.length < (b.cols || 3)) cells.push('');
        return `<tr${bg ? ` style="background:${bg}"` : ''}>` + cells.map(cell => `<td>${escF((cell || '').trim())}</td>`).join('') + '</tr>';
      }).join('') + '</tbody></table>';
    });
  } else if (data) {
    let tableRows = [];
    const flushTable = () => {
      if (!tableRows.length) return;
      html += '<table class="fd-table"><tbody>' + tableRows.map(r => {
        const bg = FD_COLORS[r.bg || ''] || '';
        const cells = (r.cells || []).slice(0, data.cols);
        while (cells.length < data.cols) cells.push('');
        return `<tr${bg ? ` style="background:${bg}"` : ''}>` + cells.map(cell => `<td>${escF((cell || '').trim())}</td>`).join('') + '</tr>';
      }).join('') + '</tbody></table>';
      tableRows = [];
    };
    data.rows.forEach(r => {
      if (r.type === 'row') { tableRows.push(r); return; }
      flushTable();
      const t = (r.text || '').trim();
      if (!t) return;
      const bg = FD_COLORS[r.bg || ''] || '';
      if (bg) html += `<div class="fd-head" style="background:${bg}">${escF(t)}</div>`;
      else html += `<div class="fd-line">${escF(t)}</div>`;
    });
    flushTable();
  } else {
    // 예전 텍스트 형식: '#' 제목줄, '|' 표 행, 그 외 일반 문장
    const lines = raw.split('\n');
    let tableRows = [];
    const flushTable = () => {
      if (!tableRows.length) return;
      const maxCols = Math.max(...tableRows.map(r => r.length));
      html += '<table class="fd-table"><tbody>' + tableRows.map(cells => {
        while (cells.length < maxCols) cells.push('');
        return '<tr>' + cells.map(cell => `<td>${escF(cell.trim())}</td>`).join('') + '</tr>';
      }).join('') + '</tbody></table>';
      tableRows = [];
    };
    lines.forEach(line => {
      const t = line.trim();
      if (!t) { flushTable(); return; }
      if (t.startsWith('#')) { flushTable(); html += `<div class="fd-head">${escF(t.replace(/^#+\s*/, ''))}</div>`; }
      else if (t.includes('|')) { tableRows.push(t.split('|')); }
      else { flushTable(); html += `<div class="fd-line">${escF(t)}</div>`; }
    });
    flushTable();
  }

  showFeePopup(html);
}

// 여권 업로드 처리 (고객 화면)
// 🆕 큰 사진 자동 축소 (최대 1800px, JPEG) — AI 읽기 용량 한계 방지
async function ppShrink(file) {
  try {
    if (file.size < 1.5 * 1024 * 1024) return file; // 1.5MB 미만은 그대로
    const img = await new Promise((res, rej) => {
      const url = URL.createObjectURL(file);
      const im = new Image();
      im.onload = () => { URL.revokeObjectURL(url); res(im); };
      im.onerror = rej;
      im.src = url;
    });
    const MAX = 1800;
    let w = img.naturalWidth, h = img.naturalHeight;
    if (Math.max(w, h) > MAX) {
      const k = MAX / Math.max(w, h);
      w = Math.round(w * k); h = Math.round(h * k);
    }
    const cv = document.createElement('canvas');
    cv.width = w; cv.height = h;
    cv.getContext('2d').drawImage(img, 0, 0, w, h);
    const blob = await new Promise(res => cv.toBlob(res, 'image/jpeg', 0.88));
    return (blob && blob.size < file.size) ? blob : file;
  } catch (e) { return file; } // 축소 실패하면 원본 그대로
}

async function ppUpload(ev) {
  const files = Array.from(ev.target.files || []);
  ev.target.value = '';
  if (!files.length) return;
  if (new URLSearchParams(location.search).get('preview') === '1') {
    alert('미리보기 화면에서는 업로드할 수 없습니다.');
    return;
  }
  const st = document.getElementById('ppStatus');
  let ok = 0;
  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    if (!f.type.startsWith('image/')) continue;
    if (st) st.textContent = `업로드 중... (${i + 1}/${files.length})`;
    const body = await ppShrink(f); // 🆕 자동 축소
    const isJpeg = body !== f;
    const ext = isJpeg ? 'jpg' : (((f.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '')) || 'jpg');
    const path = `${String(productId).replace(/[^a-zA-Z0-9_-]/g, '')}/${Date.now()}_${Math.random().toString(36).slice(2, 8)}.${ext}`;
    try {
      const up = await fetch(`${SUPABASE_URL}/storage/v1/object/passports/${path}`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': isJpeg ? 'image/jpeg' : f.type },
        body: body
      });
      if (!up.ok) throw new Error('upload fail');
      const url = `${SUPABASE_URL}/storage/v1/object/public/passports/${path}`;
      await fetch(`${SUPABASE_URL}/rest/v1/passport_uploads`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ quote_id: String(productId), file_path: path, file_url: url, file_name: f.name })
      });
      ok++;
    } catch (e) {}
  }
  if (st) st.innerHTML = ok > 0
    ? `<span style="color:#1a7f3d;font-weight:700">✅ 여권 사진 ${ok}장이 안전하게 전달되었습니다.</span><br>담당자가 확인 후 연락드리겠습니다.`
    : `<span style="color:#c0392b;font-weight:700">⚠️ 업로드에 실패했습니다.</span><br>잠시 후 다시 시도하시거나 카카오톡으로 보내주세요.`;
  if (ok > 0 && typeof ppLoadCount === 'function') ppLoadCount();  // 🆕 제출 현황 갱신
}

    if (!window.__frameCssInjected) {
      window.__frameCssInjected = true;
      try {
        let extra = '';
        for (const sheet of Array.from(document.styleSheets)) {
          let rules;
          try { rules = sheet.cssRules; } catch(e) { continue; }   // 외부 CDN 시트는 건너뜀
          if (!rules) continue;
          for (const r of Array.from(rules)) {
            if (r.media && /pointer:\s*coarse/i.test(r.media.mediaText)) {
              const cond = r.media.mediaText.replace(/\s*and\s*\(pointer:\s*coarse\)/gi, '');
              let body = '';
              for (const rr of Array.from(r.cssRules)) body += rr.cssText + '\n';
              extra += '@media ' + cond + '{\n' + body + '}\n';
            }
          }
        }
        if (extra) {
          const st = document.createElement('style');
          st.id = 'frameForceMobile';
          st.textContent = extra;
          document.head.appendChild(st);
        }
      } catch(e) {}
    }
    const hideChrome = () => {
      const mw = document.querySelector('.main-wrap');
      if (!mw) return;
      let node = mw;
      while (node && node.parentElement && node !== document.body) {
        Array.from(node.parentElement.children).forEach(sib => {
          if (sib !== node && !['SCRIPT','STYLE','LINK'].includes(sib.tagName)) sib.style.display = 'none';
        });
        node = node.parentElement;
      }
    };
    hideChrome();
    setTimeout(hideChrome, 300);
    setTimeout(hideChrome, 1200);
    try { new MutationObserver(hideChrome).observe(document.body, { childList: true }); } catch(e) {}
  }

  // 🆕 확정서(confirm-): 가격 위젯(달력·견적금액·날짜선택) 전체 숨김 + 본문 한 칸 (가격 이미 확정 단계)

/* ═══════════════════════════════════════════════════════
   🆕 일반 상품 페이지 하단: 여행후기 한 줄 리스트 (후기 없으면 표시 안 함)
   ═══════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════
   🆕 국내 상품: 예약 요금 달력 (기간 → 호텔 → 날짜별 요금)
   home_products.domestic_pricing 구조:
   { hotels:[{id,name}], durations:[{id,nights,days}],
     prices:{ "호텔id|기간id|YYYY-MM-DD": 358000 } }
   ═══════════════════════════════════════════════════════ */
let _dpState = null; // { data, durId, hotelId, year, month }

function renderDomesticCalendar(p) {
  const dp = p.domesticPricing;
  if (!dp || !Array.isArray(dp.hotels) || !dp.hotels.length ||
      !Array.isArray(dp.durations) || !dp.durations.length ||
      !dp.prices || !Object.keys(dp.prices).length) return;
  // 🆕 출발일선택 달력(판매기간 있는 상품)에 날짜별 요금이 표기되므로 중복 달력 생략
  if (p.period && p.period.start) return;

  const anchor = document.getElementById('secWeather');
  const host = anchor ? anchor.parentElement : document.querySelector('.main-content');
  if (!host || document.getElementById('secDomPrice')) return;

  const today = new Date();
  _dpState = {
    data: dp,
    durId: dp.durations[0].id,
    hotelId: dp.hotels[0].id,
    year: today.getFullYear(),
    month: today.getMonth(), // 0-11
    selected: null
  };

  const box = document.createElement('div');
  box.className = 'section-box sec-domprice';
  box.id = 'secDomPrice';
  host.prepend(box);
  drawDomCalendar();
}

// 요금 축약 표기: 365000 → "36만5천", 530000 → "53만" (여행사 달력 관행)
function dpFmtMan(n) {
  n = Number(n) || 0;
  const man = Math.floor(n / 10000);
  if (!man) return n.toLocaleString();
  const chun = Math.floor((n % 10000) / 1000);
  return man + '만' + (chun ? chun + '천' : '');
}

function dpSetDur(id){ _dpState.durId = id; _dpState.selected = null; drawDomCalendar(); }
function dpSetHotel(id){ _dpState.hotelId = id; _dpState.selected = null; drawDomCalendar(); }
function dpMoveMonth(delta){
  let m = _dpState.month + delta, y = _dpState.year;
  if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; }
  _dpState.month = m; _dpState.year = y; _dpState.selected = null;
  drawDomCalendar();
}
function dpSelect(dateStr){ _dpState.selected = dateStr; drawDomCalendar(); }

function drawDomCalendar() {
  const box = document.getElementById('secDomPrice');
  if (!box || !_dpState) return;
  const { data, durId, hotelId, year, month, selected } = _dpState;
  const escD = s => String(s == null ? '' : s).replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
  const dur = data.durations.find(d => d.id === durId) || data.durations[0];
  const hotel = data.hotels.find(h => h.id === hotelId) || data.hotels[0];

  const first = new Date(year, month, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = new Date().toISOString().slice(0, 10);

  let cells = '';
  for (let i = 0; i < startDow; i++) cells += '<div class="dp-cell dp-empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {

// 🆕 후기 사진: 선택 → 미리보기 (최대 4장)
window.__rvFiles = [];
function rvPhotosChanged(input) {
  const files = Array.from(input.files || []);
  for (const f of files) {
    if (!f.type.startsWith('image/')) continue;
    if (window.__rvFiles.length >= 4) break;
    window.__rvFiles.push(f);
  }
  input.value = '';
  rvRenderPreviews();
}
function rvRemovePhoto(i) {
  window.__rvFiles.splice(i, 1);
  rvRenderPreviews();
}
function rvRenderPreviews() {
  const host = document.getElementById('rvPhotoPreviews');
  if (!host) return;
  host.innerHTML = window.__rvFiles.map((f, i) => `
    <span class="rv-pv">
      <img src="${URL.createObjectURL(f)}" alt="">
      <button type="button" class="rv-pv-x" onclick="rvRemovePhoto(${i})" aria-label="삭제">×</button>
    </span>`).join('');
  const label = document.querySelector('.rv-photo-btn');
  if (label) label.style.display = window.__rvFiles.length >= 4 ? 'none' : '';
}
// 🆕 사진 리사이즈(최대 1600px, JPEG) — 휴대폰 원본 용량 축소
function rvCompress(file) {
  return new Promise((resolve) => {
    try {
      const img = new Image();
      img.onload = () => {
        const max = 1600;
        let w = img.width, h = img.height;
        if (Math.max(w, h) > max) {
          const r = max / Math.max(w, h);
          w = Math.round(w * r); h = Math.round(h * r);
        }
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        cv.toBlob(b => resolve(b || file), 'image/jpeg', 0.85);
      };
      img.onerror = () => resolve(file);
      img.src = URL.createObjectURL(file);
    } catch (e) { resolve(file); }
  });
}
// 🆕 Supabase Storage 업로드 → 공개 URL 목록 반환
async function rvUploadPhotos(productId) {
  const urls = [];
  for (let i = 0; i < window.__rvFiles.length; i++) {
    const blob = await rvCompress(window.__rvFiles[i]);
    const path = `reviews/${String(productId).replace(/[^a-zA-Z0-9_-]/g, '')}_${Date.now()}_${i}.jpg`;
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/golf-images/${path}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'image/jpeg' },
      body: blob
    });
    if (!res.ok) throw new Error('사진 업로드 실패 (' + res.status + ')');
    urls.push(`${SUPABASE_URL}/storage/v1/object/public/golf-images/${path}`);
  }
  return urls;
}

async function submitReview() {
  const btn = document.getElementById('rvSubmitBtn');
  const err = document.getElementById('rvErr');
  const name = (document.getElementById('rvName')?.value || '').trim();
  const content = (document.getElementById('rvContent')?.value || '').trim();
  const showErr = (msg) => { if (err) { err.textContent = msg; err.style.display = 'block'; } };
  if (err) err.style.display = 'none';

  if (!name) { showErr('성함을 입력해 주세요.'); return; }
  if (content.length < 5) { showErr('후기 내용을 5자 이상 입력해 주세요.'); return; }

  const ctx = window.__rvCtx || {};
  if (btn) { btn.disabled = true; btn.textContent = '등록 중...'; }
  try {
    // 🆕 사진 먼저 업로드
    let photoUrls = [];
    if ((window.__rvFiles || []).length) {
      if (btn) btn.textContent = '사진 올리는 중...';
      photoUrls = await rvUploadPhotos(ctx.productId || 'rv');
      if (btn) btn.textContent = '등록 중...';
    }
    const payload = {
      product_id: ctx.productId || null,
      product_title: ctx.title || null,
      customer_name: name,
      rating: Math.max(1, Math.min(5, Number(window.__rvRating) || 5)),
      content: content,
      is_published: true
    };
    if (photoUrls.length) payload.photos = photoUrls;
    const postReview = (body) => fetch(`${SUPABASE_URL}/rest/v1/reviews`, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        Prefer: 'return=minimal'
      },
      body: JSON.stringify(body)
    });
    let res = await postReview(payload);
    // photos 컬럼이 아직 없는 DB면 사진 없이 재시도
    if (!res.ok && photoUrls.length) {
      const t = await res.text();
      if (/photos/i.test(t)) { delete payload.photos; res = await postReview(payload); }
    }
    if (!res.ok) throw new Error('저장 실패 (' + res.status + ')');
    const st = Math.max(1, Math.min(5, Number(window.__rvRating) || 5));
    const boxEl = document.getElementById('secReview');
    if (boxEl) boxEl.innerHTML = `
      <h2 class="sec-title">여행 후기 <span class="sub">Review</span></h2>
      <div class="rv-done">💚 소중한 후기 감사합니다!<br>
        <span style="color:#f59e0b;font-size:18px;letter-spacing:3px">${'★'.repeat(st)}${'☆'.repeat(5 - st)}</span><br>
        <span style="font-weight:400;color:#475569;font-size:13.5px">홈페이지 후기 코너에 소개됩니다.</span><br>
        <button type="button" class="rv-btn" style="max-width:280px;margin:14px auto 0" onclick="rvWriteAnother()">✍️ 일행 후기 더 남기기</button>
      </div>`;
  } catch (e) {
    showErr('등록에 실패했어요. 잠시 후 다시 시도해 주세요.');
    if (btn) { btn.disabled = false; btn.textContent = '후기 등록하기'; }
  }
}

// 🆕 일행이 이어서 후기 작성 (작성칸 다시 열기)

  if (boxEl) boxEl.remove();
  window.__rvFiles = [];
