<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>청구서 · 초이스골프</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700;900&family=Noto+Sans+KR:wght@400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>

    :root{--navy:#1c3c70;--navy-d:#13294d;--ink:#2b2f38;--mut:#8a8f98;--line:#e3e6ec;--bg:#e9ebef;--seal:#c0392b;}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans KR',sans-serif;color:var(--ink);background:var(--bg);padding:22px 12px 50px;font-size:13px;-webkit-font-smoothing:antialiased}
    .barwrap{max-width:600px;margin:0 auto 14px;display:flex;gap:8px;justify-content:flex-end}
    .pbtn{border:1px solid #ccd2db;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
    .pbtn.print{background:var(--navy);color:#fff;border-color:var(--navy)}.pbtn.close{background:#fff;color:var(--navy)}
    .page{max-width:600px;margin:0 auto;background:#fff;position:relative;overflow:hidden;box-shadow:0 14px 44px rgba(20,30,50,.16);border:1px solid #d6dae2;border-top:6px solid var(--navy);border-bottom:6px solid var(--navy)}
    .frame{position:absolute;inset:7px;border:1px solid #dbe0e8;pointer-events:none;z-index:1}
    .inner{position:relative;z-index:2;padding:32px 28px 36px}
    /* 타이틀 */
    .head{position:relative;margin-bottom:22px}
    .tblock{display:flex;align-items:center;justify-content:center;gap:16px}
    .deco{flex:0 0 52px;height:1px;background:var(--navy);position:relative}
    .deco::after{content:'';position:absolute;top:-2.5px;width:6px;height:6px;background:var(--navy);transform:rotate(45deg)}
    .deco.left::after{right:0}.deco.right::after{left:0}
    .tt{text-align:center}
    .t-en{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;letter-spacing:.16em;color:var(--navy);line-height:1}
    .t-ko{font-family:'Noto Serif KR',serif;font-size:11px;letter-spacing:.5em;color:var(--mut);margin-top:5px;padding-left:.5em}
    .issue{position:absolute;right:0;bottom:0;font-size:11px;color:var(--mut);font-variant-numeric:tabular-nums}
    /* 섹션 헤더 (사선 네이비 바) */
    .shead{display:inline-block;background:var(--navy);color:#fff;font-weight:700;font-size:12px;letter-spacing:.01em;padding:6px 28px 6px 14px;margin-bottom:9px;clip-path:polygon(0 0,100% 0,calc(100% - 12px) 100%,0 100%)}
    /* 2단 정보 */
    .cols{display:flex;gap:16px;margin-bottom:20px;align-items:stretch}
    .col{flex:1;min-width:0;display:flex;flex-direction:column}
    .col>.shead{align-self:flex-start}
    .col .ibox{flex:1}
    .ibox{position:relative;border:1px solid var(--line)}
    .ibox.pad{padding:13px 16px}
    table.info{width:100%;height:100%;border-collapse:collapse}
    table.info td{padding:8px 11px;font-size:12px;border-bottom:1px solid #eef0f3;vertical-align:top}
    table.info tr:last-child td{border-bottom:none}
    table.info .k{color:var(--navy);font-weight:700;width:74px;white-space:nowrap;border-right:1px solid #eef0f3}
    table.info .v{color:var(--ink);word-break:keep-all}
    table.info .v.addr{font-size:11px;line-height:1.45}
    .stamp{position:absolute;right:9px;top:6px;width:44px;height:44px;border:2px solid var(--seal);border-radius:50%;color:var(--seal);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;text-align:center;line-height:1.2;transform:rotate(-7deg);opacity:.5}
    /* 요금 내역 */
    .sec{margin-bottom:18px}
    table.items{width:100%;border-collapse:collapse}
    table.items th{background:#eaedf2;color:var(--navy);font-size:11px;font-weight:700;padding:9px 6px;border:1px solid #d9dee6;white-space:nowrap}
    table.items td{padding:10px 6px;font-size:12px;text-align:center;border:1px solid #e6e9ef;vertical-align:middle}
    table.items td.nm{text-align:left;font-weight:600;padding-left:12px}
    table.items td.c{color:#555}
    table.items td.num{text-align:right;font-variant-numeric:tabular-nums;padding-right:10px}
    table.items td.sum{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;color:var(--navy);padding-right:12px}
    /* 합계 */
    .totals{display:flex;flex-direction:column;align-items:flex-end;margin-top:11px}
    .trow{display:flex;justify-content:space-between;align-items:center;width:320px;padding:9px 16px;font-size:12.5px;background:#f1f3f7;border:1px solid var(--line);border-bottom:none}
    .trow .tk{color:#555;font-weight:600}
    .trow .tv{font-weight:700;font-variant-numeric:tabular-nums}
    .trow.grand{background:#fbecec;border:1px solid #f0c8cc;padding:12px 16px}
    .trow.grand .tk{color:#b02a2a;font-size:13.5px;font-weight:700}
    .trow.grand .tv{font-size:17px}
    .trow.grand .tv.due{color:#d32020}
    .trow.grand .tv.done{color:#1f7a4d}
    /* 입금 안내 */
    .payinfo{display:flex;flex-wrap:wrap;gap:13px 30px}
    .pcell{display:flex;align-items:center;gap:9px;font-size:12px}
    .picon{flex:0 0 28px;width:28px;height:28px;border-radius:7px;background:var(--navy);display:flex;align-items:center;justify-content:center}
    .picon svg{width:16px;height:16px}
    .pk{color:var(--navy);font-weight:700;margin-right:2px}
    .pv{color:var(--ink);word-break:break-all}
    /* 취소·환불 */
    .notes p{font-size:11.5px;color:#555;line-height:1.7;padding-left:11px;text-indent:-11px}
    .notes p::before{content:'•';margin-right:7px;color:var(--navy)}
    @media print{ body{background:#fff;padding:0} .barwrap{display:none} .page{box-shadow:none;max-width:none;border:none} }
    @media (max-width:560px){ .cols{flex-direction:column;gap:14px} .trow{width:100%} .inner{padding:28px 18px 32px} .t-en{font-size:27px;letter-spacing:.1em} .deco{flex-basis:30px} .issue{position:static;display:block;text-align:center;margin-top:8px} }
    /* invoice.html 전용 */
    .wrap{max-width:600px;margin:0 auto}
    .foot{text-align:center;color:var(--mut);font-size:11.5px;line-height:1.7;margin-top:18px}
    .foot a{color:var(--navy);text-decoration:none;font-weight:600}
    .loading,.error{padding:50px 20px;text-align:center;color:var(--mut);font-size:14px}
    .error{color:#c0392b}

  </style>
</head>
<body>
<div class="wrap">
  <div id="content"><div class="card"><div class="loading">청구서를 불러오는 중...</div></div></div>
  <div class="foot">
    문의 · <a href="tel:1533-3160">1533-3160</a> · <a href="https://pf.kakao.com/_xjxjxj" target="_blank">카카오톡 상담</a><br>
    (주)초이스골프 · PREMIUM GOLF JOURNEY
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qmzrpyyadoajwziqachm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtenJweXlhZG9hand6aXFhY2htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI0NDcsImV4cCI6MjA4OTc3ODQ0N30.CI6ZFvNa2TRa0XqwnrXKL9x3ZHXfKg6GaNwJhqYvCmc';

// 공급자(초이스골프) 고정 정보
const SELLER = {
  name: '(주)초이스골프',
  bizno: '594-88-03010',
  type: '서비스 / 종합여행업',
  ceo: '최진우',
  tel: '1533-3160',
  address: '서울특별시 서초구 강남대로101안길 18-1 (잠원빌딩) 201호'
};

const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const won = n => '₩' + (Number(n)||0).toLocaleString();

function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function fmtMD(d){
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  const day = ['일','월','화','수','목','금','토'][dt.getDay()];
  return `${dt.getMonth()+1}/${dt.getDate()}(${day})`;
}

async function api(path){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) throw new Error('데이터를 불러올 수 없습니다');
  return res.json();
}

async function load(){
  const token = new URLSearchParams(location.search).get('t');
  const content = document.getElementById('content');
  if(!token){ content.innerHTML = `<div class="card"><div class="error">잘못된 주소입니다.<br>청구서 링크를 다시 확인해주세요.</div></div>`; return; }
  try{
    const bks = await api(`bookings?invoice_token=eq.${encodeURIComponent(token)}&select=*`);
    if(!bks.length){ content.innerHTML = `<div class="card"><div class="error">청구서를 찾을 수 없습니다.<br>링크가 만료되었거나 잘못되었습니다.</div></div>`; return; }
    const b = bks[0];
    const [pax, pays, settings] = await Promise.all([
      api(`booking_pax?booking_id=eq.${b.id}&order=sort_order.asc`),
      api(`booking_pax_payments?booking_id=eq.${b.id}&order=created_at.asc`),
      api(`site_settings?key=eq.invoice_account&select=value`)
    ]);
    document.getElementById('content').innerHTML = buildInvoice(b, pax, pays, settings[0]?.value || '');
  }catch(e){
    content.innerHTML = `<div class="card"><div class="error">${esc(e.message)}</div></div>`;
  }
}

/* 인보이스 HTML 생성 (admin 미리보기와 동일 로직) */
function buildInvoice(b, pax, pays, account){
  const named = (pax||[]).filter(p => (p.pax_name||'').trim());

  // 요금 상세: 1인 요금별로 묶기
  const groups = {};
  named.forEach(p => { const pr = Number(p.unit_price)||0; groups[pr] = (groups[pr]||0)+1; });
  let items = Object.keys(groups).map(pr => ({ price:Number(pr), cnt:groups[pr] }));
  let totalDue = items.reduce((s,it)=>s+it.price*it.cnt, 0);
  if(!totalDue){
    totalDue = Number(b.total_amount)||0;
    const cnt = Number(b.total_pax)||named.length||1;
    items = [{ price: cnt? Math.round(totalDue/cnt):totalDue, cnt }];
  }

  const totalPaid = (pays||[]).reduce((s,p)=>s+(Number(p.amount)||0),0);
  const balance = totalDue - totalPaid;
  const fullyPaid = totalDue>0 && balance<=0;

  const depDate = b.departure_date ? fmtMD(b.departure_date) : '미정';
  const retDate = b.return_date ? fmtMD(b.return_date) : '';
  const period = retDate ? `${depDate} ~ ${retDate}` : depDate;
  const nights = (b.nights&&b.days) ? `${b.nights}박${b.days}일` : '';
  const invNo = b.booking_no ? b.booking_no : ('INV-' + (b.id ? String(b.id).slice(0,8) : ''));
  const issue = fmtDate(new Date());

  const itemRows = items.map((it,i)=>`<tr>
      <td class="c">${i+1}</td>
      <td class="c">성인</td>
      <td class="num">${(it.price||0).toLocaleString()}</td>
      <td class="c">${it.cnt}</td>
      <td class="sum">${(it.price*it.cnt).toLocaleString()}</td></tr>`).join('');

  const dueVal = fullyPaid ? '완 납' : balance.toLocaleString();
  const dueCls = fullyPaid ? 'done' : 'due';

  const NIC = {
    bank:'<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M4 10h16M5 6l7-3 7 3M6 10v8M10 10v8M14 10v8M18 10v8"/></svg>',
    user:'<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>'
  };

  const acctHtml = account ? `
      <div class="sec">
        <div class="shead">입금 안내</div>
        <div class="ibox pad">
          <div class="payinfo">
            <div class="pcell"><span class="picon">${NIC.bank}</span><span class="pk">입금계좌</span><span class="pv">${esc(account)}</span></div>
            <div class="pcell"><span class="picon">${NIC.user}</span><span class="pk">예금주</span><span class="pv">${esc(SELLER.name)}</span></div>
          </div>
        </div>
      </div>` : '';

  return `
  <div class="page">
    <div class="frame"></div>
    <div class="inner">

      <div class="head">
        <div class="tblock">
          <span class="deco left"></span>
          <div class="tt"><div class="t-en">INVOICE</div></div>
          <span class="deco right"></span>
        </div>
        <div class="issue">발행일 ${issue}</div>
      </div>

      <div class="cols">
        <div class="col">
          <div class="shead">공급자 (발신) 정보</div>
          <div class="ibox">
            <table class="info">
              <tr><td class="k">상호</td><td class="v">${esc(SELLER.name)}</td></tr>
              <tr><td class="k">사업자번호</td><td class="v">${esc(SELLER.bizno)}</td></tr>
              <tr><td class="k">업태/종목</td><td class="v">${esc(SELLER.type)}</td></tr>
              <tr><td class="k">연락처</td><td class="v">${esc(SELLER.tel)}</td></tr>
              <tr><td class="k">주소</td><td class="v addr">${esc(SELLER.address||'-')}</td></tr>
            </table>
            <div class="stamp">초이스<br>골프</div>
          </div>
        </div>
        <div class="col">
          <div class="shead">예약 / 행사 정보</div>
          <div class="ibox">
            <table class="info">
              <tr><td class="k">행사명</td><td class="v">${esc(b.product_name||'-')}</td></tr>
              <tr><td class="k">기 간</td><td class="v">${period}${nights?` (${nights})`:''}</td></tr>
              <tr><td class="k">수 신</td><td class="v">${esc(b.rep_name||'고객')} 님</td></tr>
              <tr><td class="k">인 원</td><td class="v">${named.length||b.total_pax||0}명</td></tr>
            </table>
          </div>
        </div>
      </div>

      <div class="sec">
        <div class="shead">요금 내역</div>
        <table class="items">
          <thead><tr><th>No.</th><th>구분</th><th>금액</th><th>인원</th><th>합계금액</th></tr></thead>
          <tbody>${itemRows}</tbody>
        </table>
        <div class="totals">
          <div class="trow"><span class="tk">총 금액</span><span class="tv">${totalDue.toLocaleString()} 원</span></div>
          <div class="trow"><span class="tk">기 입금액</span><span class="tv">${totalPaid.toLocaleString()} 원</span></div>
          <div class="trow grand"><span class="tk">${fullyPaid?'납부 상태':'납부하실 금액'}</span><span class="tv ${dueCls}">${fullyPaid?dueVal:dueVal+' 원'}</span></div>
        </div>
      </div>

      ${acctHtml}

      <div class="sec">
        <div class="shead">취소 및 환불 규정</div>
        <div class="ibox pad">
          <div class="notes">
            <p>예약 취소 및 변경 규정은 별도 안내문을 참고 바랍니다.</p>
            <p>입금은 상기 계좌로 부탁드리며, 입금자명은 가급적 예약자 성함으로 부탁드립니다.</p>
            <p>본 인보이스는 세금계산서가 아니며, 세금계산서 발행이 필요하신 경우 별도 요청 바랍니다.</p>
          </div>
        </div>
      </div>

    </div>
  </div>`;
}

load();
</script>
</body>
</html>
