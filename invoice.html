<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>청구서 · 초이스골프</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0a1628; --navy2:#16263d; --gold:#c9a961; --gold-d:#a8853f;
    --cream:#faf7f0; --ink:#1f2733; --ink2:#5a6473; --line:#e8e2d4;
    --green:#1B4332; --red:#b6452f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans KR',sans-serif; color:var(--ink);
    background:linear-gradient(160deg,#0a1628 0%, #16263d 55%, #1f3550 100%);
    min-height:100vh; padding:24px 14px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px; margin:0 auto}

  /* 헤더 */
  .brand{text-align:center; margin-bottom:18px}
  .brand .en{font-family:'Cormorant Garamond',serif; letter-spacing:.35em; font-size:13px; color:var(--gold); text-transform:uppercase}
  .brand .kr{font-family:'Noto Serif KR',serif; font-weight:900; font-size:23px; color:#fff; margin-top:2px; letter-spacing:.04em}

  .card{
    background:var(--cream); border-radius:18px; overflow:hidden;
    box-shadow:0 24px 60px rgba(0,0,0,.4), 0 2px 0 rgba(201,169,97,.4) inset;
  }
  .card-top{
    background:linear-gradient(135deg,var(--navy) 0%, var(--navy2) 100%);
    color:#fff; padding:26px 26px 22px; position:relative;
  }
  .card-top::after{content:''; position:absolute; left:0; right:0; bottom:0; height:3px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent)}
  .doc-label{font-family:'Cormorant Garamond',serif; letter-spacing:.3em; font-size:12px; color:var(--gold); text-transform:uppercase}
  .prod{font-family:'Noto Serif KR',serif; font-weight:700; font-size:21px; margin-top:6px; line-height:1.35}
  .meta{margin-top:12px; font-size:13px; color:#cbd5e3; display:flex; flex-wrap:wrap; gap:6px 16px}
  .meta b{color:#fff; font-weight:500}

  .body{padding:24px 26px 28px}

  /* 큰 요약 숫자 */
  .summary{display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--line); border:1px solid var(--line); border-radius:12px; overflow:hidden; margin-bottom:22px}
  .summary>div{background:var(--cream); padding:16px 10px; text-align:center}
  .summary .lab{font-size:11px; color:var(--ink2); margin-bottom:5px}
  .summary .val{font-weight:700; font-size:17px; font-variant-numeric:tabular-nums; letter-spacing:-.02em}
  .summary .val.due{color:var(--navy)}
  .summary .val.paid{color:var(--green)}
  .summary .val.bal{color:var(--red)}
  .summary .val.done{color:var(--green)}

  .section-title{font-family:'Noto Serif KR',serif; font-weight:700; font-size:15px; color:var(--navy); margin:0 0 12px; display:flex; align-items:center; gap:8px}
  .section-title::before{content:''; width:4px; height:15px; background:var(--gold); border-radius:2px}

  /* 참가자 현황 */
  .pax{border:1px solid var(--line); border-radius:12px; overflow:hidden; margin-bottom:24px}
  .pax-row{display:flex; align-items:center; gap:10px; padding:13px 15px; border-bottom:1px solid var(--line); font-size:14px}
  .pax-row:last-child{border-bottom:none}
  .pax-row .nm{font-weight:700; color:var(--ink); min-width:64px}
  .pax-row .amt{margin-left:auto; text-align:right; font-variant-numeric:tabular-nums}
  .pax-row .amt .small{font-size:11px; color:var(--ink2)}
  .badge{font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap}
  .badge.done{background:#e3efe7; color:var(--green)}
  .badge.wait{background:#f8e6e0; color:var(--red)}

  /* 입금내역 */
  .pays{border:1px solid var(--line); border-radius:12px; overflow:hidden; margin-bottom:24px}
  .pay-row{display:flex; align-items:center; gap:8px; padding:11px 15px; border-bottom:1px solid var(--line); font-size:13px}
  .pay-row:last-child{border-bottom:none}
  .pay-row .who{font-weight:500}
  .pay-row .tag{font-size:10px; background:#eef0e9; color:var(--ink2); padding:2px 7px; border-radius:4px}
  .pay-row .pamt{margin-left:auto; font-weight:700; color:var(--green); font-variant-numeric:tabular-nums}
  .pay-row .pdate{font-size:11px; color:var(--ink2); min-width:42px; text-align:right}

  /* 계좌 안내 */
  .account{background:#fff; border:1.5px dashed var(--gold); border-radius:12px; padding:16px 18px; margin-bottom:8px}
  .account .lab{font-size:11px; color:var(--gold-d); font-weight:700; letter-spacing:.05em; margin-bottom:6px}
  .account .num{font-size:15px; font-weight:700; color:var(--navy); word-break:keep-all; line-height:1.5}

  .note{font-size:11.5px; color:var(--ink2); line-height:1.6; margin-top:14px; text-align:center}

  .foot{text-align:center; margin-top:22px; color:#9fb0c4; font-size:12px; line-height:1.7}
  .foot a{color:var(--gold); text-decoration:none; font-weight:700}

  .loading,.error{color:#cbd5e3; text-align:center; padding:80px 20px; font-size:14px}
  .error{color:#f0c0b0}

  @media (max-width:420px){
    .summary .val{font-size:15px}
    .prod{font-size:19px}
  }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="brand">
    <div class="en">Premium Golf Journey</div>
    <div class="kr">초이스골프</div>
  </div>
  <div id="content"><div class="loading">청구서를 불러오는 중...</div></div>
  <div class="foot">
    문의 · <a href="tel:1533-3160">1533-3160</a> · <a href="https://pf.kakao.com/_xjxjxj" target="_blank">카카오톡 상담</a><br>
    (주)초이스골프 · PREMIUM GOLF JOURNEY
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qmzrpyyadoajwziqachm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtenJweXlhZG9hand6aXFhY2htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI0NDcsImV4cCI6MjA4OTc3ODQ0N30.CI6ZFvNa2TRa0XqwnrXKL9x3ZHXfKg6GaNwJhqYvCmc';

const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const won = n => '₩' + (Number(n)||0).toLocaleString();
const KIND = {deposit:'예약금', balance:'잔금', full:'전액', etc:'입금'};
const METHOD = {transfer:'계좌', card:'카드', cash:'현금', etc:'기타'};

function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  const day = ['일','월','화','수','목','금','토'][dt.getDay()];
  return `${dt.getMonth()+1}/${dt.getDate()}(${day})`;
}

async function api(path){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) throw new Error('데이터를 불러올 수 없습니다');
  return res.json();
}

async function load(){
  const token = new URLSearchParams(location.search).get('t');
  const content = document.getElementById('content');
  if(!token){ content.innerHTML = `<div class="error">잘못된 주소입니다.<br>청구서 링크를 다시 확인해주세요.</div>`; return; }

  try{
    const bks = await api(`bookings?invoice_token=eq.${encodeURIComponent(token)}&select=*`);
    if(!bks.length){ content.innerHTML = `<div class="error">청구서를 찾을 수 없습니다.<br>링크가 만료되었거나 잘못되었습니다.</div>`; return; }
    const b = bks[0];

    const [pax, pays, settings] = await Promise.all([
      api(`booking_pax?booking_id=eq.${b.id}&order=sort_order.asc`),
      api(`booking_pax_payments?booking_id=eq.${b.id}&order=created_at.asc`),
      api(`site_settings?key=eq.invoice_account&select=value`)
    ]);

    render(b, pax, pays, settings[0]?.value || '');
  }catch(e){
    content.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

function render(b, pax, pays, account){
  const named = pax.filter(p => (p.pax_name||'').trim());
  const paxNames = named.map(p => (p.pax_name||'').trim());

  // 총 청구액 = 참가자 입금가 합 (없으면 행사 총액)
  let totalDue = named.reduce((s,p)=>s+(Number(p.unit_price)||0),0);
  if(!totalDue) totalDue = Number(b.total_amount)||0;

  // 총 입금액
  const totalPaid = pays.reduce((s,p)=>s+(Number(p.amount)||0),0);
  const balance = totalDue - totalPaid;
  const fullyPaid = totalDue>0 && balance<=0;

  // 참가자별 받은 돈 배분
  const received = {};
  paxNames.forEach(n=>received[n]=0);
  pays.forEach(p=>{
    const amt = Number(p.amount)||0;
    const names = (p.covers||'').split(',').map(s=>s.trim()).filter(Boolean);
    const targets = names.length ? names : paxNames;
    if(!targets.length) return;
    const per = amt/targets.length;
    targets.forEach(n=>{ received[n]=(received[n]||0)+per; });
  });

  const depDate = b.departure_date ? fmtDate(b.departure_date) : '미정';
  const retDate = b.return_date ? fmtDate(b.return_date) : '';
  const period = retDate ? `${depDate} ~ ${retDate}` : depDate;
  const nights = (b.nights&&b.days) ? `${b.nights}박${b.days}일` : '';

  // 참가자 현황 행
  const paxHtml = named.length ? named.map(p=>{
    const name=(p.pax_name||'').trim();
    const due=Number(p.unit_price)||0;
    const got=Math.round(received[name]||0);
    const bal=due-got;
    const done = due>0 && bal<=0;
    return `<div class="pax-row">
      <span class="nm">${esc(name)}</span>
      <span class="badge ${done?'done':'wait'}">${done?'완납':'잔금 '+won(bal)}</span>
      <span class="amt">${won(due)}<div class="small">입금 ${won(got)}</div></span>
    </div>`;
  }).join('') : '';

  // 입금 내역 행
  const payHtml = pays.length ? pays.map(p=>{
    const cov = (p.covers||'').trim();
    return `<div class="pay-row">
      <span class="who">${esc(p.payer_name||'입금')}</span>
      <span class="tag">${KIND[p.kind]||'입금'} · ${METHOD[p.method]||''}</span>
      ${cov?`<span class="tag">${esc(cov)} 몫</span>`:''}
      <span class="pdate">${esc(fmtDate(p.paid_date))}</span>
      <span class="pamt">${won(p.amount)}</span>
    </div>`;
  }).join('') : `<div class="pay-row"><span style="color:var(--ink2);font-size:13px">아직 입금 내역이 없습니다.</span></div>`;

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-top">
        <div class="doc-label">Invoice · 청구서</div>
        <div class="prod">${esc(b.product_name||'골프 투어')}</div>
        <div class="meta">
          <span>📅 <b>${period}</b>${nights?' · '+nights:''}</span>
          ${b.rep_name?`<span>👤 <b>${esc(b.rep_name)}</b></span>`:''}
          ${named.length?`<span>👥 <b>${named.length}명</b></span>`:''}
        </div>
      </div>
      <div class="body">
        <div class="summary">
          <div><div class="lab">총 청구액</div><div class="val due">${won(totalDue)}</div></div>
          <div><div class="lab">입금 완료</div><div class="val paid">${won(totalPaid)}</div></div>
          <div><div class="lab">${fullyPaid?'납부 상태':'남은 잔금'}</div><div class="val ${fullyPaid?'done':'bal'}">${fullyPaid?'완납 ✅':won(balance)}</div></div>
        </div>

        ${paxHtml?`<div class="section-title">참가자별 현황</div><div class="pax">${paxHtml}</div>`:''}

        <div class="section-title">입금 내역</div>
        <div class="pays">${payHtml}</div>

        ${account?`<div class="section-title">입금 계좌</div>
        <div class="account">
          <div class="lab">입금하실 계좌</div>
          <div class="num">${esc(account)}</div>
        </div>
        <div class="note">입금자명은 가급적 예약자 성함으로 부탁드립니다.<br>입금 확인 후 청구서에 자동 반영됩니다.</div>`:''}
      </div>
    </div>`;
}

load();
</script>
</body>
</html>
