<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>청구서 · 초이스골프</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700;900&family=Noto+Sans+KR:wght@400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#ffffff; --cream:#f7f2e8; --cream2:#fbf8f1;
    --ink:#2a2f3a; --ink2:#8c8f98; --line:#ece6d8; --line2:#e3ddcd;
    --navy:#1f3a5f; --navy-d:#172c48;
    --gold:#b8924d; --gold-lt:#cdb182; --gold-bg:#efe4cb;
    --green:#1f7a4d; --red:#b6452f; --seal:#c0392b;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Noto Sans KR',sans-serif; color:var(--ink);
    background:#eceae4;
    min-height:100vh; padding:22px 12px 60px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:600px; margin:0 auto}

  .card{
    background:var(--paper); border-radius:14px; overflow:hidden;
    box-shadow:0 18px 50px rgba(20,30,50,.18);
  }

  /* 상단 헤더 */
  .head{ text-align:center; padding:30px 26px 22px; border-bottom:1px solid var(--line); }
  .seal-ic{
    width:54px; height:54px; margin:0 auto 12px; border-radius:50%;
    background:var(--gold-bg); border:1.5px solid var(--gold-lt);
    display:flex; align-items:center; justify-content:center; color:var(--gold);
  }
  .title{ font-family:'Cormorant Garamond',serif; font-weight:700; font-size:40px; letter-spacing:.18em; color:var(--navy); line-height:1; }
  .title-sub{ font-family:'Noto Serif KR',serif; font-size:12px; color:var(--ink2); letter-spacing:.3em; margin-top:6px; }

  /* 공급자 / 공급받는자 */
  .parties{ display:grid; grid-template-columns:1fr 1fr; }
  .party{ padding:20px 24px; position:relative; }
  .party.seller{ border-right:1px solid var(--line); }
  .party-lab{ font-size:11px; font-weight:700; letter-spacing:.12em; color:var(--ink2); margin-bottom:11px; }
  .party-lab .en{ color:var(--gold); font-family:'Cormorant Garamond',serif; letter-spacing:.18em; }
  .prow{ display:flex; gap:8px; font-size:12.5px; line-height:1.5; margin-bottom:5px; }
  .prow .k{ color:var(--ink2); min-width:62px; flex-shrink:0; }
  .prow .v{ color:var(--ink); font-weight:500; word-break:keep-all; }
  .buyer-big{ font-size:16px; font-weight:700; color:var(--navy); margin-bottom:4px; }
  .stamp{
    position:absolute; right:16px; top:50%; transform:translateY(-50%) rotate(-8deg);
    width:62px; height:62px; border:2px solid var(--seal); border-radius:50%;
    color:var(--seal); display:flex; align-items:center; justify-content:center;
    font-family:'Noto Serif KR',serif; font-weight:700; font-size:13px; text-align:center;
    opacity:.5; letter-spacing:-.02em; line-height:1.15;
  }

  /* 메타 박스 */
  .meta{ margin:0 24px 22px; background:var(--cream); border:1px solid var(--line2); border-radius:11px; padding:6px 4px; }
  .meta-row{ display:flex; align-items:center; gap:10px; padding:9px 16px; font-size:13px; border-bottom:1px dashed var(--line2); }
  .meta-row:last-child{ border-bottom:none; }
  .meta-row .ico{ width:18px; text-align:center; color:var(--gold); flex-shrink:0; }
  .meta-row .k{ color:var(--ink2); min-width:64px; flex-shrink:0; }
  .meta-row .v{ color:var(--ink); font-weight:600; }

  /* 요금 상세 내역 */
  .sec{ padding:0 24px; margin-bottom:22px; }
  .sec-title{ font-family:'Noto Serif KR',serif; font-weight:700; font-size:14.5px; color:var(--navy); margin-bottom:11px; display:flex; align-items:center; gap:8px; }
  .sec-title::before{ content:''; width:4px; height:14px; background:var(--gold); border-radius:2px; }
  table.items{ width:100%; border-collapse:collapse; font-size:12.5px; }
  table.items th{ background:var(--cream); color:var(--navy); font-weight:700; font-size:11.5px; padding:9px 8px; border:1px solid var(--line2); white-space:nowrap; }
  table.items td{ padding:10px 8px; border:1px solid var(--line); vertical-align:middle; }
  table.items td.no{ text-align:center; color:var(--ink2); width:32px; }
  table.items td.nm{ font-weight:600; }
  table.items td.c{ text-align:center; color:var(--ink2); }
  table.items td.num{ text-align:right; font-variant-numeric:tabular-nums; }
  table.items td.sum{ text-align:right; font-variant-numeric:tabular-nums; font-weight:700; color:var(--navy); }
  table.items tbody tr:nth-child(even) td{ background:var(--cream2); }

  /* 합계 박스 3종 */
  .totals{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:0 24px; margin-bottom:24px; }
  .tot{ border-radius:11px; padding:15px 12px; text-align:center; }
  .tot .lab{ font-size:11px; margin-bottom:7px; }
  .tot .val{ font-weight:700; font-size:16px; font-variant-numeric:tabular-nums; letter-spacing:-.02em; line-height:1.2; }
  .tot.sale{ background:var(--navy); color:#fff; }
  .tot.sale .lab{ color:#aebfd6; }
  .tot.paid{ background:var(--cream); border:1px solid var(--line2); }
  .tot.paid .lab{ color:var(--ink2); } .tot.paid .val{ color:var(--green); }
  .tot.due{ background:var(--gold-bg); border:1px solid var(--gold-lt); }
  .tot.due .lab{ color:var(--gold); } .tot.due .val{ color:var(--gold); }
  .tot.due .val.done{ color:var(--green); }

  /* 계좌 안내 */
  .account{ margin:0 24px 22px; background:var(--cream2); border:1px solid var(--line2); border-radius:11px; padding:16px 20px; }
  .account .at{ font-size:13px; font-weight:700; color:var(--navy); margin-bottom:10px; display:flex; align-items:center; gap:7px; }
  .account .arow{ display:flex; gap:10px; font-size:13px; padding:4px 0; }
  .account .arow .k{ color:var(--ink2); min-width:66px; }
  .account .arow .v{ color:var(--ink); font-weight:600; font-variant-numeric:tabular-nums; word-break:break-all; }

  /* 안내 사항 */
  .notes{ margin:0 24px; padding:14px 18px; background:#fafafa; border:1px solid var(--line); border-radius:10px; }
  .notes .nt{ font-size:11.5px; font-weight:700; color:var(--ink2); margin-bottom:7px; }
  .notes ul{ list-style:none; }
  .notes li{ font-size:11.5px; color:var(--ink2); line-height:1.7; padding-left:13px; position:relative; }
  .notes li::before{ content:'·'; position:absolute; left:2px; color:var(--gold); font-weight:700; }

  .foot{ text-align:center; margin-top:22px; color:#6b7585; font-size:12px; line-height:1.7; }
  .foot a{ color:var(--gold); text-decoration:none; font-weight:700; }

  .loading,.error{ color:#5a6473; text-align:center; padding:80px 20px; font-size:14px; }
  .error{ color:var(--red); }

  @media (max-width:440px){
    .title{ font-size:33px; }
    .parties{ grid-template-columns:1fr; }
    .party.seller{ border-right:none; border-bottom:1px solid var(--line); }
    .totals{ grid-template-columns:1fr; }
    .tot{ display:flex; align-items:center; justify-content:space-between; text-align:left; }
    .tot .lab{ margin-bottom:0; }
    table.items{ font-size:11.5px; }
    .stamp{ width:54px; height:54px; font-size:11px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="content"><div class="card"><div class="loading">청구서를 불러오는 중...</div></div></div>
  <div class="foot">
    문의 · <a href="tel:1533-3160">1533-3160</a> · <a href="https://pf.kakao.com/_xjxjxj" target="_blank">카카오톡 상담</a><br>
    (주)초이스골프 · PREMIUM GOLF JOURNEY
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qmzrpyyadoajwziqachm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtenJweXlhZG9hand6aXFhY2htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI0NDcsImV4cCI6MjA4OTc3ODQ0N30.CI6ZFvNa2TRa0XqwnrXKL9x3ZHXfKg6GaNwJhqYvCmc';

// 공급자(초이스골프) 고정 정보
const SELLER = {
  name: '(주)초이스골프',
  bizno: '594-88-03010',
  type: '서비스 / 종합여행업',
  ceo: '최진우',
  tel: '1533-3160'
};

const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const won = n => '₩' + (Number(n)||0).toLocaleString();

function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function fmtMD(d){
  if(!d) return '';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  const day = ['일','월','화','수','목','금','토'][dt.getDay()];
  return `${dt.getMonth()+1}/${dt.getDate()}(${day})`;
}

async function api(path){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) throw new Error('데이터를 불러올 수 없습니다');
  return res.json();
}

async function load(){
  const token = new URLSearchParams(location.search).get('t');
  const content = document.getElementById('content');
  if(!token){ content.innerHTML = `<div class="card"><div class="error">잘못된 주소입니다.<br>청구서 링크를 다시 확인해주세요.</div></div>`; return; }
  try{
    const bks = await api(`bookings?invoice_token=eq.${encodeURIComponent(token)}&select=*`);
    if(!bks.length){ content.innerHTML = `<div class="card"><div class="error">청구서를 찾을 수 없습니다.<br>링크가 만료되었거나 잘못되었습니다.</div></div>`; return; }
    const b = bks[0];
    const [pax, pays, settings] = await Promise.all([
      api(`booking_pax?booking_id=eq.${b.id}&order=sort_order.asc`),
      api(`booking_pax_payments?booking_id=eq.${b.id}&order=created_at.asc`),
      api(`site_settings?key=eq.invoice_account&select=value`)
    ]);
    document.getElementById('content').innerHTML = buildInvoice(b, pax, pays, settings[0]?.value || '');
  }catch(e){
    content.innerHTML = `<div class="card"><div class="error">${esc(e.message)}</div></div>`;
  }
}

/* 인보이스 HTML 생성 (admin 미리보기와 동일 로직) */
function buildInvoice(b, pax, pays, account){
  const named = (pax||[]).filter(p => (p.pax_name||'').trim());

  // 요금 상세: 1인 요금별로 묶기
  const groups = {};
  named.forEach(p => { const pr = Number(p.unit_price)||0; groups[pr] = (groups[pr]||0)+1; });
  let items = Object.keys(groups).map(pr => ({ price:Number(pr), cnt:groups[pr] }));
  let totalDue = items.reduce((s,it)=>s+it.price*it.cnt, 0);
  if(!totalDue){
    totalDue = Number(b.total_amount)||0;
    const cnt = Number(b.total_pax)||named.length||1;
    items = [{ price: cnt? Math.round(totalDue/cnt):totalDue, cnt }];
  }

  const totalPaid = (pays||[]).reduce((s,p)=>s+(Number(p.amount)||0),0);
  const balance = totalDue - totalPaid;
  const fullyPaid = totalDue>0 && balance<=0;

  const depDate = b.departure_date ? fmtMD(b.departure_date) : '미정';
  const retDate = b.return_date ? fmtMD(b.return_date) : '';
  const period = retDate ? `${depDate} ~ ${retDate}` : depDate;
  const nights = (b.nights&&b.days) ? `${b.nights}박${b.days}일` : '';
  const invNo = b.booking_no ? b.booking_no : ('INV-' + (b.id ? String(b.id).slice(0,8) : ''));
  const issue = fmtDate(new Date());

  const itemRows = items.map((it,i)=>`
    <tr>
      <td class="no">${i+1}</td>
      <td class="nm">${esc(b.product_name||'골프 패키지')}</td>
      <td class="c">성인</td>
      <td class="num">${(it.price||0).toLocaleString()}</td>
      <td class="c">${it.cnt}</td>
      <td class="c">${b.nights||'-'}</td>
      <td class="sum">${(it.price*it.cnt).toLocaleString()}</td>
    </tr>`).join('');

  const acctHtml = account ? `
    <div class="account">
      <div class="at">💳 결제 계좌 안내</div>
      <div class="arow"><span class="k">입금 계좌</span><span class="v">${esc(account)}</span></div>
      <div class="arow"><span class="k">예금주</span><span class="v">${esc(SELLER.name)}</span></div>
    </div>` : '';

  return `
  <div class="card">
    <div class="head">
      <div class="seal-ic">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/></svg>
      </div>
      <div class="title">INVOICE</div>
      <div class="title-sub">청 구 서</div>
    </div>

    <div class="parties">
      <div class="party seller">
        <div class="party-lab">공급자 <span class="en">SELLER</span></div>
        <div class="prow"><span class="k">상호</span><span class="v">${esc(SELLER.name)}</span></div>
        <div class="prow"><span class="k">사업자번호</span><span class="v">${esc(SELLER.bizno)}</span></div>
        <div class="prow"><span class="k">업태/종목</span><span class="v">${esc(SELLER.type)}</span></div>
        <div class="prow"><span class="k">대표자</span><span class="v">${esc(SELLER.ceo)}</span></div>
        <div class="prow"><span class="k">연락처</span><span class="v">${esc(SELLER.tel)}</span></div>
        <div class="stamp">초이스<br>골프</div>
      </div>
      <div class="party">
        <div class="party-lab">공급받는자 <span class="en">BUYER</span></div>
        <div class="buyer-big">${esc(b.rep_name||'고객')} 님</div>
        ${named.length?`<div class="prow"><span class="k">인원</span><span class="v">${named.length}명</span></div>`:''}
        ${b.product_name?`<div class="prow"><span class="k">상품</span><span class="v">${esc(b.product_name)}</span></div>`:''}
      </div>
    </div>

    <div class="meta">
      <div class="meta-row"><span class="ico">📄</span><span class="k">Invoice No.</span><span class="v">${esc(invNo)}</span></div>
      <div class="meta-row"><span class="ico">🗓️</span><span class="k">발행일</span><span class="v">${issue}</span></div>
      <div class="meta-row"><span class="ico">⛳</span><span class="k">행사명</span><span class="v">${esc(b.product_name||'-')}</span></div>
      <div class="meta-row"><span class="ico">📅</span><span class="k">행사기간</span><span class="v">${period}${nights?` (${nights})`:''}</span></div>
      <div class="meta-row"><span class="ico">👥</span><span class="k">인원</span><span class="v">${named.length||b.total_pax||0}명</span></div>
      <div class="meta-row"><span class="ico">🙍</span><span class="k">예약자</span><span class="v">${esc(b.rep_name||'-')} 님</span></div>
      <div class="meta-row"><span class="ico">💼</span><span class="k">담당자</span><span class="v">${esc(SELLER.name)}</span></div>
    </div>

    <div class="sec">
      <div class="sec-title">요금 상세 내역</div>
      <table class="items">
        <thead><tr>
          <th>NO</th><th>내용</th><th>구분</th><th>금액(원)</th><th>인원</th><th>박수</th><th>합계금액(원)</th>
        </tr></thead>
        <tbody>${itemRows}</tbody>
      </table>
    </div>

    <div class="totals">
      <div class="tot sale"><div class="lab">총 판매금액</div><div class="val">${won(totalDue)}</div></div>
      <div class="tot paid"><div class="lab">총 입금금액</div><div class="val">${won(totalPaid)}</div></div>
      <div class="tot due"><div class="lab">${fullyPaid?'납부 상태':'청구금액'}</div><div class="val ${fullyPaid?'done':''}">${fullyPaid?'완납 ✅':won(balance)}</div></div>
    </div>

    ${acctHtml}

    <div class="notes">
      <div class="nt">📌 안내 사항</div>
      <ul>
        <li>예약 취소 및 변경 규정은 별도 안내문을 참고 바랍니다.</li>
        <li>입금은 상기 계좌로 부탁드리며, 입금자명은 가급적 예약자 성함으로 부탁드립니다.</li>
        <li>본 인보이스는 세금계산서가 아니며, 세금계산서 발행이 필요하신 경우 별도 요청 바랍니다.</li>
      </ul>
    </div>
  </div>`;
}

load();
</script>
</body>
</html>
