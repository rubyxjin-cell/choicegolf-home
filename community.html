<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객지원 | 초이스골프</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: 'Noto Sans KR', sans-serif;
  color: #0a2419;
  background: #fafaf6;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }

/* ============= 페이지 히어로 ============= */
.cs-hero {
  background: linear-gradient(180deg, #faf7f0 0%, #f5efe0 100%);
  padding: 60px 0;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid rgba(201, 169, 97, 0.15);
}
.cs-hero::before {
  content: '';
  position: absolute;
  right: -60px; top: -40px;
  width: 360px; height: 360px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201, 169, 97, 0.18) 0%, transparent 70%);
  pointer-events: none;
}
.cs-hero::after {
  content: '';
  position: absolute;
  left: -40px; bottom: -80px;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(27, 67, 50, 0.06) 0%, transparent 70%);
  pointer-events: none;
}
.cs-hero-inner {
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: 60px;
  position: relative;
  z-index: 1;
}
.cs-hero-title h1 {
  font-size: 44px;
  font-weight: 800;
  color: #0a2419;
  letter-spacing: -1.2px;
  margin-bottom: 12px;
  line-height: 1.1;
}
.cs-hero-title p {
  font-size: 15px;
  color: #6b7280;
  letter-spacing: -0.3px;
}

/* 카드 3개 */
.cs-quick-cards {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.cs-quick-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 22px 28px;
  background: #fff;
  border: 1px solid #e9e4d3;
  border-radius: 12px;
  min-width: 200px;
  box-shadow: 0 2px 8px rgba(10, 36, 25, 0.04);
  transition: all 0.25s;
  cursor: pointer;
}
.cs-quick-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 24px rgba(10, 36, 25, 0.1);
  border-color: #c9a961;
}
.cs-quick-card-icon {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #0a2419;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.cs-quick-card-icon svg { width: 22px; height: 22px; stroke: #c9a961; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.cs-quick-card-text {
  flex: 1;
  font-size: 17px;
  font-weight: 700;
  color: #0a2419;
  letter-spacing: -0.3px;
}
.cs-quick-card-arrow {
  color: #c9a961;
  font-size: 16px;
  transition: transform 0.25s;
}
.cs-quick-card:hover .cs-quick-card-arrow { transform: translateX(4px); }
.cs-quick-card.active {
  background: #0a2419;
  border-color: #0a2419;
}
.cs-quick-card.active .cs-quick-card-icon { background: #c9a961; }
.cs-quick-card.active .cs-quick-card-icon svg { stroke: #0a2419; }
.cs-quick-card.active .cs-quick-card-text { color: #fff; }
.cs-quick-card.active .cs-quick-card-arrow { color: #c9a961; }

/* ============= 메인 레이아웃 ============= */
.cs-main { padding: 50px 0 60px; }
.cs-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 32px;
  align-items: start;
}

/* 좌측 사이드 */
.cs-side {
  background: #fff;
  border: 1px solid #e9e4d3;
  border-radius: 14px;
  padding: 24px 22px;
  box-shadow: 0 2px 8px rgba(10, 36, 25, 0.03);
  position: sticky;
  top: 20px;
}
.cs-side-block { padding-bottom: 22px; margin-bottom: 22px; border-bottom: 1px solid #f0ebd8; }
.cs-side-block:last-child { border-bottom: 0; padding-bottom: 0; margin-bottom: 0; }
.cs-side-title {
  font-size: 13px;
  font-weight: 700;
  color: #0a2419;
  letter-spacing: 0.3px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 2px solid #c9a961;
  display: inline-block;
}
.cs-side-row {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  align-items: center;
}
.cs-side-row + .cs-side-row { border-top: 1px solid #f5f0de; }
.cs-side-row-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: #1B4332;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.cs-side-row-icon svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.cs-side-row-body { flex: 1; min-width: 0; }
.cs-side-row-label {
  font-size: 11.5px;
  color: #8a8a82;
  font-weight: 500;
  letter-spacing: -0.2px;
}
.cs-side-row-value {
  font-size: 17px;
  font-weight: 800;
  color: #0a2419;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.3px;
  line-height: 1.2;
}
.cs-side-row-sub {
  font-size: 11.5px;
  color: #8a8a82;
  margin-top: 3px;
}
.cs-side-row-desc {
  font-size: 12.5px;
  color: #6b7280;
  margin-top: 2px;
  letter-spacing: -0.2px;
}

/* 사이드 메뉴 */
.cs-side-menu { list-style: none; margin-top: -4px; }
.cs-side-menu li + li { border-top: 1px solid #f5f0de; }
.cs-side-menu button {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 4px;
  font-size: 14px;
  font-weight: 600;
  color: #6b7280;
  letter-spacing: -0.2px;
  transition: color 0.2s;
}
.cs-side-menu button:hover { color: #1B4332; }
.cs-side-menu button.active { color: #c9a961; }
.cs-side-menu button .cs-side-menu-arrow {
  color: #d4cdb4;
  font-size: 13px;
}
.cs-side-menu button.active .cs-side-menu-arrow { color: #c9a961; }

/* ============= 우측 컨텐츠 ============= */
.cs-content { min-width: 0; }

/* 검색바 */
.cs-search {
  display: flex;
  align-items: center;
  background: #fff;
  border: 1px solid #e9e4d3;
  border-radius: 12px;
  padding: 14px 22px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(10, 36, 25, 0.03);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.cs-search:focus-within {
  border-color: #c9a961;
  box-shadow: 0 4px 14px rgba(201, 169, 97, 0.15);
}
.cs-search input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 15px;
  font-family: inherit;
  color: #0a2419;
  background: transparent;
  letter-spacing: -0.3px;
}
.cs-search input::placeholder { color: #b8b3a3; }
.cs-search-icon {
  color: #8a8a82;
  display: flex;
}
.cs-search-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* 섹션 */
.cs-section { display: none; }
.cs-section.active { display: block; }

/* FAQ 리스트 */
.cs-faq-list {
  background: #fff;
  border: 1px solid #e9e4d3;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(10, 36, 25, 0.03);
}
.cs-faq-item { border-top: 1px solid #f0ebd8; }
.cs-faq-item:first-child { border-top: 0; }
.cs-faq-q {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 22px 24px;
  text-align: left;
  background: #fff;
  transition: background 0.2s;
}
.cs-faq-q:hover { background: #fafaf2; }
.cs-faq-q-mark {
  font-size: 15px;
  font-weight: 800;
  color: #c9a961;
  font-family: 'Cormorant Garamond', serif;
  flex-shrink: 0;
  letter-spacing: 0.5px;
}
.cs-faq-q-text {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
  color: #0a2419;
  letter-spacing: -0.3px;
}
.cs-faq-q-arrow {
  color: #b8b3a3;
  font-size: 14px;
  transition: transform 0.25s;
  flex-shrink: 0;
}
.cs-faq-item.open .cs-faq-q-arrow { transform: rotate(180deg); color: #c9a961; }
.cs-faq-item.open .cs-faq-q { background: #faf7ed; }
.cs-faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  padding: 0 24px 0 56px;
  font-size: 14px;
  color: #4a5560;
  line-height: 1.75;
  letter-spacing: -0.2px;
  background: #fdfbf3;
}
.cs-faq-item.open .cs-faq-a {
  max-height: 1000px;
  padding: 4px 24px 22px 56px;
}

/* 공지사항 리스트 */
.cs-notice-list {
  background: #fff;
  border: 1px solid #e9e4d3;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(10, 36, 25, 0.03);
}
.cs-notice-item {
  display: block;
  padding: 22px 24px;
  border-top: 1px solid #f0ebd8;
  cursor: pointer;
  transition: background 0.2s;
}
.cs-notice-item:first-child { border-top: 0; }
.cs-notice-item:hover { background: #fafaf2; }
.cs-notice-meta {
  display: flex;
  gap: 10px;
  align-items: center;
  font-size: 12px;
  color: #8a8a82;
  margin-bottom: 8px;
}
.cs-notice-badge {
  display: inline-block;
  padding: 3px 9px;
  background: #1B4332;
  color: #c9a961;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
}
.cs-notice-title {
  font-size: 15px;
  font-weight: 600;
  color: #0a2419;
  letter-spacing: -0.3px;
}
.cs-notice-summary {
  margin-top: 6px;
  font-size: 13px;
  color: #6b7280;
  letter-spacing: -0.2px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* 약관 */
.cs-terms-list {
  background: #fff;
  border: 1px solid #e9e4d3;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(10, 36, 25, 0.03);
}
.cs-terms-item {
  display: block;
  padding: 22px 24px;
  border-top: 1px solid #f0ebd8;
  cursor: pointer;
  transition: background 0.2s;
}
.cs-terms-item:first-child { border-top: 0; }
.cs-terms-item:hover { background: #fafaf2; }
.cs-terms-title {
  font-size: 15px;
  font-weight: 600;
  color: #0a2419;
  letter-spacing: -0.3px;
}
.cs-terms-summary {
  margin-top: 6px;
  font-size: 13px;
  color: #6b7280;
  letter-spacing: -0.2px;
}

/* 로딩/빈 상태 */
.cs-loading, .cs-empty {
  background: #fff;
  border: 1px solid #e9e4d3;
  border-radius: 12px;
  padding: 60px 24px;
  text-align: center;
  color: #8a8a82;
  font-size: 14px;
}
.cs-empty-icon { font-size: 36px; opacity: 0.4; margin-bottom: 10px; }

/* ============= 하단 CTA ============= */
.cs-cta-wrap { padding-bottom: 60px; }
.cs-cta {
  background: #faf7ed;
  border: 1px solid #e9d8a6;
  border-radius: 14px;
  padding: 26px 36px;
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 24px;
  align-items: center;
}
.cs-cta-icon {
  width: 56px; height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #c9a961;
}
.cs-cta-icon svg { width: 48px; height: 48px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.cs-cta-text-title {
  font-size: 18px;
  font-weight: 800;
  color: #0a2419;
  letter-spacing: -0.4px;
  margin-bottom: 4px;
}
.cs-cta-text-sub {
  font-size: 13px;
  color: #6b7280;
  letter-spacing: -0.2px;
}
.cs-cta-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 18px 36px;
  border-radius: 8px;
  font-weight: 700;
  letter-spacing: -0.3px;
  transition: all 0.2s;
  min-width: 200px;
}
.cs-cta-btn-main { font-size: 17px; }
.cs-cta-btn-sub { font-size: 11.5px; opacity: 0.85; font-weight: 500; }
.cs-cta-btn.tel {
  background: #1B4332;
  color: #fff;
  border: 1px solid #1B4332;
}
.cs-cta-btn.tel:hover { background: #0a2419; }
.cs-cta-btn.kakao {
  background: #fff;
  color: #0a2419;
  border: 1px solid #e9e4d3;
}
.cs-cta-btn.kakao:hover { background: #faf7ed; border-color: #c9a961; }

/* ============= 반응형 ============= */
@media (max-width: 1100px) {
  .cs-hero-inner { grid-template-columns: 1fr; gap: 32px; text-align: center; }
  .cs-hero-title h1 { font-size: 36px; }
  .cs-layout { grid-template-columns: 1fr; }
  .cs-side { position: static; }
  .cs-cta { grid-template-columns: 1fr; text-align: center; }
  .cs-cta-icon { margin: 0 auto; }
}
@media (max-width: 720px) {
  .cs-hero { padding: 40px 0; }
  .cs-hero-title h1 { font-size: 28px; }
  .cs-quick-cards { gap: 10px; }
  .cs-quick-card { min-width: 0; flex: 1; padding: 16px 18px; }
  .cs-quick-card-text { font-size: 14px; }
  .cs-quick-card-icon { width: 36px; height: 36px; }
  .cs-quick-card-icon svg { width: 18px; height: 18px; }
  .cs-main { padding: 30px 0 40px; }
  .cs-faq-q { padding: 16px; gap: 10px; }
  .cs-faq-q-text { font-size: 14px; }
  .cs-faq-a { padding: 0 16px 0 42px; font-size: 13px; }
  .cs-faq-item.open .cs-faq-a { padding: 2px 16px 18px 42px; }
  .cs-notice-item, .cs-terms-item { padding: 16px; }
  .cs-cta { padding: 20px; }
  .cs-cta-btn { padding: 14px 20px; min-width: 0; }
}
</style>
</head>
<body>

<!-- 페이지 히어로 -->
<section class="cs-hero">
  <div class="container">
    <div class="cs-hero-inner">
      <div class="cs-hero-title">
        <h1>고객지원</h1>
        <p>자주 묻는 질문과 공지사항, 이용약관을 확인하세요.</p>
      </div>
      <div class="cs-quick-cards" id="csQuickCards">
        <button class="cs-quick-card active" data-tab="faq">
          <span class="cs-quick-card-icon">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </span>
          <span class="cs-quick-card-text">FAQ</span>
          <span class="cs-quick-card-arrow">→</span>
        </button>
        <button class="cs-quick-card" data-tab="notice">
          <span class="cs-quick-card-icon">
            <svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </span>
          <span class="cs-quick-card-text">공지사항</span>
          <span class="cs-quick-card-arrow">→</span>
        </button>
        <button class="cs-quick-card" data-tab="terms">
          <span class="cs-quick-card-icon">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
          </span>
          <span class="cs-quick-card-text">약관</span>
          <span class="cs-quick-card-arrow">→</span>
        </button>
      </div>
    </div>
  </div>
</section>

<!-- 메인 -->
<main class="cs-main">
  <div class="container">
    <div class="cs-layout">

      <!-- 좌측 사이드 -->
      <aside class="cs-side">
        <div class="cs-side-block">
          <div class="cs-side-title">빠른 상담 안내</div>
          <div class="cs-side-row">
            <span class="cs-side-row-icon">
              <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </span>
            <div class="cs-side-row-body">
              <div class="cs-side-row-label">대표번호</div>
              <div class="cs-side-row-value">1533-3160</div>
              <div class="cs-side-row-sub">평일 09:00 - 18:00</div>
            </div>
          </div>
          <div class="cs-side-row">
            <span class="cs-side-row-icon" style="background:#FEE500;">
              <svg viewBox="0 0 24 24" style="stroke:#3C1E1E;"><path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.78 1.86 5.21 4.65 6.59L5.5 21l4.27-2.32c.73.09 1.47.12 2.23.12 5.52 0 10-3.48 10-7.8S17.52 3 12 3z"/></svg>
            </span>
            <div class="cs-side-row-body">
              <div class="cs-side-row-value" style="font-size:14px;">카카오톡 상담</div>
              <div class="cs-side-row-desc">실시간 채팅으로<br>빠르게 도와드릴게요.</div>
            </div>
          </div>
        </div>

        <div class="cs-side-block">
          <div class="cs-side-title" style="font-size:12px; color:#8a8a82; border-bottom:0; padding-bottom:0; margin-bottom:8px;">고객지원 메뉴</div>
          <ul class="cs-side-menu" id="csSideMenu">
            <li><button class="active" data-tab="faq"><span>FAQ</span><span class="cs-side-menu-arrow">›</span></button></li>
            <li><button data-tab="notice"><span>공지사항</span><span class="cs-side-menu-arrow">›</span></button></li>
            <li><button data-tab="terms"><span>약관</span><span class="cs-side-menu-arrow">›</span></button></li>
          </ul>
        </div>
      </aside>

      <!-- 우측 컨텐츠 -->
      <section class="cs-content">

        <!-- 검색바 -->
        <div class="cs-search">
          <input type="text" id="csSearch" placeholder="궁금한 내용을 검색해 보세요.">
          <span class="cs-search-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
        </div>

        <!-- FAQ -->
        <div class="cs-section active" id="sec-faq">
          <div id="listFaq"><div class="cs-loading">불러오는 중…</div></div>
        </div>

        <!-- 공지사항 -->
        <div class="cs-section" id="sec-notice">
          <div id="listNotice"><div class="cs-loading">불러오는 중…</div></div>
        </div>

        <!-- 약관 -->
        <div class="cs-section" id="sec-terms">
          <div id="listTerms"><div class="cs-loading">불러오는 중…</div></div>
        </div>

      </section>
    </div>
  </div>
</main>

<!-- 하단 CTA -->
<div class="cs-cta-wrap">
  <div class="container">
    <div class="cs-cta">
      <div class="cs-cta-icon">

<script>
const SUPABASE_URL = 'https://qmzrpyyadoajwziqachm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtenJweXlhZG9hand6aXFhY2htIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDI0NDcsImV4cCI6MjA4OTc3ODQ0N30.CI6ZFvNa2TRa0XqwnrXKL9x3ZHXfKg6GaNwJhqYvCmc';

let sb = null;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) { console.warn(e); }

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  return `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
}

// ===== 탭 전환 =====
function switchTab(tab) {
  document.querySelectorAll('.cs-quick-card').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('#csSideMenu button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.cs-section').forEach(s => s.classList.toggle('active', s.id === `sec-${tab}`));
  history.replaceState(null, '', `#${tab}`);
}
document.getElementById('csQuickCards').addEventListener('click', (e) => {
  const btn = e.target.closest('.cs-quick-card');
  if (btn) switchTab(btn.dataset.tab);
});
document.getElementById('csSideMenu').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (btn) switchTab(btn.dataset.tab);
});

// ===== 검색 =====
document.getElementById('csSearch').addEventListener('input', (e) => {
  const q = (e.target.value || '').toLowerCase().trim();
  document.querySelectorAll('.cs-faq-item, .cs-notice-item, .cs-terms-item').forEach(el => {
    el.style.display = !q || el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});

// ===== 데이터 로드 =====
async function loadAll() {
  if (!sb) {
    ['Faq','Notice','Terms'].forEach(k => {
      document.getElementById('list'+k).innerHTML = '<div class="cs-empty"><div class="cs-empty-icon">📭</div>데이터를 불러올 수 없습니다.</div>';
    });
    return;
  }
  loadFaqs();
  loadNotices();
  loadTerms();
}

// FAQ
async function loadFaqs() {
  try {
    const { data, error } = await sb.from('support_articles')
      .select('*').eq('category', 'faq')
      .order('display_order', { ascending: true }).limit(50);
    if (error) throw error;
    renderFaqs(data || []);
  } catch (e) { renderFaqs([]); }
}
function renderFaqs(items) {
  const el = document.getElementById('listFaq');
  if (!items.length) {
    el.innerHTML = '<div class="cs-empty"><div class="cs-empty-icon">❓</div>등록된 FAQ가 없습니다.</div>';
    return;
  }
  el.innerHTML = '<div class="cs-faq-list">' + items.map((it, i) => `
    <div class="cs-faq-item" data-idx="${i}">
      <button class="cs-faq-q" onclick="toggleFaq(${i})">
        <span class="cs-faq-q-mark">Q.</span>
        <span class="cs-faq-q-text">${escapeHtml(it.title || '')}</span>
        <span class="cs-faq-q-arrow">▾</span>
      </button>
      <div class="cs-faq-a">${escapeHtml(it.content || it.summary || '')}</div>
    </div>
  `).join('') + '</div>';
}
function toggleFaq(idx) {
  const item = document.querySelector(`.cs-faq-item[data-idx="${idx}"]`);
  if (item) item.classList.toggle('open');
}

// 공지사항
async function loadNotices() {
  try {
    const { data, error } = await sb.from('support_articles')
      .select('*').eq('category', 'notice')
      .order('created_at', { ascending: false }).limit(50);
    if (error) throw error;
    renderNotices(data || []);
  } catch (e) { renderNotices([]); }
}
function renderNotices(items) {
  const el = document.getElementById('listNotice');
  if (!items.length) {
    el.innerHTML = '<div class="cs-empty"><div class="cs-empty-icon">📢</div>등록된 공지사항이 없습니다.</div>';
    return;
  }
  el.innerHTML = '<div class="cs-notice-list">' + items.map(it => `
    <article class="cs-notice-item" onclick="openArticle('${it.id}')">
      <div class="cs-notice-meta">
        <span class="cs-notice-badge">공지</span>
        <span>${formatDate(it.created_at)}</span>
        ${it.view_count != null ? `<span>· 조회 ${it.view_count}</span>` : ''}
      </div>
      <h3 class="cs-notice-title">${escapeHtml(it.title || '')}</h3>
      ${it.summary ? `<p class="cs-notice-summary">${escapeHtml(it.summary)}</p>` : ''}
    </article>
  `).join('') + '</div>';
}

// 약관
async function loadTerms() {
  try {
    const { data, error } = await sb.from('support_articles')
      .select('*').eq('category', 'terms')
      .order('display_order', { ascending: true }).limit(50);
    if (error) throw error;
    renderTerms(data || []);
  } catch (e) { renderTerms([]); }
}
function renderTerms(items) {
  const el = document.getElementById('listTerms');
  if (!items.length) {
    el.innerHTML = '<div class="cs-empty"><div class="cs-empty-icon">📋</div>등록된 약관이 없습니다.</div>';
    return;
  }
  el.innerHTML = '<div class="cs-terms-list">' + items.map(it => `
    <article class="cs-terms-item" onclick="openArticle('${it.id}')">
      <h3 class="cs-terms-title">${escapeHtml(it.title || '')}</h3>
      ${it.summary ? `<p class="cs-terms-summary">${escapeHtml(it.summary)}</p>` : ''}
    </article>
  `).join('') + '</div>';
}

function openArticle(id) {
  console.log('open article:', id);
}

// 해시 라우팅
function handleHash() {
  const hash = (location.hash || '').replace('#', '');
  if (['faq','notice','terms'].includes(hash)) switchTab(hash);
}

window.addEventListener('DOMContentLoaded', () => {
  loadAll();
  handleHash();
});
window.addEventListener('hashchange', handleHash);
</script>
