<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해외 골프투어 | 초이스골프</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Gaegu:wght@400;700&family=Noto+Serif+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

<style>
:root {
  --navy-900: #0a1628;
  --navy-800: #14243e;
  --navy-700: #1f3557;
  --gold: #c9a961;
  --gold-light: #e4c97e;
  --cream: #faf7f0;
  --ink: #1a1a1a;
  --gray-900: #252525;
  --gray-700: #4a4a4a;
  --gray-500: #8a8a8a;
  --gray-300: #d4d4d4;
  --gray-200: #e5e5e5;
  --gray-100: #f5f5f5;
  --white: #ffffff;
  --kakao: #fee500;
  --line: #e8e3d6;
  --red: #d64545;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
  color: var(--ink); background: var(--cream);
  line-height: 1.6; -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
button { font-family: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

.container { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
@media (max-width: 768px) { .container { padding: 0 20px; } }

/* 공지바 */
.announce { background: var(--navy-900); color: var(--cream); text-align: center; padding: 9px 20px; font-size: 12px; letter-spacing: 1px; font-weight: 300; }
.announce b { color: var(--gold-light); font-weight: 500; letter-spacing: 2px; }

/* 헤더 */
.header { background: var(--white); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 100; }
.header-inner { display: flex; justify-content: space-between; align-items: center; padding: 18px 40px; max-width: 1280px; margin: 0 auto; }
.logo { display: flex; flex-direction: column; line-height: 1; }
.logo-main { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500; color: var(--navy-900); letter-spacing: 3px; }
.logo-sub { font-family: 'Gaegu', cursive; font-size: 13px; color: var(--gold); letter-spacing: 2px; margin-top: 2px; }
.nav { display: flex; gap: 36px; align-items: center; font-size: 14px; font-weight: 500; }
.nav a { position: relative; padding: 6px 0; color: var(--gray-900); transition: color 0.3s; }
.nav a.active { color: var(--navy-900); }
.nav a.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: var(--gold); }
.kakao-btn-header { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; background: var(--kakao); color: #3c1e1e; font-size: 13px; font-weight: 700; border-radius: 6px; border: none; }
.kakao-icon-mini { width: 16px; height: 16px; background: #3c1e1e; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: var(--kakao); font-size: 9px; font-weight: 900; }
.hamburger { display: none; cursor: pointer; background: none; border: none; padding: 6px; }
.hamburger svg { width: 26px; height: 26px; }

@media (max-width: 900px) {
  .header-inner { padding: 14px 20px; }
  .nav { display: none; }
  .hamburger { display: block; }
  .logo-main { font-size: 22px; }
}

.mobile-menu { display: none; position: fixed; inset: 0; background: var(--white); z-index: 200; padding: 80px 40px 40px; overflow-y: auto; }
.mobile-menu.open { display: block; }
.mobile-menu-close { position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 28px; cursor: pointer; color: var(--navy-900); }
.mobile-menu ul { list-style: none; }
.mobile-menu li { padding: 18px 0; border-bottom: 1px solid var(--line); font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 500; }

/* 브레드크럼 */
.breadcrumb { background: var(--cream); padding: 16px 40px; font-size: 12px; color: var(--gray-500); letter-spacing: 0.5px; }
.breadcrumb-inner { max-width: 1280px; margin: 0 auto; }
.breadcrumb a { color: var(--gray-700); }
.breadcrumb .sep { margin: 0 10px; color: var(--gray-300); }
.breadcrumb .current { color: var(--navy-900); font-weight: 500; }
@media (max-width: 768px) { .breadcrumb { padding: 14px 20px; font-size: 11px; } }

/* HERO */
.country-hero {
  position: relative;
  height: 50vh; min-height: 380px; max-height: 500px;
  background-size: cover; background-position: center;
  display: flex; align-items: center; color: white;
}
.country-hero::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(10,22,40,0.55) 0%, rgba(20,36,62,0.4) 50%, rgba(10,22,40,0.7) 100%);
}
.country-hero-inner { max-width: 1280px; margin: 0 auto; padding: 0 40px; width: 100%; position: relative; z-index: 2; }
.country-hero-eyebrow { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 20px; color: var(--gold-light); letter-spacing: 3px; margin-bottom: 12px; }
.country-hero-title { font-family: 'Noto Serif KR', serif; font-size: 54px; font-weight: 700; margin-bottom: 16px; letter-spacing: -1px; }
.country-hero-desc { font-size: 15px; line-height: 1.9; opacity: 0.9; max-width: 560px; font-weight: 300; }
.country-hero-stats { display: flex; gap: 36px; margin-top: 28px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.2); max-width: 500px; }
.stat-num { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 500; color: var(--gold-light); line-height: 1; }
.stat-label { font-size: 12px; letter-spacing: 2px; opacity: 0.8; margin-top: 6px; text-transform: uppercase; }

@media (max-width: 768px) {
  .country-hero { height: 45vh; min-height: 320px; }
  .country-hero-inner { padding: 0 20px; }
  .country-hero-title { font-size: 36px; }
  .country-hero-stats { gap: 20px; }
  .stat-num { font-size: 28px; }
}

/* 필터 */
.filter-section { background: var(--white); border-bottom: 1px solid var(--line); padding: 28px 0; position: sticky; top: 71px; z-index: 50; }
.filter-inner { max-width: 1280px; margin: 0 auto; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; }
.filter-tabs { display: flex; gap: 10px; flex-wrap: wrap; }
.filter-tab { padding: 9px 20px; background: var(--cream); border: 1px solid var(--line); border-radius: 24px; font-size: 13px; font-weight: 500; color: var(--gray-700); transition: all 0.2s; font-family: inherit; }
.filter-tab:hover { border-color: var(--gold); color: var(--navy-900); }
.filter-tab.active { background: var(--navy-900); border-color: var(--navy-900); color: var(--white); }
.filter-count { font-size: 13px; color: var(--gray-500); }
.filter-count b { color: var(--navy-900); font-weight: 600; }

@media (max-width: 768px) {
  .filter-section { top: 62px; padding: 20px 0; }
  .filter-inner { padding: 0 20px; }
  .filter-tab { padding: 7px 14px; font-size: 12px; }
}

/* 상품 */
.products-section { padding: 50px 0 80px; }
.products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
.product-card { background: var(--white); overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; border: 1px solid var(--line); }
.product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(10,22,40,0.1); }
.product-image-wrap { position: relative; aspect-ratio: 4/3; overflow: hidden; background: var(--navy-700); }
.product-image-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
.product-card:hover .product-image-wrap img { transform: scale(1.05); }
.product-tags { position: absolute; top: 14px; left: 14px; display: flex; gap: 6px; z-index: 2; }
.product-tag { background: var(--gold); color: var(--navy-900); font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 4px 10px; }
.product-tag.new { background: var(--navy-900); color: white; }
.product-duration { position: absolute; top: 14px; right: 14px; background: rgba(10,22,40,0.85); color: white; backdrop-filter: blur(6px); padding: 4px 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; z-index: 2; }
.product-body { padding: 20px 22px 22px; }
.product-region { display: inline-block; font-family: 'Gaegu', cursive; color: var(--gold); font-size: 13px; letter-spacing: 1.5px; margin-bottom: 4px; }
.product-title { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; color: var(--navy-900); line-height: 1.4; margin-bottom: 10px; min-height: 50px; }
.product-summary { font-size: 13px; color: var(--gray-700); line-height: 1.7; font-weight: 300; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 44px; }
.product-footer { padding-top: 16px; border-top: 1px dashed var(--line); display: flex; justify-content: space-between; align-items: flex-end; }
.product-price-label { font-size: 11px; color: var(--gray-500); letter-spacing: 1px; margin-bottom: 2px; }
.product-price { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; color: var(--navy-900); }
.product-price .won { font-size: 13px; font-weight: 500; color: var(--gray-700); }
.product-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; transition: gap 0.3s; }
.product-card:hover .product-link { gap: 10px; }

@media (max-width: 900px) { .products-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; } }
@media (max-width: 600px) { .products-grid { grid-template-columns: 1fr; } .products-section { padding: 30px 0 50px; } }

.empty-result { text-align: center; padding: 80px 20px; color: var(--gray-500); grid-column: 1 / -1; }
.empty-result-icon { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 60px; color: var(--gold); margin-bottom: 16px; opacity: 0.5; }
.empty-result h3 { font-family: 'Noto Serif KR', serif; font-size: 22px; color: var(--navy-900); margin-bottom: 10px; }
.empty-result p { font-size: 14px; margin-bottom: 24px; }
.empty-result .btn { display: inline-block; padding: 12px 28px; background: var(--navy-900); color: white; font-size: 13px; font-weight: 600; letter-spacing: 1px; }

/* CTA */
.cta-section { background: linear-gradient(135deg, var(--navy-900), var(--navy-800)); color: white; padding: 70px 20px; text-align: center; position: relative; overflow: hidden; }
.cta-section::before { content: ''; position: absolute; top: -50%; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(201,169,97,0.1) 0%, transparent 70%); }
.cta-eyebrow { font-family: 'Gaegu', cursive; color: var(--gold-light); letter-spacing: 3px; font-size: 14px; margin-bottom: 8px; position: relative; z-index: 2; }
.cta-title { font-family: 'Noto Serif KR', serif; font-size: 32px; font-weight: 700; margin-bottom: 10px; position: relative; z-index: 2; }
.cta-title .italic { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 400; color: var(--gold-light); }
.cta-desc { color: rgba(255,255,255,0.8); font-size: 14px; margin-bottom: 28px; font-family: 'Noto Serif KR', serif; font-weight: 300; position: relative; z-index: 2; }
.cta-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; position: relative; z-index: 2; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; font-size: 14px; font-weight: 600; letter-spacing: 1px; border: 1px solid; transition: all 0.3s; cursor: pointer; font-family: inherit; }
.btn-gold { background: var(--gold); color: var(--navy-900); border-color: var(--gold); }
.btn-gold:hover { background: var(--gold-light); border-color: var(--gold-light); }
.btn-kakao { background: var(--kakao); color: #3c1e1e; border-color: var(--kakao); }
.btn-kakao:hover { transform: translateY(-1px); }

/* Footer */
.footer { background: #050d1a; color: rgba(255,255,255,0.7); padding: 50px 0 24px; font-size: 13px; }
.footer-inner { max-width: 1280px; margin: 0 auto; padding: 0 40px; }
.footer-biz { font-size: 11px; color: rgba(255,255,255,0.4); line-height: 1.9; margin-bottom: 20px; }
.footer-biz strong { color: rgba(255,255,255,0.6); font-weight: 500; }
.footer-bottom { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
.footer-links { display: flex; gap: 20px; }
@media (max-width: 768px) { .footer-inner { padding: 0 20px; } .footer-bottom { flex-direction: column; gap: 12px; text-align: center; } }

/* Floating Kakao */
.float-kakao { position: fixed; bottom: 28px; right: 28px; z-index: 50; width: 58px; height: 58px; background: var(--kakao); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(254,229,0,0.4); color: #3c1e1e; font-size: 14px; font-weight: 900; animation: pulse 2s infinite; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 8px 24px rgba(254,229,0,0.4); }
  50% { box-shadow: 0 8px 24px rgba(254,229,0,0.7), 0 0 0 8px rgba(254,229,0,0.1); }
}
@media (max-width: 768px) { .float-kakao { width: 52px; height: 52px; bottom: 20px; right: 20px; } }

.not-found { padding: 100px 40px; text-align: center; }
.not-found h1 { font-family: 'Noto Serif KR', serif; font-size: 28px; color: var(--navy-900); margin-bottom: 12px; }
.not-found p { color: var(--gray-700); margin-bottom: 24px; }
.not-found a { display: inline-block; padding: 12px 24px; background: var(--navy-900); color: white; font-size: 14px; font-weight: 600; }
</style>
</head>

const params = new URLSearchParams(window.location.search);
const countryKey = params.get('c') || 'vietnam';
const initialRegion = params.get('r') || 'all';
const country = COUNTRIES[countryKey];

let currentRegion = initialRegion;

if (!country) {
  document.getElementById('app').innerHTML = `
    <div class="not-found">
      <h1>국가를 찾을 수 없습니다</h1>
      <p>링크가 올바르지 않거나 해당 국가가 등록되어 있지 않습니다.</p>
      <a href="index.html">← 메인으로 돌아가기</a>
    </div>`;
} else {
  document.title = `${country.name} 골프투어 | 초이스골프`;
  renderPage();
}

function renderPage() {
  const products = ALL_PRODUCTS.filter(p => p.country === countryKey);

        <span class="current">${country.name}</span>

    </div>
    
    <!-- HERO -->
    <section class="country-hero" style="background-image: url('${country.heroImage}');">
      <div class="country-hero-inner">
        <div class="country-hero-eyebrow">${country.nameEn} Golf Tour</div>
        <h1 class="country-hero-title">${country.name} 골프투어</h1>
        <p class="country-hero-desc">${country.description}</p>
        <div class="country-hero-stats">
          ${country.stats.map(s => `
            <div>
              <div class="stat-num">${s.num}</div>

      </div>
    </section>
    
    <!-- 필터 -->
    <section class="filter-section">
      <div class="filter-inner">
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab ${currentRegion === 'all' ? 'active' : ''}" data-region="all">전체</button>
          ${country.regions.map(r => `
            <button class="filter-tab ${currentRegion === r.id ? 'active' : ''}" data-region="${r.id}">${r.name}</button>

        <div class="filter-count">총 <b id="productCount">${products.length}</b>개 상품</div>

    <!-- 상품 목록 -->

    <!-- CTA -->

      <div class="cta-eyebrow">CAN'T FIND WHAT YOU WANT?</div>

          주소: 서울특별시 ○○구 ○○로 000 &nbsp;|&nbsp; 대표전화: 1533-3160 &nbsp;|&nbsp; 이메일: info@choicegolf.co.kr

    </footer>
  `;
  
  // 필터 클릭 이벤트
  document.querySelectorAll('.filter-tab').forEach(btn => {

      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentRegion = btn.dataset.region;
      renderProducts();
    });

  renderProducts();

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  const countEl = document.getElementById('productCount');
  const products = ALL_PRODUCTS.filter(p => p.country === countryKey);
  
  const filtered = currentRegion === 'all' 
    ? products 
    : products.filter(p => p.region === currentRegion);
  
  if (countEl) countEl.textContent = filtered.length;
  
  if (filtered.length === 0) {
    const isCountryEmpty = products.length === 0;
    grid.innerHTML = `
      <div class="empty-result">
        <div class="empty-result-icon">✦</div>
        <h3>${isCountryEmpty ? country.name + ' 상품 준비중' : '해당 지역 상품 준비중'}</h3>
        <p>원하시는 일정·예산을 알려주시면 맞춤 견적으로 안내해드립니다.</p>
        <a href="index.html#inquiry" class="btn">견적 문의하기 →</a>
      </div>`;
    return;
  }
  
  grid.innerHTML = filtered.map(p => `
    <div class="product-card" onclick="window.location.href='product.html?id=${p.id}'">
      <div class="product-image-wrap">
        <div class="product-tags">
          ${p.tag ? `<span class="product-tag ${p.tagNew ? 'new' : ''}">${p.tag}</span>` : ''}

        <span class="product-duration">${p.duration}</span>
        <img src="${p.image}" alt="${p.title}" loading="lazy">
      </div>
      <div class="product-body">
        <div class="product-region">[${p.regionName}]</div>
        <div class="product-title">${p.title.replace(/^\[.+?\]\s*/, '')}</div>
        <div class="product-summary">${p.summary}</div>
        <div class="product-footer">
          <div>
            <div class="product-price-label">FROM</div>
            <div class="product-price">${p.priceFrom.toLocaleString()}<span class="won">원~</span></div>
          </div>
          <span class="product-link">자세히 →</span>
        </div>
      </div>
    </div>
  `).join('');
}
